 \n>  If the discharge is directly overboard are the overboard valves secured with numbered seal/padlock and warning notices posted ?\n>  If drain channels are leading to engine room bilge well, is the access to the drains clear and not blocked?\n>  Are the spring loaded valves operational and pipeline clear ? Is this tested on regular basis and included in PMS\n>  If a hand pump is provided , it is it operational and records of regular tests maintained ?\n> If Bilge alarms is fitted, it is operational and tested", "sms": "TMM 11.7\nEMM 3.9", "status": "YES", "remarks": "Date of last testing of Bilge alarms in steering gear room: 24.01.2026", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 6.6", "q": "> Is there a duct keel on board? \nif yes answer the following, \n> Is the duct keel free of water/oil accumulation ? \n> Is the duct keel door open indication operational ?\n> Is the duct keel bilge alarm operational?\n> Is the Records of testing of alarms and indicators maintained?\n> Are the Duct Keel exhaust fan/vent damper/lighting operational?", "sms": "H&S 5.2.7\nTMM 8.1, 8.2, 12.4 & Annex 1G/2/6", "status": "NA", "remarks": "", "guidance": "Check Rubber packing on the fire damper inside the mechanical ventilator for pipe duct in good condition"}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.1A", "q": "> Is the spill containment under the bunker manifolds in good order and marked with capacity?\n> Is it clean and empty, plugs are in place and in good condition? \n> Is the capacity marked.\n> Is the spill containment not wasted/holed/thinned down etc? \n>Is adequate manifold spill containment provide under the bunker manifolds, and are they clean and empty? (V)", "sms": "TMM 4.2 & 4.2.3\nCL E-11", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.2A", "q": "> Has bunker line  been hydrostatically tested to MAWP, annually?\n> Has it been tested twice in last 5 years to 150% of MAWP?\n> Is the date of last test marked on the pipeline and there is RA and PTW available for this date.                                                                                                                                                                                    \n> Bunker valves tested at 6M", "sms": "TMM 4.8", "status": "YES", "remarks": "Date of last testing of bunker lines: 20.11.2025\n\nDate of last testing of valves: 20.11.2025", "guidance": ""}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.3A", "q": "> Are the drains, vents, and pressure gauges & thermometers at the bunker manifolds in good order? \n> Is the blanks suitable (same thickness as flange/fully bolted/bolts not missing/4-6 mm plate not being used as blank)and fitted correctly with all bolts on bunker manifolds?", "sms": "TMM 4.2.6\nE-11A", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.4A", "q": "> Are save-alls around all fuel, diesel, and lubricating oil tank vents clean and empty? \n> Are all provided with drain plug and secured with a chain? \n> Are they marked with capacity and identification?                                                                                                                                              > Is the height of save alls lower than the vent heads themselves", "sms": "D-03(Pre-arrival checklist)\nEMM-I/3.9.1\nTMM 4.2, CL E-11", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.7A                    Guideline 1", "q": "For bunkering operations: \n> Check if checklist E11A is complete in all respects and fully complied with?\n> Pre bunkering meeting done and logged? \n> Has the bunkering plan been made?\n> Is the FO, DO and LO transfer / bunkering procedures clearly displayed?\n> Is the diagram for the fuel oil transfer piping displayed?  \n> Has High-level alarms setting of the FO tanks been tested and records available?\n> Is there Proper identification of the valves on the bunker lines?\n> Is the bunkering entered in the ORB Part I?                                                                                                                                                                                                                                                               > Procedure specifying locations of fuel sampling points and shore lab analysis to ascertain sulphur levels are in place                                                                                                                                                                                                                                                      > Bunker samples as required by MARPOL  18(6) retained for last 12 months ?                                                                                                                                                                                                                                              > Are fuel samples stored in location protected by a localized fire fighting system ?", "sms": "TMM 4.2", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.10A", "q": "> Are the QC Valves of the fuel system being operational , regularly tested and in good order? \n> Is each QC valve identified with ID number/Name ?\n> Is control air bottle regularly drained and there is adequate pressure in the bottle?", "sms": "TMM 6.1.4, 6.3.2 & Annex 1A\nFM 22", "status": "YES", "remarks": "Date of Last Test: 12.11.2025", "guidance": ""}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.11A", "q": "> Are high pressure fuel delivery pipes of diesel engines protected with jacketed piping?\n> Is the leakoff alarm system being tested regularly and included in PMS?\n> Is the FO leak off alarms for ME and AE operational and record of checks maintained in PMS?", "sms": "TMM 3.5.4, 3.5.6 & Annex II", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.12A", "q": "> Are purifier rooms and fuel / lubricating oil handling areas well ventilated?\n> Is the purifier room free of oil leaks and clean? \n> Are all gauges operational at these locations? Gauges not gagged ?\n> Are all Oil seals for pumps topped up?", "sms": "TMM 3.5", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.16B", "q": "Is crew familiar with major problems associated with fumigation of cargo in stowage on board? \n-Are all crew briefed on dangers of fumigation viz toxicity and its potential for fire or explosion .\n-The chemical reaction of fumigant produces heat and if fumigant is not properly distributed can cause fire .\n-The fumigant pallet can react with water and spontaneously ignite\n-Spontaneous heating of the fumigation gas can cause fire/explosion as phosphine gas is explosive at levels above 1.7% v/v in air.", "sms": "BGCM 4.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.22B", "q": "Have the air conditioning intakes for the accommodation, the engine room and other spaces been set to prevent the possibility of drawing in fumigant gas? \n-RA for fumigation has addressed the possibility of ingress of toxic gas into accomodation/ER/other spaces due to incorrect ventilation.\n-Ventilation fans/flaps are correctly set up before the start of fumigation to prevent drawing of fumigant gas into accomodation/ER and other spaces.\n-Before ventilating cargo holds ventilation arrangements for accomodation/ER/other spaces to be rechecked to prevent ingress of toxic gases.", "sms": "BGCM 4.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.33B", "q": "Do records on board verify that cargo lights in holds, where fitted, were properly isolated before cargo was loaded? \n-Item to be included in ship specific D/Bulk 02 and complied with", "sms": "D/Bulk 02", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 12.8", "q": "> Are all USB ports blocked ( Signed paper stickers as USB port lock are not acceptable) \n> Is vessel provided with a dedicated computer and printer(Not connected to ships Lan system) for use by shore personnel and which is provided with updated antivirus.\n> Are all computers  updated with latest antivirus.\n> Is there a dedicated USB available for transferring data from communication computer to ECDIS.\n\nAre all staff and Master familiar with,\na) Company policy for use of personnel laptop/mobile for ships business.\nb) Cyber security guidelines\nc) SMS guidelines for opening attachement from unknown sources sent on email. \n> Is a Cyber security poster displayed at each computer.", "sms": "PAM 22.1", "status": "YES", "remarks": "", "guidance": "Critical equipment such as ECDIS should be protected from malware and virus attack. Access to USB and RJ-45 ports shall be controlled – i.e., disable or lock the ports."}, {"app": "All Vessels", "ref": "RISQ 13.1                    Guideline 1", "q": "Is following available in E/Rm: \n> ER watch arrangement posted (Tec 33A)\n> Port/sea/arrival-departure procedures  \n> UMS procedures when classed for UMS operations\n> Response to various emergencies in engine room \n> PMS, Spare parts and stores inventory \n> SMS guidelines on reporting damage to equipment or machinery                                                                                                                                                                                                                         > Crew job familiarization and handover   checklists.                                                                                                                                                                                                                                > Minimum critical and essential spares.                                                                                                                                                                                                                        > Reporting of accidents and near misses                                                                                                                                                                                                                                   > Defect reporting procedure                                                                                                                                                                                                                        > Procedure for preventing/controlling pollution                                                                                                                                                                                                                               > Bunkering procedures                                                                                                                                                                                                                 > Engine room work instructions and checklists                                                                                                                                                                                                                               > Permit to work systems                                                                                                                                                                                                                       > Critical equipment and their isolation /maintenance                                                                                                                                                                                                                  >Training needs and records", "sms": "TMM 3.0", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.1                    Guideline 2", "q": "Are adequate engineering procedures, instructions and guidelines included in the SMS\n> Engineering watch keeping duties and responsibilities for operational procedures available ?\n> Procedures for routine engine room operations including checklists available ?\n> Procedures for critical operations, including bunkering, port arrival and departure ?\n> Procedures for preventing and controlling pollution, including activities such as oil spill response and disposal of waste \n> Emergency response checklists available ?\n> Defect reporting procedure and system for rectifying defects in place ?\n> Reporting procedures for accident and near misses in order ?\n> Permit to work system records ?\n> Identification of critical machinery/equipment and procedures to ensure availability and for isolation/maintenance of\ncritical equipment available ?\n> Procedure for management of minimum critical and essential spares available ?\n> Planned Maintenance System and a method for recording maintenance activities available ?\n> Checklists for crew familiarization and handover ?\n> Training planner?", "sms": "TMM 3.0", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.2", "q": "> Have manning levels been increased when required(planned or unplanned).                                                                          > Have planned changes identified for every passage for acttivities such as - arrival departure, cargo operations, bunkering, fuel changeovers, machinery overhauls, docking, navigational hazards, and unplanned changes such as machinery faults, adverse weather, blackout, fire, flooding\n>Are the responsibilites of watch standing engineers and engine ratings well-define and clearly posted in the Engine Control Room? Is there a manning matrix for engineers that takes into account both planned and unplanned changes? (V)", "sms": "TMM 3.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.8", "q": "Engineer’s call system\n> Is the system operational\n> Have the alarms been tested and records available for manual testing.", "sms": "TMM 3.3", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.9                    Guideline 1", "q": "> Has manual logging of alarms being done in the absence of an engine room alarm logging printer?\n> Are historical records for the last 12 months available?\n> Are the following recorded correctly in the engine logbook:\n-Readings of main propulsion engine\n-Readings of auxiliary engines\n-Readings of other running machineries\n-Main engine RPM and load on the engine\n-Daily entry for all the lube oil ROB\n-Daily entry for all grade of fuel oil ROB\n-ROB value of sludge and bilge\n-Running hour counter for important machinery\n-Record of any major breakdown and reason for the same\n-Record of all bunkering operation (time, place, and quantity)\n-Record of soot blow for the boiler tube (Soot blowing should be performed when the vessel is at sea and/or outside the port limit)\n-Record the start and stop times of UMS mode\n\n> Has the EOW signed the logbook after completion of watch and the Chief Engineer on a daily basis ?\n> Have errors made in the log struck through with a single line and initialled and dated ?\n> Is any correction fluid used for correction of error made in the logbook ?\n> Have the alarm printers and automation system set to the correct time and date?", "sms": "TMM 3.2", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.10                    Guideline 2", "q": "> Are the the ships staff aware of preferential trips and machinary included in same. \n> Are there records of testing preferential trips.\nIs a deadship recovery procedure avilable and posted in ECR. Are the following included in the procedure:  \n>  Restoring power from the emergency to the main switchboard\n>  Charging of air reservoirs \n>  Starting auxiliary engines and other associated machinery\n>  Restarting the main engine", "sms": "TMM 6.0", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.11                    Guideline 1", "q": "PMS Procedures: Check following  \n> Can officers demonstrate familiarity with the system ?\n> Are the job descriptions for machineries correct    \n> Is the system fully operational?\n> Are all critical machinery and spare parts identified?\n> Is spare part inventory entered and updated in PMS? Does it show minimum required and actual on board qty.\n> For new delivery/takeovers, is there a paper PMS in place \n> Is a regular back up taken where required?      \n> Are all jobs completed and postponement approved by office available for overdue jobs. \n> For postponed items, is their communication available from manufacturer that maintenance can be postponed beyond the overhaul hours.                      \n\nShip specifc PMS: Are following included in PMS \n> All cargo deck machinery\n> Mooring machinary \n> All Navigational equipments \n> All LSA and FFA equipment \n> All Machineries in ER specially retrofitted machinery such as scrubber/BWTS etc", "sms": "TMM 5.2", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.13                    Guideline 1", "q": "ME - Major sub parts: Is maintainence of following equipment completed and not overdue:  \n>  Fuel valve\n>  Fuel pump\n>  Exhaust valve\n>  Cylinder cover\n<  Pistons\n>  Liner\n>  Cross head bearings\n>  Bottom end bearings\n>  Main bearing\n>  Turbo charger\n>  Governor of the main engine units .  \n>  ME alarms", "sms": "TMM 10.0", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.15", "q": "Emergency Escape : Check Following \n> Are the routes clearly marked, free of obstruction and adequtely lit \n> Are the escape signs posted within 30 cm from engine room floor and leading to the nearest emergency escape\n> Is the escape door highlighted in contrasting color \n> Is there a lifting arrangement rigged ready for use in emergency escape", "sms": "TMM 3.5.2", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.16", "q": "Engine Room Illumination: Check following  \n> Is the Iliumination level in engine room space adequate? \n> Are all lights working \n> Are all shades in good order and not cracked, aged or missing  \n> Engine room is free of temporary light fixtures", "sms": "TMM 3.5.2", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.17                    Guideline 1", "q": "> Are the emergency fire pump, main fire and foam pumps, emergency air compressor, emergency generator, emergency generator switchboard, emergency steering, emergency stops, engineers’ alarms and bilge pumping system, where applicable, tested?\n> Is the testing of the emergency generator carried out under load at least annually ?\n> IS the emergency air compressor, if fitted, regularly tested to the starting pressure of the diesel generator and emergency\nair reservoir permanently maintained at the required pressure?\n> Are the priming device attached to the emergency and main fire pumps working good and have visible and legible operating instructions ?", "sms": "TMM 6.0", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.17                    Guideline 2", "q": "> Is the emergency air reservoir charged to correct pressure.                                                                                                                        > Is the priming device attached to main and emergency fire pumps operating correctly.                                                                                                                           > Do they have visible legible operating instructions", "sm tus": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.24", "q": "Self-closing sounding devices : Check Following \n> Are the closing devises operational and not by passed.  \n> Is the spring in good order, not missing or damaged \n> Is the dead weight fitted correctly                                                                                                                                                                             > Are any sounding rods/tapes or funnels left inside the open sounding pipe ?", "sms": "TMM 3.5.9", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.25", "q": "> Are the shafts of rotating machinery/grinders/bench drill/bench grinder/bench lathe etc. provided with protective guards?", "sms": "TMM 3.5", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.26", "q": "ER workshop:  Check Following \n> Are protective guards/shields provided around various machinaries: (rotating machinery/grinders/bench drill/bench grinder)\n> Are emergency stops ( pedestal stops )for ER workshop machinery working and have they been tested                                    > Is the workshop clean and tidy ?", "sms": "TMM 3.5", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.27", "q": "> Are the cranes in engine room ,other lifting equipment and hydraulic tools inspected, tested, and records mintained? \n> Are the limits and cutouts on cranes working correctly\n> Are the records of inspection and load test of following available\n   a) Portable lifting gear  \n   b) Chain blocks\n   c) Strops\n   d) Slings,\n   e) Shackles \n   f) Lifting Eye bolts\n> Are beams in ER marked with SWL                                                                                                                                                                                                                                   > Are all shackles marked and stamped with the safe working load ?                                                                                                                                                                                                                             > Are spring loaded retaining tongue of hooks in good order ?\n> Is the 5Y load test and annual inspection certificates for ER crane available.                                                                                                                                                                                                                              > Is a 'Lifting appliance log' maintained onboard                                                                                                                                                                                                                                    >Are hydraulic jacks and bending machines in good condition, using correct grade of oil and topped up ? Are their pressure gauges calibrated regularly ?", "sms": "H & S 8.5", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.28", "q": "> Are all spares and loose equipment in engine room secured properly  especially heavy items such as paints/LO drums/ME spares.No securing using ropes.\n> Are all items, loose gear etc in stores and steering compartment secured properly                                                                                   > Are there procedures for storing, securing and manual handling of steel parts & steel plates?                                                                                                                                                            > Have risk assessments been documented ?", "sms": "H & S 6.8", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.29", "q": "Housekeeping in the Engine Room:  Check following  \n>  There are no drip catchers below any running machinery\n>  There are no oil soaked or other rags lying around/stuffed under the machiniary \n>  All oil soaked rags kept in covered bins\n>  All emergency equipment are marked properly with IMO symbols and the access is not blocked\n>  Engine room is free of tripping hazards and all overhead hazards are highlighted\n>  Are all Notices and warnings clear and legible and not worn off. \n> Void spaces under tanks/behind tanks not used to store rags/discarded machinery spare parts.     > Are workshops, spare parts room, chemical store, electrician store", "sms": "TMM 3.5", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.30", "q": "ER bilges: Check Following \n>  Are the bilges clean and free of oil leaks or sediments\n>  Have the bilges been painted in light contrasting colour so that any oil accumulation  is readily evident", "sms": "TMM 3.5", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.32", "q": "> Are the seawater pumps & seawater pipelines free of any hard rust or leakage \n> Are the pipelines and seachest free of temporary repairs/ cement box or doubler plates", "sms": "TMM 11.11", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.33                    Guideline 1", "q": "> Is the following machinery/equipment, where applicable, in good order and well maintained? \n- Shaft generator and emergency generator\n- Boilers, including waste heat and domestic boilers (Boilers should be operated in automatic mode where the automated boilers are installed)\n- Boiler safety system and instrumentation\n- Boiler water safety system\n- Main and emergency air compressors\n- Purifiers and fuel oil handling equipment\n- Stern tube sealing arrangements\n- Incinerator\n- Sewage system\n- Air condition and heating system\n- Refrigeration plant\n- Accommodation service systems (i.e., Calorifiers, Portable water equipment, heating etc)\n- Any other items of machinery, including stand-by machinery.\n- Burners, tubes, uptakes, exhaust manifolds and spark arrestors.\n- Engine control console including the control and monitoring system\n- Steering gear system\n> Is soot-blowing done frequently\n> Are exhaust gas inlet and outlet temperature and pressure differential between gas inlet and outlet of the economizer checked at least once every watch. \n> If economizers have bypass arrangements for when the ship is maneuvering or to control steam output is the bypass tested on a regular basis.\n> If the refrigeration and air conditioning use refrigerants that are classified as ozone depleting substances (ODS) is a  ODS record book maintained\n> Incinerator operation ;\n- No waste oil or sludge incinerated when in ports, harbours or estuaries;\n- Sludge from Exhaust Gas Cleaning System(EGCS) not incinerated.\n- Plastics and PVC should incinerated in IMO-approved incinerators.\n> Is there observation window for the air receiver drainage pot ?", "sms": "General ER procedures", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.33                    Guideline 2", "q": "> Are the records available for trying out of automatic switch over arrangements for A/E?   \n> Are the records available for checking of reverse power relays ? \n> Are alarm printer readouts readable?   \n> Are the boilers functioning in Auto Mode ? Easing gear for safety valves in order ?      \n> Are the entries in log book done for soot blowing prior arrival and departure port ?   \n> Is there a warning sign displayed near soot blow valve \"NO SOOT BLOWING IN PORT\"", "sms": "Ship's PMS system, TMM 3.2.10, TMM 11.2, EMM-I/9.5", "status": "YES", "remarks": "Date last reverse power relay checked:  12.11.2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.34", "q": "> Are the following piping system free of any temporary repairs or leakages:  \na) Steam,\nb) Fuel\nc) Lubricating oil\nd) Sewage, \ne) Drain \nf) Air lines", "sms": "General ER procedures", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.44", "q": "> Is the steering gear compartment clear of obstructions and is loose equipment properly secured?", "sms": "TMM 11.7", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.45", "q": "Steering space - Check Following \n>  There are suitable handrails, gratings or other non-slip surfaces around steering gear \n>  Are there wooden grating around the steering gear. (These should not be broken or with any jagged edges) \n>  Is the antiskid paint arrangement in good order", "sms": "TMM 11.7", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 14.6", "q": "Check: \n> Vents and air pipes on deck in good order \n> Are vents  marked to indicate compartment they serve? \n\nCheck following for all tank/void vents \n> Deflector plates not damaged \n> Float and sealing arrangements in good condition  \n> Flame arrestor mesh in place for vents on bunker tanks ?", "sms": "TMM 8.6", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 14.13", "q": "Check following in stores on deck and inside accommodation \n> Stores are  clean and tidy and well arranged\n> Cabins or cable ducts are not being used as stores\n> Stores with safety equipment have keys placed next to them or can be opened in an emergency immediately  \n> Heavy items are secured against movement where required using wires and turnbuckles.", "sms": "H&S 6.4.3", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 15.10", "q": "> Are senior officers familiar with the following, \na) GB 01 Suicide prevention guidelines", "sms": "GB 06 H & S 7.1.9", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 15.12", "q": "> Are senior officer familiar with GB 01 and GB 06 (guidelines on managing fatigue)\n> Has the Starting auxiliary engines and other associated machinery\n>  Restarting the main engine", "sms": "TMM 6.0", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.11                    Guideline 1", "q": "PMS Procedures: Check following  \n> Can officers demonstrate familiarity with the system ?\n> Are the job descriptions for machineries correct    \n> Is the system fully operational?\n> Are all critical machinery and spare parts identified?\n> Is spare part inventory entered and updated in PMS? Does it show minimum required and actual on board qty.\n> For new delivery/takeovers, is there a paper PMS in place \n> Is a regular back up taken where required?      \n> Are all jobs completed and postponement approved by office available for overdue jobs. \n> For postponed items, is their communication available from manufacturer that maintenance can be postponed beyond the overhaul hours.                      \n\nShip specifc PMS: Are following included in PMS \n> All cargo deck machinery\n> Mooring machinary \n> All Navigational equipments \n> All LSA and FFA equipment \n> All Machineries in ER specially retrofitted machinery such as scrubber/BWTS etc", "sms": "TMM 5.2", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.14                    Guideline 1", "q": "AE : Major sub parts:  Is maintainence of following equipment completed and not overdue\n>  Fuel valve\n>  Fuel pump\n>  Cylinder Cover\n>  Pistons\n>  Liner\n>  Cross head bearing\n>  Bottom end bearing\n>  Main bearing\n>  Turbo blower\n>  Governor of the Aux engine units\n> Automatic change over and protection devices such as reverse power trip/overload\n > AE Alarms", "sms": "TMM 11.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.17                    Guideline 1", "q": "> Are the emergency fire pump, main fire and foam pumps, emergency air compressor, emergency generator, emergency generator switchboard, emergency steering, emergency stops, engineers’ alarms and bilge pumping system, where applicable, tested?\n> Is the testing of the emergency generator carried out under load at least annually ?\n> IS the emergency air compressor, if fitted, regularly tested to the starting pressure of the diesel generator and emergency\nair reservoir permanently maintained at the required pressure?\n> Are the priming device attached to the emergency and main fire pumps working good and have visible and legible operating instructions ?", "sms": "TMM 6.0", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.18", "q": "Engine room ventilation fans/dampers: Check Following:  \n> Is closing mechanism of ventilation supply and exhaust fans clearly marked\n> Are the closing mechanisms working and tested regularly from both local and remote locations\n> Are the means to verify that flaps are closing ( Inspection ports ).(Means for checking visually must be available)  \n> Check condition of flaps edges not wasted/closing fully.\n> Have all means of stopping tested at various locations and is there a list displaying the fans stopped by each stopping devise.  \n> Are records of testing of funnel dampers available.", "sms": "TMM 3.5.2/3.5.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.29", "q": "Housekeeping in the Engine Room:  Check following  \n>  There are no drip catchers below any running machinery\n>  There are no oil soaked or other rags lying around/stuffed under the machiniary \n>  All oil soaked rags kept in covered bins\n>  All emergency equipment are marked properly with IMO symbols and the access is not blocked\n>  Engine room is free of tripping hazards and all overhead hazards are highlighted\n>  Are all Notices and warnings clear and legible and not worn off. \n> Void spaces under tanks/behind tanks not used to store rags/discarded machinery spare parts.     > Are workshops, spare parts room, chemical store, electrician store", "sms": "TMM 3.5", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.31", "q": ">Is the ER bilge high level alarm system operational , tested and records maintained                                                                            > Is the testing of high level alarms done at least every watch and as a part of pre-UMS checks", "sms": "TMM 3.2.12, TMM Annex 6", "status": "YES", "remarks": "Date of last test: 01-02-2026", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.33                    Guideline 2", "q": "> Are the records available for trying out of automatic switch over arrangements for A/E?   \n> Are the records available for checking of reverse power relays ? \n> Are alarm printer readouts readable?   \n> Are the boilers functioning in Auto Mode ? Easing gear for safety valves in order ?      \n> Are the entries in log book done for soot blowing prior arrival and departure port ?   \n> Is there a warning sign displayed near soot blow valve \"NO SOOT BLOWING IN PORT\"", "sms": "Ship's PMS system, TMM 3.2.10, TMM 11.2, EMM-I/9.5", "status": "YES", "remarks": "Date last reverse power relay checked:  12-NOV-2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.36", "q": "> Are crew familiar with the starting procedure for the emergency generator and how to put power on the emergency switch board? \n> Has the emergency source of electrical power, including its automatic starting arrangement, tested using a test switch provided in the Emergency Switch Board (ESB)?\n> Is staff familiar with the process of sequential test start and loading of the ESB.\n> Are emergency generating set equipped with starting devices with a stored energy capability of at least three consecutive starts. \n> Is a second source of energy provided for an additional three starts within 30 minutes unless manual starting can be demonstrated to be effective ?\n> Have brief instructions posted which are simple, clear, and understandable by all crew ?", "sms": "TMM 6.3/TMM 12.3", "status": "YES", "remarks": "Date emergency generator was taken on load: 12-NOV-2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.40", "q": "Emergency steering gear: Check Following : \n>  Have the drills been conducted every three months and drill records available? \n>  All crew familiar with emergency steering arrangements ?\n>  Is the working of automatic isolation system tested and recorded?\n>  Have all alarms tested during the steering drill and recorded? \n> Are records available for testing of emergency steering on emergency power ?\n>  Is the emergency reserve tank fully charged to recharge at least one power actuating system , is the level marked on tank correctly \n>  Is the Gyro repeater heading synchronised with bridge\n>  Is the communication system(Both auto and sound powered telephone) working in good order.\n>  Are the Mic and headphone operational.\n>  Is the rudder angle indicator polished and clearly marked                                                                                                                            > Manual transfer pump for steering gear system oil operational ?", "sms": "TMM 11.7", "status": "YES", "remarks": "Date of last steering gear drill: 18-NOV-2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 14.9", "q": "> Mast heads and their fittings, including wire stays,flood lights,deck lights, emergency lights, and hold lights (if installed), in good working order? (V)\n> Are wire stays kept free of sheathed plastic ?\n> Hold lighting system fully operational and properly maintained ?\n> General lighting system operative and no significant earth on the switch boards ?                                                                                                                                                                                                      >Are the lamp holders, drip shields, and shades of portable cargo lights nonconductive, and isolate the crew from electrical shock hazards and have a voltage greater than 50V AC (1-1000Hz) or 120V DC ?", "sms": "H&S 6.4.11\nTMM 12.4", "status": "YES", "remarks": "", "guidance": "Rightship inspector will record a Finding if wire stays with sheathed plastic were used to secure the mast heads. Rightship inspector will record a Finding if the lamp holder, drip shield, and shade of portable cargo lights are not nonconductive & do not isolate the crew from electrical shock hazards or have a voltage greater than 50V AC (1-1000Hz) or 120V DC."}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.13", "q": "Are procedures in place to safeguard the operation of critical equipment in sub-freezing temperatures? \n> Are the emergency batteries used designed for cold temperature\n> Has a suitable antifreeze been added to exposed lines of cooling system\n> Is the Arctic grade fuel in use where required", "sms": "TMM 6.3/CL D 13", "status": "YES", "remarks": "", "guidance": ""}]}, "CE": {"items": [{"app": "All Vessels", "ref": "RISQ 2.5", "q": "Rest Hours - Check Following \n> Are the rest and work hours records maintained? \n> Are there any Violations? Check if there have been two or more consecutive violations for the same crew \n> Check the resthour records of key personnel against UMS timings, drills,arrival and departure ports, bunkering timings, periods of restricted visibility at random to confirm if they are matching ? \n> Has an office response received for any non conformity recorded ? ANSWER - NO if above conditions are not met.", "sms": "PAM 11.6", "status": "YES", "remarks": "", "guidance": "Rest hours to be checked for all crew specifically for fire rounds."}, {"app": "All Vessels", "ref": "RISQ 4.7            Guideline 1", "q": "> Is ER workshop designated for hot work. Is a RA in place for designated hot work area. \n> Is company permission available for Hot work outside designated area where required ?\n> If any HW was done in port - is a port permission available?                                                                                                                       > Is hot work permit used for jobs done outside designated area", "sms": "H & S 5.3", "status": "YES", "remarks": "", "guidance": "Hot work in places other than the workshop should be the subject of a permit to work."}, {"app": "All Vessels", "ref": "RISQ 4.8                    Guideline 1", "q": "> Are PTW forms being used on board \n> Is the lock out-tag out system in use  \n> All all permits completed and filed correctly \n> Have you checked the permits against PMS/routine maintainence-inspection/unexpected breakdown/damages to confirm they have been adequately completed \n> Is there a RA and tool box talk record available with the permits where required", "sms": "H & S 5.0", "status": "YES", "remarks": "", "guidance": "The vessel’s manager should identify the High-risk tasks on board and create a specific permit and risk assessment system for the ship."}, {"app": "All Vessels", "ref": "RISQ 4.8                    Guideline 2", "q": "Crew must be aware of : \n> Requirements for working over the side to rig combination pilot ladders\n> Lock out/tag out kit , its location and implementation on board \n> Designated HW area and procedures for Hot work", "sms": "H & S 5.0", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Vessels with cargo cranes", "ref": "RISQ 4.13", "q": "For vessels with Cranes only : \n> Is the CL/D/Bulk/08 - Crane inspection checklist in use and completed\n> Is the CL/D/Bulk/09 - Crane operator familiarization checklist used and completed before handing over the cranes to the operator ?", "sms": "BGCM Checklists", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.27", "q": "> Are the fixed fire extinguishing systems (where fitted) in good order?\n> Have the alarms/emergency stops of fans and pumps/quick closing valves been tested \n> Have the Co2 lines been blown through. \n> Has the CO2 system undergone shore servicing/overhaul of main valve/renewal of rubber hoses and pressure testing of cylinders\n> Is the key to Co2 room kept near to the room and easily available\n> Is the foam pump free to turn?\n> Is the hypermist system in auto mode \n> Has the hypermist system been tested\n> Is the water level in reserve tank satisfactory , is the suction valve lashed open", "sms": "LSA and FFA  ship specific Maint Plans\n(MM 6.8)", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.28", "q": "> Is the emergency fire pump regularly tested and in good condition and maintaining good pressure?\n> Are starting instructions clearly posted? \n> Are Priming pump/gauges/suction and discharge valve/non return valve(if fitted) in good condition and with no leaks from gland.\n> The operating condition of the isolating valves and cocks in good order ?\n> Are all crew trained to start the emergency fire pump ? \n> Is the minimum draft at which emergency fire pump takes suction posted\n> Have all fire pumps, including emergency fire pumps, flow tested once a year to ensure proper pressure and capacity?\n> Test of the emergency fire pump’s capacity and pressure by deploying a fire hose on the bridge wing and another on the forecastle ?", "sms": "LSA and FFA  ship specific Maint Plans\n(MM 6.8)", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.33", "q": "> Are ventilation fire dampers clearly marked\n> Have they been tested\n> Have the ER vent flaps and funnel flaps checked- from local and remote location \n> Is the condition of flaps in good condition : Check from the inspection port  \n ( Item 1/2 - Chief Officer for deck , All items - CE for Engine room)", "sms": "LSA and FFA  ship specific Maint Plans\n(MM 6.8)", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.42", "q": "> Are the required number and type of lifebuoys available onboard ?\n> Are 12 rocket parachute flares available on bridge ?\n> Is illustrated table for life saving signals available on bridge ?\n> Are line throwing apparatus available and ready to use ?                                                                                                                               > Are containers, brackets, racks and similar stowage locations for LSA labelled ?", "sms": "LSA maintenance plans", "status": "YES", "remarks": "", "guidance": "MOB marker and lifebuoy can be released easily in an emergency (not entangled /tied)"}, {"app": "All Vessels", "ref": "RISQ 5.1", "q": "> Is the ORB part -1 up to date? \n> Is the company guidance on making entries to ORB entries attached with ORB?", "sms": "EMM 13.2, TM126", "status": "YES", "remarks": "Date of Last entry : 06.02.2026", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.2", "q": ">  Are the tanks and capacities of tanks in ORB match with that entered in IOPP certificate Form B Section 3.1? Has the weekly residue declaration done for all tanks listed?", "sms": "EMM 13.2, TM126", "status": "YES", "remarks": "Date of last weekly entry: 01.02.2026", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.10                    Guideline 1", "q": ">  Is the Ballast Water treatment system in good order & were the Master & officers familiar with the vessels Ballast Wter Management plan and records available to  demonstrate ballast handling was in accordance with the plan?\n>  Is BWTS operational and maintained as per PMS \n>  Are the records of sample analysis available ?\n>  Is the USCG approval available ?\n>  Is BWTS in the  BWMP and is the plan approved by class?", "sms": "EMM 8.1 Regulation update 145", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.10                    Guideline 2", "q": ">  Are the crew aware of hazards of chemicals or treatment additives used in BWTS (where used) for handling/making entry into ballast tanks/overhaul of BWTS machinery \n> Is  safe handling instructions and equipment available on board to use these chemicals", "sms": "EMM 8.1", "status": "NA", "remarks": "Vessel uses UV + Filtration type BWTS. Addition of chemicals not applicable.", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.14", "q": ">  Are arrangements for sludge collecting pumps free from any connection to a direct overboard discharge? ( Inform office if there is a connection for direct overboard discharge)\n>  If a direct overboard discharge is available the section of pipeline to be removed and end blanked & secured with EMS seals.", "sms": "EMM-I/3.4.1 & 3.5", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.15                    Guideline 1", "q": "> Are officers and crew members familiar with the operation and maintenance of the OWS equipment, including the ability to retrieve historical data from the Oil Content Monitoring (OCM) in accordance with manufacturer’s instructions?\n> Is the 15-ppm bilge alarm recording date, time and alarm status, and operating status of the 15-ppm bilge separator.\n> Is the recording device storing data for at least eighteen months and able to display or print a protocol for official inspections as required ?\n> Certificate of type approval for a 15-ppm bilge alarm available ?\n> Accuracy checked through the calibration and testing of the equipment, at intervals not exceeding five years, or within the term specified in the manufacturer’s instructions (whichever is shorter) ?\n> At least two power pumps connected to the main bilge system provided, one of which may be driven by the propulsion machinery ?", "sms": "EMM 1/3.2", "status": "YES", "remarks": "Date of last shore calibration of 15PPM monitor: 27.11.2024", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.16", "q": ">  Are there warning signs been posted at the Oily Water Separator overboard discharge valve as per SMS \n>  Are there effective sealing arrangements implemented to prevent accidental opening?                                                                                                                                                                                                                            > Is the system engineered in such a way that protection against unauthorized access or accidental operation of the valves is provided.", "sms": "EMM-I/3.2.1 & 3.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.21", "q": ">  Is a SEEMP plan available and voyage records updated  \n>  Is the SEEMP Part I ship specific and approved by VM?\n>  Is the SEEMP part II approved by Class  and available ?\n>  Has the SEEMP review been done and records maintained ?", "sms": "EMM 11.1.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.23                    Guideline 1", "q": ">  Is a exhaust gas cleaning system (scrubber system) provided \n>  Are the engineers familiar with its safe operation\n>  Have all engineers have done Ship specific Scrubber course prior joining ship and certificate of training available on board?\n>  Have C/E and 2/E reviewed the risk assessment and contingency procedure on joining or before operating the scrubber?\n>  Are engineers aware of operational procedures in normal / bypass mode and in case of system failure / deviation from normal operation?\n>  Are crew aware of potential safety hazards associated with EGCS?Action incase of medical emergencies due to hazardous chemicals ? Is required PPE available ?\n> Is method of internal monitoring of scrubber pipelines and distance piece included in  the PMS.?\n>  Is the piping condition in good condition , is it well painted and without any leaks specially at welds and at overboard discharge \n>  Is the lighting adequate in scrubber compartment ?\n> Is scrubber record book updated", "sms": "EMM/9.1\nTMM 4.1.1 Company model plan Guidelines on use of scrubber", "status": "NA", "remarks": "", "guidance": ""}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.5A", "q": "> Are the Lube oil analysis sampling and analysis done as per SMS?\n> Are all analysis reports free of any concerns.In case any caution/alert is there, correspondence with office to handle same. \n> Are samples being landed as per Tec-09 \n> Is onboard test kit provided?", "sms": "TMM 4.9& 4.10", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.6A", "q": "> Is the staff familiar with SMS guidelines to mitigate damage due to Catalytic Fines and contaminents. Is this being followed?", "sms": "TMM 4.9", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.7A                    Guideline 1", "q": "For bunkering operations: \n> Check if checklist E11A is complete in all respects and fully complied with?\n> Pre bunkering meeting done and logged? \n> Has the bunkering plan been made?\n> Is the FO, DO and LO transfer / bunkering procedures clearly displayed?\n> Is the diagram for the fuel oil transfer piping displayed?  \n> Has High-level alarms setting of the FO tanks been tested and records available?\n> Is there Proper identification of the valves on the bunker lines?\n> Is the bunkering entered in the ORB Part I?                                                                                                                                                                                                                                                               > Procedure specifying locations of fuel sampling points and shore lab analysis to ascertain sulphur levels are in place                                                                                                                                                                                                                                                      > Bunker samples as required by MARPOL  18(6) retained for last 12 months ?                                                                                                                                                                                                                                              > Are fuel samples stored in location protected by a localized fire fighting system ?", "sms": "TMM 4.2", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.8A", "q": "> Dos the vessel have approvals from class/yard regarding  use of very-low or ultra-low sulphur fuels in the main engine, auxiliary engines and boilers? \n> Is the certificate or statement of compliance available for the use of low-sulphur fuel in boilers?", "sms": "EMM 9.0", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.9A", "q": "> Are ship specific work instructions for fuel oil changeover approved by VM available?Is the pipeline capacity mentioned in the WI.\n> Are the RA records for change over maintained?\n> Is latest edition of FOBAS calculator available and being used?Printout/soft copies maintained?\n> Are appropriate records maintained in LOG 04 and ER log book ?   \n> Are the IMO DCS TEC-49 form being updated every month and records maintained?", "sms": "EMM 9.0", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.13A", "q": "> Is the reserve fuel tank of the emergency generator filled up and has sufficient for at least 18 hours operation?  The level must be markedon the reserve tank. \n> is  anti freeze available for radiator when trading to cold regions?\n> Is the Quick closing valve in good order and tested \n> Has the Load test/black out test for emergency generator done at 3M interval? \n> Are both means of starting operational and PMS routines established for testing?\n> Are there records of testing the spare starting motor in PMS?", "sms": "TMM 6.3", "status": "YES", "remarks": "Date of last load test: 24.11.2025", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.16B", "q": "Is crew familiar with major problems associated with fumigation of cargo in stowage on board? \n-Are all crew briefed on dangers of fumigation viz toxicity and its potential for fire or explosion .\n-The chemical reaction of fumigant produces heat and if fumigant is not properly distributed can cause fire .\n-The fumigant pallet can react with water and spontaneously ignite\n-Spontaneous heating of the fumigation gas can cause fire/explosion as phosphine gas is explosive at levels above 1.7% v/v in air.", "sms": "BGCM 4.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.22B", "q": "Have the air conditioning intakes for the accommodation, the engine room and other spaces been set to prevent the possibility of drawing in fumigant gas? \n-RA for fumigation has addressed the possibility of ingress of toxic gas into accomodation/ER/other spaces due to incorrect ventilation.\n-Ventilation fans/flaps are correctly set up before the start of fumigation to prevent drawing of fumigant gas into accomodation/ER and other spaces.\n-Before ventilating cargo holds ventilation arrangements for accomodation/ER/other spaces to be rechecked to prevent ingress of toxic gases.", "sms": "BGCM 4.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.33B", "q": "Do records on board verify that cargo lights in holds, where fitted, were properly isolated before cargo was loaded? \n-Item to be included in ship specific D/Bulk 02 and complied with", "sms": "D/Bulk 02", "status": "YES", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ.8.20C", "q": "Is the vessel following procedure for monitoring the temperature of refrigerated containers and records maintained as per CNM Chapter 5.1 in form OPS07? \nIf refrigerated containers are carried, are sufficient spare parts available as per guidelines in CNM chapter 5.1.12? \nDoes the vessel have a sufficient electric power supply permanently installed from the engine room? \nAre the electric sockets for reefers in good condition?", "sms": "CNM 5.1/ OPS 07", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.24C", "q": "Is the ro-ro cargo ship equipped with CCTV remote monitoring to monitor the vehicle decks?  \nAre all CCTV cameras in good working order?", "sms": "ROCM 4.4", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.31C", "q": "Has the vessel been provided with procedures and contingencies with regards to fumigation of cargo holds and are the master and chief officer familiar with the procedure?  \nHas the air conditioning intakes for the accommodation, the engine room and other spaces been set to prevent the possibility of drawing in fumigant gas?", "sms": "BGCM 4.2      H&S 9.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ .8.37C", "q": "Do records on board verify that cargo lights in holds were properly isolated before cargo was loaded?", "sms": "BGCM 3.1.5", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Vessels with cargo cranes", "ref": "RISQ 9.19A", "q": "Cranes - Check following is in good order, free of rust or wastage   \n> Main structures\n> Foundation structures\n> Crane Acesss Platform\n> Safety Hoops and rings on vertical ladder \n> Holding down bolts and slewing ring \n> Has a rocking test or Particle test of grease been done \n> Crane cabin and its attachment to main crane structure \n> Structural areas in crane cabin hidden by rubber mats etc", "sms": "TMM 7.2/BGCM 6.3", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 10.5                    Guideline 1", "q": "Brake testing arrangements : \n> Is a Brake test kit available, it is operational with all parts available.  \n> Has the brake test been done within the last year and record maintained. Is the date of testing marked on winch drum. \n> Is the brake set to 60% of the SDMBL    \n> Is brake rendering position marked-cable ties/jubilee clips etc not used\n> Is direction of heave/pay out marked on drums \n> Is the brake support set correctly and in good condition.  (Clearance 2-3 mm only)", "sms": "NMM 14.5/Training material 180", "status": "YES", "remarks": "Date of last brake test: 10.01.2026", "guidance": "Rightship recommends the vessel’s manager to set the brake at 60% of the Ship Design MBL as per OCIMF guidelines in section 6.4.6 of the MEG 4. RightShip recommends that tests are conducted at least annually."}, {"app": "All Vessels", "ref": "RISQ 12.8", "q": "> Are all USB ports blocked ( Signed paper stickers as USB port lock are not acceptable) \n> Is vessel provided with a dedicated computer and printer(Not connected to ships Lan system) for use by shore personnel and which is provided with updated antivirus.\n> Are all computers  updated with latest antivirus.\n> Is there a dedicated USB available for transferring data from communication computer to ECDIS.\n\nAre all staff and Master familiar with,\na) Company policy for use of personnel laptop/mobile for ships business.\nb) Cyber security guidelines\nc) SMS guidelines for opening attachement from unknown sources sent on email. \n> Is a Cyber security poster displayed at each computer.", "sms": "PAM 22.1", "status": "YES", "remarks": "", "guidance": "Critical equipment such as ECDIS should be protected from malware and virus attack. Access to USB and RJ-45 ports shall be controlled – i.e., disable or lock the ports."}, {"app": "All Vessels", "ref": "RISQ 13.2", "q": "> Have manning levels been increased when required(planned or unplanned).                                                                          > Have planned changes identified for every passage for acttivities such as - arrival departure, cargo operations, bunkering, fuel ch ve all means of stopping tested at various locations and is there a list displaying the fans stopped by each stopping devise.  \n> Are records of testing of funnel dampers available.", "sms": "TMM 3.5.2/3.5.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.29", "q": "Housekeeping in the Engine Room:  Check following  \n>  There are no drip catchers below any running machinery\n>  There are no oil soaked or other rags lying around/stuffed under the machiniary \n>  All oil soaked rags kept in covered bins\n>  All emergency equipment are marked properly with IMO symbols and the access is not blocked\n>  Engine room is free of tripping hazards and all overhead hazards are highlighted\n>  Are all Notices and warnings clear and legible and not worn off. \n> Void spaces under tanks/behind tanks not used to store rags/discarded machinery spare parts.     > Are workshops, spare parts room, chemical store, electrician store", "sms": "TMM 3.5", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.35", "q": "Main engine - Local manoeuvring control position; Check Following :  \n> Are the procedures for local manoeuvering  posted and readable? \n> Is testing of the system included in PMS and records available \n> Are all engineers familiar with the operations", "sms": "TMM 10.1.3", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.36", "q": "> Are crew familiar with the starting procedure for the emergency generator and how to put power on the emergency switch board? \n> Has the emergency source of electrical power, including its automatic starting arrangement, tested using a test switch provided in the Emergency Switch Board (ESB)?\n> Is staff familiar with the process of sequential test start and loading of the ESB.\n> Are emergency generating set equipped with starting devices with a stored energy capability of at least three consecutive starts. \n> Is a second source of energy provided for an additional three starts within 30 minutes unless manual starting can be demonstrated to be effective ?\n> Have brief instructions posted which are simple, clear, and understandable by all crew ?", "sms": "TMM 6.3/TMM 12.3", "status": "YES", "remarks": "Date emergency generator was taken on load: 24.11.2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.40", "q": "Emergency steering gear: Check Following : \n>  Have the drills been conducted every three months and drill records available? \n>  All crew familiar with emergency steering arrangements ?\n>  Is the working of automatic isolation system tested and recorded?\n>  Have all alarms tested during the steering drill and recorded? \n> Are records available for testing of emergency steering on emergency power ?\n>  Is the emergency reserve tank fully charged to recharge at least one power actuating system , is the level marked on tank correctly \n>  Is the Gyro repeater heading synchronised with bridge\n>  Is the communication system(Both auto and sound powered telephone) working in good order.\n>  Are the Mic and headphone operational.\n>  Is the rudder angle indicator polished and clearly marked                                                                                                                            > Manual transfer pump for steering gear system oil operational ?", "sms": "TMM 11.7", "status": "YES", "remarks": "Date of last steering gear drill: 18.11.2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 14.17", "q": "Check following in elevators  \n> Annual inspection has been completed and certificate available \n>  Limits of roll and pitch are set correctly \n>  PTW and RA are available for maintenance done on elevator or in elevator shaft.\n> PMS checks are in order , specifically checks for safety interlocks, emergency alarm and emergency stop and overload Alarm \n> Emergency escape procedure is posted \n> Notice is posted that senior officer lights, and hold lights (if installed), in good working order? (V)\n> Are wire stays kept free of sheathed plastic ?\n> Hold lighting system fully operational and properly maintained ?\n> General lighting system operative and no significant earth on the switch boards ?                                                                                                                                                                                                      >Are the lamp holders, drip shields, and shades of portable cargo lights nonconductive, and isolate the crew from electrical shock hazards and have a voltage greater than 50V AC (1-1000Hz) or 120V DC ?", "sms": "H&S 6.4.11\nTMM 12.4", "status": "YES", "remarks": "", "guidance": "Rightship inspector will record a Finding if wire stays with sheathed plastic were used to secure the mast heads. Rightship inspector will record a Finding if the lamp holder, drip shield, and shade of portable cargo lights are not nonconductive & do not isolate the crew from electrical shock hazards or have a voltage greater than 50V AC (1-1000Hz) or 120V DC."}, {"app": "All Vessels", "ref": "RISQ 14.11", "q": "Are following electrical equipment in good order on deck  \n> Junction boxes\n>  Plugs\n>  Conduits-check for crack especially at junction boxes \n> Glands of junction boxes", "sms": "H&S 6.4.11\nTMM 12.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 14.12", "q": "Check following for explosion-proof lights. ( Paint lockers,battery locker,oxygen-acetyelene room or similar spaces)  \n> LIghts are working \n> No water accumulation \n> Light cover is properly secured and not damaged \n> Earthing arrangements are intact and free from paint.\n> Are flame paths of light fittings clear                                                                                                                                                                                                                                    > If battery room ventilators have closing devices, are these left open and clear warning notice posted to prevent accidental closing ?                                                                                                                                                                                                                          > Does the battery locker PPE station have face shield/ eye glasses, chemical handling gloves, chemical resistant shoes, apron, eye wash                                                                                                                                                                                                                            > Is the PPE stowed clear of the batteries to avoid possible contamination from battery acid ?", "sms": "TMM 12.5, H&S 6.1, General Circular 16, H&S 8.7", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 14.16", "q": "Check following in refrigerated spaces \n>  Door seals in good order and no ice accumulation  \n>  Door catches are working \n>  Space alarm is working \n>  Spring Mechanism to open the door from inside is working \n>  Refer fans and pipes free from frosting.\nHygine Checks \n> Lobby clean and tidy \n> No food kept directly on the floor, area under grating is clean \n> Refer spaces well aranged and tidy\n> No rotton food or vegetables \n> No cooked food \n> Refer space temperatures as per requirement                                                                                \n> Food waste is not stored in reefer rooms during prolonged port stays.", "sms": "CL D/44", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.13", "q": "Are procedures in place to safeguard the operation of critical equipment in sub-freezing temperatures? \n> Are the emergency batteries used designed for cold temperature\n> Has a suitable antifreeze been added to exposed lines of cooling system\n> Is the Arctic grade fuel in use where required", "sms": "TMM 6.3/CL D 13", "status": "YES", "remarks": "", "guidance": ""}]}, "MASTER": {"items": [{"app": "All Vessels", "ref": "RISQ 1.5", "q": "Has the vessel been in continuous service? \nAnswer : No if vessel was laid up with dates in remarks.", "sms": "", "status": "YES", "remarks": "Date from : \nDate To : \nReason:", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 1.11", "q": "Are PSC reports for last 2 years available? \nEnter reasons in remarks if answered \"NO\"", "sms": "PAM 17.4", "status": "YES", "remarks": "Date of Last PSC inspection: 13 JAN 2026", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 1.12", "q": "Are all PSC deficiencies closed out from office? Reference Form Tec 45  or Oceanmanager/Jibe", "sms": "PAM 17.4", "status": "NA", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 1.16", "q": "Was the last docking scheduled ?\nAnswer: No for unscheduled docking or repairs with date with reason in remarks.", "sms": "PAM 17.4", "status": "NA", "remarks": "Date from : \nDate To : \nReason:", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 1.18", "q": "Has the vessel undergone FLAG state inspection? Are Flag state inspection report available ? \nAnswer: NA, if vessels flag does not conduct a flag state inspection.", "sms": "PAM 17.3", "status": "YES", "remarks": "Date of last Flag State Inspection :12 NOV 2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 1.18", "q": "Are all flag state deficiencies closed out from office? Reference Form Tec 45  or Oceanmanager/Jibe", "sms": "PAM 17.3", "status": "NA", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 1.28", "q": "Is the copy of P&I club certificate of entry available on board?", "sms": "PAM 17.3", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 1.29", "q": "Is the vessel manager a subscriber to the Dry Bulk Centre of Excellence (DBCE)? \nHas a DryBMS self-assessment been completed?", "sms": "", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 2.1", "q": "Is the class status report on board less than 14 days old. \nAre all surveys in order and no overdue COC/significant recommendation/memorandum", "sms": "PAM 20.1", "status": "YES", "remarks": "Remarks:", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 2.1", "q": "Does vessel have electronic certificates? Are you aware how to demonstrate the validity of certificate using class approved procedure?   \nAnswer: NO , If you have to use personal wifi to access certificates", "sms": "PAM 20.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 2.1", "q": "If the vessel is certified to carry cargoes listed in table G1 (IMSBC Code-4th amendment).  \nIs there a fitness certificate provided by class?\nAnswer : NO, If vessel does not have additional equipment and the certificate of fitness for such cargoes and enter details in remarks.", "sms": "PAM 20.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 2.2", "q": "Has the vessel been provided with certificates of financial security for seafarers? Certificate must be posted in common areas. (Regulation 2.5/4.2)", "sms": "PAM 20.1", "status": "YES", "remarks": "", "guidance": "Copies of both certificates of financial security for seafarers to be displayed in the crew mess rooms.\n(a)shipowners’ liabilities for repatriation of crew & \n(b) contractual payments for death or long-term disability"}, {"app": "All Vessels", "ref": "RISQ 2.3", "q": "Is the working language of the ship identified. \nIs this entered in the first page of the deck log book?", "sms": "PAM 20.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 2.3", "q": "Are all ships records in the working language . \nAre all plans and lists posted on the ship in the working language", "sms": "PAM 11.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 2.4", "q": "Is vessel complying with safe manning certificate", "sms": "PAM 11.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 2.4", "q": "Is a dispensation from flag state available and valid if short manned?", "sms": "PAM 11.4", "status": "NA", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 2.4", "q": "Are all flag and national certificates of the crew valid? If CRA is available - is it valid?", "sms": "PAM 11.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 2.5", "q": "Rest Hours - Check Following \n> Are the rest and work hours records maintained? \n> Are there any Violations? Check if there have been two or more consecutive violations for the same crew \n> Check the resthour records of key personnel against UMS timings, drills,arrival and departure ports, bunkering timings, periods of restricted visibility at random to confirm if they are matching ? \n> Has an office response received for any non conformity recorded ? ANSWER - NO if above conditions are not met.", "sms": "PAM 11.6", "status": "YES", "remarks": "", "guidance": "Rest hours to be checked for all crew specifically for fire rounds."}, {"app": "All Vessels", "ref": "RISQ 2.6", "q": "Does the master hold a ship handling simulator training certificate. \nIs the certificate as per IMO 1.22. \n(Note - Master with command experice more than 5 years do not require this certificate)", "sms": "FPD", "status": "YES", "remarks": "", "guidance": "BTRM (IMO 1.22) 5d course + Additionally, Master and Chief mate must have attended a Large Vessel Ship Handling course if joining a large size v/l for the first time."}, {"app": "Bulk Carriers", "ref": "RISQ 2.7", "q": "Have all officers and ratings responsible for the carriage and care of dangerous and hazardous substances in solid form in bulk, including Material Hazardous Only in Bulk (MHB), have received appropriate training to comply with the STCW Convention and Code’s 2010 Manila Amendments.", "sms": "PAM 11.4", "status": "YES", "remarks": "", "guidance": "AEMTC Bulk Carier Safety Inspection and Maintenance 5d course post Jan 2023 covers training requirements. \nAlternatively, the E learning CBT on LMS \"IMSBC code- Carriage of dangerous goods in bulk\" to be done by all officers and crew.\nIMSBC training for officers and ratings via Videotel VOD box (Dangerous and difficult bulk cargo – Part 1 Best practice and IMSBC code Edition 2 and Part 2 Mineral Manmade derivatives)"}, {"app": "All Vessels", "ref": "RISQ 2.8", "q": "Have all officers and ratings responsible for the carriage and care of dangerous and hazardous substances in packaged form undertake appropriate training to ensure compliance with the STCW Convention and Code’s 2010 Manila Amendments.", "sms": "PAM 11.4", "status": "NA", "remarks": "", "guidance": "Containerships provided with the onboard HAZMAT CBT training. \nAlternatively, others vessel’s Officers & crew to complete the e learning CBT on LMS \"HAZMAT (Hazardous Materials)\""}, {"app": "All Vessels", "ref": "RISQ 2.9", "q": "Is company drug and alcohol policy posted in common spaces. \nAre all crew aware of Company Drug and alcohol policy", "sms": "PAM 14.1", "status": "YES", "remarks": "Last Test Date: NOT DONE", "guidance": "Contact VM for unannounced onboard group Random Alcohol Test to be conducted at least once every 3 months."}, {"app": "All Vessels", "ref": "RISQ 2.11", "q": "Has an unannouced alcohol test been conducted on board? \nHave all crew been covered including Master and CE. \nMaster must be tested by CE and witnessed by another crew", "sms": "PAM 14.1", "status": "YES", "remarks": "Last Test Date: 27 JAN 2026", "guidance": "Report of unannounced alcohol test to be kept ready to show to Rightship Inspector"}, {"app": "All Vessels", "ref": "RISQ 2.12", "q": "Has an unannouced drug and alcohol test been conducted on board by an external agency. \nTest must not be more than 12 months old.", "sms": "PAM 14.1", "status": "NO", "remarks": "Last Test Date: NOT DONE", "guidance": "Report of unannounced drug test to be kept ready to show to Rightship Inspector"}, {"app": "All Vessels", "ref": "RISQ 2.13", "q": "Is an updated matrix reflecting crew experience at the time of inspection available?", "sms": "PAM 11.5", "status": "YES", "remarks": "", "guidance": "Inform Office to stagger joining of senior rank officers of same department on board to allow for 2 to 3 weeks of minimum overlapping time."}, {"app": "All Vessels", "ref": "RISQ 2.13", "q": "Was there sufficient handover and overlap time during last crew change. Answer : NO , If Master and CO or CE and 2/E were changed at the same time.  > Are valid CRAs held by offciers onboard?", "sms": "PAM 11.5", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 2.14", "q": "Have all deck officers including Master completed the ECDIS generic training (IMO 1.27) and type-specific familiarisation on board?", "sms": "PAM 11.4.2                              NMM 13.2.3", "status": "YES", "remarks": "", "guidance": "Request FPD / Training Centre for an Accompanying letter for the ECDIS Model used for the ECDIS IMO 1.27 / Refresher course if not mentioned on Certificate. Structured fam training D41 should be filled in addition to Type specific training."}, {"app": "All Vessels", "ref": "RISQ 2.15", "q": "Have the officers and crew completed value added courses from Anglo-Easterrn Maritime Training academy? \nAre the certificates available?\nList of courses offered by Anglo Eastern Maritime Training academy can be requested from office.", "sms": "LMS,PAM 5.5", "status": "YES", "remarks": "", "guidance": "Engineers to show additional Training certificates held like Maritime Crew Resource Management, Engine room Team & Resource Management, ME / Wartsila / WinGD OEM training, Machinery Maintenance Skill Enhancement Modules 1 to 4, Hydraulics (basic / advanced) Electrical and Electronics Modules, Aux. Eng., IGF, JiBe courses"}, {"app": "All Vessels", "ref": "RISQ 3.12", "q": "BNWAS: \n> Is BNWAS operational while underway & at anchor and times of switching on/off recorded in bell book/log book ?\n> Is the BNWAS alarms tested and records available \n> Is the key to/password of BNWAS in custody of Master", "sms": "NMM 13.8", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 3.18", "q": "ECDIS Familiarization : Can all officers demonstrate the following: \n>  Checking voyage plan (Manual and auto route check etc)\n>  Interrogating chart symbols/updates/information on chart\n>  ENC symbol identification\n>  Manual position fixing (NP5012/NP232)\n>  AIS and or Radar overlay if fitted ( Advantages/disadvantages)\n>  Knowledge of SCAMIN and how it is displayed\n>  Knowledge of CATZOCs and application for UKC as per SMS\n> Contingency action in case of ECDIS failure.\n> Setting of safety frame/safety cone( SMS guidelines/safety poster )\n> Creating parallel index lines\n> Route checking and management of alarms\n> Handling unresolved ENC update errors\n> Showing of IHO version of standard installed", "sms": "NMM 13.2", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 3.27", "q": "Does the vessel utilise a weather routeing service?\n(Alternatively all deck officers must be familiar with FOS and weather optimisation of route where fitted. Have they attended the shore beased FOS training course)", "sms": "NMM 7.3", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.1", "q": "> Are all SMS manual updated to latest revision?  \n> Are all latest version of checklist,work instructions,plans in use?", "sms": "PAM 6.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.3", "q": "> Internal audits and external audits, as well as the superintende
