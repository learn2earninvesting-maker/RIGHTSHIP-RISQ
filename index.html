s": ">Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.29", "q": "> All portable fire extinguishers ready for immediate use \n> Is the operating instructions clearly displayed\n> Are the hoses not kinked-damaged/base-body corroded \n> Are there records of monthly inspection of fire extinguishers ?\n> Does vessel carry sufficient spares and is inventory record available?\n> Is there a record of changing the powder at 5-6 years or as required by maker ?\n> Are there records of pressure testing the fire extinguishers\n> Spare powder (shelf life 5 to 6 years if not mentioned on the packet) and cartridges in date ( 10 years from date of manufacture )\n> Are there records of annual inspection of fire extinguishers by shore service company ?\n> Are there records of discharge of fire extinguisher during fire drills? \n> Have the extinguishers been color coded as required", "sms": "LSA and FFA  ship specific Maint Plans\n(MM 6.8)", "status": ">Yes", "remarks": "", "guidance": "At least one extinguisher of each type manufactured in the same year and kept on board a ship should be test discharged at five yearly intervals (as part of a fire drill)."}, {"app": "All Vessels", "ref": "RISQ 4.30                    Guideline 1", "q": "> Firemen’s outfits including their equipment, two-way portable radiotelephone apparatus for\nfire-fighter’s communication and breathing apparatus in good condition, fit for purpose and available\nfor instant use? \n> Is each firefighting party as per muster list equipped with portable intrinsically safe two-way radiotelephones ?\n> Is fireproof lifeline combination rope of wire and nylon or hemp rope, complete with safety snap hook available in 30, 40 and 50 metre lengths ?\n> Is SCBA fitted with an audible alarm and a visual or other device which will alert the user before the volume of the air in the cylinder has been reduced to no less than 200 litres ?\n> Is on-board means of recharging breathing apparatus cylinders used during drills provided or a suitable number of spare cylinders carried on board to replace those used ?", "sms": "LSA and FFA  ship specific Maint Plans\n(MM 6.8)", "status": ">Yes", "remarks": "Last shore based annual SCBA examination: 03-JUNE-2025(Onboard examination)", "guidance": "Rightship inspector will evaluate the effectiveness of the two-way radio communication equipment provided & record a Finding if there are insufficient intrinsically safe two-way portable radios for the number of fire teams on the muster list, or if wearing a fireman’s outfit and Breathing Apparatus hinders the firefighter’s ability to operate the radios while\nfighting a fire.\nRightship inspectors estimate min 4 sets of the 2- way portable radiotelephone apparatus for fire fighter’s communication on board."}, {"app": "All Vessels", "ref": "RISQ 4.31", "q": "> Is the SCBA compressor in good order. \n> Is the annual air quality check done and certificate available \n> Is the compressor connected to the emergency power supply ?\n> Is relief valve in order and set up as per working pressures of BA bottles and EEBD \n> Is the breathing air compressor properly secured ?", "sms": "LSA and FFA  ship specific Maint Plans\n(MM 6.8)", "status": ">Yes", "remarks": "Last SCBA Compressor air quality check:       23-May-2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.32                    Guideline 1", "q": "> Are EEBDs available for instant use. For Oceanco EEBD tamper indicating ball in place.For other type activating hook is properly connected.\n> Is there a Training EEBD onboard and is it marked\n> Has the hydrostatic testing of all EEBD been done as required  \n> Are the monthly inspection record of of EEBD updated \n> Are the crew members familiar with donning procedure?", "sms": "LSA and FFA  ship specific Maint Plans\n(MM 6.8)", "status": ">Yes", "remarks": "Last Hydraulic test : 07-Oct-2025", "guidance": "EEBD Training added to onboard training planner."}, {"app": "All Vessels", "ref": "RISQ 4.38                    Guideline 1", "q": ">  Are ship-specific fire safety and SOLAS training manuals available\n>  Are all non ship specific details/pages crossed and marked 'Not fitted on this vessel'? \n> Have all staff read and signed the manuals ?\n> Have the manuals of new equipment - SCBA , EEBD, FIREMAN's OUTFIT,Firemans radio, procured/recvd after take over entered in the Fire-training manuals and LSA Manuals ?", "sms": "LSA and FFA  ship specific Maint Plans\n(MM 6.8)", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.40                    Guideline 1", "q": ">  Is the muster list & fire control plan up to date\n> Are survival craft and emergencystations muster list Form LOG 12 displayed on wheelhouse/ECR/All accomodation deck alleyways and is it updated for all the crew and supernumeries on board?", "sms": "LSA and FFA  ship specific Maint Plans\n(MM 6.8)", "status": ">Yes", "remarks": "", "guidance": "Muster list must state officer in charge of communications (GMDSS) in the event of emergency situations."}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 4.41", "q": "> Are the required helicopter equipment available and inventory updated\n> Has the CL D/29 been completed for  last helicopter operation with appropriate entries  in the log book ?\n> Is a RA for last helicopter operation available ?\n> Has emergency drill for helicopter operation done as per drill planner", "sms": "H & S 6.3", "status": "Yes                                   NA                            NA                           Yes", "remarks": "Date of Last Emergency drill:30/08/2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.42", "q": "> Are the required number and type of lifebuoys available onboard ?\n> Are 12 rocket parachute flares available on bridge ?\n> Is illustrated table for life saving signals available on bridge ?\n> Are line throwing apparatus available and ready to use ?                                                                                                                               > Are containers, brackets, racks and similar stowage locations for LSA labelled ?", "sms": "LSA maintenance plans", "status": ">Yes", "remarks": "", "guidance": "MOB marker and lifebuoy can be released easily in an emergency (not entangled /tied)"}, {"app": "All Vessels", "ref": "RISQ 4.43", "q": "> Has safety familiarization been completed for all staff onboard, are records completed and available ?\n> Has a bridge familiarization been completed for deck offciers and records completed and available ?", "sms": "D-32A, D-17", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.7A", "q": "> Is the cargo plan signed by all OOW \n> Are any deviations form plan agreed with shore\n> Is OPS 10A made as per detail given in BGCM 4.2,4.3 and 4.7?\n> Are the duty officers aware of actions to take in case \n      1. High stresses are noted \n      2. Deballasting rate does not cope up with loading rate\n> Is there record of ship shore comparision of cargo figures after each pour?Draft planned and actual checked ?", "sms": "BGCM 4.2,4.3 & 4.7", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.14A                    Guideline 1", "q": "For present cargo operations : \n> Is the operations plan prepared (OPS Bulk 10A).\n> Is a pre cargo operation meeting held with all crew and recorded ?\n> Visual and calculated draft being checked and discrepancies resolved ?\n> Are SF/BM checked and recorded at each stage ?\n> All details of cargo operations- holds being operated/ballast sequences etc recorded ?", "sms": "OPS Bulk 10A", "status": ">Yes", "remarks": "", "guidance": "RightShip recommends that the cargo loading/unloading plan should be completed by the responsible officer prior to arrival at port and the commencement of cargo operations and verified and approved by the Master.\nBLU code requires the loading discharging plan to be kept on board for 6 months post that loading/ discharging operation"}, {"app": "Bulk Carriers", "ref": "RISQ 8.15A", "q": "> Is port log maintained during loading and unloading? ( Entries as per BGCM Manual section 4.3 and 4.7)", "sms": "BGCM 4.3/4.7", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.17A", "q": "For Toxic cargoes : \n> Has PTW been used when entring cargo holds/adjacent compartments ?\n> Was a pre loading meeting done and recorded to convey the dangers to all crew \n> Are staff aware of Fatality Report 08(Overcome by toxic gases) ?\n> Is CL D/Bulk/03 followed when making entry in cargo hold during port operations ?\n> Are staff aware of poster QA 02?\n> Is QA 02 being discussed with stevedores and logged?", "sms": "BGCM 3.1 & 3.2", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.19A", "q": "> Is any special emergency equipment required by IMSBC for cargo on board(as applicable)? \n> Is the equipment in a state of readiness for use?\n( Extra SCBA sets must have been serviced/ Gas detectors must be operational/ Gas testing tubes must not be expired)", "sms": "PAM 8.2", "status": ">NA", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.7B", "q": "Are the stresses, stability information and any limitations included in the cargo plan understood\nby the cargo watch officers and are conditions being monitored and maintained within design limits throughout cargo operations?\n-Is the cargo stowage and operations plan OPS 10A made in detail given in BGCM 4.2,4.3 and 4.7\n-Is each stage of the plan monitored by check of visual drafts on completion of each stage ? If there is any discrepancy between visual and calculated draft is it investigated and resolved - plan modified/loading rate reduced etc and adequate records kept ?\n-Are the duty officers aware of vessel being subjected to high stresses in case deballasting rates cannot keep with high loading rates  and action to take in such a case ?\n-Are cargo figures from terminal being sought after each pour and compared with ships planned figure ?\n-Are adequate records of loading/discharging/ballast operations maintained so as to reconstruct the full history of the operation from records ?", "sms": "BGCM 4.2,4.3,4.7", "status": ">Yes", "remarks": "", "guidance": "The Master and Chief Officer should be aware of the worst-case damage condition for the existing cargo on board. The observed drafts should be logged down after every sequence and compared with calculated draft."}, {"app": "Bulk Carriers", "ref": "RISQ 8.8B", "q": "Are there procedures in place for loading, ballasting and de-ballasting of the ballast holds? \n-Senior officers aware of the SMS guidelines given in BGCM 4.8  & WI D/Bulk 104 ?\n-Ship specific work instructions complied with in full prior ballasting/during ballasting/during the voyage/prior deballasting and after deballasting of ballast hold ?\n-Senior officers aware of precautions during ballast exchange of ballast hold ?\n-All staff aware of the consequences of ballasting/deballasting with vents not open ?Refer to Fatality report 12\n-Are the tests/checks as detailed in WI D Bulk/104 after deballasting of ballast hold diligently carried out and witnessed by senior officers ?Are staff aware of the incidents in the fleet due to water ingress from poorly maintained ballast hold valves/manhole covers ?", "sms": "BGCM 4.8/D-Bulk-104 & D/Bulk 02", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.10B", "q": "Have cargo holds been grain or hospital cleaned, where applicable, and has a ship’s hold inspection certificate been issued by a 3rd party prior to loading grain?\n- Prior loading grain cargoes cargo holds to be cleaned to grain/hospital standard as per guidance given in BGCM 4.9\n-White glove test to be done for applicable cargoes by senior officers before presenting the cargo holds for pre loading inspection", "sms": "BGCM 4.9", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.11B", "q": "Is the vessel free of any limitations or restrictions specified in the Loading Manual or Trim and Stability Booklet? \n-In case the vessel has any restrictions as given in loading manual or trim and stability manual are all the deck officers aware of same and is this limitation posted in ships office/ballast control ?\n-In case the load density of tank top has reduced due to thinning down of the inner bottom and restrictions placed by class , then are such restrictions know to all deck officers and is same taken into consideration when planning the cargo loading ?", "sms": "BGCM 4.2 & 5.1", "status": ">NA", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.12B", "q": "Are officers familiar with the risk, hazard and carriage requirements of grain cargo on board the ship? \n-Deck officers aware of the inherent risks of grain cargo -Shift of grain, contamination, ingress of water, moisture migration, and transfer of heat from engine room and / or bunker tank bulkhead and inadequate surface ventilation \n-Have Engineers been briefed about the requirement to not heat bunker tanks in cargo area above 42 Deg C?\n-Have all crew been briefed about emission of explosive / toxic gas/lack of oxygen in cargo hold and dust danger when carrying grain cargoes ?", "sms": "BGCM5.1", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.14B                    Guideline 1", "q": "Has the master been provided with clear instructions regarding any fumigation, prior to arrival at the load port? Has the vessel been provided with procedures and contingencies regarding fumigation of cargo holds and are the master and chief officer familiar with the procedure? \n-Are senior officers aware of the SMS guidelines for fumigation BGCM 4.4 ?\n-Adequate instructions received from the company carrying out the fumigation ?\n-Are senior officers aware of the guidance set out in section 3 of MSC.1/Circ.1264 and additional guidance issued by countries such as USA/Canada in case fumigation is carried out there ?\n-Are ship specific checklist D/Bulk 06 A & B used during fumigation and records maintained ?", "sms": "BGCM 4.4", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.15B", "q": "Has the master been provided with clear instructions regarding any fumigation, prior to arrival at the load port? Has the vessel been provided with procedures and contingencies regarding fumigation of cargo holds and are the master and chief officer familiar with the procedure? \n-Are senior officers aware of the SMS guidelines for fumigation BGCM 4.4 ?\n-Adequate instructions received from the company carrying out the fumigation ?\n-Are senior officers aware of the guidance set out in section 3 of MSC.1/Circ.1264 and additional guidance issued by countries such as USA/Canada in case fumigation is carried out there ?\n-Are ship specific checklist D/Bulk 06 A & B used during fumigation and records maintained ?", "sms": "BGCM 4.4", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.16B", "q": "Is crew familiar with major problems associated with fumigation of cargo in stowage on board? \n-Are all crew briefed on dangers of fumigation viz toxicity and its potential for fire or explosion .\n-The chemical reaction of fumigant produces heat and if fumigant is not properly distributed can cause fire .\n-The fumigant pallet can react with water and spontaneously ignite\n-Spontaneous heating of the fumigation gas can cause fire/explosion as phosphine gas is explosive at levels above 1.7% v/v in air.", "sms": "BGCM 4.4", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.17B", "q": "Do on-board safety requirements for fumigation comply with sub-section 3.3.2.7 of the IMO recommendation on the safe use of pesticides? \n-Vessel provided with adequate number of gas detecting equipment /tubes etc. Daily checks carried out and records maintained.\n-Instructions available and complied with respect to  disposal of residual fumigant material\n-Respiratory protection equipment (at least 4 sets are required)/Medicines and medical equipment/Antidote/MFAG - A copy of the latest version- available\n-Completed checklist D Bulk 06A and 06 B", "sms": "BGCM 4.4", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.26B", "q": "Are records maintained of fumigation operations? \n-Detailed records of fumigation operation to be maintained in cargo record file, deck log book/port log and should contain the following \n-Communication relating to fumigation/Details of fumigation company/fumigator-in-charge, and operation/Fumigation plan\n-Details of the fumigator-in-charge and operatives/Time of starting and finishing/ Holds involved/Identity of the fumigant, application level and where and how applied.\n- All gas reading with location testing.\n-Plan and sketch for each hold fumigated, showing where the fumigant was applied and the amount of fumigant at each\nlocation.\n-Certificate of fumigation/Formal written handover of responsibility.\n-Completed checklist D Bulk 06A and B", "sms": "BGCM 4.4", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.31B                    Guideline 1", "q": "Has a cargo loading/unloading plan providing detailed sequences of cargo and ballast transfer been prepared, understood, and signed off by the deck officers? \n-Has detailed loading/discharging plan as per OPS Bulk 10A been prepared by Chief officer and signed by Master and other deck officers ?\n-Is visual and calculated draft being checked at each stage of completion and discrepancies resolved ?In case plan is changed then is a amended plan made and discussed with all officers ?\n-Are SF/BM checked and recorded at each stage ?\n-All details of cargo operations- holds being operated/ballast sequences etc recorded ?\n-Is a pre cargo operation meeting held with all crew and recorded ?", "sms": "OPS Bulk 10A", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.34B", "q": "Is an adequate record of all cargo operation activities maintained during loading and unloading? \n-Are detailed records maintained for the following in port log \n-Starting and stopping of work at each hold; times and dates\n-Cargo loaded /discharged from each hold and cumulative total\n-Weather conditions\n-Use of ships crane/shore crane/barge movement\n-Opening and closing of hatches/draft readings at periodic interval - normally at completion of each stage/watch etc\n-time of rain-snow/delays in cargo operations/attendance of cargo and other surveyors/Stevedore damage\n-Cargo temperature if applicable\n-Regular monitoring of stability records", "sms": "BGCM 2.2", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.35B", "q": "Are the dangers associated with oxygen depletion of grain cargo understood by officers and crew, and have reasonable precautions been taken during routine inspections of the cargo, when entering the holds and adjacent spaces?\n-Dangers associated with grain cargo known to all officers and discussed during pre loading meeting.\n-SMS guidelines for hold entry and adjacent spaces known to all crew and complied with\n-Warning notices posted at hold entrances as per SMS and pre entry checks done as per ship-shore checklist and QA poster 02", "sms": "BGCM 3.0", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.5C                    Guideline 1", "q": "Is an approved ship-specific Cargo Securing Manual available and are officers thoroughly familiar with the contents of the manual?  \nIs cargo secured in accordance with CSM at designated securing points using cargo securing devices mentioned in the manual?\nDoes the vessel have sufficient spare lashing devices?  \n\nDose CSM include the following?\n1. Cargo Securing devices strength (MSL) and their use;  \n2. Tables and diagrams give a broad outline of the accelerations.\n3. Examples of forces acting on typical cargo units\n4. Examples of how to calculate the number and strength of portable securing devices\n5. Calculation method used converted in a form suiting the particular ship (Recommended)               \n6. CSAP- Cargo Safe Access plan (If applicable to the ship)                                           \n7. Inspections / Maintenace/ Repair records kept with CSM\n8. Procedure of accepting, maintaining, repairing or rejecting of the lashing devices must be available. (All equipment, lashings, hog wires, uprights and their foundations, deck fittings, cell guides, loose lashing equipment, twist locks, stackers etc.)                                     \n\nIs regular inspection and maintenance of lashing devices being carried out?   Must include - Routine Physical Inspection; Periodic reexamining and retesting as required by the administration.                                                                                                                                                          \n\nAre repairs to fixed lashing equipment repaired to the satisfaction of classification society as appropriate?  (Uprights, lashing points)", "sms": "BGCM 5.9/ 5.10 / 5.11 / 5.12", "status": ">Yes", "remarks": "", "guidance": "Each device used for securing cargo should be marked clearly with its SWL and a batch mark or number, where that mark can be verified by a test certificate. RightShip recommends that these test certificates be clearly labelled and kept in an easily accessible file. A method of correct identification and matching of individual certificates with the cargo-securing devices should be established on board. Cargo-securing devices without certificates must not be used on board."}, {"app": "General Cargo", "ref": "RISQ 8.12C", "q": "Are officers aware of the strength limits (t/m2) of tank tops, tween decks, hatch covers and weather decks with regards to safe cargo stowage and is this information posted in the ship’s office / ballast control room?", "sms": "BGCM 4.2 / 4.3", "status": "NA", "remarks": "", "guidance": "The maximum permissible loadings, given in tonnes per square meter (t/m²) for each deck and the tank-top, and the hatch covers should be posted in the Ship’s office."}, {"app": "General Cargo", "ref": "RISQ 8.15C", "q": "Have personnel engaged in cargo securing operations been provided with relevant training and familiarisation? \nIs the crew aware of the timber deck cargo controlled jettisoning procedure? \nIs a remote jettisoning system provided? (recommended)", "sms": "", "status": ">Yes", "remarks": "", "guidance": "Bulk Carrier Course cert post Jan 2023 contains required text. All others can access the E learning CBT \"Cargo Securing Operations training\" on LMS."}, {"app": "General Cargo", "ref": "RISQ 8.26C", "q": "Is the ro-ro cargo ship provided with an approved Operating and Maintenance Manual (OMM)?", "sms": "ROCM", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.30C                    Guideline 1", "q": "Are vehicles on the ro-ro car decks safely stowed and secured?", "sms": "CSM", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.31C", "q": "Has the vessel been provided with procedures and contingencies with regards to fumigation of cargo holds and are the master and chief officer familiar with the procedure?  \nHas the air conditioning intakes for the accommodation, the engine room and other spaces been set to prevent the possibility of drawing in fumigant gas?", "sms": "BGCM 4.2      H&S 9.4", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.38C", "q": "Is an adequate record of all cargo operation activities maintained during loading and unloading?", "sms": "BGCM 4.3.25", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.16A", "q": "Emergency means of opening hatch covers: Check Following   \n> Are crew familiar with the arrangements and training carried out ? ( Refer D/Bulk/102)\n> Is the maintenance of equipment included in PMS. \n> Is the emergency hatch cover operation tested at different hatch cover location and records maintained in PMS.", "sms": "BGCM 6.1", "status": ">Yes", "remarks": "", "guidance": "The manufacturers’ instructions for the maintenance and test of the emergency portable pump unit shall be incorporated in the PMS. All Chain blocks in use must have the safety latch on the hook."}, {"app": "All Vessels", "ref": "RISQ 10.2", "q": "> Is the safety campaigns from the company on mooring available. (You can requst company to send if not available)", "sms": "QA Message", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 10.7", "q": "> Are sufficient crew members deployed at each mooring station\n> Is a tool box meeting held prior mooring operations and recorded \n> Are heaving lines/rope and chain stoppers/ messenger line etc In good order and without any defects  ( Only double rope stoppers/No undersize messenger lines-minimum 24 mm)", "sms": "NMM 14.1 & 14.2", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 10.8", "q": "At berth checks: \n> Are winch brakes secured to correct marking and and winches are out of gear? ( proper gear engaging pins secured with chain - no use of bolts etc)\n> Have the lines been passed in correct direction.   \n> Is the mooring area free of any trip hazards and generally well kept. \n> Chafing sleeves fitted on mooring lines at exposed berths/tidal ports", "sms": "NMM 14.2 & training material 180", "status": ">Yes", "remarks": "", "guidance": "Any buried mooring ropes within a drum should be extracted from the reel and relayed on the drum"}, {"app": "All Vessels", "ref": "RISQ 10.9", "q": "At berth checks for mooring winch with split drums: \n> Is there a single  layer of mooring line on the tension side of the drum\n> Is there sufficient number of turns on the tension drum (Min 6  for synthetic lines)", "sms": "NMM 14.4/LMP", "status": ">Yes", "remarks": "", "guidance": "Split-drum winches should not have more than one layer of mooring line on the tension section of the drum because it can reduce the brake holding capacity of the mooring winch."}, {"app": "All Vessels", "ref": "RISQ 10.14", "q": "Securing mooring lines on bollards : \n> Are there 2 full turns around on the leading post before putting ‘figure-of-eight’ \n> Only one rope to be secured over a single pair of bollard \n> Confirm no ropes are secured on warping drums", "sms": "NMM 14.2/14.4", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 11.5", "q": "Is the vessel equipped with sufficient hand -held radios, for use in general operations onboard?", "sms": "NMM 13.20", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 11.6", "q": "SART Checks : \n> Is it tested monthly and records available .In case of AIS sart tests are being done as per makers recommendation.\n> If fitted with FFLB, one SART in in the life boat \n> Are batteries in date and not expired \n> SART body is in good order and without damage . \n>  Bracket available on LB to mount Sart.", "sms": "NMM 6.5", "status": ">Yes", "remarks": "Date of expiry of SART battery:  JULY-2026", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 11.7", "q": "GMDSS Radios:  \n> In good working condition and free of external damage\n> Kept fully charged .Check batteries are holding charge.\n> Spare lithium batteries in date and seal intact\n> Carrying case provided with weak link", "sms": "NMM 6.5", "status": ">Yes", "remarks": "Date of expiry of spare battery: JULY-2026", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 12.3", "q": "> Are deck officers familiar with function and use of SSAS\n> Are records of 3 M test /(Button test) with office and annual test with flag state available.", "sms": "SSP", "status": ">Yes", "remarks": "Date of last SSAS test : 23-Nov-2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 12.8", "q": "> Are all USB ports blocked ( Signed paper stickers as USB port lock are not acceptable) \n> Is vessel provided with a dedicated computer and printer(Not connected to ships Lan system) for use by shore personnel and which is provided with updated antivirus.\n> Are all computers  updated with latest antivirus.\n> Is there a dedicated USB available for transferring data from communication computer to ECDIS.\n\nAre all staff and Master familiar with,\na) Company policy for use of personnel laptop/mobile for ships business.\nb) Cyber security guidelines\nc) SMS guidelines for opening attachement from unknown sources sent on email. \n> Is a Cyber security poster displayed at each computer.", "sms": "PAM 22.1", "status": ">Yes", "remarks": "", "guidance": "Critical equipment such as ECDIS should be protected from malware and virus attack. Access to USB and RJ-45 ports shall be controlled – i.e., disable or lock the ports."}]}, "CO": {"items": [{"app": "All Vessels", "ref": "RISQ 2.5", "q": "Rest Hours - Check Following \n> Are the rest and work hours records maintained? \n> Are there any Violations? Check if there have been two or more consecutive violations for the same crew \n> Check the resthour records of key personnel against UMS timings, drills,arrival and departure ports, bunkering timings, periods of restricted visibility at random to confirm if they are matching ? \n> Has an office response received for any non conformity recorded ? ANSWER - NO if above conditions are not met.", "sms": "PAM 11.6", "status": "Yes", "remarks": "", "guidance": "Rest hours to be checked for all crew specifically for fire rounds."}, {"app": "All Vessels", "ref": "RISQ 3.18", "q": "ECDIS Familiarization : Can all officers demonstrate the following: \n>  Checking voyage plan (Manual and auto route check etc)\n>  Interrogating chart symbols/updates/information on chart\n>  ENC symbol identification\n>  Manual position fixing (NP5012/NP232)\n>  AIS and or Radar overlay if fitted ( Advantages/disadvantages)\n>  Knowledge of SCAMIN and how it is displayed\n>  Knowledge of CATZOCs and application for UKC as per SMS\n> Contingency action in case of ECDIS failure.\n> Setting of safety frame/safety cone( SMS guidelines/safety poster )\n> Creating parallel index lines\n> Route checking and management of alarms\n> Handling unresolved ENC update errors\n> Showing of IHO version of standard installed", "sms": "NMM 13.2", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.2", "q": "> Has a safety officer been appointed and is he familiar with the principles and practice of risk assessment? \n> Has the safety officer attended a suitable safety officer’s training course(adhering to the STCW Code 2010 Tables A-II/2 and A-III/2 and the IMO Model Course 3.11)?", "sms": "H & S 3.2", "status": "Yes", "remarks": "", "guidance": "Safety Officer Course (+Risk assessment + Accident Investigation Course) certificate to be shown."}, {"app": "All Vessels", "ref": "RISQ 4.5             Guideline 1", "q": "> Is the vessel provided with an enclosed space entry procedure, and is there documented evidence that it was followed? \n> Have all seafarers whose duties may involve entry into enclosed spaces attended a dedicated course for entry into enclosed spaces ?\n> If the ballast treatment system is installed in an independent enclosed compartment, is such compartment identified as an enclosed space ?\n> Additional dangerous spaces (not necessarily enclosed) such as cargo space access, forecastle space, identified/listed ?\n> Is entry permit period of validity less than 12 hours and maximum permitted time between atmosphere-testing of spaces and when they are entered by personnel,less than 30 minutes.\n> Drill records for enclosed spaces available ?\n> Warning notices outside enclosed spaces posted ?\n> Is risk assessment available for enclosed spaces ? \n> Are SCBA , personal gas monitors  with capability to conduct remote readings available?", "sms": "H & S 5.2", "status": "Yes", "remarks": "", "guidance": "The ballast treatment plant if installed in an independent enclosed compartment, should be identified as an enclosed space.\nAll Officers and crew to complete Confined Space CBT - General Requirements CBT” on LMS.\nNew sections added in RISQ 3.1\n1) Securing the Access Door of the Enclosed Space\n2) Safety of Shore-Side Personnel and Stevedores Onboard Ships\n3) Enclosed Space Register:\nAny enclosed spaces on the ship should be identified using risk assessment (carried out in accordance with Annex 1.2 of Code of Safe Working Practices for Merchant Seafarers). A register should be made of any enclosed spaces that seafarers may enter."}, {"app": "All Vessels", "ref": "RISQ 4.7            Guideline 1", "q": "> Is ER workshop designated for hot work. Is a RA in place for designated hot work area. \n> Is company permission available for Hot work outside designated area where required ?\n> If any HW was done in port - is a port permission available?                                                                                                                       > Is hot work permit used for jobs done outside designated area", "sms": "H & S 5.3", "status": "Yes", "remarks": "", "guidance": "Hot work in places other than the workshop should be the subject of a permit to work."}, {"app": "All Vessels", "ref": "RISQ 4.8                    Guideline 2", "q": "Crew must be aware of : \n> Requirements for working over the side to rig combination pilot ladders\n> Lock out/tag out kit , its location and implementation on board \n> Designated HW area and procedures for Hot work", "sms": "H & S 5.0", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.8                           Guideline 3", "q": "> Does the vessel use a ships short brow gangway which can be attached to the bottom platform of the  accommodation ladder. \n> Is the certificate of weight and SWL of this gangway available on board.\n> In case vessel is using a shore provided short brow gangway which can be attached to the bottom platform of the accomodation is a certificate of weight/SWL given by agents/terminal. If no , is there a risk assessment available for every time the brow was used.", "sms": "H & S 5.0", "status": "NA", "remarks": "No Short brow gangway onboard", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.11                    Guideline 1", "q": "> Has a PPE Matrix for use of personal protective equipment been provided and is it being worn as required?\n> Is ship’s crew using an inertia reel personal fall arrestor with a full body harness when working aloft or over side ?\n> Is crew using respiratory protective equipment and safety goggles if dusty cargo being loaded/discharged ?\n> Are rubber insulating gloves available for use near electrical equipment?\n> Are helmets replaced every 3 years and head harness insert replaced every two years?", "sms": "H&S 6.1", "status": "Yes", "remarks": "", "guidance": "Galley staff to wear PPE as specified in H&S 7.2                                                                                                           Safety Harness must have Identifier labels for SWL/ date of manufacture/ make /model and should not be dirty with paint, grease, or exposed to harsh chemicals."}, {"app": "All Vessels", "ref": "RISQ 4.12", "q": "> Are safety meeting done as per schedule. Is a office response available \n> Are watchkepers informed of minutes of safety meeting. Do they attend the next safety meeting if they missed in the previous month. \n> Are the results of CL- D/39 discussed in the safety meeting", "sms": "H & S 3.3", "status": "Yes", "remarks": "Date of last safety meeting : 19 Jan 2026", "guidance": "The vessel should record Safety Meeting feedback from the company."}, {"app": "All Vessels", "ref": "RISQ 4.13", "q": ">  Is the  IMSBC Ship/Shore Safety Check List used and available. \n>  Have all sections been completed \n( Specially check columns for hold entry checks on arrival and prior entry of any shore personal )", "sms": "BGCM Annex I", "status": "Yes", "remarks": "", "guidance": "Incomplete ship/shore safety checklist and/or non-compliance with the checklist should be recorded as a Finding."}, {"app": "Vessels with cargo cranes", "ref": "RISQ 4.13", "q": "For vessels with Cranes only : \n> Is the CL/D/Bulk/08 - Crane inspection checklist in use and completed\n> Is the CL/D/Bulk/09 - Crane operator familiarization checklist used and completed before handing over the cranes to the operator ?", "sms": "BGCM Checklists", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 4.14                    Guideline 1", "q": ">  Are all WIDAS working in order without alarms and problems\n>  Is  record of testing maintained \n>  Is the procedure for  by passing alarm in ballast cargo hold and ballast tanks available and operational                                              >  Is the WIDAS alarm power supply sourced from two separate sources ?\n> Vesels falling under N/A  are detailed in the guidance", "sms": "BGCM 6.2", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.15                    Guideline 1", "q": "> Is no smoking policy implemented. Smoking prohibited on deck \n> Are designated smoking areas identified and notices placed for same \n> Are all ash trays self extinguishing type", "sms": "H & S 7.5", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.16                    Guideline 1", "q": "> Are the number of gas detectors and toxic gas measuring equipment as per SMS requirement \n> Are they all working without alarms \n> Is the alarm setting as per SMS requirement \n> Have they been calibrated within last 12 months \n> Is a calibration kit available on board including calibration gases. \n> Do the officers know how to carry out onboard calibration / bump test \n> Is a accurate inventory of gas detectors and calibration equipment available\n> Does the cargo on board require any specific type of gas detection system. Is this available on board.", "sms": "H&S8.8", "status": "Yes", "remarks": "Last shore calibration: 11 June 2024", "guidance": "RightShip recommends that ships should have a minimum of two portable gas detectors equipped with built-in sample pumps.\n10 Benzene tubes and Pump available (H7S 8.8) and testing of Benzene during Bunkering (TMM 4.2.19)"}, {"app": "All Vessels", "ref": "RISQ 4.27", "q": "> Are the fixed fire extinguishing systems for cargo holds (where fitted) in good order?\n> Have the Co2 lines been blown through. \n> Is the paint room sprinker system in good order.", "sms": "LSA and FFA  ship specific Maint Plans\n(MM 6.8)", "status": "Yes", "remarks": "", "guidance": "Paint lockers shall be protected by either CO2 (min free gas of 40% Gross Vol of space) / Dry Powder (0.5 kg powder/m³) / Sprinkler system (5 l/m² min)."}, {"app": "All Vessels", "ref": "RISQ 4.33", "q": "> Are ventilation fire dampers clearly marked\n> Have they been tested\n> Have the ER vent flaps and funnel flaps checked- from local and remote location \n> Is the condition of flaps in good condition : Check from the inspection port  \n ( Item 1/2 - Chief Officer for deck , All items - CE for Engine room)", "sms": "LSA and FFA  ship specific Maint Plans\n(MM 6.8)", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.34", "q": "> Are Material Safety Data Sheets (MSDS) for all bunkers, chemicals, paint, corrosive, and toxic materials available, and are all crew familiar with their contents? \n> All stores on board where hazardous or toxic substances are kept, such as paint and chemical stores, have readily accessible MSDS ?", "sms": "H & S 9.2", "status": "Yes", "remarks": "", "guidance": "Ensure that MSDS kept on board are latest version and not issued more than 5 years ago.\nThe validity of MSDS depends on local regulations. (Australia 5 years validity)."}, {"app": "All Vessels", "ref": "RISQ 4.35                    Guideline 1", "q": "> Bottom step securing pins of the accommodation ladder are in place and in good condition ?\n> Has the means of access was landed on solid surfaces ashore ?\n> Are gangways used at an angle of inclination greater than 30 degrees from the horizontal ?\n> Are accommodation ladders used at angles greater than 55 degrees from the horizontal ?\n> Is there adequate lighting, lifebuoys and a mounted safety net sufficient to prevent falls ?\n> Has detailed hazard identification and risk analysis done in case short brow or gangway fitted to the lower accommodation ladder platform is used to bridge the gap between the vessel and wharf edge ?", "sms": "H & S 6.2", "status": "Yes", "remarks": "No Short brow gangway onboard", "guidance": "Rightship inspector shall check if the bottom step securing pins of the accommodation ladder are in place and in good condition & will record a Finding if the means of access was not landed on solid surfaces ashore.\nSuch arrangements should be considered only after a detailed hazard identification and risk analysis has been completed and the results have been determined to be within acceptable limits.\nInspector will be checking Risk assessment for the same."}, {"app": "All Vessels", "ref": "RISQ 4.36                    Guideline 1", "q": "> Is the accommodation ladder turn table and its pin included in the PMS ?\n> Are the accommodation ladders and gangways, including associate winches and fittings, properly maintained, and inspected at appropriate intervals in accordance with manufacturers’ instructions and recorded ?\n> Any corrosion on aluminium accommodation ladder/gangway ?\n> Any bent stanchions or worn out guard ropes ?\n> Moving parts free to turn and greased as appropriate ?\n> The wires used to support the means of embarkation and disembarkation renewed when necessary ?\n> Have during annual surveys following items examined for satisfactory condition:\n-Brake mechanism including condition of brake pads and band brake, if fitted.\n-Remote control system; and\n-Power supply system (motor).\n> At every five-yearly survey, is the winch operationally tested with the specified maximum operational load of the\naccommodation ladder ?\n> Is each accommodation ladder or gangway clearly marked at each end with a plate showing the restrictions on the safe operation and loading, including the maximum and minimum permitted design angles of inclination, design load,\nmaximum load on bottom end plate, etc. \n> Is the certificate (s) for a five-year load test of an accommodation ladder kept on board ?\n> A manufacturer’s certificate for a fall wire in service provided, as well as confirmation that accommodation ladder fall wires have been replaced within the last five years ?\n> The date of fall wire renewal stencilled in the vicinity of the fall wire winch ?", "sms": "H & S 6.2", "status": "Yes", "remarks": "Date of last load test: 25 AUG 2021", "guidance": "RightShip Inspector will record a Finding if the maintenance and inspection of the accommodation ladder turntable and its pin were not included in the PMS.\nThe SWL, number of persons and a valid test date should be posted / displayed around the entrance nearby the bottom platform.                                                                                                                                               Acceptable load of bottom platform of accommodation ladders mentioned in Yard Load test certificate if not mentioned on Class certificate."}, {"app": "All Vessels", "ref": "RISQ 4.37                    Guideline 1", "q": ">  Are pilot ladders  in good condition and certified \n>  Are they clearly identified with tags or with permanent marking\n>  Are the  maintenance records available\n>  Are pilot ladders secured as per training material 164 ?(Rightship recommendation to use manila rope 2 x 24 KN with rolling hitch )\n> Are officers aware of the guidance given in training material 164 ?                                                                                                            > Are the pilot ladders tested as per ISO 799-2021 section 6.6 on 30 monthly basis ?", "sms": "H & S 6.2", "status": "Yes", "remarks": "Date of supply of Pilot ladder: 19 May 2025/ 02 Oct 2025", "guidance": "The Record of Approved Safety Equipment should be updated to reflect the material, manufacturer, and the standard to which the pilot ladder was made and tested. \nInspector will record a finding if this document has not been updated to reflect the pilot ladder(s) on board the ship.\nRightShip strongly encourages the vessel’s manager to verify the authenticity of the pilot ladder certificate by contacting the relevant certification body. It is important to keep a record of such verification on board for future reference."}, {"app": "All Vessels", "ref": "RISQ 4.39                    Guideline 1", "q": "Helicopter Operations: \n>  Is there a safe access from the hatch cover to deck? \n>  Is there a certifcate from class for strength confirmation of hatch cover \n>  Are all Fire-fighting equipment for helicopter facilities as per ICS  “Guide to Helicopter/Ship Operations\" .                                                                                                                                                                         \n> Are fixed inclined ladders with fixed handrails and front platform with operational load of 150 kgs provided\n>  Is helicopter landing hatch marked as per ICS guide with ships name and are the obstructions highlighted ?\n> Has the vessel been provided with two access/egress routes to and from the landing area to ensure that, in the event of an incident on the landing area, helicopter passengers and crew can escape upwind of the incident ?", "sms": "H & S 6.3", "status": "Yes", "remarks": "", "guidance": "Strength calculation for helicopter landing should be available (Provided by the hatch cover maker / Class)\nAll markings to be as per ICS Guide to Helicopter/Ship Operations Edition 5."}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 4.41", "q": "> Are the required helicopter equipment available and inventory updated\n> Has the CL D/29 been completed for  last helicopter operation with appropriate entries  in the log book ?\n> Is a RA for last helicopter operation available ?\n> Has emergency drill for helicopter operation done as per drill planner", "sms": "H & S 6.3", "status": "Yes", "remarks": "Date of Last Emergency drill: 30 AUG 2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.43", "q": "> Has safety familiarization been completed for all staff onboard, are records completed and available ?\n> Has a bridge familiarization been completed for deck offciers and records completed and available ?", "sms": "D-32A, D-17", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.2", "q": ">  Is the SOPEP plan available and up to date \n>  Is the coastal contact list up to date and latest \n>  Has a port contact list been made for this port \n>  Is the SOPEP equipment inventory updated and checked", "sms": "SOPEP", "status": "Yes", "remarks": "Date of last port contact list 09 Jan 2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.3", "q": "For previous cargo washing check following: \n>  Entries in GRB Part II and deck log book for diposal of cargo residues as TM 152.  \n>  Receipts for shore disposal of wash water/cargo residue\n>  Entries for wash water disposal are made in the deck log book", "sms": "TM 152", "status": "Yes", "remarks": "Date of last Cargo Disposal: 19 Jan 2026\n( Confirm entries have been made as per requirement)", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.4", "q": ">  Are scuppers fitted properly on deck and in a satisfactory  condition and are there suitable measures in place for draining of water on deck when vessel is  engaged in dry bulk operations?\n>  Are scupper filters readily available for draining  water on deck when the vessel is involved in dry bulk cargo operations?(V)\n>  Is the condition of sealing rubber/scupper pipe edges in good condition   \n>  Are spare plugs available", "sms": "NMM 14.2 & 14.2.18\nD-102\nCL E-11", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.5", "q": "Has the vessel conducted structural inspections and maintained records as per Tec 32A-S. \nPay special attention to:  \n> E/R forward bulkhead at its intersection with the topside tank structure in the aftermost cargo hold\n> Side shell plating of the cargo hold side structure\n> Side shell plating in the foremost cargo hold/stool shelf plates of the transverse bulkheads in the cargo hold\n> Transverse bulkheads at the topside tank connection\n> In the cargo hold/vertical corrugations of transverse bulkheads in the cargo hold\n> Corrugated bulkheads at the intersection of the shredder plates in the cargo holds\n> Fuel tank bulkheads within the machinery space", "sms": "TEC-32,\nTMM 8.1 & 8.2", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.6", "q": ">  Are the bilge pumping system in good order and tested\n>  Are the sounding pipes and covers in good order and not choked or damaged.Teflon/plastic covers for sounding pipes are not acceptable \n>  Are the hold bilges, bilge wells in good order\n>  Have the above items been checked prior to loading and records maintained", "sms": "BGCM 4.2.7\nCCOM 4.3.1 & 6.2.2", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.6", "q": ">  Cargo hold bilge NRV overhauled within last 12 M and records maintained ?\n>  Bilge valve integrity test done at 3M intervals and record maintained ? \n>  Bilge valves in good condition / capable of remote operation where provided ?\n>  Bilge alarms where provided operational and tested and records available?\n>  Notices in place for cargo hold bilge valves to be shut when not in use", "sms": "BGCM 4.2.7\nCCOM 4.3.1 & 6.2.2", "status": "Yes", "remarks": "Date of last overhaul of NRV valve: 10 Jan 2026", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.7", "q": ">  Is daily sounding record for cargo hold bilge, ballast tanks, chain lockers, pipe ducts and other void spaces maintained", "sms": "BGCM 4.5", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.8", "q": ">  Are save all trays around hydraulic machinary, hatch cover rams, remote-control stand, cranes, winches, windlass, piping & hoses - clean with plugs in good order and in use?", "sms": "EMM-I/5.1.4, EMM-I/3.9.1", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.9", "q": ">  Is the forepeak bilge and chain locker pumping out system operational and tested .Is it lined up for operation from remote location.\n>  Is the overboard valve locked and secured ( use breakable seals)\n>  Are the pollution warning notice displayed ?\n>  Is there a line pumping diagram and instructions posted in vicinity", "sms": "EMM-I/3.9.2\nBGCM 6.2", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.10                    Guideline 1", "q": ">  Is the Ballast Water treatment system in good order & were the Master & officers familiar with the vessels Ballast Wter Management plan and records available to  demonstrate ballast handling was in accordance with the plan?\n>  Is BWTS operational and maintained as per PMS \n>  Are the records of sample analysis available ?\n>  Is the USCG approval available ?\n>  Is BWTS in the  BWMP and is the plan approved by class?", "sms": "EMM 8.1 Regulation update 145", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.10                    Guideline 2", "q": ">  Are the crew aware of hazards of chemicals or treatment additives used in BWTS (where used) for handling/making entry into ballast tanks/overhaul of BWTS machinery \n> Is  safe handling instructions and equipment available on board to use these chemicals", "sms": "EMM 8.1", "status": "NA", "remarks": "BWTS: UV + FILTERATION", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.10                    Guideline 3", "q": ">  Are the entries in BWRB made as per TM 186 &  matching with data recorded in BWTS\n>  Are the officers aware how to retieve data from BWTS logger\n>  In event of failure of BWTS - has entries been made in BWRB", "sms": "TM 186", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.10                    Guideline 4", "q": "> Is senior officers of SMS/Flag state guidelines for reporting/ballast water exchange in case of BWTS failure ?\n> Is the Ballast water Treatment system in good order and were the Master and Officers familiar with the vessel's BWMP, and were records available to demonstrate the ballast handling had been conducted in accordance with the plan? (V)", "sms": "TM 186,", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.11", "q": ">  Are officers aware of contents of BWMP with special reference to class approved ballast water exchange / sedimentation control methods\n>  Is BWMP Part B updated and referred to prior port call ?\n>  Are records of  BW reporting forms to authorities available?", "sms": "EMM 8.1", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.12", "q": ">  Is there a record of checking and sampling ballast water prior discharge \n>  Are enties made in port log/deck log of this inspection before deballasting.\n(If ballast tanks are located adjacent to fuel oil tanks, or if  there is a possibility of contamination by hydraulic oil, the ballast tank must be sampled prior to discharge)", "sms": "BGCM 4.8.3", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 5.18", "q": ">  Is a shippers declaration for cargo available \n>  Are there declarations available for cargo harmful to the marine environment (HME Cargo)?\n>  Is crew aware of precautions when handling cargo harmful to marine environment?", "sms": "BCGM 4.9.12", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.19 & 5.20", "q": ">  Is the GRB updated and up to date \n>  Is the garbage storage/ disposal area tidy and hygienic condition? All bins should be metal with tight fitting sealing covers.\n>  GMP updated with equipment available on board such as  food waste freezer,comminuter, compactor etc. Are all equipments working. (defective equipment included in defect list/Office informed) \n> Are the training records available for the crew regarding Garbage Disposal Regulations?\n>  Are all the garbage containers marked with capacity and color coded/stencil as per GMP ?\n>  Are separate bins for e waste /cooking oil /sharps provided \n> Are garbage handling notice poster displayed in galley, pantry, garbage collection area etc?\n>  Are the entries for incineration correct, signed by person incharge\n>  Do the  entries for shore disposal match with the receipts in GRB ?\n>  Are the old record books readily available for last 2 years ?", "sms": "EMM 7", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.24", "q": "> Is the ballast and control systems in good order. Are all controls operational \n> Are they maintained as per PMS \n> Are all suction and discharge gauges/tachometers/alarms operational.\n> Are all tank and draft gauges operational\n> Is there a record of performance test of ballast pump and eductors.", "sms": "TMM 8.7, 9.2 & Annex 1H & 1F", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.25                    Guideline 1", "q": "> Are all  ballast valves in good order and working. \n> Are all manual valves marked with O/S direction  \n> Are all valves identified with unique number matching with mimic diagram.\n> For remote operated hydraulic/pneumatic valve: Are all indicators at control station and local station working \n> Is the emergency operation of valves arrangement tried out and checked as per PMS ?                                                                                                                                                                                                                              Is record of opening/closing timing of remote operated valves maintained and compared against makers guidance.", "sms": "TMM 9.2, 11.11.3 & ANNEX 1F", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.26", "q": "> Are all bunker and  ballast tank manholes in good condition. \n> Are all manhole gaskets and fastening bolts maintained in good condition.", "sms": "TEC-32 ,TMM 8.2.1", "status": "Yes", "remarks": "Date emergency valves last tried out: 06 Oct 2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 6.2", "q": "> Have the holds and tanks been inspected as per schedule and form Tec 32 A to 32S properly maintained? Self iunloading vessels may utilize lining to reduce friction.\n> Are photos of inspection available?", "sms": "TEC 32A-32S\nTMM 8.1 & 8.2 CCM Annex-1", "status": "Yes", "remarks": "Date of last inspection:", "guidance": "Rightship Inspector will record a finding if the inspection report along with supporting photo and / or video evidence for inspection, cargo holds, ballast tanks, void spaces, trunks, duct keel and cofferdams by the ship’s personnel photo and/or video evidence of such inspection is not available."}, {"app": "All Vessels", "ref": "RISQ 6.4", "q": ">  Is the completed Form Tec 32E for hold and tank inspections along with photos available?\n> Are the access points to cargo holds, ballast tanks, and void spaces in good condition?\n> Are the vertical ladders, spiral ladders, rungs, stations, and platforms being in good condition?                                                                                                                                                                                        \n> Cargo hold vent closing devices are maintained in good order. \n> Ventilation ports and fan spaces (when fitted) are free of rust/paint flakes which can fall into the cargo.", "sms": "TEC 32E\nTMM 8.1 & 8.2", "status": "Yes", "remarks": "Date of last inspection: 24 Dec 2025", "guidance": "Rightship Inspector will record a Finding if vertical ladders, spiral ladders, rungs, station, and platform are found damaged or corroded."}, {"app": "All Vessels", "ref": "RISQ 6.5", "q": "> Does any  air pipe or sounding pipes passing through cargo hold or void space? \nIf Yes, answer below, \n> Are these free from defects? \n> Are these being inspected after every discharge? \n> Are inspection records available and updated in PMS? \n> Are the spring loaded/counter weight self closing sounding pipe closing effectively? \n> Are the Air pipe vent heads inspected/overhauled and records maintained in PMS.", "sms": "TMM 3.5.9, 8.2, 8.6, 8.6.1 & 8.6.2 & Annex 1K", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 6.6", "q": "> Is there a duct keel on board? \nif yes answer the following, \n> Is the duct keel free of water/oil accumulation ? \n> Is the duct keel door open indication operational ?\n> Is the duct keel bilge alarm operational?\n> Is the Records of testing of alarms and indicators maintained?\n> Are the Duct Keel exhaust fan/vent damper/lighting operational?", "sms": "H&S 5.2.7\nTMM 8.1, 8.2, 12.4 & Annex 1G/2/6", "status": "NA", "remarks": "", "guidance": "Check Rubber packing on the fire damper inside the mechanical ventilator for pipe duct in good condition"}, {"app": "All Vessels", "ref": "RISQ 6.8", "q": ">  Is the completed Form Tec 32E for hold and tank inspections along with photos available?\n> Are the access points to cargo holds, ballast tanks, and void spaces in good condition?\n> Are the vertical ladders, spiral ladders, rungs, stations, and platforms being in good condition?                                                                                                                                                                                        \n> Cargo hold vent closing devices are maintained in good order. \n> Ventilation ports and fan spaces (when fitted) are free of rust/paint flakes which can fall into the cargo.", "sms": "TEC 32E\nTMM 8.1 & 8.2", "status": "Yes", "remarks": "Date of last inspection: 24 Dec 2025", "guidance": "Rightship Inspector will record a Finding if vertical ladders, spiral ladders, rungs, station, and platform are found damaged or corroded."}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.4A", "q": "> Are save-alls around all fuel, diesel, and lubricating oil tank vents clean and empty? \n> Are all provided with drain plug and secured with a chain? \n> Are they marked with capacity and identification?                                                                                                                                              > Is the height of save alls lower than the vent heads themselves", "sms": "D-03(Pre-arrival checklist)\nEMM-I/3.9.1\nTMM 4.2, CL E-11", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.2A", "q": "Documents : Is the following avalilable \n>  Cargo category as per IMSBC Code\n>  TML and MC certificate \n>  Declaration, if the cargo is not listed in IMSBC code.\n>  Declaration if cargo is dangerous \n>  Cargo SF or density\n> Information if cargo is HME \n( answer as applicable for cargo on board and check for previous cargoes) \n> Are records as  OPS Bulk 11 available for last Cat A cargo loaded?                                                                                   >Do the ship staff know how to determine the angle of repose using a ‘tilting box test’ as per procedure in Appendix 2 of the IMSBC Code ?", "sms": "BGCM 4.2", "status": "Yes", "remarks": "", "guidance": "Rightship Inspector will record a finding if the cargo was damaged for reasons other than the hatch cover’s weathertight integrity."}, {"app": "Bulk Carriers", "ref": "RISQ 8.3A                    Guideline 1", "q": "Documents : Is the following avalilable \n>  Cargo category as per IMSBC Code\n>  TML and MC certificate \n>  Declaration, if the cargo is not listed in IMSBC code.\n>  Declaration if cargo is dangerous \n>  Cargo SF or density\n> Information if cargo is HME \n( answer as applicable for cargo on board and check for previous cargoes) \n> Are records as  OPS Bulk 11 available for last Cat A cargo loaded?                                                                                   >Do the ship staff know how to determine the angle of repose using a ‘tilting box test’ as per procedure in Appendix 2 of the IMSBC Code ?", "sms": "BGCM 4.2", "status": "Yes", "remarks": "", "guidance": "Rightship Inspector will record a finding if the cargo was damaged for reasons other than the hatch cover’s weathertight integrity."}, {"app": "Bulk Carriers", "ref": "RISQ 8.4A", "q": "Following information is available \n> Max ballasting and de-ballasting rate?\n> Load density of cargo holds and the maximum allowable load per hold? \n> Max allowable load per hold for homogenous and alternate hold loading.", "sms": "BGCM 4.2", "status": "Yes", "remarks": "", "guidance": "Rightship Inspector will check if the information regarding ballasting and de-ballasting rate, the maximum allowable load per unit, the surface area of the tank-top plating, and the maximum allowable load per hold is prominently posted or readily available to the user"}, {"app": "Bulk Carriers", "ref": "RISQ 8.7A", "q": "> Is the cargo plan signed by all OOW \n> Are any deviations form plan agreed with shore\n> Is OPS 10A made as per detail given in BGCM 4.2,4.3 and 4.7?\n> Are the duty officers aware of actions to take in case \n      1. High stresses are noted \n      2. Deballasting rate does not cope up with loading rate\n> Is there record of ship shore comparision of cargo figures after each pour?Draft planned and actual checked ?", "sms": "BGCM 4.2,4.3 & 4.7", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.8A", "q": "> Is WI BULK-104 for ballasting of Cargo Hold available \n> Are officers aware of the SMS guidelines given in BGCM 4.8 & WI D/Bulk 104?\n> Are senior officers aware precautions during ballast exchange of ballast hold ?\n> Consequences of ballasting/deballasting with vents not open?(Fatality report 12)\n> Consequencies of poorly maintained ballast tank manhole covers ?", "sms": "BGCM 4.8/D-Bulk-104", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.9A", "q": "Are following available : \n>  List of hold cleaning equipment available on board\n>  Hold cleaning guidelines, procedures, hold cleaning matrix for change of cargo and a hold cleaning inspection checklist ?\n>  OPS Bulk 15 form and photographic evidence ?                                                                                                                >  Are the end folding type hatch cover panels completely opened and secured during hold cleaning", "sms": "BGCM 4.9", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.10A", "q": "> Are  limitations or restrictions specified in the Loading Manual or Trim and Stability Booklet posted in control room?\n( Restrictions are given in loading manual or trim and stability manua) \n( Some times restriciton may be placed by class in case the load density of tank top has reduced due to thinning down of the inner bottom)", "sms": "BGCM 4.9", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.11A                    Guideline 1", "q": "Crew knowledge : Are officers familiar with-  \n>  Risk, hazard and carriage requirements of cargo on board? \n>  Information for present cargo from the IMSBC code and BLU code\n>  Cargo related equipment ( such as gas detectors) and records ( such as temperature, atmosphere measurements) \n>  Cargo related precautinos (weather precautions, ventilation, carriage requirements) \n> Precautions with cargo which may liquefy/have chemical  hazards/corrosive cargoes/emit toxic vapors /high denisty cargoes?\n>  Discharge requirement of  wash water and non-recoverable cargo residues.                                                                                                                                                                                                                                           \n> Can test requirement  (OPS Form11) when carrying Group A cargoes.", "sms": "BGCM 4.2 & 5.5", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.13A", "q": "For cargo not listed in the IMSBC Code, \n> Is certificate from the shipper available endorsed by the competent authority of the port? \n> Does it state the characteristics of the cargo and the required conditions for carriage and handling? \n> Is it provided in the format as per IMSBC code ?\n> Has the required competent authorities(at port of unloading) and flag state been consulted via office?", "sms": "BGCM 4.2", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.14A                    Guideline 1", "q": "For present cargo operations : \n> Is the operations plan prepared (OPS Bulk 10A).\n> Is a pre cargo operation meeting held with all crew and recorded ?\n> Visual and calculated draft being checked and discrepancies resolved ?\n> Are SF/BM checked and recorded at each stage ?\n> All details of cargo operations- holds being operated/ballast sequences etc recorded ?", "sms": "OPS Bulk 10A", "status": "Yes", "remarks": "", "guidance": "RightShip recommends that the cargo loading/unloading plan should be completed by the responsible officer prior to arrival at port and the commencement of cargo operations and verified and approved by the Master.\nBLU code requires the loading discharging plan to be kept on board for 6 months post that loading/ discharging operation"}, {"app": "Bulk Carriers", "ref": "RISQ 8.15A", "q": "> Is port log maintained during loading and unloading? ( Entries as per BGCM Manual section 4.3 and 4.7)", "sms": "BGCM 4.3/4.7", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.16A", "q": "Cargo Care during voyage ( as applicable) \n> Are vetilaltion records maintained and all parameters etered ?\n> Are form OPS bulk form 14A and 14B being maintained?\n> Is the form OPS bulk form 13 being maintained?\n> Are records of bilge sounding and pumping operationa maintained ?\n> Is the form OPS Bulk form 12 being maintained?", "sms": "BGCM 5.0", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.17A", "q": "For Toxic cargoes : \n> Has PTW been used when entring cargo holds/adjacent compartments ?\n> Was a pre loading meeting done and recorded to convey the dangers to all crew \n> Are staff aware of Fatality Report 08(Overcome by toxic gases) ?\n> Is CL D/Bulk/03 followed when making entry in cargo hold during port operations ?\n> Are staff aware of poster QA 02?\n> Is QA 02 being discussed with stevedores and logged?", "sms": "BGCM 3.1 & 3.2", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.18A", "q": "For Coal Cargo,  \n> If coal is being carried, was the ship equipped with adequate instruments for monitoring, concentration of methane, oxygen,carbon monoxide in the atmosphere,temperature,pH value of cargo space bilge samples\n> Are the gas sampling points, in good working order? \n> Are the instruments regularly serviced and calibrated. \n> Is ship personnel trained in the use of such instruments.\n> Are temperature-measuring equipment regularly checked, serviced, and calibrated as recommended by the manufacturer, and sufficient quantity of spare parts carried?", "sms": "BGCM 5.2", "status": "Yes", "remarks": "", "guidance": "Read Rightship question guidance for suitable thermometers to use."}, {"app": "Bulk Carriers", "ref": "RISQ 8.19A", "q": "> Is any special emergency equipment required by IMSBC for cargo on board(as applicable)? \n> Is the equipment in a state of readiness for use?\n( Extra SCBA sets must have been serviced/ Gas detectors must be operational/ Gas testing tubes must not be expired)", "sms": "PAM 8.2", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.1B", "q": "Has the vessel manager provided policy statements and relevant publications for the safe carriage and handling of grain in bulk? \n-Senior officers aware of SMS guidelines on carriage of grain as per BGCM 5.1\n-Senior officers aware of the content and all required publication as per general circular 18 on board ?", "sms": "BGCM 5.1", "status": "Yes", "remarks": "", "guidance": "A list of on-board publication shall be incorporated in SMS. A Finding will be filed by inspector against ships not carrying publications in accordance with National requirements and the SMS."}, {"app": "Bulk Carriers", "ref": "RISQ 8.2B", "q": "Has appropriate information about the cargo and its characteristics been provided to the master or master’s representative prior to loading?\n-Adequate information received from shipper about cargo on inherent quality, safety risks and precautions prior loading\n-Reference made to IMO grain code for information to be received from shipper.\n-Senior officers aware of the risk when the moisture content of grain exceeds 12 to 14 %", "sms": "BGCM 5.1", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.3B", "q": "Has the grain cargo been examined and sampled during loading to ensure that the apparent conditions meet the requirements as described in the documentation and is there recorded evidence of regular monitoring where applicable? \n-Is the apparent condition of cargo such as temperature, colour,dryness, dampness, free-flowing, not free- flowing,\nlumps present, foreign matter, etc., checked during the loading operations and record kept in port log ?\n-Are good quality photographs taken during loading along with entries in port log ? \n-Are LOP issued when any abnormality is observed and office informed/guidance taken ?\n-Are any cargo samples taken duirng the loading operations ?", "sms": "BGCM 2.2 &  5.1", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.4B", "q": "Is the approved document of authorisation and grain stability booklet (Grain Loading Manual) provided? \n-Is the class/flag approved document of authroisation and grain loading manual available on board ?\n-Are senior officers aware of the stability requirement compliance when carrying grain cargo during all stages of voyage ?", "sms": "BGCM 5.1", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.5B", "q": "If the document of authorisation was not provided, can the master demonstrate the compliance of the ship’s stability with the Grain Code? \n-All company vessel are provided with document of authorisation however senior officers must be aware of the stability requirement as given in IMO Grain code to demonstrate to the satisfaction of the Administration or the Contracting Government of the port of loading on behalf of the Administration that the ship in its proposed loaded condition will comply with the requirements", "sms": "Grain Code", "status": "NA", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.6B", "q": "Is a Class-approved loading computer or programme in use and has its operational accuracy been regularly tested? \n-The loading computer is not connected to ship LAN system ? A back up of loading computer ( software or otherwise) is available?\n-The accuracy of loading computer is checked every 6 M using class approved Test condition ? Chief officer aware that he has to use a new blank condition and input the requried data and not print out an existing condition ?\n-Is the test of loading computer done during Safety Construction annual survey and the test condition stamped by the class surveyor ?", "sms": "BGCM 4.2", "status": "Yes", "remarks": "No loading computer test condition found during Safety Construction annual survey stamped by class surveyor", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.7B", "q": "Are the stresses, stability information and any limitations included in the cargo plan understood\nby the cargo watch officers and are conditions being monitored and maintained within design limits throughout cargo operations?\n-Is the cargo stowage and operations plan OPS 10A made in detail given in BGCM 4.2,4.3 and 4.7\n-Is each stage of the plan monitored by check of visual drafts on completion of each stage ? If there is any discrepancy between visual and calculated draft is it investigated and resolved - plan modified/loading rate reduced etc and adequate records kept ?\n-Are the duty officers aware of vessel being subjected to high stresses in case deballasting rates cannot keep with high loading rates  and action to take in such a case ?\n-Are cargo figures from terminal being sought after each pour and compared with ships planned figure ?\n-Are adequate records of loading/discharging/ballast operations maintained so as to reconstruct the full history of the operation from records ?", "sms": "BGCM 4.2,4.3,4.7", "status": "Yes", "remarks": "", "guidance": "The Master and Chief Officer should be aware of the worst-case damage condition for the existing cargo on board. The observed drafts should be logged down after every sequence and compared with calculated draft."}, {"app": "Bulk Carriers", "ref": "RISQ 8.8B", "q": "Are there procedures in place for loading, ballasting and de-ballasting of the ballast holds? \n-Senior officers aware of the SMS guidelines given in BGCM 4.8  & WI D/Bulk 104 ?\n-Ship specific work instructions complied with in full prior ballasting/during ballasting/during the voyage/prior deballasting and after deballasting of ballast hold ?\n-Senior officers aware of precautions during ballast exchange of ballast hold ?\n-All staff aware of the consequences of ballasting/deballasting with vents not open ?Refer to Fatality report 12\n-Are the tests/checks as detailed in WI D Bulk/104 after deballasting of ballast hold diligently carried out and witnessed by senior officers ?Are staff aware of the incidents in the fleet due to water ingress from poorly maintained ballast hold valves/manhole covers ?", "sms": "BGCM 4.8/D-Bulk-104 & D/Bulk 02", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.9B", "q": "Are there guidelines and procedures for hold cleaning after completion of unloading? \n-Senior officers aware of hold cleaning guidelines as given in BGCM 4.9 ?\n-Records of pre cleaning meeting/MSDS of chemical to use (if applicable)/RA/Disposle of washing /tests to be done inside the hold maintained ?\n-Cargo holds and associated equipment prepared for the requirements of next cargo ?\n-OPS Bulk 15 form and photographic evidence maintained ?", "sms": "BGCM 4.9", "status": "Yes", "remarks": "", "guidance": "The Rightship Inspector will record the list of hold cleaning equipment available on board in comments. The cargo hold cleaning checklist should be incorporated in the hold cleaning procedure."}, {"app": "Bulk Carriers", "ref": "RISQ 8.10B", "q": "Have cargo holds been grain or hospital cleaned, where applicable, and has a ship’s hold inspection certificate been issued by a 3rd party prior to loading grain?\n- Prior loading grain cargoes cargo holds to be cleaned to grain/hospital standard as per guidance given in BGCM 4.9\n-White glove test to be done for applicable cargoes by senior officers before presenting the cargo holds for pre loading inspection", "sms": "BGCM 4.9", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.11B", "q": "Is the vessel free of any limitations or restrictions specified in the Loading Manual or Trim and Stability Booklet? \n-In case the vessel has any restrictions as given in loading manual or trim and stability manual are all the deck officers aware of same and is this limitation posted in ships office/ballast control ?\n-In case the load density of tank top has reduced due to thinning down of the inner bottom and restrictions placed by class , then are such restrictions know to all deck officers and is same taken into consideration when planning the cargo loading ?", "sms": "BGCM 4.2 & 5.1", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.12B", "q": "Are officers familiar with the risk, hazard and carriage requirements of grain cargo on board the ship? \n-Deck officers aware of the inherent risks of grain cargo -Shift of grain, contamination, ingress of water, moisture migration, and transfer of heat from engine room and / or bunker tank bulkhead and inadequate surface ventilation \n-Have Engineers been briefed about the requirement to not heat bunker tanks in cargo area above 42 Deg C?\n-Have all crew been briefed about emission of explosive / toxic gas/lack of oxygen in cargo hold and dust danger when carrying grain cargoes ?", "sms": "BGCM5.1", "status": "Yes", "remarks": "", "gui
