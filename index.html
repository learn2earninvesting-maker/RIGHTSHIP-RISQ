: ""}, {"app": "All Vessels", "ref": "RISQ 5.6", "q": ">  Are the bilge pumping system in good order and tested\n>  Are the sounding pipes and covers in good order and not choked or damaged.Teflon/plastic covers for sounding pipes are not acceptable \n>  Are the hold bilges, bilge wells in good order\n>  Have the above items been checked prior to loading and records maintained", "sms": "BGCM 4.2.7\nCCOM 4.3.1 & 6.2.2", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.10                    Guideline 2", "q": ">  Are the crew aware of hazards of chemicals or treatment additives used in BWTS (where used) for handling/making entry into ballast tanks/overhaul of BWTS machinery \n> Is  safe handling instructions and equipment available on board to use these chemicals", "sms": "EMM 8.1", "status": "NA", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.11", "q": ">  Are officers aware of contents of BWMP with special reference to class approved ballast water exchange / sedimentation control methods\n>  Is BWMP Part B updated and referred to prior port call ?\n>  Are records of  BW reporting forms to authorities available?", "sms": "EMM 8.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.19 & 5.20", "q": ">  Is the GRB updated and up to date \n>  Is the garbage storage/ disposal area tidy and hygienic condition? All bins should be metal with tight fitting sealing covers.\n>  GMP updated with equipment available on board such as  food waste freezer,comminuter, compactor etc. Are all equipments working. (defective equipment included in defect list/Office informed) \n> Are the training records available for the crew regarding Garbage Disposal Regulations?\n>  Are all the garbage containers marked with capacity and color coded/stencil as per GMP ?\n>  Are separate bins for e waste /cooking oil /sharps provided \n> Are garbage handling notice poster displayed in galley, pantry, garbage collection area etc?\n>  Are the entries for incineration correct, signed by person incharge\n>  Do the  entries for shore disposal match with the receipts in GRB ?\n>  Are the old record books readily available for last 2 years ?", "sms": "EMM 7", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.6A", "q": "> Is the staff familiar with SMS guidelines to mitigate damage due to Catalytic Fines and contaminents. Is this being followed?", "sms": "TMM 4.9", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.7A                    Guideline 1", "q": "For bunkering operations: \n> Check if checklist E11A is complete in all respects and fully complied with?\n> Pre bunkering meeting done and logged? \n> Has the bunkering plan been made?\n> Is the FO, DO and LO transfer / bunkering procedures clearly displayed?\n> Is the diagram for the fuel oil transfer piping displayed?  \n> Has High-level alarms setting of the FO tanks been tested and records available?\n> Is there Proper identification of the valves on the bunker lines?\n> Is the bunkering entered in the ORB Part I?                                                                                                                                                                                                                                                               > Procedure specifying locations of fuel sampling points and shore lab analysis to ascertain sulphur levels are in place                                                                                                                                                                                                                                                      > Bunker samples as required by MARPOL  18(6) retained for last 12 months ?                                                                                                                                                                                                                                              > Are fuel samples stored in location protected by a localized fire fighting system ?", "sms": "TMM 4.2", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.9A", "q": "> Are ship specific work instructions for fuel oil changeover approved by VM available?Is the pipeline capacity mentioned in the WI.\n> Are the RA records for change over maintained?\n> Is latest edition of FOBAS calculator available and being used?Printout/soft copies maintained?\n> Are appropriate records maintained in LOG 04 and ER log book ?   \n> Are the IMO DCS TEC-49 form being updated every month and records maintained?", "sms": "EMM 9.0", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.7A", "q": "> Is the cargo plan signed by all OOW \n> Are any deviations form plan agreed with shore\n> Is OPS 10A made as per detail given in BGCM 4.2,4.3 and 4.7?\n> Are the duty officers aware of actions to take in case \n      1. High stresses are noted \n      2. Deballasting rate does not cope up with loading rate\n> Is there record of ship shore comparision of cargo figures after each pour?Draft planned and actual checked ?", "sms": "BGCM 4.2,4.3 & 4.7", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.10A", "q": "> Are  limitations or restrictions specified in the Loading Manual or Trim and Stability Booklet posted in control room?\n( Restrictions are given in loading manual or trim and stability manua) \n( Some times restriciton may be placed by class in case the load density of tank top has reduced due to thinning down of the inner bottom)", "sms": "BGCM 4.9", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.11A                    Guideline 1", "q": "Crew knowledge : Are officers familiar with-  \n>  Risk, hazard and carriage requirements of cargo on board? \n>  Information for present cargo from the IMSBC code and BLU code\n>  Cargo related equipment ( such as gas detectors) and records ( such as temperature, atmosphere measurements) \n>  Cargo related precautinos (weather precautions, ventilation, carriage requirements) \n> Precautions with cargo which may liquefy/have chemical  hazards/corrosive cargoes/emit toxic vapors /high denisty cargoes?\n>  Discharge requirement of  wash water and non-recoverable cargo residues.                                                                                                                                                                                                                                           \n> Can test requirement  (OPS Form11) when carrying Group A cargoes.", "sms": "BGCM 4.2 & 5.5", "status": "YES", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.5C                    Guideline 1", "q": "Is an approved ship-specific Cargo Securing Manual available and are officers thoroughly familiar with the contents of the manual?  \nIs cargo secured in accordance with CSM at designated securing points using cargo securing devices mentioned in the manual?\nDoes the vessel have sufficient spare lashing devices?  \n\nDose CSM include the following?\n1. Cargo Securing devices strength (MSL) and their use;  \n2. Tables and diagrams give a broad outline of the accelerations.\n3. Examples of forces acting on typical cargo units\n4. Examples of how to calculate the number and strength of portable securing devices\n5. Calculation method used converted in a form suiting the particular ship (Recommended)               \n6. CSAP- Cargo Safe Access plan (If applicable to the ship)                                           \n7. Inspections / Maintenace/ Repair records kept with CSM\n8. Procedure of accepting, maintaining, repairing or rejecting of the lashing devices must be available. (All equipment, lashings, hog wires, uprights function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(iso){
  if(!iso) return '';
  const d = new Date(iso); if(isNaN(d.getTime())) return '';
  return d.toLocaleString(undefined,{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

/* ============ App State ============ */
const S = {
  roomCode: localStorage.getItem('rsRoomCode') || '',
  userName: localStorage.getItem('rsUserName') || '',
  screen: 'home', currentRank: null, reportRank: null,
  answers: {}, syncState: 'local', // 'local' | 'live'
  activeYour: 'ALL', activeApp: 'ALL', searchQuery: '', openItems: {},
  nameDraftPending: null,
};

let unsub = null;
function roomRef(){ return doc(db, 'rsready_rooms', S.roomCode); }

function localKey(){ return 'rsReadyAnswers_' + S.roomCode; }
function loadLocal(){ try{ const v = localStorage.getItem(localKey()); if(v) S.answers = JSON.parse(v); }catch(_){} }
function saveLocal(){ try{ localStorage.setItem(localKey(), JSON.stringify(S.answers)); }catch(_){} }

function connectRoom(){
  loadLocal();
  render();
  if(!firebaseOk){ S.syncState = 'local'; render(); return; }
  if(unsub) unsub();
  unsub = onSnapshot(roomRef(), (snap)=>{
    S.syncState = 'live';
    if(snap.exists() && snap.data().answers){
      S.answers = snap.data().answers;
      saveLocal();
    }
    render();
  }, (err)=>{ console.warn('Firestore sync error, staying local-only:', err); S.syncState='local'; render(); });
}

let saveTimer = null;
function persistAnswers(){
  saveLocal();
  render();
  if(!firebaseOk) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    setDoc(roomRef(), { answers: S.answers, updatedAt: new Date().toISOString() }, { merge: true })
      .catch(e=>console.warn('Firestore write failed (saved locally):', e));
  }, 400);
}

function requireName(cb){
  if(S.userName){ cb(S.userName); return; }
  S.nameDraftPending = cb;
  render();
}

function setStatus(rankKey, idx, status){
  requireName((who)=>{
    S.answers[rankKey] = S.answers[rankKey] || {};
    const existing = S.answers[rankKey][idx] || {status:null, remarks:'', by:'', at:''};
    const newStatus = existing.status === status ? null : status;
    S.answers[rankKey][idx] = {...existing, status:newStatus, by:who, at:new Date().toISOString()};
    persistAnswers();
  });
}

let remarksTimer = {};
function onRemarksInput(rankKey, idx, value){
  S.answers[rankKey] = S.answers[rankKey] || {};
  const existing = S.answers[rankKey][idx] || {status:null, remarks:'', by:'', at:''};
  S.answers[rankKey][idx] = {...existing, remarks:value};
  const key = rankKey+'-'+idx;
  clearTimeout(remarksTimer[key]);
  remarksTimer[key] = setTimeout(()=>{
    requireName((who)=>{
      S.answers[rankKey][idx] = {...S.answers[rankKey][idx], by:who, at:new Date().toISOString()};
      persistAnswers();
    });
  }, 500);
}

function yourCounts(rankKey, items){
  const store = S.answers[rankKey] || {};
  const c = {YES:0, NA:0, NO:0, UNANSWERED:0};
  items.forEach((it,idx)=>{ const a = store[idx]; if(a && a.status) c[a.status]++; else c.UNANSWERED++; });
  return c;
}

function goHome(){ S.screen='home'; S.currentRank=null; window.scrollTo({top:0}); render(); }
function openRank(key){ S.currentRank=key; S.activeYour='ALL'; S.activeApp='ALL'; S.searchQuery=''; S.openItems={}; S.screen='rank'; window.scrollTo({top:0}); render(); }
function toggleItem(id){ S.openItems[id] = !S.openItems[id]; render(); }
function clearRankAnswers(rankKey){
  if(!confirm('Clear all saved answers and remarks for this rank checklist? This affects everyone using this room and cannot be undone.')) return;
  delete S.answers[rankKey];
  persistAnswers();
}

function clearAllAnswers(){
  const first = confirm('Reset EVERY rank checklist in this room back to blank? This clears all YES/NO/N/A answers and remarks for every officer, across all 10 ranks. This cannot be undone.\\n\\nUse this before the next inspection cycle to start fresh.');
  if(!first) return;
  const second = confirm('Are you absolutely sure? This will wipe the entire room\\u2019s checklist data right now for everyone.');
  if(!second) return;
  S.answers = {};
  persistAnswers();
}

/* ============ Render ============ */
const app = document.getElementById('app');

function render(){
  if(!S.roomCode || S.nameDraftPending || (!S.userName && S.nameDraftPending)){
    // handled below in gate screens
  }
  if(!S.roomCode){ app.innerHTML = renderRoomGate(); attachRoomGate(); return; }
  if(S.nameDraftPending){ app.innerHTML = renderNameGate(); attachNameGate(); return; }
  if(S.reportRank){ app.innerHTML = renderReport(S.reportRank); attachReport(); window.scrollTo({top:0}); return; }
  if(S.screen === 'home'){ app.innerHTML = renderHome(); attachHome(); return; }
  app.innerHTML = renderRankScreen(); attachRankScreen();
}

function syncBadge(){
  const cls = S.syncState==='live' ? 'live' : 'local';
  const label = S.syncState==='live' ? 'Live sync' : (firebaseOk ? 'Connecting…' : 'Local only (Firebase not configured)');
  return `<span class="mono" style="font-size:10px;color:var(--dim2);display:flex;align-items:center;"><span class="sync-dot ${cls}"></span>${label}</span>`;
}

function renderRoomGate(){
  return `<div class="gate-wrap"><div class="gate-card">
    <div class="gate-title syne">Join or start a room</div>
    <div class="gate-desc">Enter your vessel name, IMO number, or company code. Anyone using the same code shares the same live checklist — so use something specific to your ship (e.g. <b>FEDERAL-FRONTIER</b>).</div>
    <input id="roomInput" class="gate-input mono" placeholder="e.g. FEDERAL-FRONTIER" autofocus>
    <button id="roomGo" class="gate-primary">Enter checklist</button>
    <div class="gate-note">${firebaseOk ? 'Connected to shared sync — your room stays private to anyone with your code.' : '⚠ Firebase is not configured on this deployment yet, so saves will stay on this device only until it is.'}</div>
  </div></div>`;
}
function attachRoomGate(){
  const go = ()=>{
    const v = document.getElementById('roomInput').value.trim().toUpperCase().replace(/\\s+/g,'-');
    if(!v) return;
    S.roomCode = v; localStorage.setItem('rsRoomCode', v);
    connectRoom();
  };
  document.getElementById('roomGo').onclick = go;
  document.getElementById('roomInput').onkeydown = (e)=>{ if(e.key==='Enter') go(); };
}

function renderNameGate(){
  return `<div class="gate-wrap"><div class="gate-card">
    <div class="gate-title syne">Who's checking?</div>
    <div class="gate-desc">Your name will be tagged against any item you save, so everyone in this room can see who confirmed what.</div>
    <input id="nameInput" class="gate-input" placeholder="e.g. C/O Sharma, 2/E Patel" autofocus>
    <button id="nameGo" class="gate-primary">Continue</button>
    <button id="nameCancel" class="gate-ghost">Cancel</button>
  </div></div>`;
}
function attachNameGate(){
  const go = ()=>{
    const v = document.getElementById('nameInput').value.trim();
    if(!v) return;
    S.userName = v; localStorage.setItem('rsUserName', v);
    const cb = S.nameDraftPending; S.nameDraftPending = null;
    if(cb) cb(v); else render();
  };
  document.getElementById('nameGo').onclick = go;
  document.getElementById('nameInput').onkeydown = (e)=>{ if(e.key==='Enter') go(); };
  document.getElementById('nameCancel').onclick = ()=>{ S.nameDraftPending=null; render(); };
}

function renderTopbar(showBack){
  return `<div class="topbar"><div class="topbar-inner">
    ${showBack ? `<button class="back-btn" id="backBtn">← Home</button>` : `<div class="brand" id="brandHome">
      <div class="brand-mark">🚢</div>
      <div><div class="brand-title syne">RightShip Ready</div><div class="brand-sub">RISQ Pre-Inspection</div></div>
    </div>`}
    <div class="room-badge mono">${esc(S.roomCode)}</div>
    ${syncBadge()}
  </div></div>`;
}

function renderHome(){
  let total=0; RANK_ORDER.forEach(k=>total+=RS_DATA[k].items.length);
  let startedRanks=0; RANK_ORDER.forEach(k=>{ if(S.answers[k] && Object.keys(S.answers[k]).length) startedRanks++; });
  const cards = RANK_ORDER.map(key=>{
    const rank = RS_DATA[key], m = RANK_META[key];
    const mine = yourCounts(key, rank.items);
    const done = mine.YES+mine.NA+mine.NO;
    return `<div class="rank-card" data-rank="${key}">
      <div class="rank-icon">${m.icon}</div>
      <div><div class="rank-name syne">${m.short}</div><div class="rank-desc">${m.desc}</div></div>
      <div class="rank-foot"><div class="rank-count mono"><b style="color:var(--text)">${rank.items.length}</b> items</div>
      ${done>0 ? `<div class="rank-mine mono">${done}/${rank.items.length} done</div>` : ''}</div>
    </div>`;
  }).join('');
  return `${renderTopbar(false)}
  <div class="wrap">
    <div style="padding:38px 0 22px;">
      <div class="eyebrow mono">RIGHTSHIP READY &middot; RISQ CHECKLIST</div>
      <h1 class="hero syne">Know it before the<br><span style="color:var(--amber)">inspector points at it.</span></h1>
      <p class="lede">Rank-wise RightShip RISQ checklists. Tap YES, NO, or N/A on every item, leave a remark with the date you checked, and it saves instantly for everyone using this room code — on any device, anywhere.</p>
      <div class="hero-stats">
        <div class="hstat"><div class="hstat-num mono" style="color:var(--amber)">10</div><div class="hstat-label">Ranks</div></div>
        <div class="hstat"><div class="hstat-num mono">${total}</div><div class="hstat-label">Checks</div></div>
        <div class="hstat"><div class="hstat-num mono" style="color:var(--green)">${startedRanks}</div><div class="hstat-label">Ranks started</div></div>
      </div>
      <button class="report-btn" id="reportAllBtn" style="margin-top:14px;">Generate full report — all ranks</button>
      <button class="reset-link mono" id="resetAllBtn" style="display:block;margin-top:12px;">Reset all checklists for next inspection</button>
      <div class="mono" style="font-size:10px;color:var(--dim2);margin-top:8px;">Room <b style="color:var(--amber)">${esc(S.roomCode)}</b> &middot; ${firebaseOk ? 'synced across every device using this code' : 'saved locally on this device'} &middot; <a href="#" id="changeRoom" style="color:var(--dim2)">switch room</a></div>
    </div>
    <div class="section-label"><span>Select your rank</span><span class="ln"></span></div>
    <div class="rank-grid">${cards}</div>
    <div class="howto">
      <h3 class="syne">How to run a focused round</h3>
      <div class="howto-steps">
        <div class="howto-step"><b>01 Pause</b>Stop at the item or machinery before checking it off.</div>
        <div class="howto-step"><b>02 Focus</b>Read the question fully — most findings hide in the sub-bullets.</div>
        <div class="howto-step"><b>03 Record</b>Mark YES / NO / N/A and note the date you checked it.</div>
        <div class="howto-step"><b>04 Report</b>Once a rank is complete, generate the PDF for the office.</div>
      </div>
    </div>
    <div class="footnote">10 RANK CHECKLISTS &middot; ${total} VERIFICATION POINTS &middot; SHARED LIVE ACROSS THIS ROOM</div>
  </div>`;
}
function attachHome(){
  document.getElementById('reportAllBtn').onclick = ()=>{ S.reportRank='ALL'; render(); };
  document.getElementById('resetAllBtn').onclick = clearAllAnswers;
  document.getElementById('changeRoom').onclick = (e)=>{ e.preventDefault(); if(confirm('Switch to a different room? You can always re-enter this code to come back.')){ S.roomCode=''; localStorage.removeItem('rsRoomCode'); if(unsub) unsub(); render(); } };
  app.querySelectorAll('.rank-card').forEach(el=>{ el.onclick = ()=>openRank(el.dataset.rank); });
}

function renderRankScreen(){
  const rank = RS_DATA[S.currentRank], m = RANK_META[S.currentRank];
  const store = S.answers[S.currentRank] || {};
  const mine = yourCounts(S.currentRank, rank.items);
  const total = rank.items.length;
  const pct = n => total ? (n/total*100) : 0;

  let entries = rank.items.map((item,idx)=>({item,idx}));
  if(S.activeApp!=='ALL') entries = entries.filter(e=>e.item.app===S.activeApp);
  if(S.activeYour!=='ALL'){
    entries = entries.filter(e=>{
      const a = store[e.idx];
      if(S.activeYour==='UNANSWERED') return !a || !a.status;
      return a && a.status===S.activeYour;
    });
  }
  if(S.searchQuery){
    const q = S.searchQuery.toLowerCase();
    entries = entries.filter(e=> e.item.ref.toLowerCase().includes(q) || e.item.q.toLowerCase().includes(q) || e.item.sms.toLowerCase().includes(q));
  }
  const apps = {}; rank.items.forEach(i=>{ apps[i.app]=(apps[i.app]||0)+1; });
  const appKeys = Object.keys(apps).sort((a,b)=>apps[b]-apps[a]);

  const yourChips = [
    {key:'ALL',label:'All',count:total}, {key:'UNANSWERED',label:'Not yet checked',count:mine.UNANSWERED},
    {key:'YES',label:'Yes',count:mine.YES}, {key:'NO',label:'No',count:mine.NO}, {key:'NA',label:'N/A',count:mine.NA},
  ].map(c=>`<div class="chip ${S.activeYour===c.key?'active':''}" data-your="${c.key}">${c.label} <span class="chip-count mono">${c.count}</span></div>`).join('');

  const appChips = ['ALL',...appKeys].map(k=>`<div class="chip ${S.activeApp===k?'active':''}" data-app="${k}">${k==='ALL'?'All vessels':esc(k)} <span class="chip-count mono">${k==='ALL'?total:apps[k]}</span></div>`).join('');

  const items = entries.length ? entries.map(({item,idx})=>{
    const a = store[idx] || {status:null, remarks:'', by:'', at:''};
    const isOpen = !!S.openItems[S.currentRank+'-'+idx];
    return `<div class="item-card ${a.status==='NO'?'flag':''}">
      <div class="item-head" data-toggle="${idx}">
        <div class="status-pill ${a.status||''}">${a.status||'—'}</div>
        <div style="flex:1;min-width:0;">
          <div class="item-ref-row"><span class="item-ref mono">${esc(item.ref)}</span><span class="item-app-tag">${esc(item.app)}</span></div>
          <div class="item-q">${esc(item.q)}</div>
          ${a.by ? `<div class="mine-meta">Last saved by ${esc(a.by)} · ${fmtDate(a.at)}</div>` : ''}
        </div>
        <div class="chevron ${isOpen?'open':''}">▾</div>
      </div>
      <div class="item-detail ${isOpen?'open':''}">
        ${item.sms ? `<div class="detail-label">SMS Reference</div><div class="detail-text mono" style="font-size:11px;">${esc(item.sms)}</div>` : ''}
        ${item.guidance ? `<div class="detail-label">Inspector guidance</div><div class="detail-text">${esc(item.guidance)}</div>` : ''}
        <div class="your-check">
          <div class="your-check-label">Your check <span class="saved-text" id="saved-${idx}"></span></div>
          <div class="toggle-row">
            <button class="toggle-btn ${a.status==='YES'?'sel-yes':''}" data-status="YES" data-idx="${idx}">YES</button>
            <button class="toggle-btn ${a.status==='NO'?'sel-no':''}" data-status="NO" data-idx="${idx}">NO</button>
            <button class="toggle-btn ${a.status==='NA'?'sel-na':''}" data-status="NA" data-idx="${idx}">N/A</button>
          </div>
          <textarea class="remarks-ta" data-remarks="${idx}" placeholder="Remarks — e.g. last tested 27 Jan 2026">${esc(a.remarks)}</textarea>
        </div>
      </div>
    </div>`;
  }).join('') : `<div class="empty-state">No items match your filters.</div>`;

  return `${renderTopbar(true)}
  <div class="wrap">
    <div style="padding:20px 0 14px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
        <div class="rank-header-icon">${m.icon}</div>
        <div style="flex:1;min-width:0;"><h2 class="rank-header-h2">${m.short}</h2><div class="rank-header-meta">${total} RISQ verification points</div></div>
        <button class="report-btn" id="reportRankBtn">Generate report</button>
      </div>
      <div class="progress-bar">
        <div style="height:100%;width:${pct(mine.YES)}%;background:var(--green);"></div>
        <div style="height:100%;width:${pct(mine.NA)}%;background:var(--blue);"></div>
        <div style="height:100%;width:${pct(mine.NO)}%;background:var(--red);"></div>
      </div>
      <div style="text-align:right;margin-top:6px;"><button class="reset-link" id="clearRankBtn">Clear this rank's answers</button></div>
    </div>
    <div class="controls">
      <div class="search-box"><span>🔍</span><input class="search-input" id="searchInput" placeholder="Search RISQ ref, question, SMS code…" value="${esc(S.searchQuery)}">
        ${S.searchQuery ? `<button class="clear-search" id="clearSearch">✕</button>` : ''}
      </div>
      <div class="filter-wrap"><div class="filter-label mono">Your check</div><div class="chip-row">${yourChips}</div></div>
      ${appKeys.length>1 ? `<div class="filter-wrap"><div class="filter-label mono">Vessel applicability</div><div class="chip-row">${appChips}</div></div>` : ''}
    </div>
    <div>${items}</div>
  </div>
  <button class="fab" id="fabTop">↑</button>`;
}
function attachRankScreen(){
  document.getElementById('backBtn').onclick = goHome;
  document.getElementById('reportRankBtn').onclick = ()=>{ S.reportRank=S.currentRank; render(); };
  document.getElementById('clearRankBtn').onclick = ()=>clearRankAnswers(S.currentRank);
  document.getElementById('searchInput').oninput = (e)=>{ S.searchQuery=e.target.value; render(); document.getElementById('searchInput').focus(); };
  const cs = document.getElementById('clearSearch'); if(cs) cs.onclick = ()=>{ S.searchQuery=''; render(); };
  app.querySelectorAll('[data-your]').forEach(el=>{ el.onclick=()=>{ S.activeYour=el.dataset.your; render(); }; });
  app.querySelectorAll('[data-app]').forEach(el=>{ el.onclick=()=>{ S.activeApp=el.dataset.app; render(); }; });
  app.querySelectorAll('[data-toggle]').forEach(el=>{ el.onclick=(e)=>{ if(e.target.closest('.your-check')) return; toggleItem(S.currentRank+'-'+el.dataset.toggle); }; });
  app.querySelectorAll('[data-status]').forEach(el=>{ el.onclick=()=>setStatus(S.currentRank, el.dataset.idx, el.dataset.status); });
  app.querySelectorAll('[data-remarks]').forEach(el=>{
    el.onclick = (e)=>e.stopPropagation();
    el.oninput = (e)=>{ onRemarksInput(S.currentRank, el.dataset.remarks, e.target.value); const sv=document.getElementById('saved-'+el.dataset.remarks); if(sv){ sv.textContent='saving…'; } };
  });
  const fab = document.getElementById('fabTop');
  window.onscroll = ()=>{ if(window.scrollY>500) fab.classList.add('show'); else fab.classList.remove('show'); };
  fab.onclick = ()=>window.scrollTo({top:0,behavior:'smooth'});
}

function renderReport(rankKeyOrAll){
  const ranks = rankKeyOrAll==='ALL' ? RANK_ORDER : [rankKeyOrAll];
  const sections = ranks.map(rk=>{
    const rank = RS_DATA[rk], m = RANK_META[rk], store = S.answers[rk]||{};
    const rows = rank.items.map((item,idx)=>{
      const a = store[idx] || {};
      return `<tr><td class="mono">${esc(item.ref)}</td><td>${esc(item.q)}</td><td>${a.status||'—'}</td><td>${esc(a.remarks||'')}</td><td>${esc(a.by||'')}</td><td class="mono">${fmtDate(a.at)}</td></tr>`;
    }).join('');
    return `<h2 class="syne" style="margin-top:26px;">${m.icon} ${m.short} <span style="font-size:12px;color:#888;font-weight:400;">(${rank.items.length} items)</span></h2>
    <table class="report-table"><thead><tr><th>RISQ Ref</th><th>Question</th><th>Status</th><th>Remarks</th><th>Checked By</th><th>Date</th></tr></thead><tbody>${rows}</tbody></table>`;
  }).join('');
  return `<div class="report-screen">
    <div class="report-topbar">
      <div><button class="report-btn2" id="printBtn">🖨 Save as PDF / Print</button><button class="report-btn2 ghost" id="closeReportBtn">Close</button></div>
      <div class="mono" style="font-size:11px;color:#666;">Room: ${esc(S.roomCode)}</div>
    </div>
    <div class="report-title">RightShip RISQ Pre-Inspection Report</div>
    <div class="report-meta">Generated ${new Date().toLocaleString()} &middot; ${rankKeyOrAll==='ALL' ? 'All ranks' : RANK_META[rankKeyOrAll].short} &middot; Room ${esc(S.roomCode)}</div>
    ${sections}
  </div>`;
}
function attachReport(){
  document.getElementById('printBtn').onclick = ()=>window.print();
  document.getElementById('closeReportBtn').onclick = ()=>{ S.reportRank=null; render(); };
}

/* ============ Boot ============ */
if(S.roomCode) connectRoom(); else render();
</script>
</body>
</html>
