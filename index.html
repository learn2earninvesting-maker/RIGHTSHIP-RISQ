<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RightShip Ready — RISQ Pre-Inspection Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04080f; --card:#0b1320; --card2:#0f1928; --line:#1b2738; --line2:#141f2f;
  --text:#e9edf3; --dim:#90a0b7; --dim2:#566578; --amber:#f0a500; --amber-d:#a87400;
  --green:#3ddc84; --red:#ff5c5c; --blue:#5b7fb8;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;}
.mono{font-family:'JetBrains Mono',monospace;}
.syne{font-family:'Syne',sans-serif;}
.wrap{max-width:1180px;margin:0 auto;padding:0 18px;}
.topbar{position:sticky;top:0;z-index:40;background:rgba(4,8,15,0.97);backdrop-filter:blur(10px);border-bottom:1px solid var(--line2);}
.topbar-inner{max-width:1180px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;gap:12px;}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer;flex:1;min-width:0;}
.brand-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(150deg,var(--amber),var(--amber-d));display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.brand-title{font-family:'Syne',sans-serif;font-weight:800;font-size:14.5px;letter-spacing:.04em;line-height:1.1;white-space:nowrap;}
.brand-sub{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--dim2);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}
.back-btn{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);color:var(--dim);font-size:13px;font-weight:600;padding:9px 13px;border-radius:10px;cursor:pointer;flex-shrink:0;}
.room-badge{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--amber);background:rgba(240,165,0,.1);border:1px solid rgba(240,165,0,.3);padding:5px 10px;border-radius:8px;white-space:nowrap;flex-shrink:0;}

.eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);display:flex;align-items:center;gap:8px;margin-bottom:14px;}
h1.hero{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(28px,7vw,46px);line-height:1.04;letter-spacing:-.01em;margin:0 0 14px;}
p.lede{font-size:15px;line-height:1.6;color:var(--dim);max-width:560px;margin:0 0 22px;}
.hero-stats{display:flex;border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:6px;}
.hstat{flex:1;padding:14px 12px;border-right:1px solid var(--line);text-align:center;}
.hstat:last-child{border-right:none;}
.hstat-num{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:22px;color:var(--text);}
.hstat-label{font-size:10px;color:var(--dim2);text-transform:uppercase;letter-spacing:.06em;margin-top:3px;}
.section-label{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim2);margin:30px 0 14px;display:flex;align-items:center;gap:10px;}
.ln{flex:1;height:1px;background:var(--line);}

.rank-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:11px;}
.rank-card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 14px;cursor:pointer;display:flex;flex-direction:column;gap:10px;transition:border-color .15s;}
.rank-card:hover{border-color:var(--amber-d);}
.rank-icon{width:38px;height:38px;border-radius:10px;background:var(--card2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:18px;}
.rank-name{font-family:'Syne',sans-serif;font-weight:700;font-size:15.5px;line-height:1.2;margin-top:2px;}
.rank-desc{font-size:11.5px;color:var(--dim2);line-height:1.4;min-height:30px;}
.rank-foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:8px;border-top:1px solid var(--line2);}
.rank-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);}
.rank-mine{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--amber);}

.howto{margin-top:34px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 16px;}
.howto h3{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin:0 0 12px;}
.howto-steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;}
.howto-step{font-size:12px;color:var(--dim);line-height:1.5;}
.howto-step b{display:block;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;margin-bottom:3px;}
.footnote{text-align:center;font-size:11px;color:var(--dim2);margin:30px 0;line-height:1.6;font-family:'JetBrains Mono',monospace;}

.rank-header-icon{width:46px;height:46px;border-radius:11px;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.rank-header-h2{font-family:'Syne',sans-serif;font-weight:800;font-size:21px;margin:0;line-height:1.15;}
.rank-header-meta{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--dim2);margin-top:3px;}
.report-btn{font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:700;background:var(--amber);color:#1a1100;border:none;border-radius:10px;padding:10px 14px;cursor:pointer;flex-shrink:0;}
.progress-bar{height:6px;border-radius:3px;background:var(--line2);overflow:hidden;display:flex;}
.reset-link{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim2);background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;text-underline-offset:2px;}
.reset-link:hover{color:var(--red);}

.controls{position:sticky;top:62px;z-index:30;background:var(--bg);padding:12px 0 10px;border-bottom:1px solid var(--line2);margin-bottom:14px;}
.search-box{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;color:var(--dim2);}
.search-input{background:none;border:none;outline:none;color:var(--text);font-size:14px;width:100%;font-family:'DM Sans';}
.clear-search{background:none;border:none;color:var(--dim2);cursor:pointer;padding:2px;font-size:15px;}
.filter-wrap{margin-top:9px;}
.filter-label{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--dim2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.chip-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;}
.chip{flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:500;padding:7px 13px;border-radius:20px;border:1px solid var(--line);background:var(--card);color:var(--dim);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.chip.active{background:var(--amber);color:#1a1100;border-color:var(--amber);font-weight:700;}
.chip-count{opacity:.7;font-size:10px;}
.chip.active .chip-count{opacity:.6;}

.empty-state{text-align:center;padding:50px 20px;color:var(--dim2);}
.item-card{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:9px;}
.item-card.flag{border-color:rgba(255,92,92,0.4);}
.item-head{display:flex;align-items:flex-start;gap:11px;padding:13px 14px;cursor:pointer;}
.status-pill{flex-shrink:0;width:34px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;margin-top:1px;background:var(--card2);color:var(--dim2);border:1px dashed var(--line);}
.status-pill.YES{background:rgba(61,220,132,0.13);color:var(--green);border:1px solid rgba(61,220,132,0.3);}
.status-pill.NO{background:rgba(255,92,92,0.15);color:var(--red);border:1px solid rgba(255,92,92,0.45);}
.status-pill.NA{background:rgba(91,127,184,0.13);color:var(--blue);border:1px solid rgba(91,127,184,0.3);}
.item-ref-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;}
.item-ref{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--amber);font-weight:700;}
.item-app-tag{font-family:'JetBrains Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:var(--dim2);background:var(--card2);border:1px solid var(--line2);padding:2px 7px;border-radius:5px;}
.item-q{font-size:13.5px;line-height:1.45;color:var(--text);white-space:pre-line;}
.mine-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim2);margin-top:5px;}
.chevron{flex-shrink:0;transition:transform .2s;margin-top:7px;}
.chevron.open{transform:rotate(180deg);}
.item-detail{padding:0 14px 16px 55px;border-top:1px solid var(--line2);padding-top:12px;display:none;}
.item-detail.open{display:block;}
.detail-label{font-family:'JetBrains Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim2);margin-bottom:4px;}
.detail-text{font-size:12.5px;line-height:1.55;color:var(--dim);white-space:pre-line;margin-bottom:10px;}

.your-check{margin-top:4px;padding-top:14px;border-top:1px dashed var(--line);}
.your-check-label{font-family:'JetBrains Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--amber);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.saved-text{font-size:9.5px;color:var(--dim2);text-transform:none;letter-spacing:0;transition:opacity .3s;}
.toggle-row{display:flex;gap:8px;margin-bottom:8px;}
.toggle-btn{flex:1;padding:9px 6px;border-radius:9px;border:1px solid var(--line);background:var(--card2);color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:700;cursor:pointer;text-align:center;}
.toggle-btn.sel-yes{border-color:var(--green);background:rgba(61,220,132,.16);color:var(--green);}
.toggle-btn.sel-no{border-color:var(--red);background:rgba(255,92,92,.16);color:var(--red);}
.toggle-btn.sel-na{border-color:var(--blue);background:rgba(91,127,184,.16);color:var(--blue);}
.remarks-ta{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;color:var(--text);font-family:'DM Sans';font-size:12.5px;line-height:1.5;resize:vertical;min-height:54px;outline:none;box-sizing:border-box;}
.last-saved{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim2);margin-top:7px;}

.fab{position:fixed;bottom:22px;right:18px;z-index:50;width:44px;height:44px;border-radius:50%;background:var(--amber);border:none;display:none;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(240,165,0,.35);cursor:pointer;}
.fab.show{display:flex;}

.gate-wrap{max-width:420px;margin:70px auto;padding:0 20px;}
.gate-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:24px;}
.gate-title{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;margin-bottom:8px;color:var(--text);}
.gate-desc{font-size:13px;color:var(--dim);margin-bottom:16px;line-height:1.5;}
.gate-input{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:11px 13px;color:var(--text);font-size:14px;margin-bottom:14px;outline:none;box-sizing:border-box;}
.gate-primary{width:100%;background:var(--amber);color:#1a1100;border:none;border-radius:9px;padding:11px;font-weight:700;font-size:13.5px;cursor:pointer;margin-bottom:8px;}
.gate-ghost{width:100%;background:none;color:var(--dim2);border:1px solid var(--line);border-radius:9px;padding:11px;font-weight:600;font-size:13px;cursor:pointer;}
.gate-note{font-size:11px;color:var(--dim2);margin-top:12px;line-height:1.6;}

.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--dim2);display:inline-block;margin-right:6px;flex-shrink:0;}
.sync-dot.live{background:var(--green);box-shadow:0 0 6px var(--green);}
.sync-dot.local{background:var(--amber);}

/* report / print */
.report-screen{background:#fff;color:#111;min-height:100vh;padding:24px;}
.report-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.report-btn2{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;background:#f0a500;color:#1a1100;border:none;border-radius:8px;padding:9px 14px;cursor:pointer;margin-right:8px;}
.report-btn2.ghost{background:#eee;color:#333;}
.report-title{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;margin:0 0 4px;}
.report-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:#666;margin-bottom:20px;}
.report-table{width:100%;border-collapse:collapse;margin-bottom:28px;font-size:11.5px;}
.report-table th{background:#f0a500;color:#1a1100;text-align:left;padding:8px;font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;}
.report-table td{padding:8px;border-bottom:1px solid #ddd;vertical-align:top;}
.report-table tr:nth-child(even){background:#fafafa;}
@media print{.report-topbar{display:none;}}

@media (min-width:900px){
  .controls{top:63px;}
}
</style>
</head>

ers for various navigation conditions incorporated in the Master’s standing order ?", "sms": "NMM 4.1.11 & WI D/101", "status": "Yes", "remarks": "Master issued standing orders on 12 Nov 2025. It was signed & understood by all officers and rating on 13 Nov 2025", "guidance": "The Master’s standing orders should be affixed with the date when the change of command takes place. The implementation date should be recorded in the deck logbook or D – 101.\nInspector will record a Finding if the detail of visibility criteria, calling the Master, minimum CPA and ECDIS display layers for various navigation conditions was not incorporated in the Master’s standing order. The Master shall clearly highlight the potential safety risks involved in VHF radio communication between vessels and reliance on AIS communication information, for the purpose of collision avoidance. The VHF or AIS text facility should not be used for collision avoidance purpose. Master shall be called if the vessel is needed to exit the XTC."}, {"app": "All Vessels", "ref": "RISQ 3.3", "q": "> Is the manoeuvring information displayed on the bridge. \n> Are officers aware of the contents of manoeuvering information \n> Is the information in the pilot card as per manoeuvering information data", "sms": "NMM 6.1.18", "status": "Yes", "remarks": "", "guidance": "Rightship recommends that the ECDIS display setting should be incorporated into the Change of Watch at Sea checklist.\nRightShip recommends that the performance of the radar(s) when operational should be checked and recorded by the OOW at the end of each watch unless this contradicts the makers recommendations. A numeric, percentage, graphical, or other measurement value should be recorded.\nThe communicated ECDIS configuration by the officer of watch to reliever should be documented."}, {"app": "All Vessels", "ref": "RISQ 3.3", "q": "Are following updated: \n>  bridge logbooks\n>  bell book\n>  Change of Watch check list", "sms": "NMM 6.1.18", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 3.3", "q": "Are the folowing details entered in deck or movement book: \n>  position at the change of each watch\n>  course and speed\n>  Times and positions of altering course\n>  passing land marks\n>  Weather and sea conditions\n>  Time and position of changing steering from Auto to Hand and vice versa \n>  Time of manning/UMS of ER                                                             \n>  RADAR performance details of every watch. \n>  Details of laminated checklists in use\n>  DR position and checks on the ECDIS route manually in watch.   \n>  IN port : pilot embarkation/disembarkation times /connection and disconnection of tugs/times of berthing and un-berthing                                                                                                                                                                                                                           > Are the deck officers familiar with the difference between X-band and S-band RADARS , as well as their characterstics and limitations , such as impact of weather conditions on their performance.                                                                                                        > Is maneuvering information displayed on bridge", "sms": "NMM 6.1.18, NMM 8.4.3", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 3.4", "q": "> Are operational checks on navigational equipment undertaken when preparing for sea and prior to port entry?\n> Before entering restricted or coastal waters, is checking done for full control of engine and steering function ?", "sms": "NMM 10", "status": "Yes", "remarks": "", "guidance": "Operational checks on navigational equipment should be undertaken when preparing for sea and prior to port entry as per section C ( Checklists C2.1,C2.6 and C2.7) of the Bridge Procedure Guide and at any other time required by the SMS."}, {"app": "All Vessels", "ref": "RISQ 3.5", "q": "Are daily checks of navigational equipments being done and recorded as per D-04.", "sms": "NMM 13.1.2", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 3.6", "q": "Are the following checklists completed correctly on arrival  \n> D-06: pilot card \n> D-07: Master Pilot exchange \n> D-08 : Navigation in pilotage waters", "sms": "NMM 8.3 & C/L D-07", "status": "Yes", "remarks": "", "guidance": "The Officer should record the time when the Master/Pilot information exchange is completed. If different, the time of the transfer of conn between the Master and Pilot should also be recorded. Additionally, the time of the transfer of conn between Pilots, and if applicable, between the Pilot and Master \nThe Pilot card should clearly indicate whether a power limiter is engaged, the time necessary to override the power limitation systems, and the ship’s maximum power capacity, both with and without the application of the limiter."}, {"app": "All Vessels", "ref": "RISQ 3.7", "q": "Is UKC and air draft guidance posted on bridge?\nAre all officers aware of the contents of this guidance.", "sms": "NMM 7.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 3.7", "q": "Has a UKC calculation been done for this voyage and included in the passage plan including considerations for CATZOC", "sms": "NMM 7.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 3.8", "q": "> Are the fire and safety rounds being conducted at the end of each watch? \n> Confirm the officer of watch is not the sole look-out during hours of darkness ? \n> In areas not covered by a fire detection system, regular fire patrols are conducted after the watch duty ?", "sms": "NMM 6.6", "status": "Yes", "remarks": "", "guidance": "The list of spaces for fire and safety rounds should be prepared and posted on the bridge."}, {"app": "All Vessels", "ref": "RISQ 3.9", "q": "Is the folowing displayed on bridge: \n> Bridge manning levels in various conditions\n> Bridge watchkeeping schedule", "sms": "NMM 5.2,NMM 5.3", "status": "Yes", "remarks": "", "guidance": "The Bridge Manning Matrix should be posted in the Bridge."}, {"app": "All Vessels", "ref": "RISQ 3.9", "q": "> Is the bridge manning levels for each watch recorded in log book\n> Is there a system in place for calling the lookout when OOW is sole lookout \n> Are officers aware of conditions when sole lookout can be maintained", "sms": "NMM 5.2,NMM 5.3", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 3.10", "q": "> Are all navigational equipment operational \n> Are all service report of navigation equipments available in a separate file? \n> Are all navigational equipment maintainence entered in vessels PMS and updated ?", "sms": "NMM 13", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 3.10", "q": "Is the running hours of magnetron less than its renewal hours as per makers requirement for both RADARS", "sms": "NMM 13", "status": "Yes", "remarks": "Running Hours : X Band - 2853\nRunning Hours : S Band - NA\nRequired hours as makers Manual: \nX band: 4000\nS Band: NA", "guidance": "Rightship Inspector will record a Finding if the magnetron of radar was not changed as per manufacturer recommendation."}, {"app": "All Vessels", "ref": "RISQ 3.11", "q": "> Are all navigation lights and emergency navigation lights operational \n> Are all navigational shapes and signalling equipment in good condition \n> Is the navigation light failure alarm tested. Is the procedure for testing posted next to navigation light panel \n>  Are all navigational light glass screens in good order \n>  Is the Aldis lamp operational/ Is the Aldis lamp battery charged / Is the aldis lamp battery less than 3 years old / Are there 3 spare bulbs available for Aldis lamp", "sms": "NMM 13.7", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 3.12", "q": ">  Has the main power failure audio-visual alarm of BNWAS tested. \n>  Are all reset switches of BNWAS in navigation space from where look out can be kept. (Not in chart space) .                               > Are the malfunction indication, and elements of emergency call facility(if provided), powered from a battery powered supply ?\n > Is malfunction of power supply failure to BNWAS indicated ? Are there means provided to allow the repeat of indication on central alarm panel?", "sms": "NMM 13.8", "status": "Yes", "remarks": "Date of Last testing: 27 Jan 2026", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 3.13", "q": "GYRO: \n> Is the Gyro error and compass error taken regularly including at anchorage/pilotage waters(leading lights)\n> Has the Gyro been serviced within last 12 months /or as per makers guidance\n> Is the speed/ latitute correction to Gyro automatic", "sms": "NMM 13.7", "status": "Yes", "remarks": "Last shore servicing of Gyro Compass: 13 Jan 2025", "guidance": "Rightship Inspector will record a Finding if the gyro compass was not serviced as per manufacturer recommendation."}, {"app": "All Vessels", "ref": "RISQ 3.13", "q": "Magnetic Compass: \n>  Is the Magnetic compass without any bubble\n>  Is the light for compass working\n>  Is the Magnetic compass clearly visible from steering position\n>  Are the deviations less than 5 degrees \n> Has the compass been adjusted by a shore adjuster within last 2 years\n>  Has the vessel been swung and a deviation card made within last 12 months on the ship", "sms": "NMM 13.7", "status": "Yes", "remarks": "Last calibration of Magnetic Compass: 28 Aug 2025\nMaximum Deviation : 3°                                                                                                                                                                                                                                                                                                                                                       Date of last swing by Master: 28 Aug 2025", "guidance": "If magnetic compass deviation on any heading > 5 degrees, the compass must be adjusted by a qualified compass adjuster or the Master of the vessel to correct the deviation. If the compass is adjusted by the Master, RightShip recommends that the compass adjustment be checked by a qualified compass adjuster at the next available opportunity"}, {"app": "All Vessels", "ref": "RISQ 3.13", "q": "TMC: \n>  Does the TMC have any correction. \n>  Are the officer aware how to use TMC in case of gyro failure and is the work instruction posted.  \n> Has a gyro failure drill been carried out", "sms": "NMM 13.7", "status": "Yes", "remarks": "", "guidance": "A TMC may have variation automatically applied. However, this correction will not include deviation. When correcting TMC outputs for compass error, care should be taken to ensure that the correct values for variation and deviation are applied"}, {"app": "All Vessels", "ref": "RISQ 3.14", "q": "> Are times and locations of engaging hand steering recorded in the deck logbook or bell book ?\n> Is manual steering used in aeas of high traffic density, restricted visibility and other potentially hazardous situations?\n> Is manual steering tested once per watch ?", "sms": "NMM 8.2", "status": "Yes", "remarks": "Date of Last Emergency Steering drill: 18 Nov 2025", "guidance": "Rightship Inspector will record a Finding if the times and locations of engaging hand steering are not recorded in the deck logbook or bell book."}, {"app": "All Vessels", "ref": "RISQ 3.15", "q": "VDR : \n>  Is the procedure for saving VDR data posted  \n>  Is the software for downloading and play back of VDR data provided on board.  Has this been used   \n>  Is the condition of VDR capsule in good condition \n>  Is the VDR battery within expiry range \n>  Are there any alarms on VDR panel", "sms": "NMM 4.1.5,NMM 13.13", "status": "Yes", "remarks": "", "guidance": "VDR Testing is required annually and should always be carried out following repair or maintenance work to the VDR or to any source providing data to the VDR.                                                                                             Watch-keeping officers should be familiar with procedures to take VDR backup."}, {"app": "All Vessels", "ref": "RISQ 3.16", "q": "> Is a shore-based company engaged to provide navigation support services including ENC’s, paper charts and marine publications ?\n> Are licenses and permits managed using the ship’s chart management system?\n> Are officers aware of Weekly Notice to Mariners Section VIII and the README file which contains important safety information relating to ENCs and ECDIS. \n> Is there a ENC management and correction process, including safety measures, to avoid viruses ?\n> Is NP133C Admiralty ENC Maintenance Record book available on board ?", "sms": "NMM 7.6 ,NMM 13.2", "status": "Yes", "remarks": "Last NTM on board: \nLast Base DVD on board: 36/25", "guidance": "NP133C update records should tally as shown on ECDIS."}, {"app": "All Vessels", "ref": "RISQ 3.17", "q": "Current Passage: \n> Has the most appropraite charts and publication used for the voyage? \n> Are the largest scale ENC used \n> Are all required publications available \n> Is Publications NP 231 and NP 5012 are available\n>  For Australia is publication AHP 20 is available and updated.", "sms": "NMM 7.2,7.6,13.2,CL D-01", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 3.18", "q": "ECDIS Familiarization : Can all officers demonstrate the following: \n>  Checking voyage plan (Manual and auto route check etc)\n>  Interrogating chart symbols/updates/information on chart\n>  ENC symbol identification\n>  Manual position fixing (NP5012/NP232)\n>  AIS and or Radar overlay if fitted ( Advantages/disadvantages)\n>  Knowledge of SCAMIN and how it is displayed\n>  Knowledge of CATZOCs and application for UKC as per SMS\n> Contingency action in case of ECDIS failure.\n> Setting of safety frame/safety cone( SMS guidelines/safety poster )\n> Creating parallel index lines\n> Route checking and management of alarms\n> Handling unresolved ENC update errors\n> Showing of IHO version of standard installed", "sms": "NMM 13.2", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 3.19", "q": "ECDIS : \n> Is the ECDIS type approval certificate available\n> Is a back up power supply from emergency generator or UPS  available and tested during the 3 M blackout drill\n> The ECDIS manufacture handbook includes a list of  spare parts that should be stored onboard, it is critical that  these parts are available onboard for replacement anytime they are required.", "sms": "NMM 13.2 & TMM Annex 1C", "status": "Yes", "remarks": "UPS Battery last changed on: 02 Jan 2024", "guidance": "If the ECDIS manufacturer handbook includes a list of spare parts that should be stored on board, it is critical that these parts be available on board for replacement anytime they are required.\nPMS requires taking backing up the hard disc of ECDIS. (Records maintained & Officers familiar)"}, {"app": "All Vessels", "ref": "RISQ 3.20", "q": "T and P notices \n>  Are all T&P NMs and navigation warnings plotted and record of date plotted/removed maintained ?\n> Are all inforce nav warnings available and handled correctly ? \n> Warnings read and initialled at the time of receipt? \n( Request office to send if not available)", "sms": "NMM 13.2", "status": "Yes", "remarks": "", "guidance": "T&P Notices - Plot manually on largest scale ENC the features that are significant for the planned passage, within 60NM* (24Nm in restricted waters) on either side of course line."}, {"app": "All Vessels", "ref": "RISQ 3.21", "q": "Last Passage checks :\n> Position verification interval followed? \n> Different means of position verification used especially in coastal/restricted waters used \n> Was the TSS used correctly specially when leaving/joining \n> Was the weather forecast monitored.\n> Were environmental requirements and regulations complied with.\n> Was adequate bridge manning maintained to ensure a proper look-out as per SMS. Has this been recorded in log book \n> Did the vessel participate in ship reporting systems.", "sms": "NMM 13.2", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 3.22", "q": "ECHO SOUNDER : \n> Is the echo-sounder recorder in use and switched on prior to each approach to shallow water ( crossing 100 M contour)\n> Was it in use during this voyage  in shallow waters? \n> Is Date and time of swtiching on and off marked on echo sounder printer paper. Also marked with date/time when passing significant marks such as breakwater.\n> Is the depth alarm  set higher than the expected UKC.", "sms": "NMM 13.6", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 3.23", "q": "For Last Passgae :  \n> Is passage plan from berth to berth\n> Have the UKC appraisals filled for courses with depth less than safety margin.\n> For deep drafted vessel - has UKC proforma for Singapore/Malacca transit used  \n> Was the passage plan loaded in both ECDIS and Emergency navigation system \n> Was the route validation done. \n> Was validation done using Visual checks/Manual and auto-validation features of ECDIS/Cross-checks by the bridge team\n> Did the master authorize the final validation \n> Confirm that no change in passage plan made without authroization from Master.", "sms": "NMM 13.2/Tec 25", "status": "Yes", "remarks": "", "guidance": "The guidelines for the passage plan have been updated to provide clarity for both the Inspector and ship manager regarding the requirements."}, {"app": "All Vessels", "ref": "RISQ 3.24", "q": "Was parallel indexing, RADAR bearings and ranges used during the last voyage. \n(Do not mark PI from drying heights/floating objects )", "sms": "NMM 7.3, 8.1.4, 13.4.8 & CL D-09", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 3.25", "q": "Position verification : \na. Was the track of the ship monitored at sea and during the pilotage? \nb. Was Radar overlay used \nc. Track monitoring done in narrow/pilotage waters after course alteration and UKC monitoring.", "sms": "NMM 8.1 & NMM 13.2", "status": "Yes", "remarks": "", "guidance": "Position Fix verification frequency to be as per SMS as a minimum."}, {"app": "All Vessels", "ref": "RISQ 3.26", "q": "> Is the OOW familiar with the GNSS system used on board and the errors/alarms affecting its accuracy such as HDOP, RAIM, multipath error, jamming, spoofing.\n> Is the correct geodetic datum set in the GNSS reciever ?", "sms": "NMM 8.1 & NMM 13.2", "status": "Yes", "remarks": "", "guidance": "HDOP Value limit to be posted next to GNSS receiver."}, {"app": "All Vessels", "ref": "RISQ 3.28", "q": "> Is there a written policy requiring that mobile phones or other personal electronic devices should only be used on the bridge in circumstances approved by the Master ?\n> Is the bridge team using internet on bridge only for essential activities as defined under SMS ?", "sms": "NMM 3.2/NMM 6.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.16                    Guideline 1", "q": "> Are the number of gas detectors and toxic gas measuring equipment as per SMS requirement \n> Are they all working without alarms \n> Is the alarm setting as per SMS requirement \n> Have they been calibrated within last 12 months \n> Is a calibration kit available on board including calibration gases. \n> Do the officers know how to carry out onboard calibration / bump test \n> Is a accurate inventory of gas detectors and calibration equipment available\n> Does the cargo on board require any specific type of gas detection system. Is this available on board.", "sms": "H&S8.8", "status": "Yes", "remarks": "Last calibration: 13 May 2025", "guidance": "RightShip recommends that ships should have a minimum of two portable gas detectors equipped with built-in sample pumps.\n10 Benzene tubes and Pump available (H7S 8.8) and testing of Benzene during Bunkering (TMM 4.2.19)"}, {"app": "All Vessels", "ref": "RISQ 4.43", "q": "> Has safety familiarization been completed for all staff onboard, are records completed and available ?\n> Has a bridge familiarization been completed for deck offciers and records completed and available ?", "sms": "D-32A, D-17", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.1A", "q": "> Is the Latest edition of IMSBC and BLU code and supplements available on board?\n> Are deck officers familiar with IMSBC Code / NI - Bulk Carrier practice / SMS - BGCM / IACS bulk carrier guidelines for survey, assessment and repair of hull structure / Code for safe carriage of grain bulk/ Code of safe practise for ships carrying timber deck cargo ( if applicable) \n> Are all publictions available as per Gen Cir 18", "sms": "Gen cir 18", "status": "Yes", "remarks": "", "guidance": "A list of on-board publication shall be incorporated in SMS. A Finding will be filed by inspector against ships not carrying publications in accordance with National requirements and the SMS."}, {"app": "Bulk Carriers", "ref": "RISQ 8.7A", "q": "> Is the cargo plan signed by all OOW \n> Are any deviations form plan agreed with shore\n> Is OPS 10A made as per detail given in BGCM 4.2,4.3 and 4.7?\n> Are the duty officers aware of actions to take in case \n      1. High stresses are noted \n      2. Deballasting rate does not cope up with loading rate\n> Is there record of ship shore comparision of cargo figures after each pour?Draft planned and actual checked ?", "sms": "BGCM 4.2,4.3 & 4.7", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.14A                    Guideline 1", "q": "For present cargo operations : \n> Is the operations plan prepared (OPS Bulk 10A).\n> Is a pre cargo operation meeting held with all crew and recorded ?\n> Visual and calculated draft being checked and discrepancies resolved ?\n> Are SF/BM checked and recorded at each stage ?\n> All details of cargo operations- holds being operated/ballast sequences etc recorded ?", "sms": "OPS Bulk 10A", "status": "Yes", "remarks": "", "guidance": "RightShip recommends that the cargo loading/unloading plan should be completed by the responsible officer prior to arrival at port and the commencement of cargo operations and verified and approved by the Master.\nBLU code requires the loading discharging plan to be kept on board for 6 months post that loading/ discharging operation"}, {"app": "Bulk Carriers", "ref": "RISQ 8.15A", "q": "> Is port log maintained during loading and unloading? ( Entries as per BGCM Manual section 4.3 and 4.7)", "sms": "BGCM 4.3/4.7", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.17A", "q": "For Toxic cargoes : \n> Has PTW been used when entring cargo holds/adjacent compartments ?\n> Was a pre loading meeting done and recorded to convey the dangers to all crew \n> Are staff aware of Fatality Report 08(Overcome by toxic gases) ?\n> Is CL D/Bulk/03 followed when making entry in cargo hold during port operations ?\n> Are staff aware of poster QA 02?\n> Is QA 02 being discussed with stevedores and logged?", "sms": "BGCM 3.1 & 3.2", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.18A", "q": "For Coal Cargo,  \n> If coal is being carried, was the ship equipped with adequate instruments for monitoring, concentration of methane, oxygen,carbon monoxide in the atmosphere,temperature,pH value of cargo space bilge samples\n> Are the gas sampling points, in good working order? \n> Are the instruments regularly serviced and calibrated. \n> Is ship personnel trained in the use of such instruments.\n> Are temperature-measuring equipment regularly checked, serviced, and calibrated as recommended by the manufacturer, and sufficient quantity of spare parts carried?", "sms": "BGCM 5.2", "status": "Yes", "remarks": "", "guidance": "Read Rightship question guidance for suitable thermometers to use."}, {"app": "Bulk Carriers", "ref": "RISQ 8.7B", "q": "Are the stresses, stability information and any limitations included in the cargo plan understood\nby the cargo watch officers and are conditions being monitored and maintained within design limits throughout cargo operations?\n-Is the cargo stowage and operations plan OPS 10A made in detail given in BGCM 4.2,4.3 and 4.7\n-Is each stage of the plan monitored by check of visual drafts on completion of each stage ? If there is any discrepancy between visual and calculated draft is it investigated and resolved - plan modified/loading rate reduced etc and adequate records kept ?\n-Are the duty officers aware of vessel being subjected to high stresses in case deballasting rates cannot keep with high loading rates  and action to take in such a case ?\n-Are cargo figures from terminal being sought after each pour and compared with ships planned figure ?\n-Are adequate records of loading/discharging/ballast operations maintained so as to reconstruct the full history of the operation from records ?", "sms": "BGCM 4.2,4.3,4.7", "status": "Yes", "remarks": "", "guidance": "The Master and Chief Officer should be aware of the worst-case damage condition for the existing cargo on board. The observed drafts should be logged down after every sequence and compared with calculated draft."}, {"app": "Bulk Carriers", "ref": "RISQ 8.8B", "q": "Are there procedures in place for loading, ballasting and de-ballasting of the ballast holds? \n-Senior officers aware of the SMS guidelines given in BGCM 4.8  & WI D/Bulk 104 ?\n-Ship specific work instructions complied with in full prior ballasting/during ballasting/during the voyage/prior deballasting and after deballasting of ballast hold ?\n-Senior officers aware of precautions during ballast exchange of ballast hold ?\n-All staff aware of the consequences of ballasting/deballasting with vents not open ?Refer to Fatality report 12\n-Are the tests/checks as detailed in WI D Bulk/104 after deballasting of ballast hold diligently carried out and witnessed by senior officers ?Are staff aware of the incidents in the fleet due to water ingress from poorly maintained ballast hold valves/manhole covers ?", "sms": "BGCM 4.8/D-Bulk-104 & D/Bulk 02", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.10B", "q": "Have cargo holds been grain or hospital cleaned, where applicable, and has a ship’s hold inspection certificate been issued by a 3rd party prior to loading grain?\n- Prior loading grain cargoes cargo holds to be cleaned to grain/hospital standard as per guidance given in BGCM 4.9\n-White glove test to be done for applicable cargoes by senior officers before presenting the cargo holds for pre loading inspection", "sms": "BGCM 4.9", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.11B", "q": "Is the vessel free of any limitations or restrictions specified in the Loading Manual or Trim and Stability Booklet? \n-In case the vessel has any restrictions as given in loading manual or trim and stability manual are all the deck officers aware of same and is this limitation posted in ships office/ballast control ?\n-In case the load density of tank top has reduced due to thinning down of the inner bottom and restrictions placed by class , then are such restrictions know to all deck officers and is same taken into consideration when planning the cargo loading ?", "sms": "BGCM 4.2 & 5.1", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.12B", "q": "Are officers familiar with the risk, hazard and carriage requirements of grain cargo on board the ship? \n-Deck officers aware of the inherent risks of grain cargo -Shift of grain, contamination, ingress of water, moisture migration, and transfer of heat from engine room and / or bunker tank bulkhead and inadequate surface ventilation \n-Have Engineers been briefed about the requirement to not heat bunker tanks in cargo area above 42 Deg C?\n-Have all crew been briefed about emission of explosive / toxic gas/lack of oxygen in cargo hold and dust danger when carrying grain cargoes ?", "sms": "BGCM5.1", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.14B                    Guideline 1", "q": "Has the master been provided with clear instructions regarding any fumigation, prior to arrival at the load port? Has the vessel been provided with procedures and contingencies regarding fumigation of cargo holds and are the master and chief officer familiar with the procedure? \n-Are senior officers aware of the SMS guidelines for fumigation BGCM 4.4 ?\n-Adequate instructions received from the company carrying out the fumigation ?\n-Are senior officers aware of the guidance set out in section 3 of MSC.1/Circ.1264 and additional guidance issued by countries such as USA/Canada in case fumigation is carried out there ?\n-Are ship specific checklist D/Bulk 06 A & B used during fumigation and records maintained ?", "sms": "BGCM 4.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.15B", "q": "Has the master been provided with clear instructions regarding any fumigation, prior to arrival at the load port? Has the vessel been provided with procedures and contingencies regarding fumigation of cargo holds and are the master and chief officer familiar with the procedure? \n-Are senior officers aware of the SMS guidelines for fumigation BGCM 4.4 ?\n-Adequate instructions received from the company carrying out the fumigation ?\n-Are senior officers aware of the guidance set out in section 3 of MSC.1/Circ.1264 and additional guidance issued by countries such as USA/Canada in case fumigation is carried out there ?\n-Are ship specific checklist D/Bulk 06 A & B used during fumigation and records maintained ?", "sms": "BGCM 4.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.16B", "q": "Is crew familiar with major problems associated with fumigation of cargo in stowage on board? \n-Are all crew briefed on dangers of fumigation viz toxicity and its potential for fire or explosion .\n-The chemical reaction of fumigant produces heat and if fumigant is not properly distributed can cause fire .\n-The fumigant pallet can react with water and spontaneously ignite\n-Spontaneous heating of the fumigation gas can cause fire/explosion as phosphine gas is explosive at levels above 1.7% v/v in air.", "sms": "BGCM 4.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.17B", "q": "Do on-board safety requirements for fumigation comply with sub-section 3.3.2.7 of the IMO recommendation on the safe use of pesticides? \n-Vessel provided with adequate number of gas detecting equipment /tubes etc. Daily checks carried out and records maintained.\n-Instructions available and complied with respect to  disposal of residual fumigant material\n-Respiratory protection equipment (at least 4 sets are required)/Medicines and medical equipment/Antidote/MFAG - A copy of the latest version- available\n-Completed checklist D Bulk 06A and 06 B", "sms": "BGCM 4.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.26B", "q": "Are records maintained of fumigation operations? \n-Detailed records of fumigation operation to be maintained in cargo record file, deck log book/port log and should contain the following \n-Communication relating to fumigation/Details of fumigation company/fumigator-in-charge, and operation/Fumigation plan\n-Details of the fumigator-in-charge and operatives/Time of starting and finishing/ Holds involved/Identity of the fumigant, application level and where and how applied.\n- All gas reading with location testing.\n-Plan and sketch for each hold fumigated, showing where the fumigant was applied and the amount of fumigant at each\nlocation.\n-Certificate of fumigation/Formal written handover of responsibility.\n-Completed checklist D Bulk 06A and B", "sms": "BGCM 4.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.31B                    Guideline 1", "q": "Has a cargo loading/unloading plan providing detailed sequences of cargo and ballast transfer been prepared, understood, and signed off by the deck officers? \n-Has detailed loading/discharging plan as per OPS Bulk 10A been prepared by Chief officer and signed by Master and other deck officers ?\n-Is visual and calculated draft being checked at each stage of completion and discrepancies resolved ?In case plan is changed then is a amended plan made and discussed with all officers ?\n-Are SF/BM checked and recorded at each stage ?\n-All details of cargo operations- holds being operated/ballast sequences etc recorded ?\n-Is a pre cargo operation meeting held with all crew and recorded ?", "sms": "OPS Bulk 10A", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.34B", "q": "Is an adequate record of all cargo operation activities maintained during loading and unloading? \n-Are detailed records maintained for the following in port log \n-Starting and stopping of work at each hold; times and dates\n-Cargo loaded /discharged from each hold and cumulative total\n-Weather conditions\n-Use of ships crane/shore crane/barge movement\n-Opening and closing of hatches/draft readings at periodic interval - normally at completion of each stage/watch etc\n-time of rain-snow/delays in cargo operations/attendance of cargo and other surveyors/Stevedore damage\n-Cargo temperature if applicable\n-Regular monitoring of stability records", "sms": "BGCM 2.2", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.35B", "q": "Are the dangers associated with oxygen depletion of grain cargo understood by officers and crew, and have reasonable precautions been taken during routine inspections of the cargo, when entering the holds and adjacent spaces?\n-Dangers associated with grain cargo known to all officers and discussed during pre loading meeting.\n-SMS guidelines for hold entry and adjacent spaces known to all crew and complied with\n-Warning notices posted at hold entrances as per SMS and pre entry checks done as per ship-shore checklist and QA poster 02", "sms": "BGCM 3.0", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ.8.1C", "q": "Does the vessel have the latest edition of the following publications:\n1) Code of safe practice for ships carrying timber deck cargoes \n2) International Maritime Solid Bulk Cargoes Code (IMSBC Code)\n3) International Maritime Solid Bulk Cargoes Code (IMSBC Code) \n4) BLU Code (incl. BLU Manual), 2011 (For Dry Cargo Ships only)\n5) Lashing and Securing of Deck Cargoes including packaged timber, vehicles on Ro-Ro vessels and ISO Containers in Non-Purpose Built Ships\n6) SOLAS  \n7) MARPOL \n8) Load Lines Convention (1966)\n9)MARPOL Annex VI & NTC 2008\n10) STCW Code\n11) Cargo Stowage and Securing (CSS) Code \n12) IMDG Code and supplement", "sms": "General Circular 18", "status": "Yes", "remarks": "", "guidance": "A list of on-board publication shall be incorporated in SMS. A Finding will be filed by inspector against ships not carrying publications in accordance with National requirements and the SMS."}, {"app": "General Cargo", "ref": "RISQ 8.5C                    Guideline 1", "q": "Is an approved ship-specific Cargo Securing Manual available and are officers thoroughly familiar with the contents of the manual?  \nIs cargo secured in accordance with CSM at designated securing points using cargo securing devices mentioned in the manual?\nDoes the vessel have sufficient spare lashing devices?  \n\nDose CSM include the following?\n1. Cargo Securing devices strength (MSL) and their use;  \n2. Tables and diagrams give a broad outline of the accelerations.\n3. Examples of forces acting on typical cargo units\n4. Examples of how to calculate the number and strength of portable securing devices\n5. Calculation method used converted in a form suiting the particular ship (Recommended)               \n6. CSAP- Cargo Safe Access plan (If applicable to the ship)                                           \n7. Inspections / Maintenace/ Repair records kept with CSM\n8. Procedure of accepting, maintaining, repairing or rejecting of the lashing devices must be available. (All equipment, lashings, hog wires, uprights and their foundations, deck fittings, cell guides, loose lashing equipment, twist locks, stackers etc.)                                     \n\nIs regular inspection and maintenance of lashing devices being carried out?   Must include - Routine Physical Inspection; Periodic reexamining and retesting as required by the administration.                                                                                                                                                          \n\nAre repairs to fixed lashing equipment repaired to the satisfaction of classification society as appropriate?  (Uprights, lashing points)", "sms": "BGCM 5.9/ 5.10 / 5.11 / 5.12", "status": "Yes", "remarks": "", "guidance": "Each device used for securing cargo should be marked clearly with its SWL and a batch mark or number, where that mark can be verified by a test certificate. RightShip recommends that these test certificates be clearly labelled and kept in an easily accessible file. A method of correct identification and matching of individual certificates with the cargo-securing devices should be established on board. Cargo-securing devices without certificates must not be used on board."}, {"app": "General Cargo", "ref": "RISQ 8.12C", "q": "Are officers aware of the strength limits (t/m2) of tank tops, tween decks, hatch covers and weather decks with regards to safe cargo stowage and is this information posted in the ship’s office / ballast control room?", "sms": "BGCM 4.2 / 4.3", "status": "Yes", "remarks": "", "guidance": "The maximum permissible loadings, given in tonnes per square meter (t/m²) for each deck and the tank-top, and the hatch covers should be posted in the Ship’s office."}, {"app": "General Cargo", "ref": "RISQ 8.15C", "q": "Have personnel engaged in cargo securing operations been provided with relevant training and familiarisation? \nIs the crew aware of the timber deck cargo controlled jettisoning procedure? \nIs a remote jettisoning system provided? (recommended)", "sms": "", "status": "NA", "remarks": "", "guidance": "Bulk Carrier Course cert post Jan 2023 contains required text. All others can access the E learning CBT \"Cargo Securing Operations training\" on LMS."}, {"app": "General Cargo", "ref": "RISQ 8.26C", "q": "Is the ro-ro cargo ship provided with an approved Operating and Maintenance Manual (OMM)?", "sms": "ROCM", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.30C                    Guideline 1", "q": "Are vehicles on the ro-ro car decks safely stowed and secured?", "sms": "CSM", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.31C", "q": "Has the vessel been provided with procedures and contingencies with regards to fumigation of cargo holds and are the master and chief officer familiar with the procedure?  \nHas the air conditioning intakes for the accommodation, the engine room and other spaces been set to prevent the possibility of drawing in fumigant gas?", "sms": "BGCM 4.2      H&S 9.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.38C", "q": "Is an adequate record of all cargo operation activities maintained during loading and unloading?", "sms": "BGCM 4.3.25", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.16A", "q": "Emergency means of opening hatch covers: Check Following   \n> Are crew familiar with the arrangements and training carried out ? ( Refer D/Bulk/102)\n> Is the maintenance of equipment included in PMS. \n> Is the emergency hatch cover operation tested at different hatch cover location and records maintained in PMS.", "sms": "BGCM 6.1", "status": "Yes", "remarks": "", "guidance": "The manufacturers’ instructions for the maintenance and test of the emergency portable pump unit shall be incorporated in the PMS. All Chain blocks in use must have the safety latch on the hook."}, {"app": "All Vessels", "ref": "RISQ 10.7", "q": "> Are sufficient crew members deployed at each mooring station\n> Is a tool box meeting held prior mooring operations and recorded \n> Are heaving lines/rope and chain stoppers/ messenger line etc In good order and without any defects  ( Only double rope stoppers/No undersize messenger lines-minimum 24 mm)", "sms": "NMM 14.1 & 14.2", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 10.8", "q": "At berth checks: \n> Are winch brakes secured to correct marking and and winches are out of gear? ( proper gear engaging pins secured with chain - no use of bolts etc)\n> Have the lines been passed in correct direction.   \n> Is the mooring area free of any trip hazards and generally well kept. \n> Chafing sleeves fitted on mooring lines at exposed berths/tidal ports", "sms": "NMM 14.2 & training material 180", "status": "Yes", "remarks": "", "guidance": "Any buried mooring ropes within a drum should be extracted from the reel and relayed on the drum"}, {"app": "All Vessels", "ref": "RISQ 10.9", "q": "At berth checks for mooring winch with split drums: \n> Is there a single  layer of mooring line on the tension side of the drum\n> Is there sufficient number of turns on the tension drum (Min 6  for synthetic lines)", "sms": "NMM 14.4/LMP", "status": "NA", "remarks": "", "guidance": "Split-drum winches should not have more than one layer of mooring line on the tension section of the drum because it can reduce the brake holding capacity of the mooring winch."}, {"app": "All Vessels", "ref": "RISQ 10.14", "q": "Securing mooring lines on bollards : \n> Are there 2 full turns around on the leading post before putting ‘figure-of-eight’ \n> Only one rope to be secured over a single pair of bollard \n> Confirm no ropes are secured on warping drums", "sms": "NMM 14.2/14.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 11.1", "q": "> Has an officer (Other than Master) been designated to handle distress and safety radio communication in the radio log book and on muster list.", "sms": "NMM 6.5/Muster list", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 11.2", "q": "> Are all communication equipments working and free from any known defect? \n> Is GMDSS Log upto date and daily, weekly and monthly tests being carried out? \n> Is battery on load/off load tests are done daily and records maintained.\n> Is battery annual load tests done and records maintained\n> Is PPE and notices in the battery room in good condition\n> Is battery room ventilator marked with required notice.\n> Is the log book signed on daily basis by the Master", "sms": "NMM 6.5", "status": "Yes", "remarks": "", "guidance": "The V-sat Radiation warning circle marked on the monkey island deck to be in sync with Dome affixed plate marking distance."}, {"app": "All Vessels", "ref": "RISQ 11.3", "q": "> Is EPIRB installed correctly?\n> Is it marked with ID/MMSI and call sign \n> Are the records available for the annual testing? \n> Is the HRU within expiry date\n> Is the HRU marked 'to be used for EPIRB only'?\n> Is monthly checks done and record maintained.", "sms": "NMM 6.5", "status": "Yes", "remarks": "Date of expiry of HRU: Jan 2028\nDate of expiry of EPIRB battery: Apr 2037", "guidance": "Check that the EPIRB ID and other information (include call sign and MMSI of the ship) is clearly marked on the outside of the equipment."}, {"app": "All Vessels", "ref": "RISQ 11.4", "q": "> Are ALRS current and uypdated \n> If electronic publication are used are they endorsed on SEQ certificate. \n> Are all ITU publications current and up to date.", "sms": "NMM 6.5", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 11.5", "q": "Is the vessel equipped with sufficient hand -held radios, for use in general operations onboard?", "sms": "NMM 13.20", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 11.6", "q": "SART Checks : \n> Is it tested monthly and records available .In case of AIS sart tests are being done as per makers recommendation.\n> If fitted with FFLB, one SART in in the life boat \n> Are batteries in date and not expired \n> SART body is in good order and without damage . \n>  Bracket available on LB to mount Sart.", "sms": "NMM 6.5", "status": "Yes", "remarks": "Date of expiry of SART battery: Jul 2026", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 11.8", "q": "AIS : \n> Static, dynamic and voyage data up to date \n> AIS annual test been performed and the record avilable on board? \n( In case AIS is switched off then date and time of switching on/off AIS must be recorded in the log book)                                                                                                                                                                       \n> Is the Pilot plug in good condition.", "sms": "NMM 6.5", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 11.9", "q": "> Is there a Shore-Based Maintenance Agreement for GMDSS equipment available, valid and posted in radio room with radio license", "sms": "NMM 6.5", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 12.3", "q": "> Are deck officers familiar with function and use of SSAS\n> Are records of 3 M test /(Button test) with office and annual test with flag state available.", "sms": "SSP", "status": "Yes", "remarks": "Date of last SSAS test: 23 Nov 2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 12.4", "q": "> Are latest version of security charts available on board? \n> Is Anti piracy plan( APP) updated to latest amendments.", "sms": "SSP", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 12.8", "q": "> Are all USB ports blocked ( Signed paper stickers as USB port lock are not acceptable) \n> Is vessel provided with a dedicated computer and printer(Not connected to ships Lan system) for use by shore personnel and which is provided with updated antivirus.\n> Are all computers  updated with latest antivirus.\n> Is there a dedicated USB available for transferring data from communication computer to ECDIS.\n\nAre all staff and Master familiar with,\na) Company policy for use of personnel laptop/mobile for ships business.\nb) Cyber security guidelines\nc) SMS guidelines for opening attachement from unknown sources sent on email. \n> Is a Cyber security poster displayed at each computer.", "sms": "PAM 22.1", "status": "Yes", "remarks": "", "guidance": "Critical equipment such as ECDIS should be protected from malware and virus attack. Access to USB and RJ-45 ports shall be controlled – i.e., disable or lock the ports."}, {"app": "All Vessels", "ref": "RISQ 14.18", "q": "Check following in hospital spaces  \n> Oxygen cylinder is rigged to provide oxygen to 2 persons simualtaneously \n> Medicine chest and medical equipment that complies with the requirements of flag state/Medical guide\n>  Space is not used as a store or cabin \n>  Hospital alarm is operational.\n>  Medicines are stored in labelled drawers.\n>  Inventory of medicines and expiry date is available.\n>  Narcotics list is available and it is stored with Master.\n>  Expired medicines are stored seperately\n> Annual inspection of medical chest has been done and certificate is posted", "sms": "PAM 11.13", "status": "Yes", "remarks": "Date of hydraulic test of the cylinder: 05 May 2021\n\nDate supplied on board: 25 Aug 2021", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 15.6", "q": "> Is the radio medical service provider information readily available (posted at communication computer or hospital) & health promotion programes", "sms": "PAM 11.13,H&S 7.1,TOE", "status": "Yes", "remarks": "", "guidance": "Rightship Inspection will record in comments the method of health promotion and related education programs on board the ship.\nHealth promotion might include:\n•\tHealth Awareness Material displayed in crew rest rooms/ mess rooms\n•\tTraining films shown to crew\n•\tWorking in hot and sunny environments -Heat Stroke/Sunburn.\n•\tDangers of dehydration\n•\tHealthy lifestyle - balanced diet, adequate sleep and regular exercise\n•\tProtection from Mosquito/insect bites\nMonthly Newsletter \"Food Ahead\" made available in Crew Messrooms."}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.5", "q": "For detecting floating ice, has the vessel been provided with \n>  Search lights controlled from bridge and capable of swivelling all around 360 degrees\n>  Cross-polarised radar systems  which provide better resolution of ice features", "sms": "NMM 8.8.7 & 8.8.10", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.6", "q": "For receiving ice reports for safe navigation, is the vessel fitted with the equipments to receive, \n>  Ice and weather information charts\n>  High resolution ice weather charts", "sms": "NMM 8.8.2", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.11", "q": "> Is Navigation Bridge provided with heating system for bridge windows.\n> Are the watch keeping personnel provided with suitable glasses to protect from direct/indirect glare of the sun.", "sms": "H&S 6.1.8", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.12", "q": "> Are communication transmitters / receivers exposed provided with deicing features\n> Is fog horn protected from sub-freezing temperature? \n> Is communication equiment provided with deicing features or built in heating elements\n> Are the Radar Scanners provided with inbuilt heating element", "sms": "By design", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 11.6", "q": "SART Checks : \n> Is it tested monthly and records available .In case of AIS sart tests are being done as per makers recommendation.\n> If fitted with FFLB, one SART in in the life boat \n> Are batteries in date and not expired \n> SART body is in good order and without damage . \n>  Bracket available on LB to mount Sart.", "sms": "NMM 6.5", "status": "Yes", "remarks": "Date of expiry of SART battery: Jul 2026", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 11.8", "q": "AIS : \n> Static, dynamic and voyage data up to date \n> AIS annual test been performed and the record avilable on board? \n( In case AIS is switched off then date and time of switching on/off AIS must be recorded in the log book)                                                                                                                                                                       \n> Is the Pilot plug in good condition.", "sms": "NMM 6.5", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 11.9", "q": "> Is there a Shore-Based Maintenance Agreement for GMDSS equipment available, valid and posted in radio room with radio license", "sms": "NMM 6.5", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 12.3", "q": "> Are deck officers familiar with function and use of SSAS\n> Are records of 3 M test /(Button test) with office and annual test with flag state available.", "sms": "SSP", "status": "Yes", "remarks": "Date of last SSAS test: 23 Nov 2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 12.4", "q": "> Are latest version of security charts available on board? \n> Is Anti piracy plan( APP) updated to latest amendments.", "sms": "SSP", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 12.8", "q": "> Are all USB ports blocked ( Signed paper stickers as USB port lock are not acceptable) \n> Is vessel provided with a dedicated computer and printer(Not connected to ships Lan system) for use by shore personnel and which is provided with updated antivirus.\n> Are all computers  updated with latest antivirus.\n> Is there a dedicated USB available for transferring data from communication computer to ECDIS.\n\nAre all staff and Master familiar with,\na) Company policy for use of personnel laptop/mobile for ships business.\nb) Cyber security guidelines\nc) SMS guidelines for opening attachement from unknown sources sent on email. \n> Is a Cyber security poster displayed at each computer.", "sms": "PAM 22.1", "status": "Yes", "remarks": "", "guidance": "Critical equipment such as ECDIS should be protected from malware and virus attack. Access to USB and RJ-45 ports shall be controlled – i.e., disable or lock the ports."}, {"app": "All Vessels", "ref": "RISQ 14.18", "q": "Check following in hospital spaces  \n> Oxygen cylinder is rigged to provide oxygen to 2 persons simualtaneously \n> Medicine chest and medical equipment that complies with the requirements of flag state/Medical guide\n>  Space is not used as a store or cabin \n>  Hospital alarm is operational.\n>  Medicines are stored in labelled drawers.\n>  Inventory of medicines and expiry date is available.\n>  Narcotics list is available and it is stored with Master.\n>  Expired medicines are stored seperately\n> Annual inspection of medical chest has been done and certificate is posted", "sms": "PAM 11.13", "status": "Yes", "remarks": "Date of hydraulic test of the cylinder: 05 May 2021\n\nDate supplied on board: 25 Aug 2021", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 15.6", "q": "> Is the radio medical service provider information readily available (posted at communication computer or hospital) & health promotion programes", "sms": "PAM 11.13,H&S 7.1,TOE", "status": "Yes", "remarks": "", "guidance": "Rightship Inspection will record in comments the method of health promotion and related education programs on board the ship.\nHealth promotion might include:\n•\tHealth Awareness Material displayed in crew rest rooms/ mess rooms\n•\tTraining films shown to crew\n•\tWorking in hot and sunny environments -Heat Stroke/Sunburn.\n•\tDangers of dehydration\n•\tHealthy lifestyle - balanced diet, adequate sleep and regular exercise\n•\tProtection from Mosquito/insect bites\nMonthly Newsletter \"Food Ahead\" made available in Crew Messrooms."}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.5", "q": "For detecting floating ice, has the vessel been provided with \n>  Search lights controlled from bridge and capable of swivelling all around 360 degrees\n>  Cross-polarised radar systems  which provide better resolution of ice features", "sms": "NMM 8.8.7 & 8.8.10", "status": "NA", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.6", "q": "For receiving ice reports for safe navigation, is the vessel fitted with the equipments to receive, \n>  Ice and weather information charts\n>  High resolution ice weather charts", "sms": "NMM 8.8.2", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.11", "q": "> Is Navigation Bridge provided with heating system for bridge windows.\n> Are the watch keeping personnel provided with suitable glasses to protect from direct/indirect glare of the sun.", "sms": "H&S 6.1.8", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.12", "q": "> Are communication transmitters / receivers exposed provided with deicing features\n> Is fog horn protected from sub-freezing temperature? \n> Is communication equiment provided with deicing features or built in heating elements\n> Are the Radar Scanners provided with inbuilt heating element", "sms": "By design", "status": "Yes", "remarks": "", "guidance": ""}]}, "3O": {"items": [{"app": "Bulk Carriers", "ref": "RISQ 2.7", "q": "Have all officers and ratings responsible for the carriage and care of dangerous and hazardous substances in solid form in bulk, including Material Hazardous Only in Bulk (MHB), have received appropriate training to comply with the STCW Convention and Code’s 2010 Manila Amendments.", "sms": "PAM 11.4", "status": "Yes", "remarks": "", "guidance": "AEMTC Bulk Carier Safety Inspection and Maintenance 5d course post Jan 2023 covers training requirements. \nAlternatively, the E learning CBT on LMS \"IMSBC code- Carriage of dangerous goods in bulk\" to be done by all officers and crew.\nIMSBC training for officers and ratings via Videotel VOD box (Dangerous and difficult bulk cargo – Part 1 Best practice and IMSBC code Edition 2 and Part 2 Mineral Manmade derivatives)"}, {"app": "All Vessels", "ref": "RISQ 2.8", "q": "Have all officers and ratings responsible for the carriage and care of dangerous and hazardous substances in packaged form undertake appropriate training to ensure compliance with the STCW Convention and Code’s 2010 Manila Amendments.", "sms": "PAM 11.4", "status": ">Yes", "remarks": "", "guidance": "Containerships provided with the onboard HAZMAT CBT training. \nAlternatively, others vessel’s Officers & crew to complete the e learning CBT on LMS \"HAZMAT (Hazardous Materials)\""}, {"app": "All Vessels", "ref": "RISQ 3.18", "q": "ECDIS Familiarization : Can all officers demonstrate the following: \n>  Checking voyage plan (Manual and auto route check etc)\n>  Interrogating chart symbols/updates/information on chart\n>  ENC symbol identification\n>  Manual position fixing (NP5012/NP232)\n>  AIS and or Radar overlay if fitted ( Advantages/disadvantages)\n>  Knowledge of SCAMIN and how it is displayed\n>  Knowledge of CATZOCs and application for UKC as per SMS\n> Contingency action in case of ECDIS failure.\n> Setting of safety frame/safety cone( SMS guidelines/safety poster )\n> Creating parallel index lines\n> Route checking and management of alarms\n> Handling unresolved ENC update errors\n> Showing of IHO version of standard installed", "sms": "NMM 13.2", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.6", "q": "a. Has the  rescue from enclosed space drills being done at 2 M intervals. \n( This should not be a table top drill)", "sms": "PAM 10.1, 10.2, Annex 1", "status": ">Yes", "remarks": "Date of Last drill: 26/12/2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.9                    Guideline 1", "q": "> Is the drill and training planner of latest edition and updated \n> Pollution drills updated in SOPEP\n> Is there any defect in LSA/FFA or Pollution prevention equipment. If - Yes, has the office been informed", "sms": "PAM 10.1, 10.2, Annex 1", "status": "Yes                                  Yes                           No", "remarks": "Date of last drill: 28/01/2026", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.11                    Guideline 1", "q": "> Has a PPE Matrix for use of personal protective equipment been provided and is it being worn as required?\n> Is ship’s crew using an inertia reel personal fall arrestor with a full body harness when working aloft or over side ?\n> Is crew using respiratory protective equipment and safety goggles if dusty cargo being loaded/discharged ?\n> Are rubber insulating gloves available for use near electrical equipment?\n> Are helmets replaced every 3 years and head harness insert replaced every two years?", "sms": "H&S 6.1", "status": ">Yes", "remarks": "", "guidance": "Galley staff to wear PPE as specified in H&S 7.2                                                                                                           Safety Harness must have Identifier labels for SWL/ date of manufacture/ make /model and should not be dirty with paint, grease, or exposed to harsh chemicals."}, {"app": "All Vessels", "ref": "RISQ 4.18                    Guideline 1", "q": "> Are all launching arrangement for  lifeboats, rescue boat and davit-launched life raft in good order without any defects \n> Is annual and 5 yearly servicing records and certificate available \n> Is emergency launching arrangement operational \n> Is on load release system properly set    \n> Are all lifeboat equipment in good condition and working order                                                                               \n> Are lifeboat and liferaft exterior in good order without defects or damages. \n> Are all safety limit cut outs working\n> Are the davit falls in good condition/lubricated/renewed at 5 Y interval.Are the fall termination properly made\n> Is the FFLB/RB lifting bridle in good condition ?                                                                                                                > If any wire pendants are sheathed with plastic and used to secure the lifeboats, rescue boat, or life raft ?", "sms": "LSA and FFA - ship specific Maint Plans\n(TMM 6.8) & LSM 5.2", "status": ">Yes", "remarks": "Date of last annual 08th Aug-2025", "guidance": "The Rightship Inspector will record a Finding If any wire pendants with sheathed plastic were used to secure the lifeboats, rescue boat, or life raft."}, {"app": "All Vessels", "ref": "RISQ 4.19", "q": "> Are liferafts  in good order. Is HRU connected correctly. \n> Is annual inspection Certificate available \n> Is lashing arrangements in good condition\n> Is the forward life raft correctly secured and  emergency light arrangement available\n> Are the embarkation ladders and handholds in good condition ?\n> Is the maximum stowage height of life raft marked. This must be 10 meters more than light freeboard of the vessel", "sms": "LSA and FFA  ship specific Maint Plans\n(MM 6.8)", "status": ">Yes", "remarks": "Last shore servicing: 29 May-2025, 30-May-2025, 31-May-2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.20", "q": "> Are life jackets in good condition\n> Are they allocated as per the LSA plan \n> Are donning instructions clearly displayed\n> Are there adequate lifejackets in remote locations and on bridge and ECR ? \n> Are there 2  lifejackets for persons weighing upto 140 Kg  ? \n> Is the LJ light in date and secured properly ?\n> In case of infltable life jackets are they SOLAS approved and serviced ?", "sms": "LSA and FFA  ship specific Maint Plans\n(MM 6.8)", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.21", "q": "> Are immersion suits in good condition. Are the zips/chains in good order\n> Are they allocated as per the LSA plan \n> Are donning instructions clearly displayed? \n> Is the crew aware regarding use of L/Jackets with Immersion Suits \n> Are the maintenance and testing records available as per MSC Circ 1114?                                                                                                                               \n> Does the vessel have testing and repair kit onboard?\n> Are the Immersion suits being pressure tested on board as per makers instructions /ashore and records available ?\n> If the immersion suit are also life jackets, are there sufficient immersion suits available for oversized persons ( upto 140KGS)", "sms": "LSA and FFA  ship specific Maint Plans\n(MM 6.8)", "status": ">Yes", "remarks": "Date of last pressure test :     09- Aug-2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.22", "q": "> All  all IMO symbols in good condition?", "sms": "H & S 6.6", "status": ">Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.23", "q": "> Has the foam compund been tested at regular intervals. (annually after first 3 yrs) \nTest must be done as per  MSC Circ.1312 \n> Is the test report available   \n> For yard  delivery certificate for Foam Test Quality- available from yard. \n> Check the expansion ratio in the latest test report against expansion ratio in original test report. ( If this is less, check if the quantity of foam is sufficient for protected area. Calculations can be checked from Yard reports)", "sms": "LSA and FFA  ship specific Maint Plans\n(MM 6.8)", "status": ">Yes", "remarks": "Date of last analysis: Tested prior delivery.", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.24", "q": "> Are fire mains, isolation valves, fire boxes, hoses, nozzles, applicators, and spanners in good condition \n> Have the Fire Hoses been pressure tested  at 3-Month interval\n> Are the fire line isolation valves tested at 3 M intervals and are they holding ? Are the drains on fire line holding ?\n> Are all fire hydrants in good condition without leaks \n> Is the fire hose box inventory complete including spare washers/spanner?\n> Are the fire hydrant caps provided with a hole to release pressure ?\n> Are the fire hydrants esp in remote locations such as boiler/steering flat/ER bottom flat checked by flowing water to see that they are free and not clogged due to debris?", "sms": "LSA and FFA  ship specific Maint Plans\n(MM 6.8)", "status": ">Yes", "remarks": "Date of last pressure test of fire line:                       15-Sep-2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.25", "q": "> Is the International Shore Connection location clearly marked. \n> Is the ISC in good condition \n> Are  all component of the ISC in place and ready for use?\n> Are the crew aware of the location and use of the ISC?", "sms": "LSA and FFA  ship specific Maint Plans\n(MM 6.8)", "statu
