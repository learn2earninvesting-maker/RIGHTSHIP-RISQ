dance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.13B", "q": "Have hatch covers been ultrasonically tested for weather tightness before loading? \n-Is the vessel provided with ultrasonic equipment to test the weather tightness of hatch cover prior loading ?\n-Are the hatches tested prior loading and record maintained ?\n-Are the calibration and other tests being done on the ultrasonic equipment and record maintained ?\n-Are all deck officers familiar with the use of the ultrasonic equipment ?", "sms": "BGCM6.0", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.14B                    Guideline 1", "q": "Has the master been provided with clear instructions regarding any fumigation, prior to arrival at the load port? Has the vessel been provided with procedures and contingencies regarding fumigation of cargo holds and are the master and chief officer familiar with the procedure? \n-Are senior officers aware of the SMS guidelines for fumigation BGCM 4.4 ?\n-Adequate instructions received from the company carrying out the fumigation ?\n-Are senior officers aware of the guidance set out in section 3 of MSC.1/Circ.1264 and additional guidance issued by countries such as USA/Canada in case fumigation is carried out there ?\n-Are ship specific checklist D/Bulk 06 A & B used during fumigation and records maintained ?", "sms": "BGCM 4.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.15B", "q": "Has the master been provided with clear instructions regarding any fumigation, prior to arrival at the load port? Has the vessel been provided with procedures and contingencies regarding fumigation of cargo holds and are the master and chief officer familiar with the procedure? \n-Are senior officers aware of the SMS guidelines for fumigation BGCM 4.4 ?\n-Adequate instructions received from the company carrying out the fumigation ?\n-Are senior officers aware of the guidance set out in section 3 of MSC.1/Circ.1264 and additional guidance issued by countries such as USA/Canada in case fumigation is carried out there ?\n-Are ship specific checklist D/Bulk 06 A & B used during fumigation and records maintained ?", "sms": "BGCM 4.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.16B", "q": "Is crew familiar with major problems associated with fumigation of cargo in stowage on board? \n-Are all crew briefed on dangers of fumigation viz toxicity and its potential for fire or explosion .\n-The chemical reaction of fumigant produces heat and if fumigant is not properly distributed can cause fire .\n-The fumigant pallet can react with water and spontaneously ignite\n-Spontaneous heating of the fumigation gas can cause fire/explosion as phosphine gas is explosive at levels above 1.7% v/v in air.", "sms": "BGCM 4.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.17B", "q": "Do on-board safety requirements for fumigation comply with sub-section 3.3.2.7 of the IMO recommendation on the safe use of pesticides? \n-Vessel provided with adequate number of gas detecting equipment /tubes etc. Daily checks carried out and records maintained.\n-Instructions available and complied with respect to  disposal of residual fumigant material\n-Respiratory protection equipment (at least 4 sets are required)/Medicines and medical equipment/Antidote/MFAG - A copy of the latest version- available\n-Completed checklist D Bulk 06A and 06 B", "sms": "BGCM 4.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.18B", "q": "Are the master’s appointed representatives for fumigation trained and is there evidence to show that they have been effectively performing duties associated with this task?Have pre-fumigation and post fumigation statements been provided to the master by the fumigator-in-charge? (\n-Completed CL D/Bulk 06A and 06B with appropriate entries in dekc log/port log.\n-Documents and certificate issued by fumigation in charge as per details in CL D Bulk 06A and 06B", "sms": "BGCM 4.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.19B                    Guideline 1", "q": "Are the master’s appointed representatives for fumigation trained and is there evidence to show that they have been effectively performing duties associated with this task?Have pre-fumigation and post fumigation statements been provided to the master by the fumigator-in-charge? (\n-Completed CL D/Bulk 06A and 06B with appropriate entries in dekc log/port log.\n-Documents and certificate issued by fumigation in charge as per details in CL D Bulk 06A and 06B", "sms": "BGCM 4.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.20B", "q": "Are visible means provided to prevent access to all entrances containing fumigant and other spaces that are considered unsafe to enter after fumigation? \n-Adequate warning signs to be posted to warn all crew and other shore personnel of the fumigation-CL D/Bulk 06A", "sms": "BGCM 4.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.21B                    Guideline 1", "q": "Has the Voyage Safety Plan (VSP), including the checklist for fumigation during the voyage, been discussed with and signed by the master prior to sailing to the discharge port?\n-CL D Bulk 06A and 06 B completed diligently and complied with", "sms": "BGCM 4.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.22B", "q": "Have the air conditioning intakes for the accommodation, the engine room and other spaces been set to prevent the possibility of drawing in fumigant gas? \n-RA for fumigation has addressed the possibility of ingress of toxic gas into accomodation/ER/other spaces due to incorrect ventilation.\n-Ventilation fans/flaps are correctly set up before the start of fumigation to prevent drawing of fumigant gas into accomodation/ER and other spaces.\n-Before ventilating cargo holds ventilation arrangements for accomodation/ER/other spaces to be rechecked to prevent ingress of toxic gases.", "sms": "BGCM 4.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.23B", "q": "Are procedures in place for entering any cargo holds sealed for fumigation in transit? Has the master informed the appropriate authorities of the country of destination about the fumigation? \n-Compliance with CL D Bulk 06A and D Bulk 06B -These are check items in the checklist", "sms": "BGCM 4.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.24B", "q": "Are procedures in place for entering any cargo holds sealed for fumigation in transit? Has the master informed the appropriate authorities of the country of destination about the fumigation? \n-Compliance with CL D Bulk 06A and D Bulk 06B -These are check items in the checklist", "sms": "BGCM 4.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.25B", "q": "Has the vessel been provided with a gas free certificate at the discharge port prior to commencement of discharge operation? \n-Compliance with CL D Bulk 06B", "sms": "BGCM 4.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.26B", "q": "Are records maintained of fumigation operations? \n-Detailed records of fumigation operation to be maintained in cargo record file, deck log book/port log and should contain the following \n-Communication relating to fumigation/Details of fumigation company/fumigator-in-charge, and operation/Fumigation plan\n-Details of the fumigator-in-charge and operatives/Time of starting and finishing/ Holds involved/Identity of the fumigant, application level and where and how applied.\n- All gas reading with location testing.\n-Plan and sketch for each hold fumigated, showing where the fumigant was applied and the amount of fumigant at each\nlocation.\n-Certificate of fumigation/Formal written handover of responsibility.\n-Completed checklist D Bulk 06A and B", "sms": "BGCM 4.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.27B", "q": "Are necessary instruments (with spares) to determine the dew point provided, maintained in good condition and are there records of the calibration of such instruments? \n-The wet and dry thermometers are in good condition/muslin clean/water reservoir filled with clean water and positioned away from direct heat source/exhaust.\n-Is whirling psychrometer provided and is it operational and records of temperature obtained are maintained ?\n-Are there any records of calibration of thermometers ?", "sms": "BGCM 4.6", "status": "Yes", "remarks": "No records of thermometers calibration found", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.28B", "q": "Are the master and / or chief officer familiar with the rules for deciding to ventilate the cargo holds during the voyage? \n-Are senior officers aware of ships sweat and cargo sweat ?\n- Are senior officers aware of hygroscopic and non hygroscopic cargoes and their ventilation requirements ?\n-Are senior officers aware of the dew point rule and 3 degree rule when deciding on cargo ventilation as detailed in SMS ?", "sms": "BGCM 4.6", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.29B", "q": "Is ventilation of cargo holds, where required, being carried out and recorded?\n-Are Voyage instructions regarding hold ventilation known and being complied with.\n-Are detailed records maintained for all temperatures taken and dew points calculated/Whether or not ventilation carried out/Reason for not ventilating/Weather and sea condition\n-Is the rule being followed for ventilation three –degree rule or dew point rule recorded.", "sms": "BGCM 4.6", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.30B", "q": "Is there evidence of a satisfactory grain stability calculation for the last voyage? \n-Grain stability calculated using class approved loadicator and country specific form viz Australia/Canada/USA etc covering the complete voyage from load port to discharge port to show that vessel complies with intact stability requirement at each stage of voyage.", "sms": "BGCM 5.1", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.31B                    Guideline 1", "q": "Has a cargo loading/unloading plan providing detailed sequences of cargo and ballast transfer been prepared, understood, and signed off by the deck officers? \n-Has detailed loading/discharging plan as per OPS Bulk 10A been prepared by Chief officer and signed by Master and other deck officers ?\n-Is visual and calculated draft being checked at each stage of completion and discrepancies resolved ?In case plan is changed then is a amended plan made and discussed with all officers ?\n-Are SF/BM checked and recorded at each stage ?\n-All details of cargo operations- holds being operated/ballast sequences etc recorded ?\n-Is a pre cargo operation meeting held with all crew and recorded ?", "sms": "OPS Bulk 10A", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.32B", "q": "Are the hold bilges cleaned prior to loading and have all hold openings been made grain tight?\n-Bilges cleaned ,disinfected and deodorised before carrying grain cargoes as per BGCM 4.9.9 and covered with burlap.\n-Cargo bilge valve integrity  test done very 3 months and overhaul every 12 months\n-Bilge sounding pipe and temperature pipe intact and clear\n-All hold opening hose tested or tested with ultrasonic device if provided prior loading.", "sms": "BGCM 4.9 & D/Bulk 02", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.33B", "q": "Do records on board verify that cargo lights in holds, where fitted, were properly isolated before cargo was loaded? \n-Item to be included in ship specific D/Bulk 02 and complied with", "sms": "D/Bulk 02", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.34B", "q": "Is an adequate record of all cargo operation activities maintained during loading and unloading? \n-Are detailed records maintained for the following in port log \n-Starting and stopping of work at each hold; times and dates\n-Cargo loaded /discharged from each hold and cumulative total\n-Weather conditions\n-Use of ships crane/shore crane/barge movement\n-Opening and closing of hatches/draft readings at periodic interval - normally at completion of each stage/watch etc\n-time of rain-snow/delays in cargo operations/attendance of cargo and other surveyors/Stevedore damage\n-Cargo temperature if applicable\n-Regular monitoring of stability records", "sms": "BGCM 2.2", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.35B", "q": "Are the dangers associated with oxygen depletion of grain cargo understood by officers and crew, and have reasonable precautions been taken during routine inspections of the cargo, when entering the holds and adjacent spaces?\n-Dangers associated with grain cargo known to all officers and discussed during pre loading meeting.\n-SMS guidelines for hold entry and adjacent spaces known to all crew and complied with\n-Warning notices posted at hold entrances as per SMS and pre entry checks done as per ship-shore checklist and QA poster 02", "sms": "BGCM 3.0", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.4C", "q": "Has appropriate cargo information been provided to the vessel prior to loading? \nHas the shipper provided all the information as required by CSS code and Timber code \n\nFor Heavy Lift -Is the following information provided?\n1. A general description of the cargo.\n2. The gross mass of the item or each item if there is more than one.\n3. The principal dimension of the item or items and, if possible, scale drawing.\n4. The location of the centre of gravity of each item.\n5. Particulars of the bending area of the cargo units and details of any precautions with regard to the bending of the item(s).\n6. Details of lifting points or slinging positions and, information on how best to lift each item.\n7. Details of securing points, including their strength and radius of strength.        \n8. IMDG Cargo - Manifest, in accordance with the classification set out in the IMDG code, the dangerous goods on board and location.\n\nIs the procedure of safe lashing and securing is available in the Cargo Securing Manual and Bulk and General Cargo Manual?", "sms": "CSS code / Timber Code/ BGCM", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.5C                    Guideline 1", "q": "Is an approved ship-specific Cargo Securing Manual available and are officers thoroughly familiar with the contents of the manual?  \nIs cargo secured in accordance with CSM at designated securing points using cargo securing devices mentioned in the manual?\nDoes the vessel have sufficient spare lashing devices?  \n\nDose CSM include the following?\n1. Cargo Securing devices strength (MSL) and their use;  \n2. Tables and diagrams give a broad outline of the accelerations.\n3. Examples of forces acting on typical cargo units\n4. Examples of how to calculate the number and strength of portable securing devices\n5. Calculation method used converted in a form suiting the particular ship (Recommended)               \n6. CSAP- Cargo Safe Access plan (If applicable to the ship)                                           \n7. Inspections / Maintenace/ Repair records kept with CSM\n8. Procedure of accepting, maintaining, repairing or rejecting of the lashing devices must be available. (All equipment, lashings, hog wires, uprights and their foundations, deck fittings, cell guides, loose lashing equipment, twist locks, stackers etc.)                                     \n\nIs regular inspection and maintenance of lashing devices being carried out?   Must include - Routine Physical Inspection; Periodic reexamining and retesting as required by the administration.                                                                                                                                                          \n\nAre repairs to fixed lashing equipment repaired to the satisfaction of classification society as appropriate?  (Uprights, lashing points)", "sms": "BGCM 5.9/ 5.10 / 5.11 / 5.12", "status": "NA", "remarks": "", "guidance": "Each device used for securing cargo should be marked clearly with its SWL and a batch mark or number, where that mark can be verified by a test certificate. RightShip recommends that these test certificates be clearly labelled and kept in an easily accessible file. A method of correct identification and matching of individual certificates with the cargo-securing devices should be established on board. Cargo-securing devices without certificates must not be used on board."}, {"app": "General Cargo", "ref": "RISQ 8.8C", "q": "Is there evidence to show that samples of the timber cargoes are being weighed during loading and what is the actual weight compared to the weight stated by the shipper?", "sms": "Not in SMS - Timber code", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ.8.9C", "q": "If the vessel is a timber carrier, have up to date lashing plans for each stowage and securing arrangement been incorporated in the Cargo Securing Manual?  \n\nDoes the plan include: Maximum cargo weight for which the arrangement is designed; Maximum stowage height; required number and strength of blocking devices; Required pretension in lashing; Illustrations of all securing items; restrictions regarding maximum accelerations;  \n\nHas a lashing plan according to the ship’s Cargo Securing Manual been prepared?", "sms": "BGCM 5.10", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.11C", "q": "Is a Class-approved loading computer or programme in use and has its operational accuracy been regularly tested?  \nIs the loading computer accuracy check done every 6 months as per the inactive function checklist and annual check during class surveys carried out and endorsed by the Master or Surveyor? \nDuring the renewal survey, are all approved test conditions checked and endorsed by the attending surveyor?", "sms": "BGCM 4.2.14", "status": "NA", "remarks": "", "guidance": "The Loadicator is required to be tested periodically (interval is every 6 months as per SMS) by ship staff for its accuracy. The test procedure includes choosing a text condition from the approved test conditions, entering the exact same data in the loadicator and comparing the results with the approved test conditions. \nThe important point to note is that the data needs to be manually entered and not opened from a pre-saved file."}, {"app": "General Cargo", "ref": "RISQ 8.12C", "q": "Are officers aware of the strength limits (t/m2) of tank tops, tween decks, hatch covers and weather decks with regards to safe cargo stowage and is this information posted in the ship’s office / ballast control room?", "sms": "BGCM 4.2 / 4.3", "status": "NA", "remarks": "", "guidance": "The maximum permissible loadings, given in tonnes per square meter (t/m²) for each deck and the tank-top, and the hatch covers should be posted in the Ship’s office."}, {"app": "General Cargo", "ref": "RISQ 8.13C                    Guideline 1", "q": "Have pre-stowage and stowage plans been prepared and completed effectively?  (Stowage plan to be made taking into consideration- cargo specifications, securing arrangement, port rotation, SWL of cranes, weight distribution, cargo compatibility etc.) \nIs the stability conditions available complying with the criteria of GM and GZ (righting levers) \nfor the following stages:\n1. Departure condition?\n2. Arrival condition?\n3. Worst condiiton duirng the voage?\nIs ship stability condition updated and checked regularly take into account - variations in displacement, CoG, FSM, absorption of water in timber, Ice accretion, variation in consumables, Ballast water exchange etc. weight and CoG of deadweights on board with tank sounding checked regularly?\nIs the tank sounding checked and logged regularly?", "sms": "BGCM 4.2 / 4.3", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ.8.14C", "q": "Is an approved ship-specific Cargo Securing Manual available and are officers thoroughly familiar with the contents of the manual?  \nIs cargo secured in accordance with CSM at designated securing points using cargo securing devices mentioned in the manual?\nDoes the vessel have sufficient spare lashing devices?  \n\nDose CSM include the following?\n1. Cargo Securing devices strength (MSL) and their use;  \n2. Tables and diagrams give a broad outline of the accelerations.\n3. Examples of forces acting on typical cargo units\n4. Examples of how to calculate the number and strength of portable securing devices\n5. Calculation method used converted in a form suiting the particular ship (Recommended)               \n6. CSAP- Cargo Safe Access plan (If applicable to the ship)                                           \n7. Inspections / Maintenace/ Repair records kept with CSM\n8. Procedure of accepting, maintaining, repairing or rejecting of the lashing devices must be available. (All equipment, lashings, hog wires, uprights and their foundations, deck fittings, cell guides, loose lashing equipment, twist locks, stackers etc.)                                     \n\nIs regular inspection and maintenance of lashing devices being carried out?   Must include - Routine Physical Inspection; Periodic reexamining and retesting as required by the administration.                                                                                                                                                          \n\nAre repairs to fixed lashing equipment repaired to the satisfaction of classification society as appropriate?  (Uprights, lashing points)  \n\nIs there evidence to show that the evaluation of forces acting on the cargo unit has been calculated, and correct cargo-securing devices are being used to secure the cargo to the ship? \nIs the MSL for securing devices available? \nIf SWL is substituted for MSL for securing purpose, is SWL >= MSL?", "sms": "CSM", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.15C", "q": "Have personnel engaged in cargo securing operations been provided with relevant training and familiarisation? \nIs the crew aware of the timber deck cargo controlled jettisoning procedure? \nIs a remote jettisoning system provided? (recommended)", "sms": "", "status": "NA", "remarks": "", "guidance": "Bulk Carrier Course cert post Jan 2023 contains required text. All others can access the E learning CBT \"Cargo Securing Operations training\" on LMS."}, {"app": "General Cargo", "ref": "RISQ 8.16C", "q": "If the vessel is carrying timber, are relevant regulations of the applicable Load-Line Convention for stowage and securing of timber as prescribed in the ship’s Cargo Securing Manual being followed?  \n(If the vessel does not have a Timber loadline then it cannot load deeper than the appropriate load line)\nIs the height or the width of the timber cargo on the weather deck appropriately reduced when the ship needs to ply within the seasonal winter zone in winter? \nIs there a convenient passage for the crew on or below deck from accommodation to all parts used in the necessary working of the ship? \nAlternatively to the convenient passage mentioned above, a passage on top or side of the cargo and lifeline in accordance with the load-line convention provided?", "sms": "", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.17C", "q": "If the vessel is carrying timber, are instructions for ballast water exchange operations for the intended voyage available in the Ballast Water Management Plan? \nAre all tanks required to be ballasted as per stability calculation, and filled prior to loading on deck?\nAre the ballast tanks full or empty to eliminate FSM?", "sms": "BGCM 4.2/ 5.10", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.19C", "q": "If the vessel is a non-cellular ship, have the containers been stowed correctly on deck? \nIs Merchant Shipping Notice M.1167: Carriage of Containers and Flats in Ships Not Designed or Modified for the Purpose available and followed?", "sms": "", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ.8.20C", "q": "Is the vessel following procedure for monitoring the temperature of refrigerated containers and records maintained as per CNM Chapter 5.1 in form OPS07? \nIf refrigerated containers are carried, are sufficient spare parts available as per guidelines in CNM chapter 5.1.12? \nDoes the vessel have a sufficient electric power supply permanently installed from the engine room? \nAre the electric sockets for reefers in good condition?", "sms": "CNM 5.1/ OPS 07", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.24C", "q": "Is the ro-ro cargo ship equipped with CCTV remote monitoring to monitor the vehicle decks?  \nAre all CCTV cameras in good working order?", "sms": "ROCM 4.4", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.25C", "q": "Is the ro-ro cargo ship drainage system in good order, tested regularly and are effective measures in place to prevent blocking of drains? \nAre the drains covered with grating with an open area ratio of 6:1 and the opening size not greater than 25mm? Confirm grating / screen is not mechanically fitter?  \nIs the drainage area marked with a marking at a height not less than 1500mm with a letter size not less than 50mm stating \"Drain Opening - Do not cover or obstruct\"? \nAre procedures in place to carry out the function and tightness testing of the bow, inner, side shell, stern doors and main to lower deck cargo elevators of ro-ro cargo ships and is there evidence of regular testing? \nIs the structural condition of the doors in good condition? Are they regularly inspected and records for inspection maintained?", "sms": "Under PMS", "status": "NA", "remarks": "", "guidance": "Rightship recommends that recorded inspections of the door supporting and securing devices be carried out by the ship’s staff at monthly intervals or following incidents that could result in damage, including heavy weather or contact in the region of side shell and stern doors. Any damage recorded during such inspections is to be reported to the Classification Society.\nMaintenance, function, and tightness tests of the doors shall be incorporated in the PMS system as per manufacturer’s recommendation."}, {"app": "General Cargo", "ref": "RISQ 8.26C", "q": "Is the ro-ro cargo ship provided with an approved Operating and Maintenance Manual (OMM)?", "sms": "ROCM", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.28C", "q": "Is an operation manual for the ventilation system in a ro-ro cargo provided and do records on board verify that the air quality is tested?", "sms": "ROCM", "status": "NA", "remarks": "", "guidance": "Maintenance of the ventilation system shall be incorporated in the PMS system as per manufacturer’s recommendation."}, {"app": "General Cargo", "ref": "RISQ 8.29C", "q": "Is the ro-ro ship fitted with an automatic system to control air quality in the cargo holds and are records of inspection, testing, calibration, and maintenance of the system is maintained?", "sms": "ROCM", "status": "NA", "remarks": "", "guidance": "Annual testing of the vehicle space ventilation system should be conducted by the ship’s safety delegate. \nThird-party testing of the vehicle space ventilation system should be undertaken before entry into service of a new ship and at periodical intervals of five years thereafter."}, {"app": "General Cargo", "ref": "RISQ 8.30C                    Guideline 1", "q": "Are vehicles on the ro-ro car decks safely stowed and secured?", "sms": "CSM", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.31C", "q": "Has the vessel been provided with procedures and contingencies with regards to fumigation of cargo holds and are the master and chief officer familiar with the procedure?  \nHas the air conditioning intakes for the accommodation, the engine room and other spaces been set to prevent the possibility of drawing in fumigant gas?", "sms": "BGCM 4.2      H&S 9.4", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.33C", "q": "Are necessary instruments (with spares) to determine the dew points provided, maintained in good condition and are there records of calibration of such instruments? \nAre the Master and/or Chief Officer familiar with the rules for deciding when to ventilate the cargo hold during the voyage? \nIs ventilation of cargo holds being carried out and recorded?", "sms": "BGCM 4.2", "status": "NA", "remarks": "", "guidance": "Calibration records for the dehumidifier system and the humidity meter."}, {"app": "General Cargo", "ref": "RISQ 8.36C", "q": "Are the hold bilges cleaned prior to loading and are cleaning and checks being recorded?", "sms": "BGCM 4.9", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ .8.37C", "q": "Do records on board verify that cargo lights in holds were properly isolated before cargo was loaded?", "sms": "BGCM 3.1.5", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.38C", "q": "Is an adequate record of all cargo operation activities maintained during loading and unloading?", "sms": "BGCM 4.3.25", "status": "NA", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.1A", "q": "> Are cargo holds fittings free of corrosion, damage and well maintained.(Pay special attention to ladders/guards/platforms/bilge and manhole covers) \n> Are undersides of hatch cover well maintained and free of corrosion  ( No loose rust/flaking paint/remnants of previous cargo)\n> Is masters remarks in section 3 of the Bulk/OPS/15 completed.", "sms": "BGCM 4.9 & 6.1", "status": "Yes", "remarks": "", "guidance": "RightShip requires the underside and internal structure of hatch panel should be free of loose rust scale, paint flakes or blistering of paint coatings."}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.2A                    Guideline 1", "q": "> Is a procedure in place for the safe operation of hatch covers ?\n> Is the Master/Chief Officer appropriately trained in hatch cover inspection and maintenance through a formal Hatch Cover Inspection and Maintenance training (shore- based and/or onboard) course. ?\n> If the training was done onboard was it conducted by a manufacturer’s representative ?\n> Is there a risk assessment for opening and closing hatch covers and working in cargo holds ?\n> Defined levels of authority and lines of communication amongst shipboard personnel during operation of hatch covers ?\n> Are hatch covers secured at all times, whether open or closed, unless they are being operated ?", "sms": "BGCM 4 BULK 101 & See remarks", "status": "Yes", "remarks": "", "guidance": "Show AEMTC Bulk Carrier Training certificate post 2023 (Included Hatch Cover inspection)\nIf course done prior 2023 – Carry out Hatch Cover Training CBT Level 2(For all Officers & Master) & Level 3 additionally for Mates and Maters (Computer Based Training) on CMS. Contact the Ops department for details.\nOur inhouse training covers the requirement as the training is done by taking the necessary reference material from MacGregor (MacGregor-Kabaya, Sundong/HSG & JMU- Japan marine United) , Nakata Mac, TTS (TTS Hua Hai & Jiangyin Huangshan), SMS - SME ,Imabari, Iknow, Tsuneshi, Iwaki Tec, Seohae, GTC Genkai & Tsuji."}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.3A", "q": "> Does the vessel have ultrasonic testing equipment for inspection of hatch cover water tightness .\n> Is equipment tested, working and calibrated as per makers manual.\n> Is the ship staff aware how to use the equipment\n> Are following records available, \n   a) Hatch Cover Test reports with photographs.\n   b) Records with a plan or drawing indicating readings obtained at different locations\n   c) Records of tests done by external agency or surveyors (as applicable)  \n   d) Is the hatch cover weather tightness( including booby hatches/hatch vents) checked using hose test/UV test/Chalk test prior very loading as per SMS and record maintained", "sms": "BGCM 6.1.3", "status": "Yes", "remarks": "Date of last hatch cover watertightness test:  09 Jan 2026", "guidance": "RightShip recommends that the weather tightness of hatch covers should be checked at least once every 3 months."}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.4A", "q": "> Are the hatch compression bars in good order \n> Are the water channels clean, free of corrosion and well maintained\n(Check for contact damage such as dents, bends, indentations. Compression bar should be smooth and rounded and are not corroded. Check for grooving damage caused by crane wires. Double drainage channels should be clean and free of corrosion)", "sms": "BGCM 6.1", "status": "Yes", "remarks": "", "guidance": "Hatch coaming tops and the double drainage channels should be clean, free of corrosion and obstructions."}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.5A", "q": "> Are inboard hatch coaming faces free from rust staining or water marks. (indicates that the NR drain valves were clogged and water leaked into hatch) \n> Are the non-return drain valves in good condition and maintained as per PMS\n> Are they fitted with a fire cap permanently held in place by chains/lanyard.  Are they covered during loading /discharging operations and checked clear before closing the hatch cover.", "sms": "BGCM 6.1", "status": "Yes", "remarks": "", "guidance": "Damaged, missing, or defective non-return drain valves should be repaired or renewed. Where applicable, the fire cap of the drain valve should be firmly connected by a lanyard to the valve and maintained in good condition. Check that the drainpipes and drain valves are not clogged. Maintenance of non-return valves should be incorporated in the plan maintenance system."}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.6A", "q": "Quick-acting cleats and holders: Check Following \n> Are all cleats in place and in good working condition\n> Are the rubber washers flexible and free from paint and cracks? Rubber washer retaining plate not thinned down.\n> Are crutches, snugs, panel side plating in good order .\n> Check for wastage/thinning down of steel  \n\nAuto cleats: Check Following  \n> Is the gap between the cleat and stopper as per makers manual.\n> Is locking nut free for adjustment.\n> Are suitable spanners available, identified and marked for use.", "sms": "BGCM 6.1", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.7A", "q": "> Are the coaming tops free from grooving or wear?\n> If bearing/rest pads are installed : are they in good condition and not worn out \n> Is the permenent compression of rubber packings less than 50% of maximum permitted   ( When replacing rubber packing - Minimum length to replaced is 1 metre. Check the expiry date of glue as it has finite shelf life.Backing rubber strip on worn out packing is not to be used.Use packing from makers.)\n> For example if  rubber packing size is 70 x 40 mm. As per makers guidance design compression is 25% of thickness ie 10 MM and discard criteria is 50 % of the design compression. In case the compression is more than 5 mm then rubber packing needs replacement.", "sms": "BGCM 6.1", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.8A", "q": "> Hatch cover bearing pads free from wear and damage ?", "sms": "BGCM 6.1.2", "status": "Yes", "remarks": "", "guidance": "Check thickness of bearing pads is within acceptable limit as per manual."}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.9A", "q": "Side and cross-joint rubber seals: Check Following  \n> Are the seals in good condition? \n> Is the retainer channel free of corrosion and wear down/ damage \n> Are Inspection and maintenance records avaialble", "sms": "BGCM 6.1", "status": "Yes", "remarks": "", "guidance": "Check permanent compression of rubber packing is within acceptable limit as per manual."}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.10A", "q": "> Are hatch cover panels aligned and record of inspection is available\n( Records must include ((as applicable)) Measurement of gaps between hatch covers, inspection of hatch resting pads, permanent deflection of rubber seals or checks of alignment marks where provided)", "sms": "BGCM 6.1", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.11A", "q": "> Seal retaining channels in good condition, free of corrosion ?", "sms": "BGCM 6.1.2", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.12A", "q": "> Are the cross-joint seal retaining channels and the cross-joint compression bar straight, free of corrosion and damage\n> Are the channel supports and brackets in good condition? \n> Are they free of contact damage such as dents, bends, indentation etc to the compression bars", "sms": "BGCM 6.1", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.13A", "q": "Parts of hatch cover - Check Following :  \n>  Are the wheels/bearings / trackway in good order and free of excessive corosion or wastage\n>  Is the hydraulic system including pipelines and hoses in good order, not leaking and free of corrosion.  \n>  Are the chains/link pin and safety pins in good condition \n>  Are cargo hold ventilator on the side and end of hatch panel in good condition, can be closed weather tight and louvers are not wasted\n> Have flexible hydraulic hoses exposed on deck replaced every 5 years ?", "sms": "BGCM 6.1", "status": "Yes", "remarks": "", "guidance": "The requirements for hydraulic hose maintenance must be included into the PMS. \nRightShip recommends that all flexible hydraulic hoses exposed on deck be replaced at least every 5 years."}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.14A", "q": "> Are cross-joint wedges and wedge bridge (where fitted) in place, operational and effective? \n> Confirm they are free of deformations/ misalignment and sliding in smoothly", "sms": "BGCM 6.1", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.15A", "q": "> Is the oil tank of the hydraulic system kept filled to the operating level and with hydraulic oil recommended by the manufacturer ?\n> Is the hydraulic system provided with bleed points from which samples can be taken ?\n> Is the hydraulic oil changed every five years or after there have been significant repairs, such as piping or cylinder replacement. \n> HAve the hydraulic oil filters changed every twelve months or as per manufacturer recommendation ?\n> In addition to the Elemental and Contaminant tests, is the hydraulic oil of the hatch cover system subjected to a Particle Count test ?", "sms": "BGCM 6.1/TMM 4.11", "status": "Yes", "remarks": "", "guidance": "Hydraulic oil should be changed every five years or after there have been significant repairs, such as piping or cylinder replacement. Hydraulic oil filters should be changed every twelve months or as per manufacturer recommendation."}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.16A", "q": "Emergency means of opening hatch covers: Check Following   \n> Are crew familiar with the arrangements and training carried out ? ( Refer D/Bulk/102)\n> Is the maintenance of equipment included in PMS. \n> Is the emergency hatch cover operation tested at different hatch cover location and records maintained in PMS.", "sms": "BGCM 6.1", "status": "Yes", "remarks": "", "guidance": "The manufacturers’ instructions for the maintenance and test of the emergency portable pump unit shall be incorporated in the PMS. All Chain blocks in use must have the safety latch on the hook."}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.17A", "q": "Lifting Equipment : Check following \n> Are annual thorough examination and load test records available and also entered in PMS \n> Are all equipment marked with SWL markings", "sms": "H & S 8.5", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Vessels with cargo cranes", "ref": "RISQ 9.18A", "q": "Cranes Wire: Check following \n> Are wires in good order and certificate of each wire rope available \n> Are there records inspection and maintenance of wire?\n> Are there records of date put in service \n> Is there a record of spare wires on board", "sms": "TMM 7.3", "status": "Yes", "remarks": "", "guidance": "There should be an appropriate test certificate for all wire ropes on board; that is for all of those in use and for all spare wire ropes. The certificates should give the date of manufacture, the material strength, the construction of the wire and the breaking load test of a sample. There should be an inventory of all wire ropes on board and records of the dates of renewal of the wires in use on all cranes. Inspection should be included under the PMS system."}, {"app": "Vessels with cargo cranes", "ref": "RISQ 9.19A", "q": "Cranes - Check following is in good order, free of rust or wastage   \n> Main structures\n> Foundation structures\n> Crane Acesss Platform\n> Safety Hoops and rings on vertical ladder \n> Holding down bolts and slewing ring \n> Has a rocking test or Particle test of grease been done \n> Crane cabin and its attachment to main crane structure \n> Structural areas in crane cabin hidden by rubber mats etc", "sms": "TMM 7.2/BGCM 6.3", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Vessels with cargo cranes", "ref": "RISQ 9.20A", "q": "Crane Cabins: \n>  Are all controls in the operator’s cab, driver's chair inspected, tested, and maintained\n>  Is there adequate light and ventillation \n>  Is the wiper if fitted working\n>  Is the glass intact and clear \n>  Are the Instructions for operation posted in crane cabin.\n>  Has crane inspection been carried out as per D Bulk 08 and records maintained\n> Is the bypass key is in custory of responsible officer \n> Are the records of crane familarization : D/Bulk/09 available \n> Does crane PMS include electrical control equipment, motors, hydraulic oil pumps, filters, coolers, winch brakes, limit switches, cut-out switches ?                                                                                                                                                                                                                                                                   > Is inspection of crane cabinet  structural integrity included in PMS ?                                                                                                                                   > Is the crane safety devices regularly tested.", "sms": "TMM 7.2/BGCM 6.3", "status": "Yes", "remarks": "", "guidance": "The inspection of the crane cabinet’s structural integrity should be included in the PMS."}, {"app": "All Vessels", "ref": "RISQ 9.22A", "q": "Loose Gear: Check Following \n> Are the loose gears of lifting appliances marked with SWL, Batch Mark or certificate number \n> Are the certificates of the loose lifting gears available on board? \n> Are records of inspection available", "sms": "H & S 8.5", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 10.1                    Guideline 1", "q": "> Is ship specific LMP/MSMP plans available and updated with ship specific information?\n> Are the records for upkeeping/inspection of mooring lines updated", "sms": "NMM 14.4/LMP", "status": "Yes", "remarks": "", "guidance": "Approved Ship specific LMP and MSMP plans to be provided to the vessels"}, {"app": "All Vessels", "ref": "RISQ 10.3", "q": "> Are certificates for all mooring lines and mooring tails including spares available on board?  \n> Are in use dates of each line and mooring tail recorded in MSMP Form 04. \n> Is each mooring line and mooring tail tagged with its certificate number", "sms": "NMM 14.4/LMP", "status": "Yes", "remarks": "", "guidance": "Mooring line certificates issued should have data pertaining to linear line density, line design breaking force, rope tenacity etc. Check guidance note in RISQ"}, {"app": "All Vessels", "ref": "RISQ 10.4", "q": "> Is the vessel equipped with HMPE mooring lines but without mooring tails fitted ?\n> Is the Line Design Break Force (LDBF) of mooring lines fitted on board shall be 100-105% of the ship design MBL ?\n> Is the TDBF of tails kept 125% - 130% of the ship’s design MBL ?\n> Is the standard overall length for mooring tails 11 metres(for exposed mooring a 22-metre tail) ?\n> Have the mooring tails retired when their residual strength reached 75% of the ship design MBL.", "sms": "NMM 14.4/LMP", "status": "NA", "remarks": "SDMBL: 42 t\nMBL Mooring lines: 57.5 t\nMBL Mooring tail: Nil\nNumber of spare mooring lines: 3\nNumber of spare mooring tails: Nil", "guidance": "Rightship Inspection will record a Finding, if the Line Design Break Force (LDBF) of the mooring lines fitted to the vessel exceeds the limit specified in this guideline & will also Record a N/C if the vessel was equipped with HMPE mooring lines but without mooring tails fitted."}, {"app": "All Vessels", "ref": "RISQ 10.5                    Guideline 1", "q": "Brake testing arrangements : \n> Is a Brake test kit available, it is operational with all parts available.  \n> Has the brake test been done within the last year and record maintained. Is the date of testing marked on winch drum. \n> Is the brake set to 60% of the SDMBL    \n> Is brake rendering position marked-cable ties/jubilee clips etc not used\n> Is direction of heave/pay out marked on drums \n> Is the brake support set correctly and in good condition.  (Clearance 2-3 mm only)", "sms": "NMM 14.5/Training material 180", "status": ">Yes", "remarks": "Date of last brake test: \n10/01/2026", "guidance": "Rightship recommends the vessel’s manager to set the brake at 60% of the Ship Design MBL as per OCIMF guidelines in section 6.4.6 of the MEG 4. RightShip recommends that tests are conducted at least annually."}, {"app": "All Vessels", "ref": "RISQ 10.6", "q": "> Are mooring lines on the same lead of same type , size and MBL \n> Are mooring tails on the same lead of  same type , size and MBL \n> Are there spares mooring lines and tails available for each type of mooring line and tail on board", "sms": "NMM 14.4/LMP", "status": "Yes", "remarks": "No Tail onboard", "guidance": "No mooring lines to be crisscrossing another. To minimize the occurrence of line failures and risks of injury or loss of life from a resulting snapback, lines of the same lead should be made of the same material/rope type. As an example, if a vessel runs four headlines, all four lines must be constructed with the same material/rope type."}, {"app": "All Vessels", "ref": "RISQ 10.7", "q": "> Are sufficient crew members deployed at each mooring station\n> Is a tool box meeting held prior mooring operations and recorded \n> Are heaving lines/rope and chain stoppers/ messenger line etc In good order and without any defects  ( Only double rope stoppers/No undersize messenger lines-minimum 24 mm)", "sms": "NMM 14.1 & 14.2", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 10.8", "q": "At berth checks: \n> Are winch brakes secured to correct marking and and winches are out of gear? ( proper gear engaging pins secured with chain - no use of bolts etc)\n> Have the lines been passed in correct direction.   \n> Is the mooring area free of any trip hazards and generally well kept. \n> Chafing sleeves fitted on mooring lines at exposed berths/tidal ports", "sms": "NMM 14.2 & training material 180", "status": "Yes", "remarks": "", "guidance": "Any buried mooring ropes within a drum should be extracted from the reel and relayed on the drum"}, {"app": "All Vessels", "ref": "RISQ 10.9", "q": "At berth checks for mooring winch with split drums: \n> Is there a single  layer of mooring line on the tension side of the drum\n> Is there sufficient number of turns on the tension drum (Min 6  for synthetic lines)", "sms": "NMM 14.4/LMP", "status": "Yes", "remarks": "", "guidance": "Split-drum winches should not have more than one layer of mooring line on the tension section of the drum because it can reduce the brake holding capacity of the mooring winch."}, {"app": "All Vessels", "ref": "RISQ 10.10", "q": "Mooring Tails \n> Are the eyes of the mooring tails protected with canavas. Is the tail connected properly with the main rope (Metal connecting links must not be used)", "sms": "NMM 14.4", "status": "No", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 10.11", "q": "Mooring Area - General Checks : \n> Are mooring ropes stowed properly ( not directly on deck)\n> Are mooring stations well lit and all the lights operational\n> Is the area clean and free from oil leaks? \n> Is the area painted with anti skid paint. \n> Is the snap back warning notices posted in area prior entry to the mooring station.\n> Is the snap back notice posted for main deck springs .\n> Are loose mooring lines and other gear well organized /stowed neatly to prevent trips/slips.\n> Is save all plugged around winches", "sms": "NMM 14.1-14.3", "status": "Yes", "remarks": "", "guidance": "The mooring stations so far as possible should be painted with a non-slip treatment. Physical hazards such as bulkhead frames, mooring bits, pedestal fairleads and cleats, platforms, and hawse pipe covers are to be highlighted"}, {"app": "All Vessels", "ref": "RISQ 10.12", "q": "> Are the heaving and messenger lines clean, without defects and in good order \n> Is the monkey fist without added weights", "sms": "NMM 14.2", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 10.14", "q": "Securing mooring lines on bollards : \n> Are there 2 full turns around on the leading post before putting ‘figure-of-eight’ \n> Only one rope to be secured over a single pair of bollard \n> Confirm no ropes are secured on warping drums", "sms": "NMM 14.2/14.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 10.15", "q": "Mooring Winches : Check following  \n> Are all Controls in good working order \n> Are all brake linkages are free and moving and not frozen \n> Are winch gear operating levers free to move and marked with the direction of operation for both paying out and heaving in. \n> Are brake drums in good order, free of corrosion, pitting and rust scale ? \n> Are locking and securing pins available and in use   \n> Are all grease nipples in place free of rust, salt, paint, grit  and highlighted in yellow. ( ensure plan showing location of grease nipples is available) \n> Is spare brake lining available for mooring winch/windlass with counter sunk screws.\n> Is the brake travel adjustment screw in good condition and not bent \n> Is the brake lining is in good condition and not overly worn down.   >", "sms": "NMM 14.5", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 10.16", "q": "Mooring Fittings : Check following \n> Are all pedestal fairleads and roller fairleads free of grooving, greased and free to move \n> Are the covers for fairleads/rollers in good condition and  not wasted  \n> Is the SWL marked in marked with bead welding in Ts or KN in contrasting color\n> Have the rollers have been inspected as per PMS (Removed from stand/Inspect the welding around pin etc)", "sms": "NMM 14.4/14.5", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 10.18", "q": "Windlass : Check Following \n> Is the Maintenance of windlass motor,greasing schedule and inspection included in PMS\n> Does anchor make 3 point contact when stowed\n> Is the chain stopper and its locking pin in good condition, sitting properly and locked\n> Is anchor lashing and bottle screw in good condition and certificates are available. (Renewed within last 2 years)\n> Is last DD anchor cable thickness measurement report available.\n> Is brake lining checked for wear(To be renewed if wear down > limits in manual) \n> Are spare brake lining for mooring winch/windlass with screw available.", "sms": "TMM 7.1", "status": "Yes", "remarks": "Date of last change of anchor lashing: 19 Oct 2025", "guidance": "PMS to include monitoring of wear down of guillotine bar, hinge and securing pin."}, {"app": "All Vessels", "ref": "RISQ 10.20", "q": "Chain Locker: Check following \n> Confirm there is no evidance of water leakage \n> Is the enclosed space warning stencilled on chain locker door/manhole\n> Is bitter end securing arrangements located outside the chain locker and accessible\n> Is locking pin free and not painted over\n> Is the sledge hammer available for release of bitter end\n> Is the bitter end pin highlighted.", "sms": "TMM 7.1", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 10.22", "q": "Emergency Towing Arrangement : Check following  \n> Is the ship specific ETA booklet available \n> Are the copies of ETA booklet available in forecastle store/ships office/bridge.", "sms": "NMM 11.1", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 12.1", "q": "Ships Access points : \n> Is the  access point manned.\n> Is a security notice as per SSP posted \n> Is Visitor ID checked\n> Is the Gangway log being maintained\n> Is the gangway watch briefing visitors about the safety and emergency signals\n> Is the gangway watch briefing visitors about any special precautions with respect to cargo / designated smoking areas/covid precautions.\n> Are sanitizer/temperature gun/PPE and Copy of tide table avaiulable.\n> Is a record of stevedores boarding and disembarking from the vessel maintained .", "sms": "SSP", "status": "Yes", "remarks": "", "guidance": "The deck watch has a responsibility to make all visitors aware of any specific hazards of the cargo or operations onboard the vessel and point out instructions to visitors what to do in the event of an emergency."}, {"app": "All Vessels", "ref": "RISQ 12.2", "q": "> Does SSO have SSO training certificate\n> All crew have certificate for security awareness training\n> Has a security drill been held within 7 days of more than 25% crew change.\n> Is the security log updated.\n> Are all the restricted area marked as per SSP\n> Are all the restricted area secured with breakable seals-locks\n( Doors to compartment containing emergency equipment such as EHQ/SOPEP locker/Emergency generator/Emg fire pump should not be secured with lock unless key is available in a breakable box outside. Use breakable seals instead.)                                                                                                                                                                                                                                                                                    \n> All accomodation/ER doors are secured in such a way that they can be opened from outside for rescue/firefighting and inside for eacape.", "sms": "SSP", "status": "Yes", "remarks": "Date of last Security drill: 28 Jan 2026", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 12.3", "q": "> Are deck officers familiar with function and use of SSAS\n> Are records of 3 M test /(Button test) with office and annual test with flag state available.", "sms": "SSP", "status": "Yes", "remarks": "Date of last SSAS test: 23 NOV 2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 12.4", "q": "> Are latest version of security charts available on board? \n> Is Anti piracy plan( APP) updated to latest amendments.", "sms": "SSP", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 12.5", "q": "> Has a ship specific voyage risk assessment been produced for every transit to HRA? \n> Has the vessel carried out following in compliance with APP: \na) Vessel hardening\nb) Reporting and communication protocol as given in Anti Piracy plan\nc) Designation of citadel / safe muster point and required equipment collected.", "sms": "SSP", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 12.6", "q": "> Is stowaway check using CL D/22 done\n> Is there record of  additional search, after dropping pilot in ports with known stowaways problems or as advised by office.", "sms": "SSP", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 12.8", "q": "> Are all USB ports blocked ( Signed paper stickers as USB port lock are not acceptable) \n> Is vessel provided with a dedicated computer and printer(Not connected to ships Lan system) for use by shore personnel and which is provided with updated antivirus.\n> Are all computers  updated with latest antivirus.\n> Is there a dedicated USB available for transferring data from communication computer to ECDIS.\n\nAre all staff and Master familiar with,\na) Company policy for use of personnel laptop/mobile for ships business.\nb) Cyber security guidelines\nc) SMS guidelines for opening attachement from unknown sources sent on email. \n> Is a Cyber security poster displayed at each computer.", "sms": "PAM 22.1", "status": "Yes", "remarks": "", "guidance": "Critical equipment such as ECDIS should be protected from malware and virus attack. Access to USB and RJ-45 ports shall be controlled – i.e., disable or lock the ports."}, {"app": "All Vessels", "ref": "RISQ 13.12", "q": "Critical Equipment : Check following \n> Is a ship specific list of critical spares available, approved by vessel manager and are officers aware of same.Check the list is updated to latest version of TMM\n> Are there requisitions available for missing items . Are records of office permission when critical machinery is taken out of service available.                                                                                                                                                                                                                                                           > Have critical spares for ECDIS been identified,available onboard and included in vessel's PMS ?", "sms": "TMM 5.3/TMM Annex 3", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 14.1", "q": "> Is the hull clean, free of significant corrosion marks / marine growth or extensive coating breakdown.                                                                      > Hull resistance is optimized by new technology coating systems ?                                                                                                                                                                       > Have regular in-water inspection of the hull carried out to check condition.(recommended)                                                   > Biofouling management plan implemented and records kept updated ?", "sms": "TMM 8.1.TMM 8.2,TMM 8.4", "status": "YES", "remarks": "", "guidance": "To carry out regular inspection of vessel’s hull, In case any touch up needed, vessel to ask for port permission via agent, in case the permission denied, the same to be documented and Office informed."}, {"app": "All Vessels", "ref": "RISQ 14.2", "q": "> Are the following markings in good order \na) Vessel’s name / POR \nb) Load lines and draft marks\nc) Thruster warnings / tug push marks \nd) IMO number\ne) Bulbous bow mark\nf) Vessel's IMO number engraved on hatch beam and ER bulkhead", "sms": "TMM 8.1,8.2,8.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 14.3", "q": "> Is deck condition free of significant corrosion? \n> Are mooring, muster station and other workings areas with non-slip surfaces", "sms": "H & S 6.4.3", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 14.4", "q": "> Are following pipelines free of significant corrosion, pitting leakages and temporary repairs : Hydraulic and pneumatic pipework, Fire mains, Pneumatic lines, Electrical conduit lines, Ballast lines, Fresh water lines, Steam pipe and heating system.\nSpecial Attention: \n> Check Fixed Co2 lines to hold, if provided, dresser couplings on fire and other lines ,                                                                             > Hydraulic lines especially from underneath                                                                                                             \n> Isolation valves operational and holding.                                                                                                                                                            > Are pipe securing arrangements in good condition and allow free movement of pipes as necessary.", "sms": "TMM 8.7", "status": "Yes", "remarks": "", "guidance": "Denso tape / Plastic sheathing not to be used on Deck as the metal / wire rope within gets hidden and corrosion within cannot be monitored."}, {"app": "All Vessels", "ref": "RISQ 14.5", "q": "> Are all the watertight doors including fire doors, weathertight doors, portholes, and wheelhouse\nwindows maintained in good order? \n> Self-closing devices on fire doors not fastened or wedged open in any way ?\n> Doors positioned on a weather deck, not fastened or tied open when underway ?", "sms": "H&S 6.4.9 6.4.10\nTMM 8.2.3", "status": "Yes", "remarks": "Date of last test for hatch covers:  09 Jan 2026", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 14.6", "q": "Check: \n> Vents and air pipes on deck in good order \n> Are vents  marked to indicate compartment they serve? \n\nCheck following for all tank/void vents \n> Deflector plates not damaged \n> Float and sealing arrangements in good condition  \n> Flame arrestor mesh in place for vents on bunker tanks ?", "sms": "TMM 8.6", "status": "Yes", "remarks": "Flame arrestor : NA", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 14.7", "q": "> Is the superstructure free of corrosion and rust stains \n> Are the mast stays and life boat gripes properly secured.\n ( Ensure they are not rubber or plastic sheated)", "sms": "TMM 8.1.4", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 14.8", "q": "> Are the hatch numbers clearly marked on hatch covers ?\n> Are hatch entrances bead welded with hatch numbers?", "sms": "Blu Code", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 14.9", "q": "> Mast heads and their fittings, including wire stays,flood lights,deck lights, emergency lights, and hold lights (if installed), in good working order? (V)\n> Are wire stays kept free of sheathed plastic ?\n> Hold lighting system fully operational and properly maintained ?\n> General lighting system operative and no significant earth on the switch boards ?                                                                                                                                                                                                      >Are the lamp holders, drip shields, and shades of portable cargo lights nonconductive, and isolate the crew from electrical shock hazards and have a voltage greater than 50V AC (1-1000Hz) or 120V DC ?", "sms": "H&S 6.4.11\nTMM 12.4", "status": "Yes", "remarks": "", "guidance": "Rightship inspector will record a Finding if wire stays with sheathed plastic were used to secure the mast heads. Rightship inspector will record a Finding if the lamp holder, drip shield, and shade of portable cargo lights are not nonconductive & do not isolate the crew from electrical shock hazards or have a voltage greater than 50V AC (1-1000Hz) or 120V DC."}, {"app": "All Vessels", "ref": "RISQ 14.13", "q": "Check following in stores on deck and inside accommodation \n> Stores are  clean and tidy and well arranged\n> Cabins or cable ducts are not being used as stores\n> Stores with safety equipment have keys placed next to them or can be opened in an emergency immediately  \n> Heavy items are secured against movement where required using wires and turnbuckles.", "sms": "H&S 6.4.3", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 14.14", "q": "Check following in laundry room \n> Laundry room is clean and hygenic. \n> There is no build-up of lint in dryers , notice is posted to clean up the filters\n> Exhaust pipe not clogged\n> No unnecessary items in the laundry room and no built up of washed or discarded clothes \n> Clothes are not hung in close vicinity of fixed heaters", "sms": "H&S 6.5.6", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 14.15", "q": "Check following in Galley \n> All electrical equipment in working condition\n> Hot plates being regulary cleaned and no accumulation of fast grease or food particles   \n> Deep fat cooking equipment fitted with auto cutoff and same is working \n> Crew can demonstrate actions in case of galley fire                                                                                                                                                                                                                                                                              Check exhaust mesh above hot plate is regularly cleaned and no built up of oil/fat deposit inside the exhaust duct/exhaust vent for galley", "sms": "H&S 6.4.3\nH&S 6.5.4\nH&S 6.5.7\nH&S 7.1\nH&S 7.2", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 14.16", "q": "Check following in refrigerated spaces \n>  Door seals in good order and no ice accumulation  \n>  Door catches are working \n>  Space alarm is working \n>  Spring Mechanism to open the door from inside is working \n>  Refer fans and pipes free from frosting.\nHygine Checks \n> Lobby clean and tidy \n> No food kept directly on the floor, area under grating is clean \n> Refer spaces well aranged and tidy\n> No rotton food or vegetables \n> No cooked food \n> Refer space temperatures as per requirement                                                                                \n> Food waste is not stored in reefer rooms during prolonged port stays.", "sms": "CL D/44", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 14.19", "q": "Are the ship's guard rails, walkways and access ladders, as well as  the steps and  railings, maintained and in good  working order and are the securting arrangements for deck cargoes on the deck   also maintained and  in satisfactory condition?", "sms": "H&S 6.2, LL Annex-1", "status": "Yes", "remarks": "", "guidance": "Rightship inspector would record a Finding if the chains strung between guard rail stanchions, in lieu of a fixed railing, are sagging and fail to provide a minimum clearance of one meter from the deck."}, {"app": "All Vessels", "ref": "RISQ 15.10", "q": "> Are senior officers familiar with the following, \na) GB 01 Suicide prevention guidelines", "sms": "GB 06 H & S 7.1.9", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 15.12", "q": "> Are senior officer familiar with GB 01 and GB 06 (guidelines on managing fatigue)\n> Has the traning been conducted on GB-01, as per traning planner\n> Are crew aware of the basic principle as laid in GB-01", "sms": "GB 01 and GB 06", "status": "Yes", "remarks": "", "guidance": "Suicide prevention booklet GB 1 contains materials on Mental Wellness and Mental Health\nMental Wellbeing conducted for Senior Officers during the IPS course at AEMTC. \"Wellness at Sea\" CBT on our LMS also covering same. Company's 6m matrix includes training on board (GB01)."}, {"app": "All Vessels", "ref": "RISQ 15.13", "q": "> For ships constructed after 2011 or certified as asbestos free is there a SMS provision which prohibits supply of spares that may contain asbestos ?                                                                                                                                                                                                                 > In case no asbestos free certification or no SMS provision does the vessel have Asbestos Management plan ?", "sms": "H&S 9.5", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.8", "q": "> Are all personnel provided with appropriate protective equipment suitable for sub- freezing temperature\n> Does it include suitable PPE for eye and hand protection in sub freezing tempratures.", "sms": "H & S 7.6.2", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.9", "q": "> Are the accommodation spaces provided with adequate heating systems? \n> Is the system capable of maintaining temperature around 21 deg C", "sms": "CL D 13/14", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.10", "q": "> Is the vessel equipped with following equipment or material for cleaning the ice and snow from critical areas\na) Suitable shovels\nb) Crow-bars\nc) Spikes\nd) Hammers \ne) Pick / fire axe\nf) Grease pots\ng) De-icing salt to clear snow and ice from handrails, steps, ladders, and walkways.", "sms": "H&S 6.4.3 & CL D/13", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.14", "q": "> Are procedures in place to safeguard the readiness of lifesaving appliances and survival arrangements in sub-freezing temperature? \n> Is the vessel in compliance of the following to ensure readiness of LSA in sub freezing temperatures,  \n>  Wooden mallets available at each of the following locations\n1) Lifeboats davits\n2) Life rafts cradles, \n3) Rescue boat davits,\n4) Other launching gear \n>  Additional water and rations stored in mast house or accomodation \n>  Additional heater provided at these locations.", "sms": "CL D 13", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.15", "q": "> Is the vessel in compliance of the following to ensure readiness of FFA in sub freezing temperatures,  \na) Snow and ice accumulation being cleared off from the equipment\nb) Draining of fire line \nc) Fire dampers/isolation valves etc suitabely greased and checked daily\nd) Heaters for emergency fire pump space if required", "sms": "CL D 13", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.16", "q": "> Are following precautions being observed to safeguard the ballast lines, hydraulic lines, fire lines and bunker lines in sub-freezing temperature? \na) Hydraulic oil for hatch opening is suitable for cold temperature.\nb) Local heaters provided in the pipeline where requried.\nc) Ballast pipeline is protected from freezing in exposed section.\nd) Other lines that can freeze are provided with drains.", "sms": "CL D13", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.17", "q": "Are means and procedures in place to safeguard the readiness of the ballast systems in sub-freezing temperature? \n> Are Ballast tanks provided with means to prevent freezing. \n> Are ship staff familair with the procedures?", "sms": "CL D13", "status": "Yes", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.18", "q": "Are means and procedures in place to safeguard the blockage of vent pipes in sub-freezing temperature? \n> Are the ballast tank air vents provided with covers to prevent them from freezing spary\n> Are sounding points filled with anti freeze liquid.\n> Is there a system in place to ensure that the covers are removed just before ballasting/deballasting.", "sms": "CL D 13", "status": "Yes", "remarks": "", "guidance": ""}]}, "2E": {"items": [{"app": "All Vessels", "ref": "RISQ 2.5", "q": "Rest Hours - Check Following \n> Are the rest and work hours records maintained? \n> Are there any Violations? Check if there have been two or more consecutive violations for the same crew \n> Check the resthour records of key personnel against UMS timings, drills,arrival and departure ports, bunkering timings, periods of restricted visibility at random to confirm if they are matching ? \n> Has an office response received for any non conformity recorded ? ANSWER - NO if above conditions are not met.", "sms": "PAM 11.6", "status": "YES", "remarks": "", "guidance": "Rest hours to be checked for all crew specifically for fire rounds."}, {"app": "All Vessels", "ref": "RISQ 4.5             Guideline 1", "q": "> Is the vessel provided with an enclosed space entry procedure, and is there documented evidence that it was followed? \n> Have all seafarers whose duties may involve entry into enclosed spaces attended a dedicated course for entry into enclosed spaces ?\n> If the ballast treatment system is installed in an independent enclosed compartment, is such compartment identified as an enclosed space ?\n> Additional dangerous spaces (not necessarily enclosed) such as cargo space access, forecastle space, identified/listed ?\n> Is entry permit period of validity less than 12 hours and maximum permitted time between atmosphere-testing of spaces and when they are entered by personnel,less than 30 minutes.\n> Drill records for enclosed spaces available ?\n> Warning notices outside enclosed spaces posted ?\n> Is risk assessment available for enclosed spaces ? \n> Are SCBA , personal gas monitors  with capability to conduct remote readings available?", "sms": "H & S 5.2", "status": "YES", "remarks": "", "guidance": "The ballast treatment plant if installed in an independent enclosed compartment, should be identified as an enclosed space.\nAll Officers and crew to complete Confined Space CBT - General Requirements CBT” on LMS.\nNew sections added in RISQ 3.1\n1) Securing the Access Door of the Enclosed Space\n2) Safety of Shore-Side Personnel and Stevedores Onboard Ships\n3) Enclosed Space Register:\nAny enclosed spaces on the ship should be identified using risk assessment (carried out in accordance with Annex 1.2 of Code of Safe Working Practices for Merchant Seafarers). A register should be made of any enclosed spaces that seafarers may enter."}, {"app": "All Vessels", "ref": "RISQ 4.12", "q": "> Are safety meeting done as per schedule. Is a office response available \n> Are watchkepers informed of minutes of safety meeting. Do they attend the next safety meeting if they missed in the previous month. \n> Are the results of CL- D/39 discussed in the safety meeting", "sms": "H & S 3.3", "status": "YES", "remarks": "Date of last safety meeting 19.01.2026", "guidance": "The vessel should record Safety Meeting feedback from the company."}, {"app": "All Vessels", "ref": "RISQ 4.17                    Guideline 1", "q": "> Are Oxygen/Acetylene bottles stored properly in separate lockers.Annual check of the onboard oxygen-acetylene, welding equipment/installation  onboard has to be carried out by a competent person in accordamce with manufacturer's guidelines.\n> Are they secured with clamps and not ropes\n> Are empty, full and in-use cylinders marked. \n> Are valves,regulator, pressure gauge and flash back arrestors in good condition \n> Is the flash back arrestor provided at both ends of the line(locker/workshop) and between gas torch and the gas pipe ?                                                                                                                               \n> Is the gas line free of any joints between the flexible gas pipe                                                               \n> Is the fixed piping of steel welded type\n> Are the regulators replaced every 5 years. \n> Are all gas cylinders disconnected after use\n> Is the supply line free of any residual pressure \n> Are the welding and gas-burning equipment, as well as the electric arc equipment, properly stored and maintained in good working order? (V & M)", "sms": "H & S 5.3 TMM Annex 1K", "status": "YES", "remarks": "Date last changed ( Regulators) : 25.08.2021", "guidance": "The Rightship Inspector will record a finding if an annual check of the oxygen and acetylene installation onboard has not been undertaken by a competent engineer from the manufacturers and a certificate for the inspection cannot be provided.\n\nEmpty oxygen and acetylene bottles should only be stored in the designated area.                                                                                The welding transformer grounding cable must be affixed to the work piece on which welding is to be carried out and not sometimes permanently bolted to the workshop deck.                                                                                    Regular inspection, thorough examination, and testing of all components to ensure that all the oxy/ acetylene equipment in use on board is in a safe operational condition. This should be undertaken at least annually by a competent engineer from the manufacturer of the equipment and should also include pressure testing of on-board piping systems. An appropriate certificate should be issued. Copper pipe or fittings shall not be used to connect acetylene hoses."}, {"app": "All Vessels", "ref": "RISQ 4.34", "q": "> Are Material Safety Data Sheets (MSDS) for all bunkers, chemicals, paint, corrosive, and toxic materials available, and are all crew familiar with their contents? \n> All stores on board where hazardous or toxic substances are kept, such as paint and chemical stores, have readily accessible MSDS ?", "sms": "H & S 9.2", "status": "YES", "remarks": "", "guidance": "Ensure that MSDS kept on board are latest version and not issued more than 5 years ago.\nThe validity of MSDS depends on local regulations. (Australia 5 years validity)."}, {"app": "All Vessels", "ref": "RISQ 5.8", "q": ">  Are save all trays around hydraulic machinary, hatch cover rams, remote-control stand, cranes, winches, windlass, piping & hoses - clean with plugs in good order and in use?", "sms": "EMM-I/5.1.4, EMM-I/3.9.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.13", "q": ">  Are the emergency bilge suction and emergency overboard discharge valves in the engine room clearly identified , locked with a proper warning against accidental opening. This includes cross over valves which can be used for discharge of bilges . ( Seals must be breakable and seal numbers must be recorded in the ER logbook/Log 07- ER bilge management book) \n>  Is the area around the bilge injection suction bellmouth clear of debris and clean?\n>  Are the valves in good order, free to operate and there are  maintenance records of checking, testing and overhaul available ?", "sms": "TMM 6.5\nEMM-I/3.4.1\nTMM Annex 1A & 6", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.17", "q": ">  Is the steering compartment oily bilge water discharge arrangement satisfactory?
