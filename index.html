lator for pipe duct in good condition"}, {"app": "All Vessels", "ref": "RISQ 6.7", "q": "> Is there any apparent structural defects to the vessel ?", "sms": "Tec32A-32S\nTMM 8.1 & 8.2", "status": "NO", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 6.8", "q": ">  Is the completed Form Tec 32E for hold and tank inspections along with photos available?\n> Are the access points to cargo holds, ballast tanks, and void spaces in good condition?\n> Are the vertical ladders, spiral ladders, rungs, stations, and platforms being in good condition?                                                                                                                                                                                        \n> Cargo hold vent closing devices are maintained in good order. \n> Ventilation ports and fan spaces (when fitted) are free of rust/paint flakes which can fall into the cargo.", "sms": "TEC 32E\nTMM 8.1 & 8.2", "status": "YES", "remarks": "Date of last inspection: 24 DEC 2025", "guidance": "Rightship Inspector will record a Finding if vertical ladders, spiral ladders, rungs, station, and platform are found damaged or corroded."}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.2A", "q": "> Has bunker line  been hydrostatically tested to MAWP, annually?\n> Has it been tested twice in last 5 years to 150% of MAWP?\n> Is the date of last test marked on the pipeline and there is RA and PTW available for this date.                                                                                                                                                                                    \n> Bunker valves tested at 6M", "sms": "TMM 4.8", "status": "YES", "remarks": "Date of last testing of bunker lines: 20.11.2025\n\nDate of last testing of valves: 20.11.2025", "guidance": ""}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.7A                    Guideline 1", "q": "For bunkering operations: \n> Check if checklist E11A is complete in all respects and fully complied with?\n> Pre bunkering meeting done and logged? \n> Has the bunkering plan been made?\n> Is the FO, DO and LO transfer / bunkering procedures clearly displayed?\n> Is the diagram for the fuel oil transfer piping displayed?  \n> Has High-level alarms setting of the FO tanks been tested and records available?\n> Is there Proper identification of the valves on the bunker lines?\n> Is the bunkering entered in the ORB Part I?                                                                                                                                                                                                                                                               > Procedure specifying locations of fuel sampling points and shore lab analysis to ascertain sulphur levels are in place                                                                                                                                                                                                                                                      > Bunker samples as required by MARPOL  18(6) retained for last 12 months ?                                                                                                                                                                                                                                              > Are fuel samples stored in location protected by a localized fire fighting system ?", "sms": "TMM 4.2", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.8A", "q": "> Dos the vessel have approvals from class/yard regarding  use of very-low or ultra-low sulphur fuels in the main engine, auxiliary engines and boilers? \n> Is the certificate or statement of compliance available for the use of low-sulphur fuel in boilers?", "sms": "EMM 9.0", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.9A", "q": "> Are ship specific work instructions for fuel oil changeover approved by VM available?Is the pipeline capacity mentioned in the WI.\n> Are the RA records for change over maintained?\n> Is latest edition of FOBAS calculator available and being used?Printout/soft copies maintained?\n> Are appropriate records maintained in LOG 04 and ER log book ?   \n> Are the IMO DCS TEC-49 form being updated every month and records maintained?", "sms": "EMM 9.0", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.10A", "q": "> Are the QC Valves of the fuel system being operational , regularly tested and in good order? \n> Is each QC valve identified with ID number/Name ?\n> Is control air bottle regularly drained and there is adequate pressure in the bottle?", "sms": "TMM 6.1.4, 6.3.2 & Annex 1A\nFM 22", "status": "YES", "remarks": "Date of Last Test: 12.11.2025", "guidance": ""}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.11A", "q": "> Are high pressure fuel delivery pipes of diesel engines protected with jacketed piping?\n> Is the leakoff alarm system being tested regularly and included in PMS?\n> Is the FO leak off alarms for ME and AE operational and record of checks maintained in PMS?", "sms": "TMM 3.5.4, 3.5.6 & Annex II", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.12A", "q": "> Are purifier rooms and fuel / lubricating oil handling areas well ventilated?\n> Is the purifier room free of oil leaks and clean? \n> Are all gauges operational at these locations? Gauges not gagged ?\n> Are all Oil seals for pumps topped up?", "sms": "TMM 3.5", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Engines Using Fuel Oil", "ref": "RISQ 7.13A", "q": "> Is the reserve fuel tank of the emergency generator filled up and has sufficient for at least 18 hours operation?  The level must be markedon the reserve tank. \n> is  anti freeze available for radiator when trading to cold regions?\n> Is the Quick closing valve in good order and tested \n> Has the Load test/black out test for emergency generator done at 3M interval? \n> Are both means of starting operational and PMS routines established for testing?\n> Are there records of testing the spare starting motor in PMS?", "sms": "TMM 6.3", "status": "YES", "remarks": "Date of last load test: 12.11.2025", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.2A", "q": "Documents : Is the following avalilable \n>  Cargo category as per IMSBC Code\n>  TML and MC certificate \n>  Declaration, if the cargo is not listed in IMSBC code.\n>  Declaration if cargo is dangerous \n>  Cargo SF or density\n> Information if cargo is HME \n( answer as applicable for cargo on board and check for previous cargoes) \n> Are records as  OPS Bulk 11 available for last Cat A cargo loaded?                                                                                   >Do the ship staff know how to determine the angle of repose using a ‘tilting box test’ as per procedure in Appendix 2 of the IMSBC Code ?", "sms": "BGCM 4.2", "status": "YES", "remarks": "", "guidance": "Rightship Inspector will record a finding if the cargo was damaged for reasons other than the hatch cover’s weathertight integrity."}, {"app": "Bulk Carriers", "ref": "RISQ 8.3A                    Guideline 1", "q": "Documents : Is the following avalilable \n>  Cargo category as per IMSBC Code\n>  TML and MC certificate \n>  Declaration, if the cargo is not listed in IMSBC code.\n>  Declaration if cargo is dangerous \n>  Cargo SF or density\n> Information if cargo is HME \n( answer as applicable for cargo on board and check for previous cargoes) \n> Are records as  OPS Bulk 11 available for last Cat A cargo loaded?                                                                                   >Do the ship staff know how to determine the angle of repose using a ‘tilting box test’ as per procedure in Appendix 2 of the IMSBC Code ?", "sms": "BGCM 4.2", "status": "YES", "remarks": "", "guidance": "Rightship Inspector will record a finding if the cargo was damaged for reasons other than the hatch cover’s weathertight integrity."}, {"app": "Bulk Carriers", "ref": "RISQ 8.5A", "q": "Is following available : \n> Approved damaged stability, Trim and Stability and Loading Manual \n> Class-approved loading computer or programme \n> Testing records of loadicator \n> Class attested lodicator accuracy test (from last annual survey) available\n> Worst stability condition for present voyage?", "sms": "BGCM 4.2", "status": "YES", "remarks": "", "guidance": "The Loadicator is required to be tested periodically (interval is every 6 months as per SMS) by ship staff for its accuracy. The test procedure includes choosing a text condition from the approved test conditions, entering the exact same data in the loadicator and comparing the results with the approved test conditions. \nThe important point to note is that the data needs to be manually entered and not opened from a pre-saved file."}, {"app": "Bulk Carriers", "ref": "RISQ 8.6A", "q": "Is following available : \n> Approved damaged stability, Trim and Stability and Loading Manual \n> Class-approved loading computer or programme \n> Testing records of loadicator \n> Class attested lodicator accuracy test (from last annual survey) available\n> Worst stability condition for present voyage?", "sms": "BGCM 4.2", "status": "YES", "remarks": "", "guidance": "The Loadicator is required to be tested periodically (interval is every 6 months as per SMS) by ship staff for its accuracy. The test procedure includes choosing a text condition from the approved test conditions, entering the exact same data in the loadicator and comparing the results with the approved test conditions. \nThe important point to note is that the data needs to be manually entered and not opened from a pre-saved file."}, {"app": "Bulk Carriers", "ref": "RISQ 8.8A", "q": "> Is WI BULK-104 for ballasting of Cargo Hold available \n> Are officers aware of the SMS guidelines given in BGCM 4.8 & WI D/Bulk 104?\n> Are senior officers aware precautions during ballast exchange of ballast hold ?\n> Consequences of ballasting/deballasting with vents not open?(Fatality report 12)\n> Consequencies of poorly maintained ballast tank manhole covers ?", "sms": "BGCM 4.8/D-Bulk-104", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.9A", "q": "Are following available : \n>  List of hold cleaning equipment available on board\n>  Hold cleaning guidelines, procedures, hold cleaning matrix for change of cargo and a hold cleaning inspection checklist ?\n>  OPS Bulk 15 form and photographic evidence ?                                                                                                                >  Are the end folding type hatch cover panels completely opened and secured during hold cleaning", "sms": "BGCM 4.9", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.13A", "q": "For cargo not listed in the IMSBC Code, \n> Is certificate from the shipper available endorsed by the competent authority of the port? \n> Does it state the characteristics of the cargo and the required conditions for carriage and handling? \n> Is it provided in the format as per IMSBC code ?\n> Has the required competent authorities(at port of unloading) and flag state been consulted via office?", "sms": "BGCM 4.2", "status": "NA", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.14A                    Guideline 1", "q": "For present cargo operations : \n> Is the operations plan prepared (OPS Bulk 10A).\n> Is a pre cargo operation meeting held with all crew and recorded ?\n> Visual and calculated draft being checked and discrepancies resolved ?\n> Are SF/BM checked and recorded at each stage ?\n> All details of cargo operations- holds being operated/ballast sequences etc recorded ?", "sms": "OPS Bulk 10A", "status": "YES", "remarks": "", "guidance": "RightShip recommends that the cargo loading/unloading plan should be completed by the responsible officer prior to arrival at port and the commencement of cargo operations and verified and approved by the Master.\nBLU code requires the loading discharging plan to be kept on board for 6 months post that loading/ discharging operation"}, {"app": "Bulk Carriers", "ref": "RISQ 8.15A", "q": "> Is port log maintained during loading and unloading? ( Entries as per BGCM Manual section 4.3 and 4.7)", "sms": "BGCM 4.3/4.7", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.16A", "q": "Cargo Care during voyage ( as applicable) \n> Are vetilaltion records maintained and all parameters etered ?\n> Are form OPS bulk form 14A and 14B being maintained?\n> Is the form OPS bulk form 13 being maintained?\n> Are records of bilge sounding and pumping operationa maintained ?\n> Is the form OPS Bulk form 12 being maintained?", "sms": "BGCM 5.0", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.17A", "q": "For Toxic cargoes : \n> Has PTW been used when entring cargo holds/adjacent compartments ?\n> Was a pre loading meeting done and recorded to convey the dangers to all crew \n> Are staff aware of Fatality Report 08(Overcome by toxic gases) ?\n> Is CL D/Bulk/03 followed when making entry in cargo hold during port operations ?\n> Are staff aware of poster QA 02?\n> Is QA 02 being discussed with stevedores and logged?", "sms": "BGCM 3.1 & 3.2", "status": "YES", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ.8.1C", "q": "Does the vessel have the latest edition of the following publications:\n1) Code of safe practice for ships carrying timber deck cargoes \n2) International Maritime Solid Bulk Cargoes Code (IMSBC Code)\n3) International Maritime Solid Bulk Cargoes Code (IMSBC Code) \n4) BLU Code (incl. BLU Manual), 2011 (For Dry Cargo Ships only)\n5) Lashing and Securing of Deck Cargoes including packaged timber, vehicles on Ro-Ro vessels and ISO Containers in Non-Purpose Built Ships\n6) SOLAS  \n7) MARPOL \n8) Load Lines Convention (1966)\n9)MARPOL Annex VI & NTC 2008\n10) STCW Code\n11) Cargo Stowage and Securing (CSS) Code \n12) IMDG Code and supplement", "sms": "General Circular 18", "status": "YES", "remarks": "", "guidance": "A list of on-board publication shall be incorporated in SMS. A Finding will be filed by inspector against ships not carrying publications in accordance with National requirements and the SMS."}, {"app": "General Cargo", "ref": "RISQ 8.4C", "q": "Has appropriate cargo information been provided to the vessel prior to loading? \nHas the shipper provided all the information as required by CSS code and Timber code \n\nFor Heavy Lift -Is the following information provided?\n1. A general description of the cargo.\n2. The gross mass of the item or each item if there is more than one.\n3. The principal dimension of the item or items and, if possible, scale drawing.\n4. The location of the centre of gravity of each item.\n5. Particulars of the bending area of the cargo units and details of any precautions with regard to the bending of the item(s).\n6. Details of lifting points or slinging positions and, information on how best to lift each item.\n7. Details of securing points, including their strength and radius of strength.        \n8. IMDG Cargo - Manifest, in accordance with the classification set out in the IMDG code, the dangerous goods on board and location.\n\nIs the procedure of safe lashing and securing is available in the Cargo Securing Manual and Bulk and General Cargo Manual?", "sms": "CSS code / Timber Code/ BGCM", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.5C                    Guideline 1", "q": "Is an approved ship-specific Cargo Securing Manual available and are officers thoroughly familiar with the contents of the manual?  \nIs cargo secured in accordance with CSM at designated securing points using cargo securing devices mentioned in the manual?\nDoes the vessel have sufficient spare lashing devices?  \n\nDose CSM include the following?\n1. Cargo Securing devices strength (MSL) and their use;  \n2. Tables and diagrams give a broad outline of the accelerations.\n3. Examples of forces acting on typical cargo units\n4. Examples of how to calculate the number and strength of portable securing devices\n5. Calculation method used converted in a form suiting the particular ship (Recommended)               \n6. CSAP- Cargo Safe Access plan (If applicable to the ship)                                           \n7. Inspections / Maintenace/ Repair records kept with CSM\n8. Procedure of accepting, maintaining, repairing or rejecting of the lashing devices must be available. (All equipment, lashings, hog wires, uprights and their foundations, deck fittings, cell guides, loose lashing equipment, twist locks, stackers etc.)                                     \n\nIs regular inspection and maintenance of lashing devices being carried out?   Must include - Routine Physical Inspection; Periodic reexamining and retesting as required by the administration.                                                                                                                                                          \n\nAre repairs to fixed lashing equipment repaired to the satisfaction of classification society as appropriate?  (Uprights, lashing points)", "sms": "BGCM 5.9/ 5.10 / 5.11 / 5.12", "status": "YES", "remarks": "", "guidance": "Each device used for securing cargo should be marked clearly with its SWL and a batch mark or number, where that mark can be verified by a test certificate. RightShip recommends that these test certificates be clearly labelled and kept in an easily accessible file. A method of correct identification and matching of individual certificates with the cargo-securing devices should be established on board. Cargo-securing devices without certificates must not be used on board."}, {"app": "General Cargo", "ref": "RISQ 8.8C", "q": "Is there evidence to show that samples of the timber cargoes are being weighed during loading and what is the actual weight compared to the weight stated by the shipper?", "sms": "Not in SMS - Timber code", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ.8.9C", "q": "If the vessel is a timber carrier, have up to date lashing plans for each stowage and securing arrangement been incorporated in the Cargo Securing Manual?  \n\nDoes the plan include: Maximum cargo weight for which the arrangement is designed; Maximum stowage height; required number and strength of blocking devices; Required pretension in lashing; Illustrations of all securing items; restrictions regarding maximum accelerations;  \n\nHas a lashing plan according to the ship’s Cargo Securing Manual been prepared?", "sms": "BGCM 5.10", "status": "N/A", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.11C", "q": "Is a Class-approved loading computer or programme in use and has its operational accuracy been regularly tested?  \nIs the loading computer accuracy check done every 6 months as per the inactive function checklist and annual check during class surveys carried out and endorsed by the Master or Surveyor? \nDuring the renewal survey, are all approved test conditions checked and endorsed by the attending surveyor?", "sms": "BGCM 4.2.14", "status": "YES", "remarks": "", "guidance": "The Loadicator is required to be tested periodically (interval is every 6 months as per SMS) by ship staff for its accuracy. The test procedure includes choosing a text condition from the approved test conditions, entering the exact same data in the loadicator and comparing the results with the approved test conditions. \nThe important point to note is that the data needs to be manually entered and not opened from a pre-saved file."}, {"app": "General Cargo", "ref": "RISQ 8.13C                    Guideline 1", "q": "Have pre-stowage and stowage plans been prepared and completed effectively?  (Stowage plan to be made taking into consideration- cargo specifications, securing arrangement, port rotation, SWL of cranes, weight distribution, cargo compatibility etc.) \nIs the stability conditions available complying with the criteria of GM and GZ (righting levers) \nfor the following stages:\n1. Departure condition?\n2. Arrival condition?\n3. Worst condiiton duirng the voage?\nIs ship stability condition updated and checked regularly take into account - variations in displacement, CoG, FSM, absorption of water in timber, Ice accretion, variation in consumables, Ballast water exchange etc. weight and CoG of deadweights on board with tank sounding checked regularly?\nIs the tank sounding checked and logged regularly?", "sms": "BGCM 4.2 / 4.3", "status": "YES", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ.8.14C", "q": "Is an approved ship-specific Cargo Securing Manual available and are officers thoroughly familiar with the contents of the manual?  \nIs cargo secured in accordance with CSM at designated securing points using cargo securing devices mentioned in the manual?\nDoes the vessel have sufficient spare lashing devices?  \n\nDose CSM include the following?\n1. Cargo Securing devices strength (MSL) and their use;  \n2. Tables and diagrams give a broad outline of the accelerations.\n3. Examples of forces acting on typical cargo units\n4. Examples of how to calculate the number and strength of portable securing devices\n5. Calculation method used converted in a form suiting the particular ship (Recommended)               \n6. CSAP- Cargo Safe Access plan (If applicable to the ship)                                           \n7. Inspections / Maintenace/ Repair records kept with CSM\n8. Procedure of accepting, maintaining, repairing or rejecting of the lashing devices must be available. (All equipment, lashings, hog wires, uprights and their foundations, deck fittings, cell guides, loose lashing equipment, twist locks, stackers etc.)                                     \n\nIs regular inspection and maintenance of lashing devices being carried out?   Must include - Routine Physical Inspection; Periodic reexamining and retesting as required by the administration.                                                                                                                                                          \n\nAre repairs to fixed lashing equipment repaired to the satisfaction of classification society as appropriate?  (Uprights, lashing points)  \n\nIs there evidence to show that the evaluation of forces acting on the cargo unit has been calculated, and correct cargo-securing devices are being used to secure the cargo to the ship? \nIs the MSL for securing devices available? \nIf SWL is substituted for MSL for securing purpose, is SWL >= MSL?", "sms": "CSM", "status": "YES", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.15C", "q": "Have personnel engaged in cargo securing operations been provided with relevant training and familiarisation? \nIs the crew aware of the timber deck cargo controlled jettisoning procedure? \nIs a remote jettisoning system provided? (recommended)", "sms": "", "status": "NA", "remarks": "", "guidance": "Bulk Carrier Course cert post Jan 2023 contains required text. All others can access the E learning CBT \"Cargo Securing Operations training\" on LMS."}, {"app": "General Cargo", "ref": "RISQ 8.17C", "q": "If the vessel is carrying timber, are instructions for ballast water exchange operations for the intended voyage available in the Ballast Water Management Plan? \nAre all tanks required to be ballasted as per stability calculation, and filled prior to loading on deck?\nAre the ballast tanks full or empty to eliminate FSM?", "sms": "BGCM 4.2/ 5.10", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.19C", "q": "If the vessel is a non-cellular ship, have the containers been stowed correctly on deck? \nIs Merchant Shipping Notice M.1167: Carriage of Containers and Flats in Ships Not Designed or Modified for the Purpose available and followed?", "sms": "", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ.8.20C", "q": "Is the vessel following procedure for monitoring the temperature of refrigerated containers and records maintained as per CNM Chapter 5.1 in form OPS07? \nIf refrigerated containers are carried, are sufficient spare parts available as per guidelines in CNM chapter 5.1.12? \nDoes the vessel have a sufficient electric power supply permanently installed from the engine room? \nAre the electric sockets for reefers in good condition?", "sms": "CNM 5.1/ OPS 07", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.23C", "q": "Are pre-loading/acceptance procedures for the carriage of vehicles on board a ro-ro cargo ship incorporated in the SMS?", "sms": "ROCM  4.2", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.25C", "q": "Is the ro-ro cargo ship drainage system in good order, tested regularly and are effective measures in place to prevent blocking of drains? \nAre the drains covered with grating with an open area ratio of 6:1 and the opening size not greater than 25mm? Confirm grating / screen is not mechanically fitter?  \nIs the drainage area marked with a marking at a height not less than 1500mm with a letter size not less than 50mm stating \"Drain Opening - Do not cover or obstruct\"? \nAre procedures in place to carry out the function and tightness testing of the bow, inner, side shell, stern doors and main to lower deck cargo elevators of ro-ro cargo ships and is there evidence of regular testing? \nIs the structural condition of the doors in good condition? Are they regularly inspected and records for inspection maintained?", "sms": "Under PMS", "status": "N/A", "remarks": "", "guidance": "Rightship recommends that recorded inspections of the door supporting and securing devices be carried out by the ship’s staff at monthly intervals or following incidents that could result in damage, including heavy weather or contact in the region of side shell and stern doors. Any damage recorded during such inspections is to be reported to the Classification Society.\nMaintenance, function, and tightness tests of the doors shall be incorporated in the PMS system as per manufacturer’s recommendation."}, {"app": "General Cargo", "ref": "RISQ 8.26C", "q": "Is the ro-ro cargo ship provided with an approved Operating and Maintenance Manual (OMM)?", "sms": "ROCM", "status": "N/A", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.28C", "q": "Is an operation manual for the ventilation system in a ro-ro cargo provided and do records on board verify that the air quality is tested?", "sms": "ROCM", "status": "N/A", "remarks": "", "guidance": "Maintenance of the ventilation system shall be incorporated in the PMS system as per manufacturer’s recommendation."}, {"app": "General Cargo", "ref": "RISQ 8.29C", "q": "Is the ro-ro ship fitted with an automatic system to control air quality in the cargo holds and are records of inspection, testing, calibration, and maintenance of the system is maintained?", "sms": "ROCM", "status": "N/A", "remarks": "", "guidance": "Annual testing of the vehicle space ventilation system should be conducted by the ship’s safety delegate. \nThird-party testing of the vehicle space ventilation system should be undertaken before entry into service of a new ship and at periodical intervals of five years thereafter."}, {"app": "General Cargo", "ref": "RISQ 8.33C", "q": "Are necessary instruments (with spares) to determine the dew points provided, maintained in good condition and are there records of calibration of such instruments? \nAre the Master and/or Chief Officer familiar with the rules for deciding when to ventilate the cargo hold during the voyage? \nIs ventilation of cargo holds being carried out and recorded?", "sms": "BGCM 4.2", "status": "YES", "remarks": "", "guidance": "Calibration records for the dehumidifier system and the humidity meter."}, {"app": "General Cargo", "ref": "RISQ 8.36C", "q": "Are the hold bilges cleaned prior to loading and are cleaning and checks being recorded?", "sms": "BGCM 4.9", "status": "YES", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.38C", "q": "Is an adequate record of all cargo operation activities maintained during loading and unloading?", "sms": "BGCM 4.3.25", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.1A", "q": "> Are cargo holds fittings free of corrosion, damage and well maintained.(Pay special attention to ladders/guards/platforms/bilge and manhole covers) \n> Are undersides of hatch cover well maintained and free of corrosion  ( No loose rust/flaking paint/remnants of previous cargo)\n> Is masters remarks in section 3 of the Bulk/OPS/15 completed.", "sms": "BGCM 4.9 & 6.1", "status": "YES", "remarks": "", "guidance": "RightShip requires the underside and internal structure of hatch panel should be free of loose rust scale, paint flakes or blistering of paint coatings."}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.3A", "q": "> Does the vessel have ultrasonic testing equipment for inspection of hatch cover water tightness .\n> Is equipment tested, working and calibrated as per makers manual.\n> Is the ship staff aware how to use the equipment\n> Are following records available, \n   a) Hatch Cover Test reports with photographs.\n   b) Records with a plan or drawing indicating readings obtained at different locations\n   c) Records of tests done by external agency or surveyors (as applicable)  \n   d) Is the hatch cover weather tightness( including booby hatches/hatch vents) checked using hose test/UV test/Chalk test prior very loading as per SMS and record maintained", "sms": "BGCM 6.1.3", "status": "YES", "remarks": "Date of last hatch cover watertightness test: 09 Jan 2026", "guidance": "RightShip recommends that the weather tightness of hatch covers should be checked at least once every 3 months."}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.9A", "q": "Side and cross-joint rubber seals: Check Following  \n> Are the seals in good condition? \n> Is the retainer channel free of corrosion and wear down/ damage \n> Are Inspection and maintenance records avaialble", "sms": "BGCM 6.1", "status": "YES", "remarks": "", "guidance": "Check permanent compression of rubber packing is within acceptable limit as per manual."}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.10A", "q": "> Are hatch cover panels aligned and record of inspection is available\n( Records must include ((as applicable)) Measurement of gaps between hatch covers, inspection of hatch resting pads, permanent deflection of rubber seals or checks of alignment marks where provided)", "sms": "BGCM 6.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.15A", "q": "> Is the oil tank of the hydraulic system kept filled to the operating level and with hydraulic oil recommended by the manufacturer ?\n> Is the hydraulic system provided with bleed points from which samples can be taken ?\n> Is the hydraulic oil changed every five years or after there have been significant repairs, such as piping or cylinder replacement. \n> HAve the hydraulic oil filters changed every twelve months or as per manufacturer recommendation ?\n> In addition to the Elemental and Contaminant tests, is the hydraulic oil of the hatch cover system subjected to a Particle Count test ?", "sms": "BGCM 6.1/TMM 4.11", "status": "YES", "remarks": "", "guidance": "Hydraulic oil should be changed every five years or after there have been significant repairs, such as piping or cylinder replacement. Hydraulic oil filters should be changed every twelve months or as per manufacturer recommendation."}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.16A", "q": "Emergency means of opening hatch covers: Check Following   \n> Are crew familiar with the arrangements and training carried out ? ( Refer D/Bulk/102)\n> Is the maintenance of equipment included in PMS. \n> Is the emergency hatch cover operation tested at different hatch cover location and records maintained in PMS.", "sms": "BGCM 6.1", "status": "YES", "remarks": "", "guidance": "The manufacturers’ instructions for the maintenance and test of the emergency portable pump unit shall be incorporated in the PMS. All Chain blocks in use must have the safety latch on the hook."}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.17A", "q": "Lifting Equipment : Check following \n> Are annual thorough examination and load test records available and also entered in PMS \n> Are all equipment marked with SWL markings", "sms": "H & S 8.5", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Vessels with cargo cranes", "ref": "RISQ 9.18A", "q": "Cranes Wire: Check following \n> Are wires in good order and certificate of each wire rope available \n> Are there records inspection and maintenance of wire?\n> Are there records of date put in service \n> Is there a record of spare wires on board", "sms": "TMM 7.3", "status": "YES", "remarks": "", "guidance": "There should be an appropriate test certificate for all wire ropes on board; that is for all of those in use and for all spare wire ropes. The certificates should give the date of manufacture, the material strength, the construction of the wire and the breaking load test of a sample. There should be an inventory of all wire ropes on board and records of the dates of renewal of the wires in use on all cranes. Inspection should be included under the PMS system."}, {"app": "Vessels with cargo cranes", "ref": "RISQ 9.19A", "q": "Cranes - Check following is in good order, free of rust or wastage   \n> Main structures\n> Foundation structures\n> Crane Acesss Platform\n> Safety Hoops and rings on vertical ladder \n> Holding down bolts and slewing ring \n> Has a rocking test or Particle test of grease been done \n> Crane cabin and its attachment to main crane structure \n> Structural areas in crane cabin hidden by rubber mats etc", "sms": "TMM 7.2/BGCM 6.3", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Vessels with cargo cranes", "ref": "RISQ 9.20A", "q": "Crane Cabins: \n>  Are all controls in the operator’s cab, driver's chair inspected, tested, and maintained\n>  Is there adequate light and ventillation \n>  Is the wiper if fitted working\n>  Is the glass intact and clear \n>  Are the Instructions for operation posted in crane cabin.\n>  Has crane inspection been carried out as per D Bulk 08 and records maintained\n> Is the bypass key is in custory of responsible officer \n> Are the records of crane familarization : D/Bulk/09 available \n> Does crane PMS include electrical control equipment, motors, hydraulic oil pumps, filters, coolers, winch brakes, limit switches, cut-out switches ?                                                                                                                                                                                                                                                                   > Is inspection of crane cabinet  structural integrity included in PMS ?                                                                                                                                   > Is the crane safety devices regularly tested.", "sms": "TMM 7.2/BGCM 6.3", "status": "YES", "remarks": "", "guidance": "The inspection of the crane cabinet’s structural integrity should be included in the PMS."}, {"app": "All Vessels", "ref": "RISQ 9.22A", "q": "Loose Gear: Check Following \n> Are the loose gears of lifting appliances marked with SWL, Batch Mark or certificate number \n> Are the certificates of the loose lifting gears available on board? \n> Are records of inspection available", "sms": "H & S 8.5", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 10.1                    Guideline 1", "q": "> Is ship specific LMP/MSMP plans available and updated with ship specific information?\n> Are the records for upkeeping/inspection of mooring lines updated", "sms": "NMM 14.4/LMP", "status": "YES", "remarks": "", "guidance": "Approved Ship specific LMP and MSMP plans to be provided to the vessels"}, {"app": "All Vessels", "ref": "RISQ 10.2", "q": "> Is the safety campaigns from the company on mooring available. (You can requst company to send if not available)", "sms": "QA Message", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 10.3", "q": "> Are certificates for all mooring lines and mooring tails including spares available on board?  \n> Are in use dates of each line and mooring tail recorded in MSMP Form 04. \n> Is each mooring line and mooring tail tagged with its certificate number", "sms": "NMM 14.4/LMP", "status": "YES", "remarks": "", "guidance": "Mooring line certificates issued should have data pertaining to linear line density, line design breaking force, rope tenacity etc. Check guidance note in RISQ"}, {"app": "All Vessels", "ref": "RISQ 10.4", "q": "> Is the vessel equipped with HMPE mooring lines but without mooring tails fitted ?\n> Is the Line Design Break Force (LDBF) of mooring lines fitted on board shall be 100-105% of the ship design MBL ?\n> Is the TDBF of tails kept 125% - 130% of the ship’s design MBL ?\n> Is the standard overall length for mooring tails 11 metres(for exposed mooring a 22-metre tail) ?\n> Have the mooring tails retired when their residual strength reached 75% of the ship design MBL.", "sms": "NMM 14.4/LMP", "status": "YES", "remarks": "SDMBL: 42 t\nMBL Mooring lines: 57.5 t\nMBL Mooring tail: \nNumber of spare mooring lines: 3\nNumber of spare mooring tails: NA", "guidance": "Rightship Inspection will record a Finding, if the Line Design Break Force (LDBF) of the mooring lines fitted to the vessel exceeds the limit specified in this guideline & will also Record a N/C if the vessel was equipped with HMPE mooring lines but without mooring tails fitted."}, {"app": "All Vessels", "ref": "RISQ 10.5                    Guideline 1", "q": "Brake testing arrangements : \n> Is a Brake test kit available, it is operational with all parts available.  \n> Has the brake test been done within the last year and record maintained. Is the date of testing marked on winch drum. \n> Is the brake set to 60% of the SDMBL    \n> Is brake rendering position marked-cable ties/jubilee clips etc not used\n> Is direction of heave/pay out marked on drums \n> Is the brake support set correctly and in good condition.  (Clearance 2-3 mm only)", "sms": "NMM 14.5/Training material 180", "status": "YES", "remarks": "Date of last brake test: 10 Jan 2026", "guidance": "Rightship recommends the vessel’s manager to set the brake at 60% of the Ship Design MBL as per OCIMF guidelines in section 6.4.6 of the MEG 4. RightShip recommends that tests are conducted at least annually."}, {"app": "All Vessels", "ref": "RISQ 10.10", "q": "Mooring Tails \n> Are the eyes of the mooring tails protected with canavas. Is the tail connected properly with the main rope (Metal connecting links must not be used)", "sms": "NMM 14.4", "status": "NA", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 10.16", "q": "Mooring Fittings : Check following \n> Are all pedestal fairleads and roller fairleads free of grooving, greased and free to move \n> Are the covers for fairleads/rollers in good condition and  not wasted  \n> Is the SWL marked in marked with bead welding in Ts or KN in contrasting color\n> Have the rollers have been inspected as per PMS (Removed from stand/Inspect the welding around pin etc)", "sms": "NMM 14.4/14.5", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 10.18", "q": "Windlass : Check Following \n> Is the Maintenance of windlass motor,greasing schedule and inspection included in PMS\n> Does anchor make 3 point contact when stowed\n> Is the chain stopper and its locking pin in good condition, sitting properly and locked\n> Is anchor lashing and bottle screw in good condition and certificates are available. (Renewed within last 2 years)\n> Is last DD anchor cable thickness measurement report available.\n> Is brake lining checked for wear(To be renewed if wear down > limits in manual) \n> Are spare brake lining for mooring winch/windlass with screw available.", "sms": "TMM 7.1", "status": "YES", "remarks": "Date of last change of anchor lashing: 14 OCT 2025", "guidance": "PMS to include monitoring of wear down of guillotine bar, hinge and securing pin."}, {"app": "All Vessels", "ref": "RISQ 10.22", "q": "Emergency Towing Arrangement : Check following  \n> Is the ship specific ETA booklet available \n> Are the copies of ETA booklet available in forecastle store/ships office/bridge.", "sms": "NMM 11.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 10.23                    Guideline 1", "q": "> If the vessel has a DWT > 120,000 or more, does it meet the towing criteria of the Pilbara Ports Authority (PPA) and Rio Tinto?\n> Is the requirement for Capsize with DWT> 120,000 or more calling the Port Hedland have a set of 120 T SWL bitts and\nlead\n> Is the PPA Towing Arrangement, associated foundation and supporting structure subjected to periodic survey(at least once every 5 years)\n> Is the PPA Towing Arrangement permanently marked with their SWL and appropriate serial number so that certificates can be easily cross referenced >\n> Does the ship hold a class issued certificate attesting to the strength of the PPA Towing Arrangement foundations and associated ship supporting structure substantiated by detailed engineering analysis or calculation. \n> Ships of 120K and higher provided with five pull and push locations on each side ?\n> Can the towing arrangement accommodate a 180 degrees range of towline angles in the horizontal plane and a 0-90 degrees downward range in the vertical plane outward of the fairlead?\n> Does the provision for tug handling consist of properly placed closed fairleads and associated bits for guiding and attaching the towing lines >\n> Are means of hauling the tug’s towing lines aboard with a ship’s heaving line/messenger provided.(pedestal fairleads, guideposts or bitts) ?", "sms": "Recomm", "status": "NA", "remarks": "", "guidance": "Emergency towing booklet, aft mooring deck plan must be updated to reflect the fitting of the 120T bollard and fairlead lay-out (RTM Pilbara Port requirement)\nPilbara Ports Authority (PPA) requires all vessels deadweight 120,000 or more to have at least one set of bitts and Panama lead / roller fairlead on the vessel’s aft deck at or near the centreline to be rated to a minimum of 120 T safe working load (SWL).\nRightship recommends that the PPA Towing Arrangement, associated foundation and supporting structure should be subject to periodic survey, at least once every 5 years, and maintained in good order.\nRightShip recommends that ships of 120K and higher should be provided with five pull and push locations on each side."}, {"app": "All Vessels", "ref": "RISQ 11.3", "q": "> Is EPIRB installed correctly?\n> Is it marked with ID/MMSI and call sign \n> Are the records available for the annual testing? \n> Is the HRU within expiry date\n> Is the HRU marked 'to be used for EPIRB only'?\n> Is monthly checks done and record maintained.", "sms": "NMM 6.5", "status": "YES", "remarks": "Date of expiry of HRU: JAN 2028\nDate of expiry of EPIRB battery: APR 2037", "guidance": "Check that the EPIRB ID and other information (include call sign and MMSI of the ship) is clearly marked on the outside of the equipment."}, {"app": "All Vessels", "ref": "RISQ 11.4", "q": "> Are ALRS current and uypdated \n> If electronic publication are used are they endorsed on SEQ certificate. \n> Are all ITU publications current and up to date.", "sms": "NMM 6.5", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 12.1", "q": "Ships Access points : \n> Is the  access point manned.\n> Is a security notice as per SSP posted \n> Is Visitor ID checked\n> Is the Gangway log being maintained\n> Is the gangway watch briefing visitors about the safety and emergency signals\n> Is the gangway watch briefing visitors about any special precautions with respect to cargo / designated smoking areas/covid precautions.\n> Are sanitizer/temperature gun/PPE and Copy of tide table avaiulable.\n> Is a record of stevedores boarding and disembarking from the vessel maintained .", "sms": "SSP", "status": "YES", "remarks": "", "guidance": "The deck watch has a responsibility to make all visitors aware of any specific hazards of the cargo or operations onboard the vessel and point out instructions to visitors what to do in the event of an emergency."}, {"app": "All Vessels", "ref": "RISQ 12.2", "q": "> Does SSO have SSO training certificate\n> All crew have certificate for security awareness training\n> Has a security drill been held within 7 days of more than 25% crew change.\n> Is the security log updated.\n> Are all the restricted area marked as per SSP\n> Are all the restricted area secured with breakable seals-locks\n( Doors to compartment containing emergency equipment such as EHQ/SOPEP locker/Emergency generator/Emg fire pump should not be secured with lock unless key is available in a breakable box outside. Use breakable seals instead.)                                                                                                                                                                                                                                                                                    \n> All accomodation/ER doors are secured in such a way that they can be opened from outside for rescue/firefighting and inside for eacape.", "sms": "SSP", "status": "YES", "remarks": "Date of last Security drill: 28 JAN 2026", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 12.3", "q": "> Are deck officers familiar with function and use of SSAS\n> Are records of 3 M test /(Button test) with office and annual test with flag state available.", "sms": "SSP", "status": "YES", "remarks": "Date of last SSAS test : 23 NOV 2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 12.4", "q": "> Are latest version of security charts available on board? \n> Is Anti piracy plan( APP) updated to latest amendments.", "sms": "SSP", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 12.7                    Guideline 1", "q": "> Is Master and cyber security officer familiar with content of PAM 22.1\n> Is Vessel IT / OT Asset Vulnerability and Protection Assessment using Tec 53 done and record maintained. Reviewed every 6 M.\n> Has RA DKM 48 been made ship specific.\n> Has a Cyber security officer been appointed and is he familiar with job responsibility as per PAM.\n> Is a Cyber security drills conducted at 3 M interval and records maintained.\n> Are 24 hour contact details of global call centre team must be  available at ships telephone (Emerg CL D/26)", "sms": "PAM 22.1", "status": "YES", "remarks": "Date of Last Cyber security drill: 23 DEC 2025", "guidance": "Cyber security Certificate added to TEC-04B Trading Certificate file"}, {"app": "All Vessels", "ref": "RISQ 12.8", "q": "> Are all USB ports blocked ( Signed paper stickers as USB port lock are not acceptable) \n> Is vessel provided with a dedicated computer and printer(Not connected to ships Lan system) for use by shore personnel and which is provided with updated antivirus.\n> Are all computers  updated with latest antivirus.\n> Is there a dedicated USB available for transferring data from communication computer to ECDIS.\n\nAre all staff and Master familiar with,\na) Company policy for use of personnel laptop/mobile for ships business.\nb) Cyber security guidelines\nc) SMS guidelines for opening attachement from unknown sources sent on email. \n> Is a Cyber security poster displayed at each computer.", "sms": "PAM 22.1", "status": "YES", "remarks": "", "guidance": "Critical equipment such as ECDIS should be protected from malware and virus attack. Access to USB and RJ-45 ports shall be controlled – i.e., disable or lock the ports."}, {"app": "All Vessels", "ref": "RISQ 13.1                    Guideline 1", "q": "Is following available in E/Rm: \n> ER watch arrangement posted (Tec 33A)\n> Port/sea/arrival-departure procedures  \n> UMS procedures when classed for UMS operations\n> Response to various emergencies in engine room \n> PMS, Spare parts and stores inventory \n> SMS guidelines on reporting damage to equipment or machinery                                                                                                                                                                                                                         > Crew job familiarization and handover   checklists.                                                                                                                                                                                                                                > Minimum critical and essential spares.                                                                                                                                                                                                                        > Reporting of accidents and near misses                                                                                                                                                                                                                                   > Defect reporting procedure                                                                                                                                                                                                                        > Procedure for preventing/controlling pollution                                                                                                                                                                                                                               > Bunkering procedures                                                                                                                                                                                                                 > Engine room work instructions and checklists                                                                                                                                                                                                                               > Permit to work systems                                                                                                                                                                                                                       > Critical equipment and their isolation /maintenance                                                                                                                                                                                                                  >Training needs and records", "sms": "TMM 3.0", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.2", "q": "> Have manning levels been increased when required(planned or unplanned).                                                                          > Have planned changes identified for every passage for acttivities such as - arrival departure, cargo operations, bunkering, fuel changeovers, machinery overhauls, docking, navigational hazards, and unplanned changes such as machinery faults, adverse weather, blackout, fire, flooding\n>Are the responsibilites of watch standing engineers and engine ratings well-define and clearly posted in the Engine Control Room? Is there a manning matrix for engineers that takes into account both planned and unplanned changes? (V)", "sms": "TMM 3.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.3", "q": "> Has the Chief Engineer prepared specific standing orders, night and day orders, and have these orders been read, understood, and signed by the watch standing engineers, engine crew, and electrical engineer, where applicable? \n> Is a reference copy of the order readily available in the ECR.", "sms": "PAM 9.7.5 TMM 3.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.4", "q": "> If the vessel is certified for UMS in manning certificate then is she being operated in UMS except for operational reasons such as transit through high piracy area / manoeuvering / hold cleaning \n> Before changing over to unattended operation, has the EOOW completed a round of the machinery spaces?", "sms": "TMM 3.1/ 3.3", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.6", "q": "Are following available when ER is being operated in UMS mode:  \n> Entry requirements to the engine room posted at ER entrance and on bridge\n> ER entry procedures for specific purpose eg duty engineer entering ER alone for attending alarm in UMS period understood( communication with duty officer prior entering during stay and on leaving ER,use of deadman alarm)?\n> Are all the restricted area other safety notices in place at entrance?", "sms": "TMM 3.3", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.7", "q": "When a deadman alarm is fitted : \n> Is it in good working order and records of testing available.Is the alarm setting less than 30 minutes.                                                              > Does the EOOW report to bridge when entering or leaving an unattended machinery space and has he used the deadman alarm system.                                                                                                                                                                                                                                                                              > Where no deadman alarm is fitted, has he contacted bridge every 15 minutes.", "sms": "TMM 3.3", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.8", "q": "Engineer’s call system\n> Is the system operational\n> Have the alarms been tested and records available for manual testing.", "sms": "TMM 3.3", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.9                    Guideline 1", "q": "> Has manual logging of alarms being done in the absence of an engine room alarm logging printer?\n> Are historical records for the last 12 months available?\n> Are the following recorded correctly in the engine logbook:\n-Readings of main propulsion engine\n-Readings of auxiliary engines\n-Readings of other running machineries\n-Main engine RPM and load on the engine\n-Daily entry for all the lube oil ROB\n-Daily entry for all grade of fuel oil ROB\n-ROB value of sludge and bilge\n-Running hour counter for important machinery\n-Record of any major breakdown and reason for the same\n-Record of all bunkering operation (time, place, and quantity)\n-Record of soot blow for the boiler tube (Soot blowing should be performed when the vessel is at sea and/or outside the port limit)\n-Record the start and stop times of UMS mode\n\n> Has the EOW signed the logbook after completion of watch and the Chief Engineer on a daily basis ?\n> Have errors made in the log struck through with a single line and initialled and dated ?\n> Is any correction fluid used for correction of error made in the logbook ?\n> Have the alarm printers and automation system set to the correct time and date?", "sms": "TMM 3.2", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.10                    Guideline 2", "q": "> Are the the ships staff aware of preferential trips and machinary included in same. \n> Are there records of testing preferential trips.\nIs a deadship recovery procedure avilable and posted in ECR. Are the following included in the procedure:  \n>  Restoring power from the emergency to the main switchboard\n>  Charging of air reservoirs \n>  Starting auxiliary engines and other associated machinery\n>  Restarting the main engine", "sms": "TMM 6.0", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.11                    Guideline 2", "q": "PMS Procedures: Check following  \n> Can officers demonstrate familiarity with the system ?\n> Are the job descriptions for machineries correct    \n> Is the system fully operational?\n> Are all critical machinery and spare parts identified?\n> Is spare part inventory entered and updated in PMS? Does it show minimum required and actual on board qty.\n> For new delivery/takeovers, is there a paper PMS in place \n> Is a regular back up taken where required?      \n> Are all jobs completed and postponement approved by office available for overdue jobs. \n> For postponed items, is their communication available from manufacturer that maintenance can be postponed beyond the overhaul hours.                      \n\nShip specifc PMS: Are following included in PMS \n> All cargo deck machinery\n> Mooring machinary \n> All Navigational equipments \n> All LSA and FFA equipment \n> All Machineries in ER specially retrofitted machinery such as scrubber/BWTS etc", "sms": "TMM 5.2", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.12", "q": "Critical Equipment : Check following \n> Is a ship specific list of critical spares available, approved by vessel manager and are officers aware of same.Check the list is updated to latest version of TMM\n> Are there requisitions available for missing items . Are records of office permission when critical machinery is taken out of service available.                                                                                                                                                                                                                                                           > Have critical spares for ECDIS been identified,available onboard and included in vessel's PMS ?", "sms": "TMM 5.3/TMM Annex 3", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.13                    Guideline 1", "q": "ME - Major sub parts: Is maintainence of following equipment completed and not overdue:  \n>  Fuel valve\n>  Fuel pump\n>  Exhaust valve\n>  Cylinder cover\n<  Pistons\n>  Liner\n>  Cross head bearings\n>  Bottom end bearings\n>  Main bearing\n>  Turbo charger\n>  Governor of the main engine units .  \n>  ME alarms", "sms": "TMM 10.0", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.14                    Guideline 1", "q": "AE : Major sub parts:  Is maintainence of following equipment completed and not overdue\n>  Fuel valve\n>  Fuel pump\n>  Cylinder Cover\n>  Pistons\n>  Liner\n>  Cross head bearing\n>  Bottom end bearing\n>  Main bearing\n>  Turbo blower\n>  Governor of the Aux engine units\n> Automatic change over and protection devices such as reverse power trip/overload\n > AE Alarms", "sms": "TMM 11.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.33                    Guideline 1", "q": "> Is the following machinery/equipment, where applicable, in good order and well maintained? \n- Shaft generator and emergency generator\n- Boilers, including waste heat and domestic boilers (Boilers should be operated in automatic mode where the automated boilers are installed)\n- Boiler safety system and instrumentation\n- Boiler water safety system\n- Main and emergency air compressors\n- Purifiers and fuel oil handling equipment\n- Stern tube sealing arrangements\n- Incinerator\n- Sewage system\n- Air condition and heating system\n- Refrigeration plant\n- Accommodation service systems (i.e., Calorifiers, Portable water equipment, heating etc)\n- Any other items of machinery, including stand-by machinery.\n- Burners, tubes, uptakes, exhaust manifolds and spark arrestors.\n- Engine control console including the control and monitoring system\n- Steering gear system\n> Is soot-blowing done frequently\n> Are exhaust gas inlet and outlet temperature and pressure differential between gas inlet and outlet of the economizer checked at least once every watch. \n> If economizers have bypass arrangements for when the ship is maneuvering or to control steam output is the bypass tested on a regular basis.\n> If the refrigeration and air conditioning use refrigerants that are classified as ozone depleting substances (ODS) is a  ODS record book maintained\n> Incinerator operation ;\n- No waste oil or sludge incinerated when in ports, harbours or estuaries;\n- Sludge from Exhaust Gas Cleaning System(EGCS) not incinerated.\n- Plastics and PVC should incinerated in IMO-approved incinerators.\n> Is there observation window for the air receiver drainage pot ?", "sms": "General ER procedures", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.35", "q": "Main engine - Local manoeuvring control position; Check Following :  \n> Are the procedures for local manoeuvering  posted and readable? \n> Is testing of the system included in PMS and records available \n> Are all engineers familiar with the operations", "sms": "TMM 10.1.3", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.36", "q": "> Are crew familiar with the starting procedure for the emergency generator and how to put power on the emergency switch board? \n> Has the emergency source of electrical power, including its automatic starting arrangement, tested using a test switch provided in the Emergency Switch Board (ESB)?\n> Is staff familiar with the process of sequential test start and loading of the ESB.\n> Are emergency generating set equipped with starting devices with a stored energy capability of at least three consecutive starts. \n> Is a second source of energy provided for an additional three starts within 30 minutes unless manual starting can be demonstrated to be effective ?\n> Have brief instructions posted which are simple, clear, and understandable by all crew ?", "sms": "TMM 6.3/TMM 12.3", "status": "YES", "remarks": "Date emergency generator was taken on load:12.11.2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.38", "q": "If emergency batteries are provided :  \n> Are these in in good working order and kept fully charged \n> Are there records available for regular testing and checking?", "sms": "TMM 6.3, TMM12.3", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 13.40", "q": "Emergency steering gear: Check Following : \n>  Have the drills been conducted every three months and drill records available? \n>  All crew familiar with emergency steering arrangements ?\n>  Is the working of automatic isolation system tested and recorded?\n>  Have all alarms tested during the steering drill and recorded? \n> Are records available for testing of emergency steering on emergency power ?\n>  Is the emergency reserve tank fully charged to recharge at least one power actuating system , is the level marked on tank correctly \n>  Is the Gyro repeater heading synchronised with bridge\n>  Is the communication system(Both auto and sound powered telephone) working in good order.\n>  Are the Mic and headphone operational.\n>  Is the rudder angle indicator polished and clearly marked                                                                                                                            > Manual transfer pump for steering gear system oil operational ?", "sms": "TMM 11.7", "status": "YES", "remarks": "Date of last steering gear drill: 07 FEB 2026", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 15.1", "q": "> Do the Seafarer Employment Agreements (SEA) comply with the requirements of MLC 2006 and do the crew salaries meet or exceed the current ILO Minimum Wage Scale? \n> Are valid CBA kept onboard \n> Are original copies of the SEA provided to all mariners ?\n> Have seafarers been releived on time or in case of illness/injury but withing 12 months period ?", "sms": "PAM 11.2,PAM11.3", "status": "YES", "remarks": "", "guidance": "The Rightship inspector will record in the comment the duration of the seafarers’ employment agreement for the key personnel (Master, Chief Officers, Chief Engineer, and Second Engineers), other Officers, and crew on board."}, {"app": "All Vessels", "ref": "RISQ 15.8", "q": "> Are Monthly statement of wages given to individual crew member\n> Is rate of exchange available to crew for the allotment.", "sms": "TOE 6.9/PAM 12.2", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 15.9", "q": "> Is there a complaints procedure on board and displayed", "sms": "PAM 11.9,TOE", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 15.10", "q": "> Are senior officers familiar with the following, \na) GB 01 Suicide prevention guidelines", "sms": "GB 06 H & S 7.1.9", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 15.11", "q": "Are contact details of help line whom the crew can contact for mental health problem posted?ARP-Anglo Eastern Reach program", "sms": "FPD/019AS/21", "status": "YES", "remarks": "", "guidance": "Kindly display the 3Cube posters in public places (Crew/Officer Mess Rooms etc) – 24x7 guidance available for medical cases/emergencies, including handling of a death on board"}, {"app": "All Vessels", "ref": "RISQ 15.14", "q": "> Is the air handling unit (AHU) able to maintain comfortable temperature ?                                                                                                     > Are there records of regular maintenance and cleaning (maximum 3-months) ?", "sms": "TMM 11.9", "status": "YES", "remarks": "", "guidance": "A/C condition intake filters to be replaced if observed in dirty condition."}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.1", "q": "> Is the ship-specific Polar Water Operation manual or an Ice Operation manual available?\n> Is it approved by flag/class .", "sms": "NMM 9.5", "status": "NA", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.3", "q": "> Have master and other deck officers completed basic/advanced training for polar waters as applicable.\n> Has crew been trained on board for polar water operation manual\n> Does crew has experince in polar water operation.", "sms": "NMM 8.8.3", "status": "NA", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.4", "q": "> Has SOPEP been revised, taking into account operation in polar waters", "sms": "IOPP", "status": "NA", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.15", "q": "> Is the vessel in compliance of the following to ensure readiness of FFA in sub freezing temperatures,  \na) Snow and ice accumulation being cleared off from the equipment\nb) Draining of fire line \nc) Fire dampers/isolation valves etc suitabely greased and checked daily\nd) Heaters for emergency fire pump space if required", "sms": "CL D 13", "status": "NA", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.19", "q": "PAM Annex 1 Drill panner ,Annex -II -Group 7H", "sms": "", "status": "NA", "remarks": "", "guidance": ""}]}, "MCCOMP": {"items": [{"app": "All Vessels", "ref": "RISQ 2.9", "q": "Is company drug and alcohol policy posted in common spaces. \nAre all crew aware of Company Drug and alcohol policy", "sms": "PAM 14.1", "status": "YES", "remarks": "Last Test Date: 27 Jan 2026", "guidance": "Contact VM for unannounced onboard group Random Alcohol Test to be conducted at least once every 3 months."}, {"app": "All Vessels", "ref": "RISQ 3.1", "q": "If following are available on bridge and updated: \n> Watch keeping schedule,duties, responsibilities \n>  Passage planning and Passage monitoring and execution \n>  Procedures for updating charts and publications \n>  Recording of relevant events in deck log book/movement book  \n>  Red status of alert  and record keeping of same.\n> Procedures for familiarisation and effective handover when crew changes occur.(Bridge and ECDIS familiarisation checklists)\n> Master & Pilot exchange should be documented,  discussed and agreed upon before transfer of conn.", "sms": "NMM 13.2 & 8.3", "status": "YES", "remarks": "", "guidance": "Masters, Officers, and Engineers should be familiar with the utilization of the override function of engine power limiters. They should also understand that the activation of this override may be necessary while navigating in pilotage waters."}, {"app": "All Vessels", "ref": "RISQ 3.1", "q": "Are all navigating officer aware of below:\n>  SMS requirements for use of ECDIS \n>  Voyage Planning in ECDIS \n>  Position monitoring and Position verification in ECDIS\n>  Safety settings\n>  Reliability of CATZOC\n>  Display layers of ECDIS  \n>  Limitations of ECDIS \n>  Plotting of navigational warningns and T&P notices\n>  Two shade and four shade use \n>  XTL for various legs of voyage \n>  Procedures of amending a passage plan \n>  Route validation\n> Naming and saving a route \n> Procedures for taking backup of ECDIS data and frequency", "sms": "NMM & 13.2", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 3.1", "q": "Are all all navigating officers aware of following: \n>  SMS procedures for anchoring \n>  Selection of anchoring location \n>  Approach and limiting conditions for anchorage \n>  Swinging circle, minimum UKC requirements. \n>  Keeping a safe anchor watch, monitoring position with use of radar and GPS guard rings/alarms, use of main engine.\n>  Use of engines, scope of cable as per holding ground, anchor holding power\n>  Actions in case of dragging anchor\n>  Use of additional ballast in light condition \n>  Use of two anchors\n>  Limitations on the anchoring equipment under heavy stress\n>  Use of anchors in an emergency\n>  Deep water anchoring\n> Factors affecting a vessel when at anchor in heavy weather, including yawing and snatching                                                                                                                                                                                                                                             > SMS guidelines for action to take during onset of bad weather.", "sms": "NMM 11, CL D/16", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 3.3", "q": "> Is the manoeuvring information displayed on the bridge. \n> Are officers aware of the contents of manoeuvering information \n> Is the information in the pilot card as per manoeuvering information data", "sms": "NMM 6.1.18", "status": "YES", "remarks": "", "guidance": "Rightship recommends that the ECDIS display setting should be incorporated into the Change of Watch at Sea checklist.\nRightShip recommends that the performance of the radar(s) when operational should be checked and recorded by the OOW at the end of each watch unless this contradicts the makers recommendations. A numeric, percentage, graphical, or other measurement value should be recorded.\nThe communicated ECDIS configuration by the officer of watch to reliever should be documented."}, {"app": "All Vessels", "ref": "RISQ 3.7", "q": "Is UKC and air draft guidance posted on bridge?\nAre all officers aware of the contents of this guidance.", "sms": "NMM 7.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 3.8", "q": "> Are the fire and safety rounds being conducted at the end of each watch? \n> Confirm the officer of watch is not the sole look-out during hours of darkness ? \n> In areas not covered by a fire detection system, regular fire patrols are conducted after the watch duty ?", "sms": "NMM 6.6", "status": "YES", "remarks": "", "guidance": "The list of spaces for fire and safety rounds should be prepared and posted on the bridge."}, {"app": "All Vessels", "ref": "RISQ 3.9", "q": "> Is the bridge manning levels for each watch recorded in log book\n> Is there a system in place for calling the lookout when OOW is sole lookout \n> Are officers aware of conditions when sole lookout can be maintained", "sms": "NMM 5.2,NMM 5.3", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 3.11", "q": "> Are all navigation lights and emergency navigation lights operational \n> Are all navigational shapes and signalling equipment in good condition \n> Is the navigation light failure alarm tested. Is the procedure for testing posted next to navigation light panel \n>  Are all navigational light glass screens in good order \n>  Is the Aldis lamp operational/ Is the Aldis lamp battery charged / Is the aldis lamp battery less than 3 years old / Are there 3 spare bulbs available for Aldis lamp", "sms": "NMM 13.7", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 3.13", "q": "TMC: \n>  Does the TMC have any correction. \n>  Are the officer aware how to use TMC in case of gyro failure and is the work instruction posted.  \n> Has a gyro failure drill been carried out", "sms": "NMM 13.7", "status": "YES", "remarks": "", "guidance": "A TMC may have variation automatically applied. However, this correction will not include deviation. When correcting TMC outputs for compass error, care should be taken to ensure that the correct values for variation and deviation are applied"}, {"app": "All Vessels", "ref": "RISQ 3.14", "q": "> Are times and locations of engaging hand steering recorded in the deck logbook or bell book ?\n> Is manual steering used in aeas of high traffic density, restricted visibility and other potentially hazardous situations?\n> Is manual steering tested once per watch ?", "sms": "NMM 8.2", "status": "YES", "remarks": "Date of Last Emergency Steering drill: 07 FEB 2026", "guidance": "Rightship Inspector will record a Finding if the times and locations of engaging hand steering are not recorded in the deck logbook or bell book."}, {"app": "All Vessels", "ref": "RISQ 3.15", "q": "VDR : \n>  Is the procedure for saving VDR data posted  \n>  Is the software for downloading and play back of VDR data provided on board.  Has this been used   \n>  Is the condition of VDR capsule in good condition \n>  Is the VDR battery within expiry range \n>  Are there any alarms on VDR panel", "sms": "NMM 4.1.5,NMM 13.13", "status": "YES", "remarks": "", "guidance": "VDR Testing is required annually and should always be carried out following repair or maintenance work to the VDR or to any source providing data to the VDR.                                                                                             Watch-keeping officers should be familiar with procedures to take VDR backup."}, {"app": "All Vessels", "ref": "RISQ 3.18", "q": "ECDIS Familiarization : Can all officers demonstrate the following: \n>  Checking voyage plan (Manual and auto route check etc)\n>  Interrogating chart symbols/updates/information on chart\n>  ENC symbol identification\n>  Manual position fixing (NP5012/NP232)\n>  AIS and or Radar overlay if fitted ( Advantages/disadvantages)\n>  Knowledge of SCAMIN and how it is displayed\n>  Knowledge of CATZOCs and application for UKC as per SMS\n> Contingency action in case of ECDIS failure.\n> Setting of safety frame/safety cone( SMS guidelines/safety poster )\n> Creating parallel index lines\n> Route checking and management of alarms\n> Handling unresolved ENC update errors\n> Showing of IHO version of standard installed", "sms": "NMM 13.2", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 3.20", "q": "T and P notices \n>  Are all T&P NMs and navigation warnings plotted and record of date plotted/removed maintained ?\n> Are all inforce nav warnings available and handled correctly ? \n> Warnings read and initialled at the time of receipt? \n( Request office to send if not available)", "sms": "NMM 13.2", "status": "YES", "remarks": "", "guidance": "T&P Notices - Plot manually on largest scale ENC the features that are significant for the planned passage, within 60NM* (24Nm in restricted waters) on either side of course line."}, {"app": "All Vessels", "ref": "RISQ 3.26", "q": "> Is the OOW familiar with the GNSS system used on board and the errors/alarms affecting its accuracy such as HDOP, RAIM, multipath error, jamming, spoofing.\n> Is the correct geodetic datum set in the GNSS reciever ?", "sms": "NMM 8.1 & NMM 13.2", "status": "YES", "remarks": "", "guidance": "HDOP Value limit to be posted next to GNSS receiver."}, {"app": "All Vessels", "ref": "RISQ 4.8                    Guideline 2", "q": "Crew must be aware of : \n> Requirements for working over the side to rig combination pilot ladders\n> Lock out/tag out kit , its location and implementation on board \n> Designated HW area and procedures for Hot work", "sms": "H & S 5.0", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.37                    Guideline 1", "q": ">  Are pilot ladders  in good condition and certified \n>  Are they clearly identified with tags or with permanent marking\n>  Are the  maintenance records available\n>  Are pilot ladders secured as per training material 164 ?(Rightship recommendation to use manila rope 2 x 24 KN with rolling hitch )\n> Are officers aware of the guidance given in training material 164 ?                                                                                                            > Are the pilot ladders tested as per ISO 799-2021 section 6.6 on 30 monthly basis ?", "sms": "H & S 6.2", "status": "YES", "remarks": "Date of supply of Pilot ladder: 19 MAY 2025 AND 02 OCT 2025", "guidance": "The Record of Approved Safety Equipment should be updated to reflect the material, manufacturer, and the standard to which the pilot ladder was made and tested. \nInspector will record a finding if this document has not been updated to reflect the pilot ladder(s) on board the ship.\nRightShip strongly encourages the vessel’s manager to verify the authenticity of the pilot ladder certificate by contacting the relevant certification body. It is important to keep a record of such verification on board for future reference."}, {"app": "All Vessels", "ref": "RISQ 4.38                    Guideline 1", "q": ">  Are ship-specific fire safety and SOLAS training manuals available\n>  Are all non ship specific details/pages crossed and marked 'Not fitted on this vessel'? \n> Have all staff read and signed the manuals ?\n> Have the manuals of new equipment - SCBA , EEBD, FIREMAN's OUTFIT,Firemans radio, procured/recvd after take over entered in the Fire-training manuals and LSA Manuals ?", "sms": "LSA and FFA  ship specific Maint Plans\n(MM 6.8)", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.3", "q": "Are the officers and crew aware of following : \n>  MARPOL Annex V requirement for disposal of operational waste and cargo residues \n>  SMS Guidelines in Training material 152", "sms": "EMM 7, TM152", "status": "YES", "remarks": "", "guidance"
