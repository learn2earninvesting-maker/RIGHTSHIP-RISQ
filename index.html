nt inspection reports, available? Are corrective being taken in reponse to recorded non- conformances?, held as required by the management system, at intervals not exceeding twelve months?\n> Are reports available on board. \n> Has at least once a year, each vessel subjected to a Master’s navigation audit to ensure compliance with the Dry Bulk Management Standard (DBMS) ?", "sms": "PAM 16.2.11   PAM 18.1", "status": "YES", "remarks": "Date of Last Internal Audit & last VM insp: 25 Sep 2025 & 10 Aug 2025\nDate of Last navigational assesment by Master: 22 DEC 2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.4", "q": "> Is Masters Review of SMS done?\n> Is a company response available", "sms": "PAM 16.4", "status": "YES", "remarks": "Date of last Masters Review: 29 SEP 2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.8                    Guideline 1", "q": "> Are PTW forms being used on board \n> Is the lock out-tag out system in use  \n> All all permits completed and filed correctly \n> Have you checked the permits against PMS/routine maintainence-inspection/unexpected breakdown/damages to confirm they have been adequately completed \n> Is there a RA and tool box talk record available with the permits where required", "sms": "H & S 5.0", "status": "YES", "remarks": "", "guidance": "The vessel’s manager should identify the High-risk tasks on board and create a specific permit and risk assessment system for the ship."}, {"app": "All Vessels", "ref": "RISQ 4.10", "q": ">  Are all accidents,incidents,injuries,near miss reports complete in OM/Jibe \n>  Are all reports closed from office", "sms": "PAM 18.1", "status": "YES", "remarks": "", "guidance": "Rightship Inspector shall verify the incident history of the vessel with the 24-month incident history provided by RightShip. \nAny incidents that are not documented in the RightShip record shall be recorded as a Finding."}, {"app": "All Vessels", "ref": "RISQ 4.43", "q": "> Has safety familiarization been completed for all staff onboard, are records completed and available ?\n> Has a bridge familiarization been completed for deck offciers and records completed and available ?", "sms": "D-32A, D-17", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.44", "q": "Does the vessel manager have documented procedures in place to control stevedore activities onboard by \n identifying potential hazards and implementing appropriate mitigation measures?(V)", "sms": "", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.2", "q": ">  Is the SOPEP plan available and up to date \n>  Is the coastal contact list up to date and latest \n>  Has a port contact list been made for this port \n>  Is the SOPEP equipment inventory updated and checked", "sms": "SOPEP", "status": "YES", "remarks": "Date of last port contact list : 31 JAN 2026", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.11", "q": ">  Are officers aware of contents of BWMP with special reference to class approved ballast water exchange / sedimentation control methods\n>  Is BWMP Part B updated and referred to prior port call ?\n>  Are records of  BW reporting forms to authorities available?", "sms": "EMM 8.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.22", "q": "Is a IEEE certificates available", "sms": "IEE Certificate\nEMM 11.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 6.1", "q": "> Are there are any major repairs to the hull? \n> If yes , have all the repairs to hull reported to class? \n> Is the vessel free of any defect to hull which affects water tight integrity?  \n> Is the vesel free of any major defects? (AE,ME,Steering)", "sms": "TMM 8.3.1/PAM 17.12", "status": "NA", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 6.3", "q": "> Is the vessel required to undergo a special survey by class rules.  \n> If yes answer below: \n: Is enhanced survey report file on board and maintained? \n: Thickness gauging report available.\n: Is condition evaluation report available. Are there any comments?\n: Is the Survey report file on board?", "sms": "Enhanced Survey Report File,\nD-33", "status": "NA", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 6.7", "q": "> Is there any apparent structural defects to the vessel ?", "sms": "Tec32A-32S\nTMM 8.1 & 8.2", "status": "NA", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.5A", "q": "Is following available : \n> Approved damaged stability, Trim and Stability and Loading Manual \n> Class-approved loading computer or programme \n> Testing records of loadicator \n> Class attested lodicator accuracy test (from last annual survey) available\n> Worst stability condition for present voyage?", "sms": "BGCM 4.2", "status": "YES", "remarks": "Class attested lodicator accuracy test (from last annual survey) is not available.", "guidance": "The Loadicator is required to be tested periodically (interval is every 6 months as per SMS) by ship staff for its accuracy. The test procedure includes choosing a text condition from the approved test conditions, entering the exact same data in the loadicator and comparing the results with the approved test conditions. \nThe important point to note is that the data needs to be manually entered and not opened from a pre-saved file."}, {"app": "Bulk Carriers", "ref": "RISQ 8.6A", "q": "Is following available : \n> Approved damaged stability, Trim and Stability and Loading Manual \n> Class-approved loading computer or programme \n> Testing records of loadicator \n> Class attested lodicator accuracy test (from last annual survey) available\n> Worst stability condition for present voyage?", "sms": "BGCM 4.2", "status": "YES", "remarks": "Class attested lodicator accuracy test (from last annual survey) is not available.", "guidance": "The Loadicator is required to be tested periodically (interval is every 6 months as per SMS) by ship staff for its accuracy. The test procedure includes choosing a text condition from the approved test conditions, entering the exact same data in the loadicator and comparing the results with the approved test conditions. \nThe important point to note is that the data needs to be manually entered and not opened from a pre-saved file."}, {"app": "Bulk Carriers", "ref": "RISQ 8.8A", "q": "> Is WI BULK-104 for ballasting of Cargo Hold available \n> Are officers aware of the SMS guidelines given in BGCM 4.8 & WI D/Bulk 104?\n> Are senior officers aware precautions during ballast exchange of ballast hold ?\n> Consequences of ballasting/deballasting with vents not open?(Fatality report 12)\n> Consequencies of poorly maintained ballast tank manhole covers ?", "sms": "BGCM 4.8/D-Bulk-104", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.13A", "q": "For cargo not listed in the IMSBC Code, \n> Is certificate from the shipper available endorsed by the competent authority of the port? \n> Does it state the characteristics of the cargo and the required conditions for carriage and handling? \n> Is it provided in the format as per IMSBC code ?\n> Has the required competent authorities(at port of unloading) and flag state been consulted via office?", "sms": "BGCM 4.2", "status": "NA", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.1B", "q": "Has the vessel manager provided policy statements and relevant publications for the safe carriage and handling of grain in bulk? \n-Senior officers aware of SMS guidelines on carriage of grain as per BGCM 5.1\n-Senior officers aware of the content and all required publication as per general circular 18 on board ?", "sms": "BGCM 5.1", "status": "YES", "remarks": "", "guidance": "A list of on-board publication shall be incorporated in SMS. A Finding will be filed by inspector against ships not carrying publications in accordance with National requirements and the SMS."}, {"app": "Bulk Carriers", "ref": "RISQ 8.2B", "q": "Has appropriate information about the cargo and its characteristics been provided to the master or master’s representative prior to loading?\n-Adequate information received from shipper about cargo on inherent quality, safety risks and precautions prior loading\n-Reference made to IMO grain code for information to be received from shipper.\n-Senior officers aware of the risk when the moisture content of grain exceeds 12 to 14 %", "sms": "BGCM 5.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.3B", "q": "Has the grain cargo been examined and sampled during loading to ensure that the apparent conditions meet the requirements as described in the documentation and is there recorded evidence of regular monitoring where applicable? \n-Is the apparent condition of cargo such as temperature, colour,dryness, dampness, free-flowing, not free- flowing,\nlumps present, foreign matter, etc., checked during the loading operations and record kept in port log ?\n-Are good quality photographs taken during loading along with entries in port log ? \n-Are LOP issued when any abnormality is observed and office informed/guidance taken ?\n-Are any cargo samples taken duirng the loading operations ?", "sms": "BGCM 2.2 &  5.1", "status": "NO", "remarks": "Cargo sample is not taken", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.4B", "q": "Is the approved document of authorisation and grain stability booklet (Grain Loading Manual) provided? \n-Is the class/flag approved document of authroisation and grain loading manual available on board ?\n-Are senior officers aware of the stability requirement compliance when carrying grain cargo during all stages of voyage ?", "sms": "BGCM 5.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.5B", "q": "If the document of authorisation was not provided, can the master demonstrate the compliance of the ship’s stability with the Grain Code? \n-All company vessel are provided with document of authorisation however senior officers must be aware of the stability requirement as given in IMO Grain code to demonstrate to the satisfaction of the Administration or the Contracting Government of the port of loading on behalf of the Administration that the ship in its proposed loaded condition will comply with the requirements", "sms": "Grain Code", "status": "NA", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.6B", "q": "Is a Class-approved loading computer or programme in use and has its operational accuracy been regularly tested? \n-The loading computer is not connected to ship LAN system ? A back up of loading computer ( software or otherwise) is available?\n-The accuracy of loading computer is checked every 6 M using class approved Test condition ? Chief officer aware that he has to use a new blank condition and input the requried data and not print out an existing condition ?\n-Is the test of loading computer done during Safety Construction annual survey and the test condition stamped by the class surveyor ?", "sms": "BGCM 4.2", "status": "YES", "remarks": "Class attested lodicator accuracy test (from last annual survey) is not available.", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.7B", "q": "Are the stresses, stability information and any limitations included in the cargo plan understood\nby the cargo watch officers and are conditions being monitored and maintained within design limits throughout cargo operations?\n-Is the cargo stowage and operations plan OPS 10A made in detail given in BGCM 4.2,4.3 and 4.7\n-Is each stage of the plan monitored by check of visual drafts on completion of each stage ? If there is any discrepancy between visual and calculated draft is it investigated and resolved - plan modified/loading rate reduced etc and adequate records kept ?\n-Are the duty officers aware of vessel being subjected to high stresses in case deballasting rates cannot keep with high loading rates  and action to take in such a case ?\n-Are cargo figures from terminal being sought after each pour and compared with ships planned figure ?\n-Are adequate records of loading/discharging/ballast operations maintained so as to reconstruct the full history of the operation from records ?", "sms": "BGCM 4.2,4.3,4.7", "status": "YES", "remarks": "", "guidance": "The Master and Chief Officer should be aware of the worst-case damage condition for the existing cargo on board. The observed drafts should be logged down after every sequence and compared with calculated draft."}, {"app": "Bulk Carriers", "ref": "RISQ 8.8B", "q": "Are there procedures in place for loading, ballasting and de-ballasting of the ballast holds? \n-Senior officers aware of the SMS guidelines given in BGCM 4.8  & WI D/Bulk 104 ?\n-Ship specific work instructions complied with in full prior ballasting/during ballasting/during the voyage/prior deballasting and after deballasting of ballast hold ?\n-Senior officers aware of precautions during ballast exchange of ballast hold ?\n-All staff aware of the consequences of ballasting/deballasting with vents not open ?Refer to Fatality report 12\n-Are the tests/checks as detailed in WI D Bulk/104 after deballasting of ballast hold diligently carried out and witnessed by senior officers ?Are staff aware of the incidents in the fleet due to water ingress from poorly maintained ballast hold valves/manhole covers ?", "sms": "BGCM 4.8/D-Bulk-104 & D/Bulk 02", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.9B", "q": "Are there guidelines and procedures for hold cleaning after completion of unloading? \n-Senior officers aware of hold cleaning guidelines as given in BGCM 4.9 ?\n-Records of pre cleaning meeting/MSDS of chemical to use (if applicable)/RA/Disposle of washing /tests to be done inside the hold maintained ?\n-Cargo holds and associated equipment prepared for the requirements of next cargo ?\n-OPS Bulk 15 form and photographic evidence maintained ?", "sms": "BGCM 4.9", "status": "YES", "remarks": "", "guidance": "The Rightship Inspector will record the list of hold cleaning equipment available on board in comments. The cargo hold cleaning checklist should be incorporated in the hold cleaning procedure."}, {"app": "Bulk Carriers", "ref": "RISQ 8.10B", "q": "Have cargo holds been grain or hospital cleaned, where applicable, and has a ship’s hold inspection certificate been issued by a 3rd party prior to loading grain?\n- Prior loading grain cargoes cargo holds to be cleaned to grain/hospital standard as per guidance given in BGCM 4.9\n-White glove test to be done for applicable cargoes by senior officers before presenting the cargo holds for pre loading inspection", "sms": "BGCM 4.9", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.11B", "q": "Is the vessel free of any limitations or restrictions specified in the Loading Manual or Trim and Stability Booklet? \n-In case the vessel has any restrictions as given in loading manual or trim and stability manual are all the deck officers aware of same and is this limitation posted in ships office/ballast control ?\n-In case the load density of tank top has reduced due to thinning down of the inner bottom and restrictions placed by class , then are such restrictions know to all deck officers and is same taken into consideration when planning the cargo loading ?", "sms": "BGCM 4.2 & 5.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.12B", "q": "Are officers familiar with the risk, hazard and carriage requirements of grain cargo on board the ship? \n-Deck officers aware of the inherent risks of grain cargo -Shift of grain, contamination, ingress of water, moisture migration, and transfer of heat from engine room and / or bunker tank bulkhead and inadequate surface ventilation \n-Have Engineers been briefed about the requirement to not heat bunker tanks in cargo area above 42 Deg C?\n-Have all crew been briefed about emission of explosive / toxic gas/lack of oxygen in cargo hold and dust danger when carrying grain cargoes ?", "sms": "BGCM5.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.13B", "q": "Have hatch covers been ultrasonically tested for weather tightness before loading? \n-Is the vessel provided with ultrasonic equipment to test the weather tightness of hatch cover prior loading ?\n-Are the hatches tested prior loading and record maintained ?\n-Are the calibration and other tests being done on the ultrasonic equipment and record maintained ?\n-Are all deck officers familiar with the use of the ultrasonic equipment ?", "sms": "BGCM6.0", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.14B                    Guideline 1", "q": "Has the master been provided with clear instructions regarding any fumigation, prior to arrival at the load port? Has the vessel been provided with procedures and contingencies regarding fumigation of cargo holds and are the master and chief officer familiar with the procedure? \n-Are senior officers aware of the SMS guidelines for fumigation BGCM 4.4 ?\n-Adequate instructions received from the company carrying out the fumigation ?\n-Are senior officers aware of the guidance set out in section 3 of MSC.1/Circ.1264 and additional guidance issued by countries such as USA/Canada in case fumigation is carried out there ?\n-Are ship specific checklist D/Bulk 06 A & B used during fumigation and records maintained ?", "sms": "BGCM 4.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.15B", "q": "Has the master been provided with clear instructions regarding any fumigation, prior to arrival at the load port? Has the vessel been provided with procedures and contingencies regarding fumigation of cargo holds and are the master and chief officer familiar with the procedure? \n-Are senior officers aware of the SMS guidelines for fumigation BGCM 4.4 ?\n-Adequate instructions received from the company carrying out the fumigation ?\n-Are senior officers aware of the guidance set out in section 3 of MSC.1/Circ.1264 and additional guidance issued by countries such as USA/Canada in case fumigation is carried out there ?\n-Are ship specific checklist D/Bulk 06 A & B used during fumigation and records maintained ?", "sms": "BGCM 4.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.16B", "q": "Is crew familiar with major problems associated with fumigation of cargo in stowage on board? \n-Are all crew briefed on dangers of fumigation viz toxicity and its potential for fire or explosion .\n-The chemical reaction of fumigant produces heat and if fumigant is not properly distributed can cause fire .\n-The fumigant pallet can react with water and spontaneously ignite\n-Spontaneous heating of the fumigation gas can cause fire/explosion as phosphine gas is explosive at levels above 1.7% v/v in air.", "sms": "BGCM 4.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.17B", "q": "Do on-board safety requirements for fumigation comply with sub-section 3.3.2.7 of the IMO recommendation on the safe use of pesticides? \n-Vessel provided with adequate number of gas detecting equipment /tubes etc. Daily checks carried out and records maintained.\n-Instructions available and complied with respect to  disposal of residual fumigant material\n-Respiratory protection equipment (at least 4 sets are required)/Medicines and medical equipment/Antidote/MFAG - A copy of the latest version- available\n-Completed checklist D Bulk 06A and 06 B", "sms": "BGCM 4.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.18B", "q": "Are the master’s appointed representatives for fumigation trained and is there evidence to show that they have been effectively performing duties associated with this task?Have pre-fumigation and post fumigation statements been provided to the master by the fumigator-in-charge? (\n-Completed CL D/Bulk 06A and 06B with appropriate entries in dekc log/port log.\n-Documents and certificate issued by fumigation in charge as per details in CL D Bulk 06A and 06B", "sms": "BGCM 4.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.19B                    Guideline 1", "q": "Are the master’s appointed representatives for fumigation trained and is there evidence to show that they have been effectively performing duties associated with this task?Have pre-fumigation and post fumigation statements been provided to the master by the fumigator-in-charge? (\n-Completed CL D/Bulk 06A and 06B with appropriate entries in dekc log/port log.\n-Documents and certificate issued by fumigation in charge as per details in CL D Bulk 06A and 06B", "sms": "BGCM 4.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.21B                    Guideline 1", "q": "Has the Voyage Safety Plan (VSP), including the checklist for fumigation during the voyage, been discussed with and signed by the master prior to sailing to the discharge port?\n-CL D Bulk 06A and 06 B completed diligently and complied with", "sms": "BGCM 4.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.22B", "q": "Have the air conditioning intakes for the accommodation, the engine room and other spaces been set to prevent the possibility of drawing in fumigant gas? \n-RA for fumigation has addressed the possibility of ingress of toxic gas into accomodation/ER/other spaces due to incorrect ventilation.\n-Ventilation fans/flaps are correctly set up before the start of fumigation to prevent drawing of fumigant gas into accomodation/ER and other spaces.\n-Before ventilating cargo holds ventilation arrangements for accomodation/ER/other spaces to be rechecked to prevent ingress of toxic gases.", "sms": "BGCM 4.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.23B", "q": "Are procedures in place for entering any cargo holds sealed for fumigation in transit? Has the master informed the appropriate authorities of the country of destination about the fumigation? \n-Compliance with CL D Bulk 06A and D Bulk 06B -These are check items in the checklist", "sms": "BGCM 4.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.24B", "q": "Are procedures in place for entering any cargo holds sealed for fumigation in transit? Has the master informed the appropriate authorities of the country of destination about the fumigation? \n-Compliance with CL D Bulk 06A and D Bulk 06B -These are check items in the checklist", "sms": "BGCM 4.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.25B", "q": "Has the vessel been provided with a gas free certificate at the discharge port prior to commencement of discharge operation? \n-Compliance with CL D Bulk 06B", "sms": "BGCM 4.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.26B", "q": "Are records maintained of fumigation operations? \n-Detailed records of fumigation operation to be maintained in cargo record file, deck log book/port log and should contain the following \n-Communication relating to fumigation/Details of fumigation company/fumigator-in-charge, and operation/Fumigation plan\n-Details of the fumigator-in-charge and operatives/Time of starting and finishing/ Holds involved/Identity of the fumigant, application level and where and how applied.\n- All gas reading with location testing.\n-Plan and sketch for each hold fumigated, showing where the fumigant was applied and the amount of fumigant at each\nlocation.\n-Certificate of fumigation/Formal written handover of responsibility.\n-Completed checklist D Bulk 06A and B", "sms": "BGCM 4.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.27B", "q": "Are necessary instruments (with spares) to determine the dew point provided, maintained in good condition and are there records of the calibration of such instruments? \n-The wet and dry thermometers are in good condition/muslin clean/water reservoir filled with clean water and positioned away from direct heat source/exhaust.\n-Is whirling psychrometer provided and is it operational and records of temperature obtained are maintained ?\n-Are there any records of calibration of thermometers ?", "sms": "BGCM 4.6", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.28B", "q": "Are the master and / or chief officer familiar with the rules for deciding to ventilate the cargo holds during the voyage? \n-Are senior officers aware of ships sweat and cargo sweat ?\n- Are senior officers aware of hygroscopic and non hygroscopic cargoes and their ventilation requirements ?\n-Are senior officers aware of the dew point rule and 3 degree rule when deciding on cargo ventilation as detailed in SMS ?", "sms": "BGCM 4.6", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.29B", "q": "Is ventilation of cargo holds, where required, being carried out and recorded?\n-Are Voyage instructions regarding hold ventilation known and being complied with.\n-Are detailed records maintained for all temperatures taken and dew points calculated/Whether or not ventilation carried out/Reason for not ventilating/Weather and sea condition\n-Is the rule being followed for ventilation three –degree rule or dew point rule recorded.", "sms": "BGCM 4.6", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.30B", "q": "Is there evidence of a satisfactory grain stability calculation for the last voyage? \n-Grain stability calculated using class approved loadicator and country specific form viz Australia/Canada/USA etc covering the complete voyage from load port to discharge port to show that vessel complies with intact stability requirement at each stage of voyage.", "sms": "BGCM 5.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.31B                    Guideline 1", "q": "Has a cargo loading/unloading plan providing detailed sequences of cargo and ballast transfer been prepared, understood, and signed off by the deck officers? \n-Has detailed loading/discharging plan as per OPS Bulk 10A been prepared by Chief officer and signed by Master and other deck officers ?\n-Is visual and calculated draft being checked at each stage of completion and discrepancies resolved ?In case plan is changed then is a amended plan made and discussed with all officers ?\n-Are SF/BM checked and recorded at each stage ?\n-All details of cargo operations- holds being operated/ballast sequences etc recorded ?\n-Is a pre cargo operation meeting held with all crew and recorded ?", "sms": "OPS Bulk 10A", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.34B", "q": "Is an adequate record of all cargo operation activities maintained during loading and unloading? \n-Are detailed records maintained for the following in port log \n-Starting and stopping of work at each hold; times and dates\n-Cargo loaded /discharged from each hold and cumulative total\n-Weather conditions\n-Use of ships crane/shore crane/barge movement\n-Opening and closing of hatches/draft readings at periodic interval - normally at completion of each stage/watch etc\n-time of rain-snow/delays in cargo operations/attendance of cargo and other surveyors/Stevedore damage\n-Cargo temperature if applicable\n-Regular monitoring of stability records", "sms": "BGCM 2.2", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 8.35B", "q": "Are the dangers associated with oxygen depletion of grain cargo understood by officers and crew, and have reasonable precautions been taken during routine inspections of the cargo, when entering the holds and adjacent spaces?\n-Dangers associated with grain cargo known to all officers and discussed during pre loading meeting.\n-SMS guidelines for hold entry and adjacent spaces known to all crew and complied with\n-Warning notices posted at hold entrances as per SMS and pre entry checks done as per ship-shore checklist and QA poster 02", "sms": "BGCM 3.0", "status": "YES", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ.8.1C", "q": "Does the vessel have the latest edition of the following publications:\n1) Code of safe practice for ships carrying timber deck cargoes \n2) International Maritime Solid Bulk Cargoes Code (IMSBC Code)\n3) International Maritime Solid Bulk Cargoes Code (IMSBC Code) \n4) BLU Code (incl. BLU Manual), 2011 (For Dry Cargo Ships only)\n5) Lashing and Securing of Deck Cargoes including packaged timber, vehicles on Ro-Ro vessels and ISO Containers in Non-Purpose Built Ships\n6) SOLAS  \n7) MARPOL \n8) Load Lines Convention (1966)\n9)MARPOL Annex VI & NTC 2008\n10) STCW Code\n11) Cargo Stowage and Securing (CSS) Code \n12) IMDG Code and supplement", "sms": "General Circular 18", "status": "YES", "remarks": "", "guidance": "A list of on-board publication shall be incorporated in SMS. A Finding will be filed by inspector against ships not carrying publications in accordance with National requirements and the SMS."}, {"app": "General Cargo", "ref": "RISQ 8.4C", "q": "Has appropriate cargo information been provided to the vessel prior to loading? \nHas the shipper provided all the information as required by CSS code and Timber code \n\nFor Heavy Lift -Is the following information provided?\n1. A general description of the cargo.\n2. The gross mass of the item or each item if there is more than one.\n3. The principal dimension of the item or items and, if possible, scale drawing.\n4. The location of the centre of gravity of each item.\n5. Particulars of the bending area of the cargo units and details of any precautions with regard to the bending of the item(s).\n6. Details of lifting points or slinging positions and, information on how best to lift each item.\n7. Details of securing points, including their strength and radius of strength.        \n8. IMDG Cargo - Manifest, in accordance with the classification set out in the IMDG code, the dangerous goods on board and location.\n\nIs the procedure of safe lashing and securing is available in the Cargo Securing Manual and Bulk and General Cargo Manual?", "sms": "CSS code / Timber Code/ BGCM", "status": "YES", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.5C                    Guideline 1", "q": "Is an approved ship-specific Cargo Securing Manual available and are officers thoroughly familiar with the contents of the manual?  \nIs cargo secured in accordance with CSM at designated securing points using cargo securing devices mentioned in the manual?\nDoes the vessel have sufficient spare lashing devices?  \n\nDose CSM include the following?\n1. Cargo Securing devices strength (MSL) and their use;  \n2. Tables and diagrams give a broad outline of the accelerations.\n3. Examples of forces acting on typical cargo units\n4. Examples of how to calculate the number and strength of portable securing devices\n5. Calculation method used converted in a form suiting the particular ship (Recommended)               \n6. CSAP- Cargo Safe Access plan (If applicable to the ship)                                           \n7. Inspections / Maintenace/ Repair records kept with CSM\n8. Procedure of accepting, maintaining, repairing or rejecting of the lashing devices must be available. (All equipment, lashings, hog wires, uprights and their foundations, deck fittings, cell guides, loose lashing equipment, twist locks, stackers etc.)                                     \n\nIs regular inspection and maintenance of lashing devices being carried out?   Must include - Routine Physical Inspection; Periodic reexamining and retesting as required by the administration.                                                                                                                                                          \n\nAre repairs to fixed lashing equipment repaired to the satisfaction of classification society as appropriate?  (Uprights, lashing points)", "sms": "BGCM 5.9/ 5.10 / 5.11 / 5.12", "status": "YES", "remarks": "", "guidance": "Each device used for securing cargo should be marked clearly with its SWL and a batch mark or number, where that mark can be verified by a test certificate. RightShip recommends that these test certificates be clearly labelled and kept in an easily accessible file. A method of correct identification and matching of individual certificates with the cargo-securing devices should be established on board. Cargo-securing devices without certificates must not be used on board."}, {"app": "General Cargo", "ref": "RISQ 8.8C", "q": "Is there evidence to show that samples of the timber cargoes are being weighed during loading and what is the actual weight compared to the weight stated by the shipper?", "sms": "Not in SMS - Timber code", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ.8.9C", "q": "If the vessel is a timber carrier, have up to date lashing plans for each stowage and securing arrangement been incorporated in the Cargo Securing Manual?  \n\nDoes the plan include: Maximum cargo weight for which the arrangement is designed; Maximum stowage height; required number and strength of blocking devices; Required pretension in lashing; Illustrations of all securing items; restrictions regarding maximum accelerations;  \n\nHas a lashing plan according to the ship’s Cargo Securing Manual been prepared?", "sms": "BGCM 5.10", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.11C", "q": "Is a Class-approved loading computer or programme in use and has its operational accuracy been regularly tested?  \nIs the loading computer accuracy check done every 6 months as per the inactive function checklist and annual check during class surveys carried out and endorsed by the Master or Surveyor? \nDuring the renewal survey, are all approved test conditions checked and endorsed by the attending surveyor?", "sms": "BGCM 4.2.14", "status": "YES", "remarks": "", "guidance": "The Loadicator is required to be tested periodically (interval is every 6 months as per SMS) by ship staff for its accuracy. The test procedure includes choosing a text condition from the approved test conditions, entering the exact same data in the loadicator and comparing the results with the approved test conditions. \nThe important point to note is that the data needs to be manually entered and not opened from a pre-saved file."}, {"app": "General Cargo", "ref": "RISQ 8.12C", "q": "Are officers aware of the strength limits (t/m2) of tank tops, tween decks, hatch covers and weather decks with regards to safe cargo stowage and is this information posted in the ship’s office / ballast control room?", "sms": "BGCM 4.2 / 4.3", "status": "YES", "remarks": "", "guidance": "The maximum permissible loadings, given in tonnes per square meter (t/m²) for each deck and the tank-top, and the hatch covers should be posted in the Ship’s office."}, {"app": "General Cargo", "ref": "RISQ 8.13C                    Guideline 1", "q": "Have pre-stowage and stowage plans been prepared and completed effectively?  (Stowage plan to be made taking into consideration- cargo specifications, securing arrangement, port rotation, SWL of cranes, weight distribution, cargo compatibility etc.) \nIs the stability conditions available complying with the criteria of GM and GZ (righting levers) \nfor the following stages:\n1. Departure condition?\n2. Arrival condition?\n3. Worst condiiton duirng the voage?\nIs ship stability condition updated and checked regularly take into account - variations in displacement, CoG, FSM, absorption of water in timber, Ice accretion, variation in consumables, Ballast water exchange etc. weight and CoG of deadweights on board with tank sounding checked regularly?\nIs the tank sounding checked and logged regularly?", "sms": "BGCM 4.2 / 4.3", "status": "YES", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ.8.14C", "q": "Is an approved ship-specific Cargo Securing Manual available and are officers thoroughly familiar with the contents of the manual?  \nIs cargo secured in accordance with CSM at designated securing points using cargo securing devices mentioned in the manual?\nDoes the vessel have sufficient spare lashing devices?  \n\nDose CSM include the following?\n1. Cargo Securing devices strength (MSL) and their use;  \n2. Tables and diagrams give a broad outline of the accelerations.\n3. Examples of forces acting on typical cargo units\n4. Examples of how to calculate the number and strength of portable securing devices\n5. Calculation method used converted in a form suiting the particular ship (Recommended)               \n6. CSAP- Cargo Safe Access plan (If applicable to the ship)                                           \n7. Inspections / Maintenace/ Repair records kept with CSM\n8. Procedure of accepting, maintaining, repairing or rejecting of the lashing devices must be available. (All equipment, lashings, hog wires, uprights and their foundations, deck fittings, cell guides, loose lashing equipment, twist locks, stackers etc.)                                     \n\nIs regular inspection and maintenance of lashing devices being carried out?   Must include - Routine Physical Inspection; Periodic reexamining and retesting as required by the administration.                                                                                                                                                          \n\nAre repairs to fixed lashing equipment repaired to the satisfaction of classification society as appropriate?  (Uprights, lashing points)  \n\nIs there evidence to show that the evaluation of forces acting on the cargo unit has been calculated, and correct cargo-securing devices are being used to secure the cargo to the ship? \nIs the MSL for securing devices available? \nIf SWL is substituted for MSL for securing purpose, is SWL >= MSL?", "sms": "CSM", "status": "YES", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.15C", "q": "Have personnel engaged in cargo securing operations been provided with relevant training and familiarisation? \nIs the crew aware of the timber deck cargo controlled jettisoning procedure? \nIs a remote jettisoning system provided? (recommended)", "sms": "", "status": "NA", "remarks": "", "guidance": "Bulk Carrier Course cert post Jan 2023 contains required text. All others can access the E learning CBT \"Cargo Securing Operations training\" on LMS."}, {"app": "General Cargo", "ref": "RISQ 8.16C", "q": "If the vessel is carrying timber, are relevant regulations of the applicable Load-Line Convention for stowage and securing of timber as prescribed in the ship’s Cargo Securing Manual being followed?  \n(If the vessel does not have a Timber loadline then it cannot load deeper than the appropriate load line)\nIs the height or the width of the timber cargo on the weather deck appropriately reduced when the ship needs to ply within the seasonal winter zone in winter? \nIs there a convenient passage for the crew on or below deck from accommodation to all parts used in the necessary working of the ship? \nAlternatively to the convenient passage mentioned above, a passage on top or side of the cargo and lifeline in accordance with the load-line convention provided?", "sms": "", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.17C", "q": "If the vessel is carrying timber, are instructions for ballast water exchange operations for the intended voyage available in the Ballast Water Management Plan? \nAre all tanks required to be ballasted as per stability calculation, and filled prior to loading on deck?\nAre the ballast tanks full or empty to eliminate FSM?", "sms": "BGCM 4.2/ 5.10", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.19C", "q": "If the vessel is a non-cellular ship, have the containers been stowed correctly on deck? \nIs Merchant Shipping Notice M.1167: Carriage of Containers and Flats in Ships Not Designed or Modified for the Purpose available and followed?", "sms": "", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ.8.20C", "q": "Is the vessel following procedure for monitoring the temperature of refrigerated containers and records maintained as per CNM Chapter 5.1 in form OPS07? \nIf refrigerated containers are carried, are sufficient spare parts available as per guidelines in CNM chapter 5.1.12? \nDoes the vessel have a sufficient electric power supply permanently installed from the engine room? \nAre the electric sockets for reefers in good condition?", "sms": "CNM 5.1/ OPS 07", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.23C", "q": "Are pre-loading/acceptance procedures for the carriage of vehicles on board a ro-ro cargo ship incorporated in the SMS?", "sms": "ROCM  4.2", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.24C", "q": "Is the ro-ro cargo ship equipped with CCTV remote monitoring to monitor the vehicle decks?  \nAre all CCTV cameras in good working order?", "sms": "ROCM 4.4", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.25C", "q": "Is the ro-ro cargo ship drainage system in good order, tested regularly and are effective measures in place to prevent blocking of drains? \nAre the drains covered with grating with an open area ratio of 6:1 and the opening size not greater than 25mm? Confirm grating / screen is not mechanically fitter?  \nIs the drainage area marked with a marking at a height not less than 1500mm with a letter size not less than 50mm stating \"Drain Opening - Do not cover or obstruct\"? \nAre procedures in place to carry out the function and tightness testing of the bow, inner, side shell, stern doors and main to lower deck cargo elevators of ro-ro cargo ships and is there evidence of regular testing? \nIs the structural condition of the doors in good condition? Are they regularly inspected and records for inspection maintained?", "sms": "Under PMS", "status": "NA", "remarks": "", "guidance": "Rightship recommends that recorded inspections of the door supporting and securing devices be carried out by the ship’s staff at monthly intervals or following incidents that could result in damage, including heavy weather or contact in the region of side shell and stern doors. Any damage recorded during such inspections is to be reported to the Classification Society.\nMaintenance, function, and tightness tests of the doors shall be incorporated in the PMS system as per manufacturer’s recommendation."}, {"app": "General Cargo", "ref": "RISQ 8.26C", "q": "Is the ro-ro cargo ship provided with an approved Operating and Maintenance Manual (OMM)?", "sms": "ROCM", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.28C", "q": "Is an operation manual for the ventilation system in a ro-ro cargo provided and do records on board verify that the air quality is tested?", "sms": "ROCM", "status": "NA", "remarks": "", "guidance": "Maintenance of the ventilation system shall be incorporated in the PMS system as per manufacturer’s recommendation."}, {"app": "General Cargo", "ref": "RISQ 8.29C", "q": "Is the ro-ro ship fitted with an automatic system to control air quality in the cargo holds and are records of inspection, testing, calibration, and maintenance of the system is maintained?", "sms": "ROCM", "status": "NA", "remarks": "", "guidance": "Annual testing of the vehicle space ventilation system should be conducted by the ship’s safety delegate. \nThird-party testing of the vehicle space ventilation system should be undertaken before entry into service of a new ship and at periodical intervals of five years thereafter."}, {"app": "General Cargo", "ref": "RISQ 8.30C                    Guideline 1", "q": "Are vehicles on the ro-ro car decks safely stowed and secured?", "sms": "CSM", "status": "NA", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.31C", "q": "Has the vessel been provided with procedures and contingencies with regards to fumigation of cargo holds and are the master and chief officer familiar with the procedure?  \nHas the air conditioning intakes for the accommodation, the engine room and other spaces been set to prevent the possibility of drawing in fumigant gas?", "sms": "BGCM 4.2      H&S 9.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "General Cargo", "ref": "RISQ 8.38C", "q": "Is an adequate record of all cargo operation activities maintained during loading and unloading?", "sms": "BGCM 4.3.25", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers\nGeneral Cargo", "ref": "RISQ 9.2A                    Guideline 1", "q": "> Is a procedure in place for the safe operation of hatch covers ?\n> Is the Master/Chief Officer appropriately trained in hatch cover inspection and maintenance through a formal Hatch Cover Inspection and Maintenance training (shore- based and/or onboard) course. ?\n> If the training was done onboard was it conducted by a manufacturer’s representative ?\n> Is there a risk assessment for opening and closing hatch covers and working in cargo holds ?\n> Defined levels of authority and lines of communication amongst shipboard personnel during operation of hatch covers ?\n> Are hatch covers secured at all times, whether open or closed, unless they are being operated ?", "sms": "BGCM 4 BULK 101 & See remarks", "status": "YES", "remarks": "No such requirement in our SMS", "guidance": "Show AEMTC Bulk Carrier Training certificate post 2023 (Included Hatch Cover inspection)\nIf course done prior 2023 – Carry out Hatch Cover Training CBT Level 2(For all Officers & Master) & Level 3 additionally for Mates and Maters (Computer Based Training) on CMS. Contact the Ops department for details.\nOur inhouse training covers the requirement as the training is done by taking the necessary reference material from MacGregor (MacGregor-Kabaya, Sundong/HSG & JMU- Japan marine United) , Nakata Mac, TTS (TTS Hua Hai & Jiangyin Huangshan), SMS - SME ,Imabari, Iknow, Tsuneshi, Iwaki Tec, Seohae, GTC Genkai & Tsuji."}, {"app": "All Vessels", "ref": "RISQ 10.21", "q": "Are senior officers aware of following:  \n> Limitations of anchoring equipment, limiting conditions of wind/current/wave height as per SMS ( Deepwater anchoring)", "sms": "NMM 11.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 10.23                    Guideline 1", "q": "> If the vessel has a DWT > 120,000 or more, does it meet the towing criteria of the Pilbara Ports Authority (PPA) and Rio Tinto?\n> Is the requirement for Capsize with DWT> 120,000 or more calling the Port Hedland have a set of 120 T SWL bitts and\nlead\n> Is the PPA Towing Arrangement, associated foundation and supporting structure subjected to periodic survey(at least once every 5 years)\n> Is the PPA Towing Arrangement permanently marked with their SWL and appropriate serial number so that certificates can be easily cross referenced >\n> Does the ship hold a class issued certificate attesting to the strength of the PPA Towing Arrangement foundations and associated ship supporting structure substantiated by detailed engineering analysis or calculation. \n> Ships of 120K and higher provided with five pull and push locations on each side ?\n> Can the towing arrangement accommodate a 180 degrees range of towline angles in the horizontal plane and a 0-90 degrees downward range in the vertical plane outward of the fairlead?\n> Does the provision for tug handling consist of properly placed closed fairleads and associated bits for guiding and attaching the towing lines >\n> Are means of hauling the tug’s towing lines aboard with a ship’s heaving line/messenger provided.(pedestal fairleads, guideposts or bitts) ?", "sms": "Recomm", "status": "NA", "remarks": "", "guidance": "Emergency towing booklet, aft mooring deck plan must be updated to reflect the fitting of the 120T bollard and fairlead lay-out (RTM Pilbara Port requirement)\nPilbara Ports Authority (PPA) requires all vessels deadweight 120,000 or more to have at least one set of bitts and Panama lead / roller fairlead on the vessel’s aft deck at or near the centreline to be rated to a minimum of 120 T safe working load (SWL).\nRightship recommends that the PPA Towing Arrangement, associated foundation and supporting structure should be subject to periodic survey, at least once every 5 years, and maintained in good order.\nRightShip recommends that ships of 120K and higher should be provided with five pull and push locations on each side."}, {"app": "All Vessels", "ref": "RISQ 12.7                    Guideline 1", "q": "> Is Master and cyber security officer familiar with content of PAM 22.1\n> Is Vessel IT / OT Asset Vulnerability and Protection Assessment using Tec 53 done and record maintained. Reviewed every 6 M.\n> Has RA DKM 48 been made ship specific.\n> Has a Cyber security officer been appointed and is he familiar with job responsibility as per PAM.\n> Is a Cyber security drills conducted at 3 M interval and records maintained.\n> Are 24 hour contact details of global call centre team must be  available at ships telephone (Emerg CL D/26)", "sms": "PAM 22.1", "status": "YES", "remarks": "Date of Last Cyber security drill: 23 DEC 2025", "guidance": "Cyber security Certificate added to TEC-04B Trading Certificate file"}, {"app": "All Vessels", "ref": "RISQ 12.8", "q": "> Are all USB ports blocked ( Signed paper stickers as USB port lock are not acceptable) \n> Is vessel provided with a dedicated computer and printer(Not connected to ships Lan system) for use by shore personnel and which is provided with updated antivirus.\n> Are all computers  updated with latest antivirus.\n> Is there a dedicated USB available for transferring data from communication computer to ECDIS.\n\nAre all staff and Master familiar with,\na) Company policy for use of personnel laptop/mobile for ships business.\nb) Cyber security guidelines\nc) SMS guidelines for opening attachement from unknown sources sent on email. \n> Is a Cyber security poster displayed at each computer.", "sms": "PAM 22.1", "status": "YES", "remarks": "", "guidance": "Critical equipment such as ECDIS should be protected from malware and virus attack. Access to USB and RJ-45 ports shall be controlled – i.e., disable or lock the ports."}, {"app": "All Vessels", "ref": "RISQ 14.18", "q": "Check following in hospital spaces  \n> Oxygen cylinder is rigged to provide oxygen to 2 persons simualtaneously \n> Medicine chest and medical equipment that complies with the requirements of flag state/Medical guide\n>  Space is not used as a store or cabin \n>  Hospital alarm is operational.\n>  Medicines are stored in labelled drawers.\n>  Inventory of medicines and expiry date is available.\n>  Narcotics list is available and it is stored with Master.\n>  Expired medicines are stored seperately\n> Annual inspection of medical chest has been done and certificate is posted", "sms": "PAM 11.13", "status": "YES", "remarks": "Date of hydraulic test of the cylinder: 01/03/2021\n\nDate supplied on board:21/08/2021", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 15.1", "q": "> Do the Seafarer Employment Agreements (SEA) comply with the requirements of MLC 2006 and do the crew salaries meet or exceed the current ILO Minimum Wage Scale? \n> Are valid CBA kept onboard \n> Are original copies of the SEA provided to all mariners ?\n> Have seafarers been releived on time or in case of illness/injury but withing 12 months period ?", "sms": "PAM 11.2,PAM11.3", "status": "YES", "remarks": "", "guidance": "The Rightship inspector will record in the comment the duration of the seafarers’ employment agreement for the key personnel (Master, Chief Officers, Chief Engineer, and Second Engineers), other Officers, and crew on board."}, {"app": "All Vessels", "ref": "RISQ 15.2", "q": "> Are records of the weekly Master’s weekly inspections of the vessel’s accommodation available?\n> Are all cabins clean and fully functional?\n> Accommodation spaces clean and free of dirt and dust ?\n> All cabin portholes water tight ?\n> Hot and cold water in the washrooms of cabins in working condition ?\n> Beds are using clean sheets and washed linen ?\n> Laundry equipment in working order? Separate washing machines for civil clothes and boiler suits with sufficient detergent provided?\n> Heating and ventilation ducts inside the cabins and common accommodation spaces in working condition ?\n> Adequate natural and artificial light available ?\n> Private / common toilets and shower rooms in good order ?\n> Food store handling areas, refrigerated areas, galley, and pantries should well illuminated, clean, tidy, hygienic, and free of obstructions ?\n> The condition of portable electrical equipment in cabins(ship-owned or personal) in good condition", "sms": "TMM 12.6.1\nH&S 7.1.10\nCL-D-44", "status": "YES", "remarks": "", "guidance": "The Rightship inspector will record a Finding if records of the weekly Master’s inspections of the vessel’s accommodation are not available."}, {"app": "All Vessels", "ref": "RISQ 15.3", "q": "> Are there recreation facility provided onboard,\n> Are any group social activities like social sunday and get togethers etc being followed on board?", "sms": "PAM 11.11", "status": "YES", "remarks": "", "guidance": "The Rightship inspector will Record the most recent group social activities that were carried out on board."}, {"app": "All Vessels", "ref": "RISQ 15.4", "q": "> Is the  monthly welfare budget available and used?\n> Is ships library account used for  providing entetainment equipment and welfare of crew", "sms": "PAM 11.11", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 15.5", "q": "> Are seafarers being provided with sufficient food and water free of charge and does the cook hold appropriate qualifications and is over 18 years age? \n> Is the only water offered free of charge for human consumption on board the ship potable?\n> Sufficient quantities of good quality food including fresh fruit, vegetables available onboard?\n> Is the food nutritious, varied and prepared and served in hygienic conditions?\n> Are religious and cultural considerations considered ?\n> All catering staff adequately trained (using training programme, posters) ?", "sms": "PAM 11.11,H&S 7.2,TOE", "status": "YES", "remarks": "", "guidance": "Chief Cook Training Cert + Chief Cook Refresher Training (2d course), Food Safety Management (MI), Saloon Ratings Safety Training"}, {"app": "All Vessels", "ref": "RISQ 15.7", "q": "> Is the crew allowed medical visits when required \n> Details of treatment are kept confidential\n> Treatment form in custody of Master ( FPD08)", "sms": "FPD 07 & FPD 08", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 15.8", "q": "> Are Monthly statement of wages given to individual crew member\n> Is rate of exchange available to crew for the allotment.", "sms": "TOE 6.9/PAM 12.2", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 15.9", "q": "> Is there a complaints procedure on board and displayed", "sms": "PAM 11.9,TOE", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 15.10", "q": "> Are senior officers familiar with the following, \na) GB 01 Suicide prevention guidelines", "sms": "GB 06 H & S 7.1.9", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 15.11", "q": "Are contact details of help line whom the crew can contact for mental health problem posted?ARP-Anglo Eastern Reach program", "sms": "FPD/019AS/21", "status": "YES", "remarks": "", "guidance": "Kindly display the 3Cube posters in public places (Crew/Officer Mess Rooms etc) – 24x7 guidance available for medical cases/emergencies, including handling of a death on board"}, {"app": "All Vessels", "ref": "RISQ 15.12", "q": "> Are senior officer familiar with GB 01 and GB 06 (guidelines on managing fatigue)\n> Has the traning been conducted on GB-01, as per traning planner\n> Are crew aware of the basic principle as laid in GB-01", "sms": "GB 01 and GB 06", "status": "YES", "remarks": "", "guidance": "Suicide prevention booklet GB 1 contains materials on Mental Wellness and Mental Health\nMental Wellbeing conducted for Senior Officers during the IPS course at AEMTC. \"Wellness at Sea\" CBT on our LMS also covering same. Company's 6m matrix includes training on board (GB01)."}, {"app": "All Vessels", "ref": "RISQ 15.13", "q": "> For ships constructed after 2011 or certified as asbestos free is there a SMS provision which prohibits supply of spares that may contain asbestos ?                                                                                                                                                                                                                 > In case no asbestos free certification or no SMS provision does the vessel have Asbestos Management plan ?", "sms": "H&S 9.5", "status": "NA", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.1", "q": "> Is the ship-specific Polar Water Operation manual or an Ice Operation manual available?\n> Is it approved by flag/class .", "sms": "NMM 9.5", "status": "NA", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.2", "q": "> Are there any limitations limitations specified in the Polar Ship Certificate? Is the crew aware of same", "sms": "NMM 9.5", "status": "NA", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.3", "q": "> Have master and other deck officers completed basic/advanced training for polar waters as applicable.\n> Has crew been trained on board for polar water operation manual\n> Does crew has experince in polar water operation.", "sms": "NMM 8.8.3", "status": "YES", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.4", "q": "> Has SOPEP been revised, taking into account operation in polar waters", "sms": "IOPP", "status": "NA", "remarks": "", "guidance": ""}, {"app": "Polar water operation Vessels", "ref": "RISQ 16.19", "q": "PAM Annex 1 Drill panner ,Annex -II -Group 7H", "sms": "", "status": "NA", "remarks": "", "guidance": ""}, {"app": "Ship to Ship Operation", "ref": "RISQ  17.5", "q": ">Was a Joint Plan of Operation (JPO) readily available onboard, and did the master and deck officers demonstrate familiarity with its contents, and were the operations executed in accordance with the plan's requirements?(V)", "sms": "", "status": "NA", "remarks": "", "guidance": "The STS Superintendent or any of the participating Masters should ensure that the Joint Plan of Operation has been thoroughly communicated and agreed, over the toolbox meeting prior to the STS Operation."}, {"app": "Ship to Ship Operation", "ref": "RISQ 17.11", "q": "Has the STS Unit Questionnaire been completed by either the STS Organiser or the STS Unit Manager, and is \nthere available objective evidence from the managers, demonstrating that any identified gaps in the questionnaire \n have been assessed and addressed through appropriate risk mitigation measures to ensure the safety of the \n Ocean-Going Vessel during operations with the unit(s)? (V)", "sms": "", "status": "NA", "remarks": "", "guidance": ""}]}, "MCDOC": {"items": [{"app": "All Vessels", "ref": "RISQ 1.12", "q": "Are all PSC deficiencies closed out from office? Reference Form Tec 45  or Oceanmanager/Jibe", "sms": "PAM 17.4", "status": "NA", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 1.18", "q": "Has the vessel undergone FLAG state inspection? Are Flag state inspection report available ? \nAnswer: NA, if vessels flag does not conduct a flag state inspection.", "sms": "PAM 17.3", "status": "YES", "remarks": "Date of last Flag State Inspection : 12 Nov 2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 1.18", "q": "Are all flag state deficiencies closed out from office? Reference Form Tec 45  or Oceanmanager/Jibe", "sms": "PAM 17.3", "status": "NA", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 1.28", "q": "Is the copy of P&I club certificate of entry available on board?", "sms": "PAM 17.3", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 2.1", "q": "Is the class status report on board less than 14 days old. \nAre all surveys in order and no overdue COC/significant recommendation/memorandum", "sms": "PAM 20.1", "status": "YES", "remarks": "Remarks:", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 2.1", "q": "Does vessel have electronic certificates? Are you aware how to demonstrate the validity of certificate using class approved procedure?   \nAnswer: NO , If you have to use personal wifi to access certificates", "sms": "PAM 20.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 2.1", "q": "If the vessel is certified to carry cargoes listed in table G1 (IMSBC Code-4th amendment).  \nIs there a fitness certificate provided by class?\nAnswer : NO, If vessel does not have additional equipment and the certificate of fitness for such cargoes and enter details in remarks.", "sms": "PAM 20.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 2.2", "q": "Has the vessel been provided with certificates of financial security for seafarers? Certificate must be posted in common areas. (Regulation 2.5/4.2)", "sms": "PAM 20.1", "status": "YES", "remarks": "", "guidance": "Copies of both certificates of financial security for seafarers to be displayed in the crew mess rooms.\n(a)shipowners’ liabilities for repatriation of crew & \n(b) contractual payments for death or long-term disability"}, {"app": "All Vessels", "ref": "RISQ 2.4", "q": "Is vessel complying with safe manning certificate", "sms": "PAM 11.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 2.4", "q": "Is a dispensation from flag state available and valid if short manned?", "sms": "PAM 11.4", "status": "NA", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 2.4", "q": "Are all flag and national certificates of the crew valid? If CRA is available - is it valid?", "sms": "PAM 11.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 2.5", "q": "Rest Hours - Check Following \n> Are the rest and work hours records maintained? \n> Are there any Violations? Check if there have been two or more consecutive violations for the same crew \n> Check the resthour records of key personnel against UMS timings, drills,arrival and departure ports, bunkering timings, periods of restricted visibility at random to confirm if they are matching ? \n> Has an office response received for any non conformity recorded ? ANSWER - NO if above conditions are not met.", "sms": "PAM 11.6", "status": "YES", "remarks": "", "guidance": "Rest hours to be checked for all crew specifically for fire rounds."}, {"app": "Bulk Carriers", "ref": "RISQ 2.7", "q": "Have all officers and ratings responsible for the carriage and care of dangerous and hazardous substances in solid form in bulk, including Material Hazardous Only in Bulk (MHB), have received appropriate training to comply with the STCW Convention and Code’s 2010 Manila Amendments.", "sms": "PAM 11.4", "status": "YES", "remarks": "", "guidance": "AEMTC Bulk Carier Safety Inspection and Maintenance 5d course post Jan 2023 covers training requirements. \nAlternatively, the E learning CBT on LMS \"IMSBC code- Carriage of dangerous goods in bulk\" to be done by all officers and crew.\nIMSBC training for officers and ratings via Videotel VOD box (Dangerous and difficult bulk cargo – Part 1 Best practice and IMSBC code Edition 2 and Part 2 Mineral Manmade derivatives)"}, {"app": "All Vessels", "ref": "RISQ 2.8", "q": "Have all officers and ratings responsible for the carriage and care of dangerous and hazardous substances in packaged form undertake appropriate training to ensure compliance with the STCW Convention and Code’s 2010 Manila Amendments.", "sms": "PAM 11.4", "status": "NA", "remarks": "", "guidance": "Containerships provided with the onboard HAZMAT CBT training. \nAlternatively, others vessel’s Officers & crew to complete the e learning CBT on LMS \"HAZMAT (Hazardous Materials)\""}, {"app": "All Vessels", "ref": "RISQ 2.10 Guidelines", "q": "Does the vessel have a alcometer on board. \nHas the same been calibrated within last 12 months.", "sms": "PAM 5.3 & 14.1", "status": "YES", "remarks": "Last Calibrated date:  03 Jan 2025. As per manufacture, only sensor change is required after 300 tests. So calculated due is June 2027", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 2.12", "q": "Has an unannouced drug and alcohol test been conducted on board by an external agency. \nTest must not be more than 12 months old.", "sms": "PAM 14.1", "status": "YES", "remarks": "Last Test Date: 27 JAN 2026", "guidance": "Report of unannounced drug test to be kept ready to show to Rightship Inspector"}, {"app": "All Vessels", "ref": "RISQ 2.14", "q": "Have all deck officers including Master completed the ECDIS generic training (IMO 1.27) and type-specific familiarisation on board?", "sms": "PAM 11.4.2                              NMM 13.2.3", "status": "YES", "remarks": "", "guidance": "Request FPD / Training Centre for an Accompanying letter for the ECDIS Model used for the ECDIS IMO 1.27 / Refresher course if not mentioned on Certificate. Structured fam training D41 should be filled in addition to Type specific training."}, {"app": "All Vessels", "ref": "RISQ 2.15", "q": "Have the officers and crew completed value added courses from Anglo-Easterrn Maritime Training academy? \nAre the certificates available?\nList of courses offered by Anglo Eastern Maritime Training academy can be requested from office.", "sms": "LMS,PAM 5.5", "status": "YES", "remarks": "", "guidance": "Engineers to show additional Training certificates held like Maritime Crew Resource Management, Engine room Team & Resource Management, ME / Wartsila / WinGD OEM training, Machinery Maintenance Skill Enhancement Modules 1 to 4, Hydraulics (basic / advanced) Electrical and Electronics Modules, Aux. Eng., IGF, JiBe courses"}, {"app": "All Vessels", "ref": "RISQ 3.7", "q": "Has a UKC calculation been done for this voyage and included in the passage plan including considerations for CATZOC", "sms": "NMM 7.4", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 3.12", "q": "BNWAS: \n> Is BNWAS operational while underway & at anchor and times of switching on/off recorded in bell book/log book ?\n> Is the BNWAS alarms tested and records available \n> Is the key to/password of BNWAS in custody of Master", "sms": "NMM 13.8", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.1", "q": "> Are all SMS manual updated to latest revision?  \n> Are all latest version of checklist,work instructions,plans in use?", "sms": "PAM 6.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.4", "q": "> Is Masters Review of SMS done?\n> Is a company response available", "sms": "PAM 16.4", "status": "YES", "remarks": "Date of last Masters Review: 29 SEP 2025", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 4.43", "q": "> Has safety familiarization been completed for all staff onboard, are records completed and available ?\n> Has a bridge familiarization been completed for deck offciers and records completed and available ?", "sms": "D-32A, D-17", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.1", "q": "> Is the ORB part -1 up to date? \n> Is the company guidance on making entries to ORB entries attached with ORB?", "sms": "EMM 13.2, TM126", "status": "YES", "remarks": "Date of Last entry : 05/02/2026", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.2", "q": ">  Is the SOPEP plan available and up to date \n>  Is the coastal contact list up to date and latest \n>  Has a port contact list been made for this port \n>  Is the SOPEP equipment inventory updated and checked", "sms": "SOPEP", "status": "YES", "remarks": "Date of last port contact list : 30 JAN 2026", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.3", "q": "For previous cargo washing check following: \n>  Entries in GRB Part II and deck log book for diposal of cargo residues as TM 152.  \n>  Receipts for shore disposal of wash water/cargo residue\n>  Entries for wash water disposal are made in the deck log book", "sms": "TM 152", "status": "YES", "remarks": "Date of last Cargo Disposal: 19 Jan 2026\n( Confirm entries have been made as per requirement)", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.5", "q": "Has the vessel conducted structural inspections and maintained records as per Tec 32A-S. \nPay special attention to:  \n> E/R forward bulkhead at its intersection with the topside tank structure in the aftermost cargo hold\n> Side shell plating of the cargo hold side structure\n> Side shell plating in the foremost cargo hold/stool shelf plates of the transverse bulkheads in the cargo hold\n> Transverse bulkheads at the topside tank connection\n> In the cargo hold/vertical corrugations of transverse bulkheads in the cargo hold\n> Corrugated bulkheads at the intersection of the shredder plates in the cargo holds\n> Fuel tank bulkheads within the machinery space", "sms": "TEC-32,\nTMM 8.1 & 8.2", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.7", "q": ">  Is daily sounding record for cargo hold bilge, ballast tanks, chain lockers, pipe ducts and other void spaces maintained", "sms": "BGCM 4.5", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.10                    Guideline 1", "q": ">  Is the Ballast Water treatment system in good order & were the Master & officers familiar with the vessels Ballast Wter Management plan and records available to  demonstrate ballast handling was in accordance with the plan?\n>  Is BWTS operational and maintained as per PMS \n>  Are the records of sample analysis available ?\n>  Is the USCG approval available ?\n>  Is BWTS in the  BWMP and is the plan approved by class?", "sms": "EMM 8.1 Regulation update 145", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.10                    Guideline 4", "q": "> Is senior officers of SMS/Flag state guidelines for reporting/ballast water exchange in case of BWTS failure ?\n> Is the Ballast water Treatment system in good order and were the Master and Officers familiar with the vessel's BWMP, and were records available to demonstrate the ballast handling had been conducted in accordance with the plan? (V)", "sms": "TM 186,", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.11", "q": ">  Are officers aware of contents of BWMP with special reference to class approved ballast water exchange / sedimentation control methods\n>  Is BWMP Part B updated and referred to prior port call ?\n>  Are records of  BW reporting forms to authorities available?", "sms": "EMM 8.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.12", "q": ">  Is there a record of checking and sampling ballast water prior discharge \n>  Are enties made in port log/deck log of this inspection before deballasting.\n(If ballast tanks are located adjacent to fuel oil tanks, or if  there is a possibility of contamination by hydraulic oil, the ballast tank must be sampled prior to discharge)", "sms": "BGCM 4.8.3", "status": "NO", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.15                    Guideline 1", "q": "> Are officers and crew members familiar with the operation and maintenance of the OWS equipment, including the ability to retrieve historical data from the Oil Content Monitoring (OCM) in accordance with manufacturer’s instructions?\n> Is the 15-ppm bilge alarm recording date, time and alarm status, and operating status of the 15-ppm bilge separator.\n> Is the recording device storing data for at least eighteen months and able to display or print a protocol for official inspections as required ?\n> Certificate of type approval for a 15-ppm bilge alarm available ?\n> Accuracy checked through the calibration and testing of the equipment, at intervals not exceeding five years, or within the term specified in the manufacturer’s instructions (whichever is shorter) ?\n> At least two power pumps connected to the main bilge system provided, one of which may be driven by the propulsion machinery ?", "sms": "EMM 1/3.2", "status": "YES", "remarks": "Date of last shore calibration of 15PPM monitor: 24.11.2024", "guidance": ""}, {"app": "Bulk Carriers", "ref": "RISQ 5.18", "q": ">  Is a shippers declaration for cargo available \n>  Are there declarations available for cargo harmful to the marine environment (HME Cargo)?\n>  Is crew aware of precautions when handling cargo harmful to marine environment?", "sms": "BCGM 4.9.12", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.19 & 5.20", "q": ">  Is the GRB updated and up to date \n>  Is the garbage storage/ disposal area tidy and hygienic condition? All bins should be metal with tight fitting sealing covers.\n>  GMP updated with equipment available on board such as  food waste freezer,comminuter, compactor etc. Are all equipments working. (defective equipment included in defect list/Office informed) \n> Are the training records available for the crew regarding Garbage Disposal Regulations?\n>  Are all the garbage containers marked with capacity and color coded/stencil as per GMP ?\n>  Are separate bins for e waste /cooking oil /sharps provided \n> Are garbage handling notice poster displayed in galley, pantry, garbage collection area etc?\n>  Are the entries for incineration correct, signed by person incharge\n>  Do the  entries for shore disposal match with the receipts in GRB ?\n>  Are the old record books readily available for last 2 years ?", "sms": "EMM 7", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.21", "q": ">  Is a SEEMP plan available and voyage records updated  \n>  Is the SEEMP Part I ship specific and approved by VM?\n>  Is the SEEMP part II approved by Class  and available ?\n>  Has the SEEMP review been done and records maintained ?", "sms": "EMM 11.1.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.22", "q": "Is a IEEE certificates available", "sms": "IEE Certificate\nEMM 11.1", "status": "YES", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 5.23                    Guideline 1", "q": ">  Is a exhaust gas cleaning system (scrubber system) provided \n>  Are the engineers familiar with its safe operation\n>  Have all engineers have done Ship specific Scrubber course prior joining ship and certificate of training available on board?\n>  Have C/E and 2/E reviewed the risk assessment and contingency procedure on joining or before operating the scrubber?\n>  Are engineers aware of operational procedures in normal / bypass mode and in case of system failure / deviation from normal operation?\n>  Are crew aware of potential safety hazards associated with EGCS?Action incase of medical emergencies due to hazardous chemicals ? Is required PPE available ?\n> Is method of internal monitoring of scrubber pipelines and distance piece included in  the PMS.?\n>  Is the piping condition in good condition , is it well painted and without any leaks specially at welds and at overboard discharge \n>  Is the lighting adequate in scrubber compartment ?\n> Is scrubber record book updated", "sms": "EMM/9.1\nTMM 4.1.1 Company model plan Guidelines on use of scrubber", "status": "N/A", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 6.1", "q": "> Are there are any major repairs to the hull? \n> If yes , have all the repairs to hull reported to class? \n> Is the vessel free of any defect to hull which affects water tight integrity?  \n> Is the vesel free of any major defects? (AE,ME,Steering)", "sms": "TMM 8.3.1/PAM 17.12", "status": "YES", "remarks": "NO MAJOR DEFECTS AND REPAIRS.", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 6.2", "q": "> Have the holds and tanks been inspected as per schedule and form Tec 32 A to 32S properly maintained? Self iunloading vessels may utilize lining to reduce friction.\n> Are photos of inspection available?", "sms": "TEC 32A-32S\nTMM 8.1 & 8.2 CCM Annex-1", "status": "YES", "remarks": "Date of last inspection: 19 JAN 2026", "guidance": "Rightship Inspector will record a finding if the inspection report along with supporting photo and / or video evidence for inspection, cargo holds, ballast tanks, void spaces, trunks, duct keel and cofferdams by the ship’s personnel photo and/or video evidence of such inspection is not available."}, {"app": "Bulk Carriers", "ref": "RISQ 6.3", "q": "> Is the vessel required to undergo a special survey by class rules.  \n> If yes answer below: \n: Is enhanced survey report file on board and maintained? \n: Thickness gauging report available.\n: Is condition evaluation report available. Are there any comments?\n: Is the Survey report file on board?", "sms": "Enhanced Survey Report File,\nD-33", "status": "NA", "remarks": "", "guidance": ""}, {"app": "All Vessels", "ref": "RISQ 6.4", "q": ">  Is the completed Form Tec 32E for hold and tank inspections along with photos available?\n> Are the access points to cargo holds, ballast tanks, and void spaces in good condition?\n> Are the vertical ladders, spiral ladders, rungs, stations, and platforms being in good condition?                                                                                                                                                                                        \n> Cargo hold vent closing devices are maintained in good order. \n> Ventilation ports and fan spaces (when fitted) are free of rust/paint flakes which can fall into the cargo.", "sms": "TEC 32E\nTMM 8.1 & 8.2", "status": "YES", "remarks": "Date of last inspection: 24 DEC 2025", "guidance": "Rightship Inspector will record a Finding if vertical ladders, spiral ladders, rungs, station, and platform are found damaged or corroded."}, {"app": "All Vessels", "ref": "RISQ 6.6", "q": "> Is there a duct keel on board? \nif yes answer the following, \n> Is the duct keel free of water/oil accumulation ? \n> Is the duct keel door open indication operational ?\n> Is the duct keel bilge alarm operational?\n> Is the Records of testing of alarms and indicators maintained?\n> Are the Duct Keel exhaust fan/vent damper/lighting operational?", "sms": "H&S 5.2.7\nTMM 8.1, 8.2, 12.4 & Annex 1G/2/6", "status": "N/A", "remarks": "", "guidance": "Check Rubber packing on the fire damper inside the mechanical venti
